################## Дитяча А
title: Дитяча А
icon: mdi:human-female-girl
sections:

############################ Колонка 1 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Керування

      - type: markdown
        content: >
          ### Освітлення

      - type: grid
        square: false
        columns: 3
        cards:
          - type: button
            name: Люстра
            entity: light.0x00158d000635ded8_right
            tap_action:
              action: toggle

          - type: light
            name: Настільна лампа
            entity: light.yeelight_lamp1_0x32a4ab4

          - type: light
            name: WLED стрічка
            entity: light.da_wled

      - type: custom:mushroom-cover-card
        entity: cover.0x00124b0029dee0c9
        name: Штори
        layout: horizontal
        show_buttons_control: true
        show_position_control: true

      - type: markdown
        content: >
          ### Живлення

      - type: custom:mushroom-template-card
        primary: Рекуператор
        secondary: |-
          {{ states('sensor.0x04cf8cdf3c764e0a_power') | float | round(0) }} Вт
        layout: horizontal
        tap_action:
          action: toggle
        entity: switch.0x04cf8cdf3c764e0a
        icon: mdi:power-standby
        multiline_secondary: true
        icon_color: |-
          {% if is_state("switch.0x04cf8cdf3c764e0a", "on") %}
          green
          {% else %}
          red
          {% endif %}

      - type: custom:mushroom-template-card
        primary: Живлення WLED
        secondary: |-
          {{ states('sensor.0xa4c138131a85d3ff_power') | float | round(0) }} Вт
        layout: horizontal
        tap_action:
          action: toggle
        entity: switch.0xa4c138131a85d3ff
        icon: mdi:power-standby
        multiline_secondary: true
        icon_color: |-
          {% if is_state("switch.0xa4c138131a85d3ff", "on") %}
          green
          {% else %}
          red
          {% endif %}

############################ Колонка 2 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Моніторинг

      - type: markdown
        content: >
          ### Датчики та сенсори

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Рух
            secondary: |-
              {% if is_state("binary_sensor.0x00158d00016d56f5_occupancy", "off") %}
              Нема руху
              {% else %}
              Виявлено
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d00016d56f5_occupancy
            icon: |-
              {% if is_state("binary_sensor.0x00158d00016d56f5_occupancy", "off") %}
              mdi:motion-sensor-off
              {% else %}
              mdi:motion-sensor
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d00016d56f5_occupancy", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Освітленість
            secondary: |-
              {{ states('sensor.0x04cf8cdf3c78ca91_illuminance') | float | round(0) }} lux
            layout: vertical
            entity: sensor.0x04cf8cdf3c78ca91_illuminance
            icon_color: |-
              {% if states("sensor.0x04cf8cdf3c78ca91_illuminance")|float <= 100 %}
              blue-grey
              {% elif states("sensor.0x04cf8cdf3c78ca91_illuminance")|float <= 200 %}
              grey
              {% elif states("sensor.0x04cf8cdf3c78ca91_illuminance")|float > 200 %}
              white
              {% endif %}
            icon: mdi:brightness-5
            tap_action:
              action: more-info

      - type: markdown
        content: >
          ### Колонка

      - type: media-control
        entity: media_player.living_room
        name: Колонка

      - type: markdown
        content: >
          ## Телеметрія

      - type: custom:battery-state-card
        entities:
          - entity: sensor.0x00158d00016d56f5_battery
            name: "Датчик руху"
            icon: phu:aqara-motion
          - entity: sensor.0x00158d000159c7e6_battery
            name: "Датчик температури і вологості"
            icon: phu:aqara-temperature
          - entity: sensor.0x04cf8cdf3c78ca91_battery
            name: "Датчик освітленості"
            icon: phu:friends-of-hue-aurora-dimmer-switch
          - entity: sensor.0x00158d0001583c7b_battery
            name: "Датчик відкриття вікна"
            icon: phu:aqara-contact
          - entity: sensor.0x54ef4410004c16d9_battery
            name: "Вимикач біля дверей"
            icon: phu:aqara-h1-switch

############################ Колонка 3 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Будильники

      - type: entities
        show_header_toggle: false
        entities:
          - entity: input_boolean.da_alarm1_enabled
            name: Будильник 1
          - entity: input_select.da_alarm1_repeat
            name: Період
          - entity: input_datetime.da_alarm1_time
            name: Час
          - entity: input_select.da_alarm1_tone
            name: Мелодія

      - type: entities
        show_header_toggle: false
        entities:
          - entity: input_boolean.da_alarm2_enabled
            name: Будильник 2
          - entity: input_select.da_alarm2_repeat
            name: Період
          - entity: input_datetime.da_alarm2_time
            name: Час
          - entity: input_select.da_alarm2_tone
            name: Мелодія

      - type: entities
        show_header_toggle: false
        entities:
          - entity: input_boolean.da_alarm3_enabled
            name: Будильник 3
          - entity: input_select.da_alarm3_repeat
            name: Період
          - entity: input_datetime.da_alarm3_time
            name: Час
          - entity: input_select.da_alarm3_tone
            name: Мелодія

      # - type: entities
      #   show_header_toggle: false
      #   entities:
      #     - entity: script.da_alarm_play_60s_ramp