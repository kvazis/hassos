################## Ванна кімната
title: Ванна кімната
icon: mdi:shower
sections:

############################ Колонка 1 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Керування

      - type: markdown
        content: >
          ### Освітлення та вентиляція

      - type: grid
        square: false
        columns: 3
        cards:
          - type: light
            name: Люстра
            entity: light.yeelight_ceiling3_0x45727f2

          - type: light
            name: Аварійне світло
            entity: light.0xa4c13861cd14a054

          - type: button
            name: Витяжка
            entity: fan.0x00158d000a8244b4
            tap_action:
              action: toggle

      - type: markdown
        content: >
          ### Відновлення роботи

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Доступність
            secondary: |-
              {% if is_state('light.yeelight_ceiling3_0x45727f2', 'unavailable') %}
              Недоступно
              {% else %}
              OK
              {% endif %}
            layout: horizontal
            entity: binary_sensor.kn_ceiling_unavailable
            icon: |-
              {% if is_state('light.yeelight_ceiling3_0x45727f2', 'unavailable') %}
              mdi:alert
              {% else %}
              mdi:check-bold
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state('light.yeelight_ceiling3_0x45727f2', 'unavailable') %}
              red
              {% else %}
              green
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Живлення
            secondary: |-
              {% if is_state("switch.0x00158d000a8244b4_right", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x00158d000a8244b4_right
            icon: phu:aqara-h1-switch
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x00158d000a8244b4_right", "on") %}
              green
              {% else %}
              red
              {% endif %}

      - type: markdown
        content: >
          ### Живлення

      - type: custom:mushroom-template-card
        primary: Розетка біля входу
        secondary: |-
          {{ states('sensor.0x540f57fffe78ba20_power') }} Вт
        layout: horizontal
        tap_action:
          action: toggle
        entity: switch.0x540f57fffe78ba20
        icon: mdi:power-standby
        multiline_secondary: true
        icon_color: |-
          {% if is_state("switch.0x540f57fffe78ba20", "on") %}
          green
          {% else %}
          red
          {% endif %}

############################ Колонка 2 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Моніторинг

      - type: markdown
        content: >
          ### Датчики та сенсори

      - type: grid
        square: false
        columns: 3
        cards:
          - type: custom:mushroom-template-card
            primary: Рух
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001e547a3_occupancy", "off") %}
              Нема руху
              {% else %}
              Виявлено
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0001e547a3_occupancy
            icon: |-
              {% if is_state("binary_sensor.0x00158d0001e547a3_occupancy", "off") %}
              mdi:motion-sensor-off
              {% else %}
              mdi:motion-sensor
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0001e547a3_occupancy", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Присутність
            secondary: |-
              {% if is_state("binary_sensor.0xa4c138a9cf8e75ef_presence", "off") %}
              Нікого нема
              {% else %}
              Виявлено
              {% endif %}
            layout: vertical
            entity: binary_sensor.0xa4c138a9cf8e75ef_presence
            icon: |-
              {% if is_state("binary_sensor.0xa4c138a9cf8e75ef_presence", "off") %}
              mdi:home-off
              {% else %}
              mdi:home
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0xa4c138a9cf8e75ef_presence", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Двері
            secondary: |-
              {% if is_state("binary_sensor.0x00158d00054495dc_contact", "off") %}
              Закриті
              {% else %}
              Відкриті
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d00054495dc_contact
            icon: |-
              {% if is_state("binary_sensor.0x00158d00054495dc_contact", "off") %}
              mdi:door-closed
              {% else %}
              mdi:door
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d00054495dc_contact", "off") %}
              white
              {% else %}
              grey
              {% endif %}
            tap_action:
              action: more-info

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Рукомийник
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001d72fa2_water_leak", "off") %}
              Сухо
              {% else %}
              Протікання
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0001d72fa2_water_leak
            icon: |-
              {% if is_state("binary_sensor.0x00158d0001d72fa2_water_leak", "off") %}
              mdi:water-check
              {% else %}
              mdi:water-alert
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0001d72fa2_water_leak", "off") %}
              green
              {% else %}
              red
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Кабіна
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001bb60c2_water_leak", "off") %}
              Сухо
              {% else %}
              Протікання
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0001bb60c2_water_leak
            icon: |-
              {% if is_state("binary_sensor.0x00158d0001bb60c2_water_leak", "off") %}
              mdi:water-check
              {% else %}
              mdi:water-alert
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0001bb60c2_water_leak", "off") %}
              green
              {% else %}
              red
              {% endif %}
            tap_action:
              action: more-info

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Температура
            secondary: |-
              {{ states('sensor.0x00158d0001dcd47e_temperature') }} С°
            layout: vertical
            entity: sensor.0x00158d0001dcd47e_temperature
            icon_color: |-
              {% if states("sensor.0x00158d0001dcd47e_temperature")|float <= -10 %}
              indigo
              {% elif states("sensor.0x00158d0001dcd47e_temperature")|float <= 0 %}
              blue
              {% elif states("sensor.0x00158d0001dcd47e_temperature")|float <= 10 %}
              light-blue
              {% elif states("sensor.0x00158d0001dcd47e_temperature")|float <= 20 %}
              cyan
              {% elif states("sensor.0x00158d0001dcd47e_temperature")|float <= 25 %}
              yellow
              {% elif states("sensor.0x00158d0001dcd47e_temperature")|float <= 30 %}
              amber
              {% elif states("sensor.0x00158d0001dcd47e_temperature")|float <= 40 %}
              orange
              {% endif %}
            icon: mdi:temperature-celsius
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Вологість
            secondary: |-
              {{ states('sensor.0x00158d0001dcd47e_humidity') }} %
            layout: vertical
            entity: sensor.0x00158d0001dcd47e_humidity
            icon_color: |-
              {% if states("sensor.0x00158d0001dcd47e_humidity")|float <= 30 %}
              deep-orange
              {% elif states("sensor.0x00158d0001dcd47e_humidity")|float <= 40 %}
              yellow
              {% elif states("sensor.0x00158d0001dcd47e_humidity")|float <= 50 %}
              light-blue
              {% elif states("sensor.0x00158d0001dcd47e_humidity")|float <= 60 %}
              blue
              {% elif states("sensor.0x00158d0001dcd47e_humidity")|float > 60 %}
              indigo
              {% endif %}
            icon: mdi:water-percent
            tap_action:
              action: more-info

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Температура труби
            secondary: |-
              {{ states('sensor.0xa4c13804c656ffff_temperature') }} С°
            layout: vertical
            entity: sensor.0xa4c13804c656ffff_temperature
            icon_color: |-
              {% if states("sensor.0xa4c13804c656ffff_temperature")|float <= 10 %}
              indigo
              {% elif states("sensor.0xa4c13804c656ffff_temperature")|float <= 15 %}
              blue
              {% elif states("sensor.0xa4c13804c656ffff_temperature")|float <= 20 %}
              light-blue
              {% elif states("sensor.0xa4c13804c656ffff_temperature")|float <= 25 %}
              cyan
              {% elif states("sensor.0xa4c13804c656ffff_temperature")|float <= 35 %}
              yellow
              {% elif states("sensor.0xa4c13804c656ffff_temperature")|float <= 40 %}
              amber
              {% elif states("sensor.0xa4c13804c656ffff_temperature")|float > 40 %}
              orange
              {% endif %}
            icon: mdi:temperature-celsius
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Стан труби
            secondary: |-
              {% if is_state("binary_sensor.bt_hot_water", "off") %}
              Холодна
              {% else %}
              Гаряча
              {% endif %}
            layout: vertical
            entity: binary_sensor.bt_hot_water
            icon: |-
              {% if is_state("binary_sensor.bt_hot_water", "off") %}
              mdi:water-thermometer-outline
              {% else %}
              mdi:thermometer-water
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.bt_hot_water", "off") %}
              cyan
              {% else %}
              orange
              {% endif %}
            tap_action:
              action: more-info

############################ Колонка 3 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Бойлер

      - type: markdown
        content: >
          ### Стан та керування

      - type: entities
        show_header_toggle: false
        entities:
          - entity: sensor.current_time
          - entity: switch.0x00158d0003584401_mode

          - entity: switch.0x00158d0003584401
            type: custom:multiple-entity-row
            toggle: true
            state_color: true
            name: Бойлер
            secondary_info: last-changed
            state_header: Живлення
            entities:
              - entity: sensor.0x00158d0003584401_timer_manual
                name: Таймер M
              - entity: sensor.0x00158d0003584401_power
                name: Потужність
                unit: 'Вт'

      - type: conditional
        conditions:
          - entity: switch.0x00158d0003584401
            state: "on"
        card:
          type: custom:timer-bar-card
          entities:
            - entity: timer.0x00158d0003584401
              name: Залишилось -
          modifications:
            - elapsed: 30%
              bar_foreground: yellow
            - elapsed: 60%
              bar_foreground: orange
            - elapsed: 90%
              bar_foreground: red
          bar_height: 20px
          sync_issues: ignore
          invert: true

      - type: markdown
        content: >
          ### Швидкий вибір періоду

      - type: entities
        show_header_toggle: false
        entities:
          - entity: input_datetime.0x00158d0003584401_period

      - type: grid
        square: false
        columns: 5
        cards:
          - type: custom:mushroom-template-card
            layout: vertical
            entity: input_button.0x00158d0003584401_period_1
            icon: mdi:numeric-1-circle
            icon_color: grey
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.0x00158d0003584401_period_1

          - type: custom:mushroom-template-card
            layout: vertical
            entity: input_button.0x00158d0003584401_period_2
            icon: mdi:numeric-2-circle
            icon_color: grey
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.0x00158d0003584401_period_2

          - type: custom:mushroom-template-card
            layout: vertical
            entity: input_button.0x00158d0003584401_period_3
            icon: mdi:numeric-3-circle
            icon_color: grey
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.0x00158d0003584401_period_3

          - type: custom:mushroom-template-card
            layout: vertical
            entity: input_button.0x00158d0003584401_period_4
            icon: mdi:numeric-4-circle
            icon_color: grey
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.0x00158d0003584401_period_4

          - type: custom:mushroom-template-card
            layout: vertical
            entity: input_button.0x00158d0003584401_period_5
            icon: mdi:numeric-5-circle
            icon_color: grey
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.0x00158d0003584401_period_5

      - type: markdown
        content: >
          ### Швидкий вибір таймера

      - type: entities
        show_header_toggle: false
        entities:
          - entity: input_datetime.0x00158d0003584401_timer

      - type: grid
        square: false
        columns: 6
        cards:
          - type: custom:mushroom-template-card
            layout: vertical
            entity: input_button.0x00158d0003584401_timer_1
            icon: mdi:numeric-1-circle
            icon_color: grey
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.0x00158d0003584401_timer_1

          - type: custom:mushroom-template-card
            layout: vertical
            entity: input_button.0x00158d0003584401_timer_2
            icon: mdi:numeric-2-circle
            icon_color: grey
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.0x00158d0003584401_timer_2

          - type: custom:mushroom-template-card
            layout: vertical
            entity: input_button.0x00158d0003584401_timer_3
            icon: mdi:numeric-3-circle
            icon_color: grey
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.0x00158d0003584401_timer_3

          - type: custom:mushroom-template-card
            layout: vertical
            entity: input_button.0x00158d0003584401_timer_4
            icon: mdi:numeric-4-circle
            icon_color: grey
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.0x00158d0003584401_timer_4

          - type: custom:mushroom-template-card
            layout: vertical
            entity: input_button.0x00158d0003584401_timer_5
            icon: mdi:numeric-5-circle
            icon_color: grey
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.0x00158d0003584401_timer_5

          - type: custom:mushroom-template-card
            layout: vertical
            entity: input_button.0x00158d0003584401_timer_manual
            icon: mdi:alpha-m-circle-outline
            icon_color: grey
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.0x00158d0003584401_timer_manual

      - type: markdown
        content: >
          ### Періоди роботи

      - type: entities
        show_header_toggle: false
        entities:
          - entity: switch.0x00158d0003584401_period_1_mode
            type: custom:multiple-entity-row
            toggle: true
            state_color: true
            name: Період 1
            secondary_info: last-changed
            state_header: Активність
            entities:
              - entity: sensor.0x00158d0003584401_timer_1
                name: Таймер
              - entity: sensor.0x00158d0003584401_period_1
                name: Старт

          - entity: switch.0x00158d0003584401_period_2_mode
            type: custom:multiple-entity-row
            toggle: true
            state_color: true
            name: Період 2
            secondary_info: last-changed
            state_header: Активність
            entities:
              - entity: sensor.0x00158d0003584401_timer_2
                name: Таймер
              - entity: sensor.0x00158d0003584401_period_2
                name: Старт

          - entity: switch.0x00158d0003584401_period_3_mode
            type: custom:multiple-entity-row
            toggle: true
            state_color: true
            name: Період 3
            secondary_info: last-changed
            state_header: Активність
            entities:
              - entity: sensor.0x00158d0003584401_timer_3
                name: Таймер
              - entity: sensor.0x00158d0003584401_period_3
                name: Старт

          - entity: switch.0x00158d0003584401_period_4_mode
            type: custom:multiple-entity-row
            toggle: true
            state_color: true
            name: Період 4
            secondary_info: last-changed
            state_header: Активність
            entities:
              - entity: sensor.0x00158d0003584401_timer_4
                name: Таймер
              - entity: sensor.0x00158d0003584401_period_4
                name: Старт

          - entity: switch.0x00158d0003584401_period_5_mode
            type: custom:multiple-entity-row
            toggle: true
            state_color: true
            name: Період 5
            secondary_info: last-changed
            state_header: Активність
            entities:
              - entity: sensor.0x00158d0003584401_timer_5
                name: Таймер
              - entity: sensor.0x00158d0003584401_period_5
                name: Старт

############################ Колонка 4 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Телеметрія

      - type: markdown
        content: >
          ### Стан датчиків

      - type: custom:battery-state-card
        entities:
          - entity: sensor.0x00158d0001d72fa2_battery
            name: "Датчик протікання - рукомийник"
            icon: phu:aqara-waterleak
          - entity: sensor.0x00158d0001bb60c2_battery
            name: "Датчик протікання - кабіна"
            icon: phu:aqara-waterleak
          - entity: sensor.0x00158d0001e547a3_battery
            name: "Датчик руху"
            icon: phu:aqara-motion
          - entity: sensor.0xa4c138a9cf8e75ef_battery
            name: "Датчик присутності"
            icon: phu:motion-sensor
          - entity: sensor.0x00158d00054495dc_battery
            name: "Датчик відкриття дверей"
            icon: phu:aqara-contact
          - entity: sensor.0x00158d0001dcd47e_battery
            name: "Датчик температури і вологості"
            icon: phu:aqara-temperature
          - entity: sensor.0x00158d0003d50723_battery
            name: "Бездротовий вимикач"
            icon: phu:aqara-h1-switch