          - type: custom:mushroom-template-card
            primary: Мікрохвильовка
            secondary: |-
              {{ states('sensor.0xa4c138273b49e4d0_power') }} Вт
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0xa4c138273b49e4d0
            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0xa4c138273b49e4d0", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Аерогриль
            secondary: |-
              {{ states('sensor.0xa4c138d571b656c5_power') }} Вт
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0xa4c138d571b656c5
            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0xa4c138d571b656c5", "on") %}
              green
              {% else %}
              red
              {% endif %}

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Електрогриль
            secondary: |-
