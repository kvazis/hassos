            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0xa4c138201dcb67f6", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Кавомашина
            secondary: |-
              {{ states('sensor.0xa4c13874f3d1d1c0_power') }} Вт
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0xa4c13874f3d1d1c0
            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0xa4c13874f3d1d1c0", "on") %}
              green
              {% else %}
              red
              {% endif %}

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Чайник
            secondary: |-
              {{ states('sensor.0xa4c1385bcf7d00c9_power') }} Вт
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0xa4c1385bcf7d00c9
            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0xa4c1385bcf7d00c9", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Холодильник
            secondary: |-
              {{ states('sensor.0x00158d0001fa2934_power') }} Вт
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x00158d0001fa2934
            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x00158d0001fa2934", "on") %}
              green
              {% else %}
              red
              {% endif %}

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Живлення шлюзу
            secondary: |-
              {{ states('sensor.0x00158d000114a1e1_power') }} Вт
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x00158d000114a1e1
            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x00158d000114a1e1", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Живлення телевізора
            secondary: |-
              {{ states('sensor.0x00158d0001291d12_power') }} Вт
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x00158d0001291d12
            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x00158d0001291d12", "on") %}
              green
              {% else %}
              red
              {% endif %}

############################ Колонка 2 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Моніторинг


      - type: picture-entity
        entity: camera.reolink_e1_zoom_rtsp
        camera_view: live
        show_state: false
        show_name: false

      - type: custom:mushroom-media-player-card
        entity: media_player.mi_smart_clock
        name: Колонка
        icon: phu:google-wifi-router
        use_media_info: true
        show_volume_level: true
        media_controls:
          - on_off
          - play_pause_stop
        volume_controls:
          - volume_set
          - volume_mute
          - volume_buttons
        collapsible_controls: true

      - type: custom:mushroom-media-player-card
        entity: media_player.kn_mi_box
        name: Android TV Box
        icon: phu:xiaomi-logo
        use_media_info: true
        show_volume_level: true
        media_controls:
          - on_off
          - play_pause_stop
        volume_controls:
          - volume_set
          - volume_mute
          - volume_buttons
        collapsible_controls: true

      - type: custom:mushroom-template-card
        primary: TV
        layout: horizontal
        entity: input_button.kn_tv_control
        icon: mdi:remote-tv
        multiline_secondary: true
        icon_color: blue
        tap_action:
          action: call-service
          service: input_button.press
          target:
            entity_id: input_button.kn_tv_control


      - type: markdown
        content: >
          ### Датчики та сенсори

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Вхід
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001ab3350_occupancy", "off") %}
              Не виявлено
              {% else %}
              Рух
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0001ab3350_occupancy
            icon: |-
              {% if is_state("binary_sensor.0x00158d0001ab3350_occupancy", "off") %}
              mdi:motion-sensor-off
              {% else %}
              mdi:motion-sensor
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0001ab3350_occupancy", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Холодильник
            secondary: |-
              {% if is_state("binary_sensor.0x54ef441000118375_occupancy", "off") %}
              Не виявлено
              {% else %}
              Рух
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x54ef441000118375_occupancy
            icon: |-
              {% if is_state("binary_sensor.0x54ef441000118375_occupancy", "off") %}
              mdi:motion-sensor-off
              {% else %}
              mdi:motion-sensor
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x54ef441000118375_occupancy", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: FP1
            secondary: |-
              {% if is_state("binary_sensor.0x54ef44100042e226_occupancy", "off") %}
              Не виявлено
              {% else %}
              Рух
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x54ef44100042e226_occupancy
            icon: |-
              {% if is_state("binary_sensor.0x54ef44100042e226_occupancy", "off") %}
              mdi:motion-sensor-off
              {% else %}
              mdi:motion-sensor
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x54ef44100042e226_occupancy", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Загальний рух
            secondary: |-
              {% if is_state("binary_sensor.kn_occupancy", "off") %}
              Не виявлено
              {% else %}
              Рух
              {% endif %}
            layout: vertical
            entity: binary_sensor.kn_occupancy
            icon: |-
              {% if is_state("binary_sensor.kn_occupancy", "off") %}
              mdi:motion-sensor-off
              {% else %}
              mdi:motion-sensor
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.kn_occupancy", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Освітленість
            secondary: |-
              {{ states('sensor.0x04cf8cdf3c772379_illuminance') }} lux
            layout: vertical
            entity: sensor.0x04cf8cdf3c772379_illuminance
            icon_color: |-
              {% if states("sensor.0x04cf8cdf3c772379_illuminance")|float <= 100 %}
              blue-grey
              {% elif states("sensor.0x04cf8cdf3c772379_illuminance")|float <= 200 %}
              grey
              {% elif states("sensor.0x04cf8cdf3c772379_illuminance")|float > 200 %}
              white
              {% endif %}
            icon: mdi:brightness-5
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: FP1
            secondary: |-
              {% if is_state("binary_sensor.0x54ef44100042e226_presence", "off") %}
              Не виявлено
              {% else %}
              Присутність
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x54ef44100042e226_presence
            icon: |-
              {% if is_state("binary_sensor.0x54ef44100042e226_presence", "off") %}
              mdi:home-off
              {% else %}
              mdi:home-account
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x54ef44100042e226_presence", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

      - type: entities
        show_header_toggle: false
        entities:
          - entity: sensor.kn_fridge_meter
            name: Споживання за годину
          - entity: sensor.kn_fridge_max_energy_day
            name: Максимальне споживання за добу
          - entity: sensor.kn_fridge_max_power_day
            name: Максимальна потужність за добу

      - type: markdown
        content: >
          ### Рослини

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Заміокулькас
            secondary: |-
              {{ states('sensor.0x00124b0022145c90_soil_moisture') }} %
            layout: vertical
            entity: sensor.0x00124b0022145c90_soil_moisture
            icon_color: |-
              {% if states("sensor.0x00124b0022145c90_soil_moisture")|float <= 70 %}
              deep-orange
              {% elif states("sensor.0x00124b0022145c90_soil_moisture")|float <= 80 %}
              yellow
              {% elif states("sensor.0x00124b0022145c90_soil_moisture")|float <= 90 %}
              light-blue
              {% elif states("sensor.0x00124b0022145c90_soil_moisture")|float <= 100 %}
              blue
              {% endif %}
            icon: mdi:sprout
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Юка
            secondary: |-
              {{ states('sensor.0x00124b0022145bc7_soil_moisture') }} %
            layout: vertical
            entity: sensor.0x00124b0022145bc7_soil_moisture
            icon_color: |-
              {% if states("sensor.0x00124b0022145bc7_soil_moisture")|float <= 70 %}
              deep-orange
              {% elif states("sensor.0x00124b0022145bc7_soil_moisture")|float <= 80 %}
              yellow
              {% elif states("sensor.0x00124b0022145bc7_soil_moisture")|float <= 90 %}
              light-blue
              {% elif states("sensor.0x00124b0022145bc7_soil_moisture")|float <= 100 %}
              blue
              {% endif %}
            icon: mdi:spa
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Дифенбахія
            secondary: |-
              {{ states('sensor.0x00124b0022027bd2_soil_moisture') }} %
            layout: vertical
            entity: sensor.0x00124b0022027bd2_soil_moisture
            icon_color: |-
              {% if states("sensor.0x00124b0022027bd2_soil_moisture")|float <= 70 %}
              deep-orange
              {% elif states("sensor.0x00124b0022027bd2_soil_moisture")|float <= 80 %}
              yellow
              {% elif states("sensor.0x00124b0022027bd2_soil_moisture")|float <= 90 %}
              light-blue
              {% elif states("sensor.0x00124b0022027bd2_soil_moisture")|float <= 100 %}
              blue
              {% endif %}
            icon: mdi:tree
            tap_action:
              action: more-info

