##################   Кухня
title: Кухня
icon: phu:rooms-dining
sections:

############################ Колонка 1 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Керування

      - type: markdown
        content: >
          ### Освітлення

      - type: horizontal-stack
        cards:

          - type: button
            name: Люстра
            entity: light.kn_ceiling_light
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.kn_ceiling_light

          - type: button
            name: Нічник
            entity: light.gateway_light_7811dc64f4c8
            tap_action:
              action: toggle

      - type: conditional
        conditions:
          - entity: light.kn_ceiling_light
            state: "on"
        card:
          type: custom:mushroom-light-card
          entity: light.kn_ceiling_light
          name: Люстра
          icon_type: none
          primary_info: name
          secondary_info: none
          use_light_color: true
          show_brightness_control: true
          show_color_temp_control: true
          show_color_control: false
          collapsible_controls: true

      - type: conditional
        conditions:
          - entity: light.0x00158d000420dbab
            state: "on"
        card:
          type: custom:mushroom-light-card
          entity: light.0x00158d000420dbab
          name: Лампочка
          icon_type: none
          primary_info: name
          secondary_info: none
          use_light_color: true
          show_brightness_control: true
          show_color_temp_control: true
          show_color_control: false
          collapsible_controls: true

      - type: markdown
        content: >
          ### Люстра

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Доступність
            secondary: |-
              {% if is_state('light.kn_ceiling_light', 'unavailable') %}
              Недоступно
              {% else %}
              OK
              {% endif %}
            layout: horizontal
            entity: binary_sensor.kn_ceiling_unavailable
            icon: |-
              {% if is_state('light.kn_ceiling_light', 'unavailable') %}
              mdi:alert
              {% else %}
              mdi:check-bold
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state('light.kn_ceiling_light', 'unavailable') %}
              red
              {% else %}
              green
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Живлення
            secondary: |-
              {% if is_state("switch.0x54ef4410000f4741_right", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x54ef4410000f4741_right
            icon: phu:aqara-h1-switch
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x54ef4410000f4741_right", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Ручне перезавантаження
            layout: horizontal
            entity: input_button.kn_ceiling_reset
            icon: mdi:reload
            multiline_secondary: true
            icon_color: amber
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.kn_ceiling_reset

      - type: markdown
        content: >
          ### Нічник

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Доступність
            secondary: |-
              {% if is_state('light.gateway_light_7811dc64f4c8', 'unavailable') %}
              Недоступно
              {% else %}
              OK
              {% endif %}
            layout: horizontal
            entity: binary_sensor.kn_migateway_unavailable
            icon: |-
              {% if is_state('light.gateway_light_7811dc64f4c8', 'unavailable') %}
              mdi:alert
              {% else %}
              mdi:check-bold
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state('light.gateway_light_7811dc64f4c8', 'unavailable') %}
              red
              {% else %}
              green
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Живлення
            secondary: |-
              {% if is_state("switch.0x00158d000114a1e1", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x00158d000114a1e1
            icon: mdi:power-socket-eu
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x00158d000114a1e1", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Ручне перезавантаження
            layout: horizontal
            entity: input_button.kn_gateway_reset
            icon: mdi:reload
            multiline_secondary: true
            icon_color: amber
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.kn_gateway_reset

      - type: markdown
        content: >
          ## Живлення

      - type: markdown
        content: >
          ### Розетки

      - type: horizontal-stack
