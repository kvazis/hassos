              {% elif states("sensor.0xa4c138dc97e602e5_illuminance")|float <= 400 %}
              grey
              {% elif states("sensor.0xa4c138dc97e602e5_illuminance")|float > 400 %}
              white
              {% endif %}
            icon: mdi:brightness-5
            tap_action:
              action: more-info

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Рух
            secondary: |-
              {% if is_state("binary_sensor.0x00158d00010f8920_occupancy", "off") %}
              Нема руху
              {% else %}
              Виявлено
