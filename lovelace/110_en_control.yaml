################## Поверх, вхід
title: Поверх, вхід
icon: phu:rooms-other
sections:
  - type: grid
    cards:

      - type: markdown
        content: >
           ## Керування

      - type: markdown
        content: >
           ### Освітлення

      - type: horizontal-stack
        cards:

          - type: light
            name: Освітлення при вході
            entity: light.0x00158d0003e74c31

          # - type: light
          #   name: Гірлянда
          #   entity: light.outsmart_rgbic_led

      - type: horizontal-stack
        cards:

          - type: light
            name: Люстра коридор
            entity: light.yeelight_ceiling4_0x456e813

          - type: light
            name: Амбілайт
            entity: light.yeelight_ceiling4_0x456e813_ambilight

      - type: markdown
        content: >
           ### Відновлення роботи

      - type: markdown
        content: >
           ### Освітлення при вході

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Доступність
            secondary: |-
              {% if is_state("binary_sensor.en_light_unavailable", "off") %}
              OK
              {% else %}
              Недоступно
              {% endif %}
            layout: horizontal
            entity: binary_sensor.en_light_unavailable
            icon: |-
              {% if is_state("binary_sensor.en_light_unavailable", "off") %}
              mdi:check-bold
              {% else %}
              mdi:alert
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.en_light_unavailable", "off") %}
              green
              {% else %}
              red
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Живлення
            secondary: |-
              {% if is_state("switch.0x00158d00057305ac_right", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x00158d00057305ac_right
            icon: phu:aqara-h1-switch
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x00158d00057305ac_right", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Перезавантаження
            layout: horizontal
            entity: input_button.en_light_reboot
            icon: mdi:reload
            multiline_secondary: true
            icon_color: amber
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.en_light_reboot

      - type: markdown
        content: >
           ### Люстра в коридорі

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Доступність
            secondary: |-
              {% if is_state("light.yeelight_ceiling4_0x456e813", "unavailable") %}
              Недоступно
              {% else %}
              ОК
              {% endif %}
            layout: horizontal
            entity: binary_sensor.cr_ceiling_unavailable
            icon: |-
              {% if is_state("light.yeelight_ceiling4_0x456e813", "unavailable") %}
              mdi:alert
              {% else %}
              mdi:check-bold
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("light.yeelight_ceiling4_0x456e813", "unavailable") %}
              red
              {% else %}
              green
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Живлення
            secondary: |-
              {% if is_state("switch.0x00158d00057305ac_left", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x00158d00057305ac_left
            icon: phu:aqara-h1-switch
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x00158d00057305ac_left", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Перезавантаження
            layout: horizontal
            entity: input_button.cr_ceiling_reboot
            icon: mdi:reload
            multiline_secondary: true
            icon_color: amber
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.cr_ceiling_reboot

  - type: grid
    cards:

      - type: markdown
        content: >
           ## Моніторинг

      - type: picture-entity
        entity: camera.mi_2k
        camera_view: live
        show_state: false
        show_name: false

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-entity-card
            entity: input_button.mi_2k
            layout: horizontal
            icon_color: blue
            icon: mdi:camera
            primary_info: name
            name: Фото
            secondary_info: last-changed
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.mi_2k

          - type: custom:mushroom-template-card
            primary: Живлення
            secondary: |-
              {% if is_state("switch.sonoff_1000d036a0_1", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.sonoff_1000d036a0_1
            icon: phu:aqara-h1-switch
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.sonoff_1000d036a0_1", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Рух
            secondary: |-
              {% if is_state("binary_sensor.en_mi_2k_motion", "off") %}
              Нема руху
              {% else %}
              Виявлено
              {% endif %}
            layout: horizontal
            entity: binary_sensor.en_mi_2k_motion
            icon: |-
              {% if is_state("binary_sensor.en_mi_2k_motion", "off") %}
              mdi:motion-sensor-off
              {% else %}
              mdi:motion-sensor
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.en_mi_2k_motion", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

      - type: markdown
        content: >
           ### Датчики та сенсори в передпокої

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Дим
            secondary: |-
              {% if is_state("binary_sensor.0x00158d000149d28b_smoke", "off") %}
              OK
              {% else %}
              Задимлення
              {% endif %}
            layout: horizontal
            entity: binary_sensor.0x00158d000149d28b_smoke
            icon: phu:aqara-smoke-detector
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d000149d28b_smoke", "off") %}
              green
              {% else %}
              red
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Рух
            secondary: |-
              {% if is_state("binary_sensor.0x00158d00013f7894_occupancy", "off") %}
              Нема руху
              {% else %}
              Виявлено
              {% endif %}
            layout: horizontal
            entity: binary_sensor.0x00158d00013f7894_occupancy
            icon: |-
              {% if is_state("binary_sensor.0x00158d00013f7894_occupancy", "off") %}
              mdi:motion-sensor-off
              {% else %}
              mdi:motion-sensor
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d00013f7894_occupancy", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Двері
            secondary: |-
              {% if is_state("binary_sensor.0x00158d000119378d_contact", "off") %}
              Закриті
              {% else %}
              Відкриті
              {% endif %}
            layout: horizontal
            entity: binary_sensor.0x00158d000119378d_contact
            icon: |-
              {% if is_state("binary_sensor.0x00158d000119378d_contact", "off") %}
              phu:panel-frontdoor-close
              {% else %}
              phu:panel-frontdoor-open
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d000119378d_contact", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Температура
            secondary: |-
              {{ states('sensor.0x54ef44100001b68d_temperature') }} С°
            layout: horizontal
            entity: sensor.0x54ef44100001b68d_temperature
            icon_color: |-
              {% if states("sensor.0x54ef44100001b68d_temperature")|float <= -10 %}
              indigo
              {% elif states("sensor.0x54ef44100001b68d_temperature")|float <= 0 %}
              blue
              {% elif states("sensor.0x54ef44100001b68d_temperature")|float <= 10 %}
              light-blue
              {% elif states("sensor.0x54ef44100001b68d_temperature")|float <= 20 %}
              cyan
              {% elif states("sensor.0x54ef44100001b68d_temperature")|float <= 25 %}
              yellow
              {% elif states("sensor.0x54ef44100001b68d_temperature")|float <= 30 %}
              amber
              {% elif states("sensor.0x54ef44100001b68d_temperature")|float <= 40 %}
              orange
              {% endif %}
            icon: mdi:temperature-celsius
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Вологість
            secondary: |-
              {{ states('sensor.0x54ef44100001b68d_humidity') }} %
            layout: horizontal
            entity: sensor.0x54ef44100001b68d_humidity
            icon_color: |-
              {% if states("sensor.0x54ef44100001b68d_humidity")|float <= 30 %}
              deep-orange
              {% elif states("sensor.0x54ef44100001b68d_humidity")|float <= 40 %}
              yellow
              {% elif states("sensor.0x54ef44100001b68d_humidity")|float <= 50 %}
              light-blue
              {% elif states("sensor.0x54ef44100001b68d_humidity")|float <= 60 %}
              blue
              {% elif states("sensor.0x54ef44100001b68d_humidity")|float > 60 %}
              indigo
              {% endif %}
            icon: mdi:water-percent
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: VOC
            secondary: |-
              {{ states('sensor.0x54ef44100001b68d_voc') }} ppb
            layout: horizontal
            entity: sensor.0x54ef44100001b68d_voc
            icon_color: |-
              {% if states("sensor.0x54ef44100001b68d_voc")|float <= 65 %}
              green
              {% elif states("sensor.0x54ef44100001b68d_voc")|float <= 220 %}
              light-green
              {% elif states("sensor.0x54ef44100001b68d_voc")|float <= 450 %}
              lime
              {% elif states("sensor.0x54ef44100001b68d_voc")|float <= 660 %}
              yellow
              {% elif states("sensor.0x54ef44100001b68d_voc")|float <= 1500 %}
              orange
              {% elif states("sensor.0x54ef44100001b68d_voc")|float > 1500 %}
              red
              {% endif %}
            icon: mdi:virus
            tap_action:
              action: more-info

      - type: markdown
        content: >
           ### Датчики та сенсори в коридорі

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Присутність
            secondary: |-
