              deep-orange
              {% elif states("sensor.0x00124b0022659c04_humidity")|float <= 40 %}
              yellow
              {% elif states("sensor.0x00124b0022659c04_humidity")|float <= 50 %}
              light-blue
              {% elif states("sensor.0x00124b0022659c04_humidity")|float <= 60 %}
              blue
              {% elif states("sensor.0x00124b0022659c04_humidity")|float > 60 %}
