              Нема руху
              {% else %}
              Виявлено
              {% endif %}
            layout: horizontal
            entity: binary_sensor.0xa4c138dc97e602e5_presence
            icon: |-
              {% if is_state("binary_sensor.0xa4c138dc97e602e5_presence", "off") %}
