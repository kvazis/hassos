############################ Автономне живлення ############################
title: Deye
icon: phu:fronius-inverter-gen24
sections:

############################ Колонка 1 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Deye Sun15

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Мережа
            secondary: |-
              {% if is_state("binary_sensor.deye_sun15_grid", "on") %}
              Є живлення
              {% else %}
              Немає живлення
              {% endif %}
            layout: vertical
            entity: binary_sensor.deye_sun15_grid
            icon: |-
              {% if is_state("binary_sensor.deye_sun15_grid", "on") %}
              mdi:transmission-tower
              {% else %}
              mdi:transmission-tower-off
              {% endif %}
            icon_color: |-
              {% if is_state("binary_sensor.deye_sun15_grid", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Місто
            secondary: |-
              {{ states('sensor.deye_sun15_grid_power') }} W
            layout: vertical
            entity: sensor.deye_sun15_grid_power
            icon: mdi:transmission-tower-import
            icon_color: blue

          - type: custom:mushroom-template-card
            primary: Навантаження
            secondary: |-
              {{ states('sensor.deye_sun15_load_power') }} W
            layout: vertical
            entity: sensor.deye_sun15_load_power
            icon: mdi:home-lightning-bolt
            icon_color: amber

      - type: markdown
        content: >
          ### Параметри мережі

      - type: entities
        entities:

          - type: custom:multiple-entity-row
            entity: sensor.deye_sun15_grid_l1_power
            name: Фаза 1
            state_header: Потужність
            entities:
              - entity: sensor.deye_sun15_grid_l1_voltage
                name: Напруга

          - type: custom:multiple-entity-row
            entity: sensor.deye_sun15_grid_l2_power
            name: Фаза 2
            state_header: Потужність
            entities:
              - entity: sensor.deye_sun15_grid_l2_voltage
                name: Напруга

          - type: custom:multiple-entity-row
            entity: sensor.deye_sun15_grid_l3_power
            name: Фаза 3
            state_header: Потужність
            entities:
              - entity: sensor.deye_sun15_grid_l3_voltage
                name: Напруга

      - type: markdown
        content: >
          ### Вихід інвертора

      - type: entities
        entities:

          - type: custom:multiple-entity-row
            entity: sensor.deye_sun15_load_l1_power
            name: Фаза 1
            state_header: Потужність
            entities:
              - entity: sensor.deye_sun15_load_l1_voltage
                name: Напруга

          - type: custom:multiple-entity-row
            entity: sensor.deye_sun15_load_l2_power
            name: Фаза 2
            state_header: Потужність
            entities:
              - entity: sensor.deye_sun15_load_l2_voltage
                name: Напруга

          - type: custom:multiple-entity-row
            entity: sensor.deye_sun15_load_l3_power
            name: Фаза 3
            state_header: Потужність
            entities:
              - entity: sensor.deye_sun15_load_l3_voltage
                name: Напруга

############################ Колонка 2 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ### Система

      - type: custom:power-flow-card-plus
        clickable_entities: true
        entities:
          grid:
            entity: sensor.deye_sun15_grid_power
            power_outage:
              entity: binary_sensor.deye_sun15_grid
              state_alert: "off"
              display_state: one_way
              color_circle: true
          battery:
            entity:
              consumption: sensor.deye_sun15_battery_power_consumption
              production: sensor.deye_sun15_battery_power_production
            state_of_charge: sensor.deye_sun15_battery
            display_state: one_way
            color_circle: true
          home:
            entity: sensor.deye_sun15_load_power
            override_state: true
          individual:
            - entity: sensor.deye_sun15_load_l1_power
              name: L1 out
              icon: mdi:power-socket-eu
              display_zero: true
            - entity: sensor.deye_sun15_load_l2_power
              name: L2 out
              icon: mdi:power-socket-eu
              display_zero: true
            - entity: sensor.deye_sun15_load_l3_power
              name: L3 out
              icon: mdi:power-socket-eu
              display_zero: true

      - type: custom:sunsynk-power-flow-card
        cardstyle: compact
        show_solar: false
        show_grid: true
        show_battery: true
        show_loads: true

        inverter:
          modern: true
          model: deye
          autarky: none
          three_phase: true

        battery:
          shutdown_soc: 15
          auto_scale: true
          invert_power: false
          energy: sensor.deye_sun15_battery_capacity

        entities:
          grid_power_169: sensor.deye_sun15_grid_power
          grid_ct_power_172: sensor.deye_sun15_grid_power
          grid_connected_status_194: binary_sensor.deye_sun15_grid

          battery_soc_184: sensor.deye_sun15_battery
          battery_power_190: sensor.deye_sun15_battery_power
          battery_voltage_183: sensor.deye_sun15_battery_voltage
          battery_current_191: sensor.deye_sun15_battery_current

          load_power_172: sensor.deye_sun15_load_power
          essential_power: sensor.deye_sun15_load_power

          load_power_L1: sensor.deye_sun15_load_l1_power
          load_power_L2: sensor.deye_sun15_load_l2_power
          load_power_L3: sensor.deye_sun15_load_l3_power

          inverter_power_175: sensor.deye_sun15_internal_power

      - type: grid
        square: false
        columns: 3
        cards:
          - type: custom:mushroom-template-card
            primary: L1
            secondary: |-
              {{ states('sensor.deye_sun15_load_l1_power') | float | round(0) }} Вт
            layout: vertical
            entity: sensor.deye_sun15_load_l1_power
            icon: mdi:lightning-bolt
            icon_color: |-
              {% set p = states('sensor.deye_sun15_load_l1_power')|float %}
              {% if p < 100 %}
              green
              {% elif p < 300 %}
              yellow
              {% elif p < 600 %}
              orange
              {% else %}
              red
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: L2
            secondary: |-
              {{ states('sensor.deye_sun15_load_l2_power') | float | round(0) }} Вт
            layout: vertical
            entity: sensor.deye_sun15_load_l2_power
            icon: mdi:lightning-bolt
            icon_color: |-
              {% set p = states('sensor.deye_sun15_load_l2_power')|float %}
              {% if p < 100 %}
              green
              {% elif p < 300 %}
              yellow
              {% elif p < 600 %}
              orange
              {% else %}
              red
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: L3
            secondary: |-
              {{ states('sensor.deye_sun15_load_l3_power') | float | round(0) }} Вт
            layout: vertical
            entity: sensor.deye_sun15_load_l3_power
            icon: mdi:lightning-bolt
            icon_color: |-
              {% set p = states('sensor.deye_sun15_load_l3_power')|float %}
              {% if p < 100 %}
              green
              {% elif p < 300 %}
              yellow
              {% elif p < 600 %}
              orange
              {% else %}
              red
              {% endif %}
            tap_action:
              action: more-info

      - type: markdown
        content: >
          ### Статистика

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Останнє зникнення
            secondary: |-
              {{ states('input_datetime.deye_sun15_grid_off') }}
            layout: vertical
            entity: input_datetime.deye_sun15_grid_off
            icon: mdi:power-plug-off
            multiline_secondary: true
            icon_color: red
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Остання поява
            secondary: |-
              {{ states('input_datetime.deye_sun15_grid_on') }}
            layout: vertical
            entity: input_datetime.deye_sun15_grid_on
            icon: mdi:power-plug
            multiline_secondary: true
            icon_color: green
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Учора
            secondary: |-
              {{ states('sensor.deye_sun15_grid_on_yesterday') }}
            layout: vertical
            entity: sensor.deye_sun15_grid_on_yesterday
            icon: mdi:calendar-clock
            multiline_secondary: true
            icon_color: blue
            tap_action:
              action: more-info

############################ Колонка 3 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ### Управління

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Режим
            secondary: |-
              {{ states('input_select.deye_sun15_mode') }}
            layout: vertical
            entity: input_select.deye_sun15_mode
            icon: mdi:home-lightning-bolt-outline
            multiline_secondary: true
            icon_color: amber
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Активний режим
            secondary: |-
              {{ states('sensor.deye_sun15_effective_mode') }}
            layout: vertical
            entity: sensor.deye_sun15_effective_mode
            icon: mdi:state-machine
            multiline_secondary: true
            icon_color: |-
              {% set mode = states('sensor.deye_sun15_effective_mode') %}
              {% if mode == 'normal' %}
              green
              {% elif mode == 'eco_day' %}
              amber
              {% elif mode == 'eco_night' %}
              blue
              {% elif mode == 'supereco' %}
              purple
              {% else %}
              grey
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: TOU
            secondary: |-
              {{ states('select.deye_sun15_time_of_use') }}
            layout: vertical
            entity: select.deye_sun15_time_of_use
            icon: mdi:clock-outline
            multiline_secondary: true
            icon_color: blue
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Автовимкнення
            secondary: |-
              {% if is_state("input_boolean.deye_sun15_auto_power_off", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: vertical
            entity: input_boolean.deye_sun15_auto_power_off
            icon: mdi:power-sleep
            multiline_secondary: true
            icon_color: |-
              {% if is_state("input_boolean.deye_sun15_auto_power_off", "on") %}
              amber
              {% else %}
              grey
              {% endif %}
            tap_action:
              action: toggle

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Заряд від мережі
            secondary: |-
              {% if is_state("switch.deye_sun15_battery_grid_charging", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: vertical
            entity: switch.deye_sun15_battery_grid_charging
            icon: mdi:battery-charging
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.deye_sun15_battery_grid_charging", "on") %}
              green
              {% else %}
              grey
              {% endif %}
            tap_action:
              action: toggle

          - type: custom:mushroom-template-card
            primary: Очікуваний заряд
            secondary: |-
              {{ states('sensor.deye_sun15_expected_grid_charging') }}
            layout: vertical
            entity: sensor.deye_sun15_expected_grid_charging
            icon: mdi:battery-charging-medium
            multiline_secondary: true
            icon_color: |-
              {% if is_state("sensor.deye_sun15_expected_grid_charging", "on") %}
              green
              {% else %}
              grey
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Очікуваний TOU
            secondary: |-
              {{ states('sensor.deye_sun15_expected_tou') }}
            layout: vertical
            entity: sensor.deye_sun15_expected_tou
            icon: mdi:timer-outline
            multiline_secondary: true
            icon_color: blue
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Стан логіки
            secondary: |-
              {% if is_state("binary_sensor.deye_sun15_mode_mismatch", "on") %}
              Є невідповідність
              {% else %}
              Норма
              {% endif %}
            layout: vertical
            entity: binary_sensor.deye_sun15_mode_mismatch
            icon: |-
              {% if is_state("binary_sensor.deye_sun15_mode_mismatch", "on") %}
              mdi:alert-circle
              {% else %}
              mdi:check-circle
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.deye_sun15_mode_mismatch", "on") %}
              red
              {% else %}
              green
              {% endif %}
            tap_action:
              action: more-info

      - type: entities
        entities:
          - entity: binary_sensor.deye_sun15_night_tariff
          - entity: binary_sensor.deye_sun15_grid_charging_mismatch
          - entity: binary_sensor.deye_sun15_tou_mismatch

      - type: markdown
        content: >
          ### Акумулятор

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Заряд
            secondary: |-
              {{ states('sensor.deye_sun15_battery') }} %
            layout: vertical
            entity: sensor.deye_sun15_battery
            icon: mdi:battery
            multiline_secondary: true
            icon_color: |-
              {% set b = states('sensor.deye_sun15_battery')|float %}
              {% if b <= 15 %}
              red
              {% elif b <= 35 %}
              orange
              {% elif b <= 60 %}
              yellow
              {% else %}
              green
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Розряд сьогодні
            secondary: |-
              {{ states('sensor.deye_sun15_today_battery_discharge') }}
            layout: vertical
            entity: sensor.deye_sun15_today_battery_discharge
            icon: mdi:battery-high
            multiline_secondary: true
            icon_color: green
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Стан
            secondary: |-
              {{ states('sensor.deye_sun15_battery_state') }}
            layout: vertical
            entity: sensor.deye_sun15_battery_state
            icon: mdi:battery-sync
            multiline_secondary: true
            icon_color: blue
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Аварія
            secondary: |-
              {% if is_state("binary_sensor.deye_sun15_battery_alarm", "on") %}
              Є тривога
              {% else %}
              Норма
              {% endif %}
            layout: vertical
            entity: binary_sensor.deye_sun15_battery_alarm
            icon: |-
              {% if is_state("binary_sensor.deye_sun15_battery_alarm", "on") %}
              mdi:alert
              {% else %}
              mdi:check-circle
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.deye_sun15_battery_alarm", "on") %}
              red
              {% else %}
              green
              {% endif %}
            tap_action:
              action: more-info

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Напруга
            secondary: |-
              {{ states('sensor.deye_sun15_battery_voltage') }} V
            layout: vertical
            entity: sensor.deye_sun15_battery_voltage
            icon: mdi:sine-wave
            multiline_secondary: true
            icon_color: amber
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Струм
            secondary: |-
              {{ states('sensor.deye_sun15_battery_current') }} A
            layout: vertical
            entity: sensor.deye_sun15_battery_current
            icon: mdi:current-dc
            multiline_secondary: true
            icon_color: amber
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Потужність
            secondary: |-
              {{ states('sensor.deye_sun15_battery_power') }} W
            layout: vertical
            entity: sensor.deye_sun15_battery_power
            icon: mdi:flash
            multiline_secondary: true
            icon_color: amber
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Температура
            secondary: |-
              {{ states('sensor.deye_sun15_battery_temperature') }} °C
            layout: vertical
            entity: sensor.deye_sun15_battery_temperature
            icon: mdi:thermometer
            multiline_secondary: true
            icon_color: |-
              {% set t = states('sensor.deye_sun15_battery_temperature')|float %}
              {% if t < 5 %}
              blue
              {% elif t < 35 %}
              green
              {% elif t < 45 %}
              orange
              {% else %}
              red
              {% endif %}
            tap_action:
              action: more-info

      - type: entities
        entities:
          - entity: number.deye_sun15_battery_grid_charging_current
          - entity: number.deye_sun15_battery_low_soc
          - type: divider
          - entity: sensor.deye_sun15_dc_temperature

############################ Колонка 4 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ### TOU профіль та інтервали

      - type: entities
        entities:
          - entity: input_select.deye_sun15_tou_profile

      - type: entities
        entities:
          - entity: select.deye_sun15_program_1_charging
          - entity: time.deye_sun15_program_1_time
          - entity: number.deye_sun15_program_1_soc
          - type: divider
          - entity: select.deye_sun15_program_2_charging
          - entity: time.deye_sun15_program_2_time
          - entity: number.deye_sun15_program_2_soc
          - type: divider
          - entity: select.deye_sun15_program_3_charging
          - entity: time.deye_sun15_program_3_time
          - entity: number.deye_sun15_program_3_soc
          - type: divider
          - entity: select.deye_sun15_program_4_charging
          - entity: time.deye_sun15_program_4_time
          - entity: number.deye_sun15_program_4_soc
          - type: divider
          - entity: select.deye_sun15_program_5_charging
          - entity: time.deye_sun15_program_5_time
          - entity: number.deye_sun15_program_5_soc
          - type: divider
          - entity: select.deye_sun15_program_6_charging
          - entity: time.deye_sun15_program_6_time
          - entity: number.deye_sun15_program_6_soc