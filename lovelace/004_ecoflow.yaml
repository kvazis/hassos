############################ Живлення ############################
title: Ecoflow
icon: phu:solar-battery-10
sections:

############################ Колонка 1 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ### Ecoflow Delta 2 1024 Wh

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: AC
            secondary: |-
              {% if is_state("switch.delta_2_ac_enabled", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: vertical
            entity: switch.delta_2_ac_enabled
            icon: mdi:power-plug
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.delta_2_ac_enabled", "on") %}
              green
              {% else %}
              grey
              {% endif %}
            tap_action:
              action: toggle

          - type: custom:mushroom-template-card
            primary: DC 12V
            secondary: |-
              {% if is_state("switch.delta_2_dc_12v_enabled", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: vertical
            entity: switch.delta_2_dc_12v_enabled
            icon: mdi:current-dc
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.delta_2_dc_12v_enabled", "on") %}
              green
              {% else %}
              grey
              {% endif %}
            tap_action:
              action: toggle

          - type: custom:mushroom-template-card
            primary: Заряд
            secondary: |-
              {{ states('sensor.delta_2_battery_level') }} %
            layout: vertical
            entity: sensor.delta_2_battery_level
            icon: mdi:battery
            multiline_secondary: true
            icon_color: |-
              {% set b = states('sensor.delta_2_battery_level')|float %}
              {% if b <= 15 %}
              red
              {% elif b <= 35 %}
              orange
              {% elif b <= 60 %}
              yellow
              {% else %}
              green
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Час роботи
            secondary: |-
              {{ states('sensor.delta_2_discharge_remaining_time') }}
            layout: vertical
            entity: sensor.delta_2_discharge_remaining_time
            icon: mdi:timer-outline
            multiline_secondary: true
            icon_color: blue
            tap_action:
              action: more-info

      - type: entities
        entities:
          - entity: sensor.delta_2_ac_in_volts
          - entity: sensor.delta_2_ac_out_volts
          - type: divider
          - entity: number.delta_2_ac_charging_power
          - entity: number.delta_2_max_charge_level
          - entity: number.delta_2_min_discharge_level
          - type: divider
          - entity: sensor.delta_2_state_of_health
          - entity: sensor.delta_2_cycles
          - entity: input_boolean.delta_2_stage_1
          - entity: input_boolean.delta_2_stage_2
          - entity: input_boolean.delta_2_stage_3

      - type: custom:power-flow-card-plus
        clickable_entities: true
        entities:
          grid:
            entity: sensor.delta_2_ac_in_power
            power_outage:
              entity: binary_sensor.electricity
              state_alert: "on"
              display_state: one_way
              color_circle: true
          solar:
            entity: sensor.delta_2_solar_in_power
          battery:
            entity:
              consumption: sensor.delta_2_battery_out_power
              production: sensor.delta_2_battery_in_power
            state_of_charge: sensor.delta_2_battery_level
            display_state: one_way
            color_circle: true
          home:
            entity: sensor.delta_2_total_out_power
            override_state: true
          individual:
            - entity: sensor.delta_2_ac_out_power
              name: AC out
              icon: mdi:power-socket-eu
              display_zero: true
            - entity: sensor.delta_2_usb_out_power
              name: USB A out
              icon: mdi:usb-port
              display_zero: true
            - entity: sensor.delta_2_type_c_out_power
              name: USB C out
              icon: mdi:usb-c-port
              display_zero: true
            - entity: sensor.delta_2_dc_out_power
              name: DC out
              icon: mdi:current-dc
              display_zero: true

