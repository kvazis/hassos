############################ Живлення ############################
title: Зовнішнє живлення
icon: mdi:transmission-tower
sections:

############################ Колонка 1 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Електромережа

      - type: markdown
        content: >
          ### Зовнішнє живлення

      - type: markdown
        content: >
          ### Потужність з мережі - {{ states('sensor.total_enter_power') }} Вт

      - type: custom:mushroom-template-card
        primary: Основний сенсор живлення
        secondary: |-
          {% if is_state("binary_sensor.electricity", "off") %}
          Є живлення
          {% else %}
          Немає живлення
          {% endif %}
        layout: horizontal
        entity: binary_sensor.electricity
        icon_color: |-
          {% if is_state("binary_sensor.electricity", "off") %}
          green
          {% else %}
          red
          {% endif %}
        icon: |-
          {% if is_state("binary_sensor.electricity", "off") %}
          mdi:power-plug
          {% else %}
          mdi:power-plug-off
          {% endif %}
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        primary: Резервний сенсор живлення
        secondary: |-
          {% if is_state("binary_sensor.electricity_second", "off") %}
          Є живлення
          {% else %}
          Немає живлення
          {% endif %}
        layout: horizontal
        entity: binary_sensor.electricity_second
        icon_color: |-
          {% if is_state("binary_sensor.electricity_second", "off") %}
          green
          {% else %}
          red
          {% endif %}
        icon: |-
          {% if is_state("binary_sensor.electricity_second", "off") %}
          mdi:power-plug
          {% else %}
          mdi:power-plug-off
          {% endif %}
        tap_action:
          action: more-info

      - type: entities
        show_header_toggle: false
        entities:
          - entity: input_datetime.electricity_off
          - entity: input_datetime.electricity_on

      - type: markdown
        content: >
          ### Лічильник електроенергії

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Поточний тариф
            secondary: |-
              {% if is_state("select.total_counter_energy", "day") %}
              День
              {% else %}
              Ніч
              {% endif %}
            layout: horizontal
            entity: select.total_counter_energy
            icon_color: |-
              {% if is_state("select.total_counter_energy", "day") %}
              white
              {% else %}
              grey
              {% endif %}
            icon: |-
              {% if is_state("select.total_counter_energy", "day") %}
              mdi:weather-sunny
              {% else %}
              mdi:weather-night
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Оновити тариф
            layout: horizontal
            entity: input_button.select_tariff
            icon: mdi:reload
            multiline_secondary: true
            icon_color: amber
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.select_tariff

      - type: markdown
        content: >
          ### Енергія за {{ states('sensor.current_month') }} / Покази лічильника

      - type: custom:mushroom-template-card
        primary: |-
          День - {{ states('sensor.total_monthly_energy_day') }} кВт·год, на {{ (4.32 * (states('sensor.total_monthly_energy_day')|float))|round(2) }} грн
        secondary: |-
          Ніч - {{ states('sensor.total_monthly_energy_night') }} кВт·год, на {{ (2.16 * (states('sensor.total_monthly_energy_night')|float))|round(2) }} грн
        layout: horizontal
        entity: sensor.total_monthly_energy_day
        icon_color: grey
        icon: mdi:home-lightning-bolt
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        primary: |-
          День - {{ states('sensor.total_counter_energy_day') }} кВт·год
        secondary: |-
          Ніч - {{ states('sensor.total_counter_energy_night') }} кВт·год
        layout: horizontal
        entity: sensor.total_counter_energy_day
        icon_color: grey
        icon: mdi:counter
        tap_action:
          action: more-info

      - type: entities
        show_header_toggle: false
        entities:
          - entity: input_text.energy_correction

      - type: custom:mushroom-template-card
        primary: Корекція день
        layout: horizontal
        entity: input_button.energy_correction_day
        icon: mdi:weather-sunny
        multiline_secondary: true
        icon_color: white
        tap_action:
          action: call-service
          service: input_button.press
          target:
            entity_id: input_button.energy_correction_day

      - type: custom:mushroom-template-card
        primary: Корекція ніч
        layout: horizontal
        entity: input_button.energy_correction_night
        icon: mdi:weather-night
        multiline_secondary: true
        icon_color: grey
        tap_action:
          action: call-service
          service: input_button.press
          target:
            entity_id: input_button.energy_correction_night


