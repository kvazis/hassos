################## Клімат
title: Клімат у дитячій А
icon: mdi:home-thermometer-outline
sections:

############################ Колонка 1 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Клімат

      - type: markdown
        content: >
          ### Датчики та сенсори

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Провітрювання
            secondary: |-
              {% if is_state("binary_sensor.da_aeration", "off") %}
              Усе закрито
              {% else %}
              Провітрюється
              {% endif %}
            layout: vertical
            entity: binary_sensor.da_aeration
            icon: |-
              {% if is_state("binary_sensor.da_aeration", "off") %}
              phu:tilt-window-closed
              {% else %}
              phu:tilt-window-opened
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.da_aeration", "off") %}
              grey
              {% else %}
              light-blue
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Вікно
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001583c7b_contact", "off") %}
              Закрито
              {% else %}
              Відкрито
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0001583c7b_contact
            icon: |-
              {% if is_state("binary_sensor.0x00158d0001583c7b_contact", "off") %}
              phu:lift-in-window-closed
              {% else %}
              phu:lift-in-window-open1
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0001583c7b_contact", "off") %}
              grey
              {% else %}
              light-blue
              {% endif %}
            tap_action:
              action: more-info

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Температура
            secondary: |-
              {{ states('sensor.0x00158d000159c7e6_temperature') | float | round(1) }} С°
            layout: vertical
            entity: sensor.0x00158d000159c7e6_temperature
            icon_color: |-
              {% if states("sensor.0x00158d000159c7e6_temperature")|float <= -10 %}
              indigo
              {% elif states("sensor.0x00158d000159c7e6_temperature")|float <= 0 %}
              blue
              {% elif states("sensor.0x00158d000159c7e6_temperature")|float <= 10 %}
              light-blue
              {% elif states("sensor.0x00158d000159c7e6_temperature")|float <= 20 %}
              cyan
              {% elif states("sensor.0x00158d000159c7e6_temperature")|float <= 25 %}
              yellow
              {% elif states("sensor.0x00158d000159c7e6_temperature")|float <= 30 %}
              amber
              {% elif states("sensor.0x00158d000159c7e6_temperature")|float <= 40 %}
              orange
              {% endif %}
            icon: mdi:temperature-celsius
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Вологість
            secondary: |-
              {{ states('sensor.0x00158d000159c7e6_humidity') | float | round(0) }} %
            layout: vertical
            entity: sensor.0x00158d000159c7e6_humidity
            icon_color: |-
              {% if states("sensor.0x00158d000159c7e6_humidity")|float <= 30 %}
              deep-orange
              {% elif states("sensor.0x00158d000159c7e6_humidity")|float <= 40 %}
              yellow
              {% elif states("sensor.0x00158d000159c7e6_humidity")|float <= 50 %}
              light-blue
              {% elif states("sensor.0x00158d000159c7e6_humidity")|float <= 60 %}
              blue
              {% elif states("sensor.0x00158d000159c7e6_humidity")|float > 60 %}
              indigo
              {% endif %}
            icon: mdi:water-percent
            tap_action:
              action: more-info

############################ Колонка 2 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Опалення

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Режим
            secondary: |-
              {% if is_state("switch.da_radiator_mode", "on") %}
              Опалення увімкнене
              {% else %}
              Опалення вимкнене
              {% endif %}
            layout: vertical
            tap_action:
              action: toggle
            entity: switch.da_radiator_mode
            icon: |-
              {% if is_state("switch.da_radiator_mode", "on") %}
              phu:wiser-thermostat-off
              {% else %}
              phu:wiser-thermostat-on
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.da_radiator_mode", "on") %}
              orange
              {% else %}
              grey
              {% endif %}

          - type: custom:mushroom-climate-card
            entity: climate.0x2c1165fffec612b1
            hvac_modes:
              - heat
            show_temperature_control: true
            layout: vertical
            fill_container: true
            collapsible_controls: true
            primary_info: name
            secondary_info: state
            name: Дитяча А

      - type: grid
        square: false
        columns: 3
        cards:
          - type: custom:mushroom-template-card
            primary: Калібрування
            secondary: |-
              {% if ((states('sensor.0x00158d000159c7e6_temperature') | float - state_attr('climate.0x2c1165fffec612b1', 'current_temperature') | float))|round(1) > 1
                 or ((states('sensor.0x00158d000159c7e6_temperature') | float - state_attr('climate.0x2c1165fffec612b1', 'current_temperature') | float))|round(1) < -1 %}
              Розбіжність > 1 С°
              {% else %}
              ОК
              {% endif %}
            layout: vertical
            tap_action:
              action: call-service
              service: script.turn_on
              service_data:
                entity_id: script.da_temperature_calibration
            entity: script.da_temperature_calibration
            icon: mdi:sync
            multiline_secondary: true
            icon_color: |-
              {% if ((states('sensor.0x00158d000159c7e6_temperature') | float - state_attr('climate.0x2c1165fffec612b1', 'current_temperature') | float))|round(1) > 1
                 or ((states('sensor.0x00158d000159c7e6_temperature') | float - state_attr('climate.0x2c1165fffec612b1', 'current_temperature') | float))|round(1) < -1 %}
              amber
              {% else %}
              green
              {% endif %}

          - type: custom:mushroom-template-card
            primary: |-
              Датчик {{ states('sensor.0x00158d000159c7e6_temperature') | float | round(1) }} С°
            secondary: |-
              Головка - {{ state_attr('climate.0x2c1165fffec612b1', 'current_temperature') | float | round(1) }} С°
            layout: vertical
            entity: sensor.0x00158d000159c7e6_temperature
            icon_color: |-
              {% if is_state("switch.da_radiator_mode", "on") %}
              amber
              {% else %}
              grey
              {% endif %}
            icon: mdi:temperature-celsius
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: |-
              Поправка {{ states('number.0x2c1165fffec612b1_local_temperature_calibration') | float | round(1) }} С°
            secondary: |-
              Різниця {{ ((states('sensor.0x00158d000159c7e6_temperature') | float - state_attr('climate.0x2c1165fffec612b1', 'current_temperature') | float)) | round(1) }} С°
            layout: vertical
            entity: sensor.0x00158d000159c7e6_temperature
            icon_color: |-
              {% if is_state("switch.da_radiator_mode", "on") %}
              amber
              {% else %}
              grey
              {% endif %}
            icon: mdi:compare-horizontal
            tap_action:
              action: more-info

      - type: entities
        style: |
          ha-card {
            color: #f8ffd8;
            --paper-item-icon-color: #f8ffd8;
            --paper-item-icon-active-color: #f8ffd8;
            font-weight: bold;
            font-size: 14px;
          }
        show_header_toggle: false
        entities:
          - type: divider
          - entity: number.0x2c1165fffec612b1_comfort_temperature
            name: Цільова температура
          - type: divider
          - entity: number.0x2c1165fffec612b1_open_window_temperature
            name: Температура провітрювання
          - type: divider
          - entity: number.0x2c1165fffec612b1_eco_temperature
            name: Нічна температура
          - type: divider
          - entity: binary_sensor.0x2c1165fffec612b1_battery_low
            type: custom:multiple-entity-row
            state_header: Батарея
            entities:
              - attribute: last_seen
                format: relative
                name: Останній зв’язок

############################ Колонка 3 ############################
  - type: grid
