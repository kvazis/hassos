################## Спальня
title: Спальня
icon: phu:rooms-lounge
sections:

############################ Колонка 1 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Керування

      - type: markdown
        content: >
          ### Освітлення

      - type: grid
        square: false
        columns: 2
        cards:
          - type: button
            name: Люстра
            entity: light.br_philips_62
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.br_ceiling_light

          - type: button
            name: Світловий шнур
            entity: light.br_wled_round
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.br_gradient_wled

      - type: markdown
        content: >
          ### Люстра

      - type: grid
        square: false
        columns: 3
        cards:
          - type: custom:mushroom-template-card
            primary: Доступність
            secondary: |-
              {% if is_state('light.br_philips_62', 'unavailable') %}
              Недоступно
              {% else %}
              OK
              {% endif %}
            layout: horizontal
            entity: binary_sensor.br_ceiling_unavailable
            icon: |-
              {% if is_state('light.br_philips_62', 'unavailable') %}
              mdi:alert
              {% else %}
              mdi:check-bold
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state('light.br_philips_62', 'unavailable') %}
              red
              {% else %}
              green
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Живлення
            secondary: |-
              {% if is_state("switch.0x54ef44100024689c_right", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x54ef44100024689c_right
            icon: phu:aqara-h1-switch
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x54ef44100024689c_right", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Ручне перезавантаження
            layout: horizontal
            entity: input_button.br_ceiling_reset
            icon: mdi:reload
            multiline_secondary: true
            icon_color: amber
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.br_ceiling_reset

      - type: conditional
        conditions:
          - entity: light.br_philips_62
            state: "on"
        card:
          type: custom:mushroom-light-card
          entity: light.br_philips_62
          name: Люстра
          icon_type: none
          primary_info: name
          secondary_info: none
          use_light_color: true
          show_brightness_control: true
          show_color_temp_control: true
          show_color_control: false
          collapsible_controls: true

      - type: conditional
        conditions:
          - entity: light.br_wled_round
            state: "on"
        card:
          type: custom:mushroom-light-card
          entity: light.br_wled_round
          name: Світловий шнур
          icon_type: none
          primary_info: name
          secondary_info: none
          use_light_color: true
          show_brightness_control: true
          show_color_temp_control: true
          show_color_control: true
          collapsible_controls: true

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Ручне керування
            secondary: |-
              {% if is_state("input_boolean.br_wled_round", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: input_boolean.br_wled_round
            icon: |-
              {% if is_state("input_boolean.br_wled_round", "on") %}
              mdi:toggle-switch
              {% else %}
              mdi:toggle-switch-off
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("input_boolean.br_wled_round", "on") %}
              green
              {% else %}
              gray
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Вимкнено 5 хв
            secondary: |-
              {% if is_state("binary_sensor.br_wled_round_off_5m", "on") %}
              OK
              {% else %}
              Менше 5 хв
              {% endif %}
            layout: vertical
            entity: binary_sensor.br_wled_round_off_5m
            icon: |-
              {% if is_state("binary_sensor.br_wled_round_off_5m", "on") %}
              mdi:led-strip-variant
              {% else %}
              mdi:led-strip-variant-off
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.br_wled_round_off_5m", "on") %}
              green
              {% else %}
              gray
              {% endif %}
            tap_action:
              action: more-info

      - type: markdown
        content: >
          ## Живлення

      - type: markdown
        content: >
          ### Подовжувач

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Розетка 1
            secondary: |-
              {% if is_state("switch.0x842e14fffefd9721_l1", "on") %}
              Увімкнено
              {% else %}
