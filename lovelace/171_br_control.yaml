              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x842e14fffefd9721_l1
            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x842e14fffefd9721_l1", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Samsung TV
            secondary: |-
              {% if is_state("switch.0x842e14fffefd9721_l2", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x842e14fffefd9721_l2
            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x842e14fffefd9721_l2", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Google Speaker
            secondary: |-
              {% if is_state("switch.0x842e14fffefd9721_l3", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x842e14fffefd9721_l3
            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x842e14fffefd9721_l3", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Reolink Zoom 2
            secondary: |-
              {% if is_state("switch.0x842e14fffefd9721_l4", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x842e14fffefd9721_l4
            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x842e14fffefd9721_l4", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: USB
            secondary: |-
              {% if is_state("switch.0x842e14fffefd9721_l5", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x842e14fffefd9721_l5
            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x842e14fffefd9721_l5", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Розетка під столом
            secondary: |-
              {{ states('sensor.0xa4c138e22148db3a_power') }} Вт
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0xa4c138e22148db3a
            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0xa4c138e22148db3a", "on") %}
              green
              {% else %}
              red
              {% endif %}

############################ Колонка 2 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Моніторинг

      - type: picture-entity
        entity: camera.e1_zoom_lan_fluent
        camera_view: live
        show_state: false
        show_name: false

      - type: grid
        square: false
        columns: 3
        cards:
          - type: custom:mushroom-template-card
            primary: Рух
            secondary: |-
              {% if is_state("binary_sensor.e1_zoom_lan_motion", "off") %}
              Не виявлено
              {% else %}
              Виявлено
              {% endif %}
            layout: vertical
            entity: binary_sensor.e1_zoom_lan_motion
            icon: |-
              {% if is_state("binary_sensor.e1_zoom_lan_motion", "off") %}
              mdi:motion-sensor-off
              {% else %}
              mdi:motion-sensor
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.e1_zoom_lan_motion", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Люди в кадрі
            secondary: |-
              {% if is_state("binary_sensor.e1_zoom_lan_person", "off") %}
              Не виявлено
              {% else %}
              Люди в кадрі
              {% endif %}
            layout: vertical
            entity: binary_sensor.e1_zoom_lan_person
            icon: |-
              {% if is_state("binary_sensor.e1_zoom_lan_person", "off") %}
              mdi:motion-sensor-off
              {% else %}
              mdi:motion-sensor
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.e1_zoom_lan_person", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Освітленість
            secondary: |-
              {{ states('sensor.0xa4c13805b968f3d2_illuminance') | float | round(0) }} lux
            layout: vertical
            entity: sensor.0xa4c13805b968f3d2_illuminance
            icon_color: |-
              {% if states("sensor.0xa4c13805b968f3d2_illuminance")|float <= 50 %}
              blue-grey
              {% elif states("sensor.0xa4c13805b968f3d2_illuminance")|float <= 400 %}
              grey
              {% elif states("sensor.0xa4c13805b968f3d2_illuminance")|float > 400 %}
              white
              {% endif %}
            icon: |-
              {% if states("sensor.0xa4c13805b968f3d2_illuminance")|float <= 50 %}
              mdi:brightness-1
              {% elif states("sensor.0xa4c13805b968f3d2_illuminance")|float <= 150 %}
              mdi:brightness-2
              {% elif states("sensor.0xa4c13805b968f3d2_illuminance")|float <= 300 %}
              mdi:brightness-3
              {% elif states("sensor.0xa4c13805b968f3d2_illuminance")|float <= 500 %}
              mdi:brightness-4
              {% elif states("sensor.0xa4c13805b968f3d2_illuminance")|float <= 700 %}
              mdi:brightness-5
              {% elif states("sensor.0xa4c13805b968f3d2_illuminance")|float <= 900 %}
              mdi:brightness-6
              {% elif states("sensor.0xa4c13805b968f3d2_illuminance")|float > 900 %}
              mdi:brightness-7
              {% endif %}
            tap_action:
              action: more-info

      - type: custom:mushroom-media-player-card
        entity: media_player.43_crystal_uhd
        name: Samsung TV
        icon: phu:samsung
        use_media_info: true
        show_volume_level: true
        media_controls:
          - on_off
          - play_pause_stop
        volume_controls:
          - volume_set
          - volume_mute
          - volume_buttons
        collapsible_controls: true

      - type: custom:mushroom-media-player-card
        entity: media_player.mi_speaker
        name: Колонка
        icon: phu:google-home
        use_media_info: true
        show_volume_level: true
        media_controls:
          - on_off
          - play_pause_stop
        volume_controls:
          - volume_set
          - volume_mute
          - volume_buttons
        collapsible_controls: true

      - type: markdown
        content: >
          ### Датчики та сенсори

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Спальня
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001a66222_occupancy", "off") %}
              Не виявлено
              {% else %}
              Рух
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0001a66222_occupancy
            icon: |-
              {% if is_state("binary_sensor.0x00158d0001a66222_occupancy", "off") %}
              mdi:motion-sensor-off
              {% else %}
              mdi:motion-sensor
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0001a66222_occupancy", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Балкон
            secondary: |-
              {% if is_state("binary_sensor.0xec1bbdfffe4521a3_occupancy", "off") %}
              Не виявлено
              {% else %}
