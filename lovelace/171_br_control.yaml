              {% endif %}
            layout: vertical
            entity: binary_sensor.0xec1bbdfffe4521a3_occupancy
            icon: |-
              {% if is_state("binary_sensor.0xec1bbdfffe4521a3_occupancy", "off") %}
              mdi:motion-sensor-off
              {% else %}
              mdi:motion-sensor
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0xec1bbdfffe4521a3_occupancy", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Вікно
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001193697_contact", "off") %}
              Закрито
              {% else %}
              Відкрито
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0001193697_contact
            icon: |-
              {% if is_state("binary_sensor.0x00158d0001193697_contact", "off") %}
              phu:lift-in-window-closed
              {% else %}
              phu:lift-in-window-open1
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0001193697_contact", "off") %}
              grey
              {% else %}
              light-blue
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Двері на балкон
            secondary: |-
              {% if is_state("binary_sensor.0x00158d00015843d4_contact", "off") %}
              Закриті
              {% else %}
              Відкриті
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d00015843d4_contact
            icon: |-
              {% if is_state("binary_sensor.0x00158d00015843d4_contact", "off") %}
              phu:panel-glass-door2-close
              {% else %}
              phu:panel-glass-door2-open
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d00015843d4_contact", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Балконне вікно 1
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001a65b68_contact", "off") %}
              Закрито
              {% else %}
              Відкрито
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0001a65b68_contact
            icon: |-
              {% if is_state("binary_sensor.0x00158d0001a65b68_contact", "off") %}
              phu:lift-in-window-closed
              {% else %}
              phu:lift-in-window-open1
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0001a65b68_contact", "off") %}
              grey
              {% else %}
              light-blue
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Балконне вікно 2
            secondary: |-
              {% if is_state("binary_sensor.0xec1bbdfffe3a653e_contact", "off") %}
