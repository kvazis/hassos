              {% endif %}
            icon: mdi:temperature-celsius
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Вологість екрана
            secondary: |-
              {{ states('sensor.0xa4c138b7e1e0812c_humidity') }} %
            layout: vertical
            entity: sensor.0xa4c138b7e1e0812c_humidity
            icon_color: |-
              {% if states("sensor.0xa4c138b7e1e0812c_humidity")|float <= 30 %}
              deep-orange
              {% elif states("sensor.0xa4c138b7e1e0812c_humidity")|float <= 40 %}
              yellow
              {% elif states("sensor.0xa4c138b7e1e0812c_humidity")|float <= 50 %}
              light-blue
              {% elif states("sensor.0xa4c138b7e1e0812c_humidity")|float <= 60 %}
              blue
              {% elif states("sensor.0xa4c138b7e1e0812c_humidity")|float > 60 %}
