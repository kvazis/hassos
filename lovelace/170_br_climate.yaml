        entities:
          - entity: input_boolean.br_humidification_mode
          - entity: switch.0x00158d00010ec4b8
          - entity: sensor.0x00158d00010ec4b8_power
          - entity: input_number.br_humidifier_power_low_threshold
          - type: divider
          - entity: binary_sensor.br_aeration
          - entity: binary_sensor.br_humidification_time_allowed
