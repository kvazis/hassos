              {% elif states("sensor.0xa4c138b7e1e0812c_temperature")|float <= 0 %}
              blue
              {% elif states("sensor.0xa4c138b7e1e0812c_temperature")|float <= 10 %}
              light-blue
              {% elif states("sensor.0xa4c138b7e1e0812c_temperature")|float <= 20 %}
              cyan
              {% elif states("sensor.0xa4c138b7e1e0812c_temperature")|float <= 25 %}
