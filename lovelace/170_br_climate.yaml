################## Клімат
title: Клімат у спальні
icon: mdi:home-thermometer
sections:

############################ Колонка 1 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Клімат

      - type: markdown
        content: >
          ### Датчики та сенсори

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Провітрювання
            secondary: |-
              {% if is_state("binary_sensor.br_aeration", "off") %}
              Усе закрито
              {% else %}
              Провітрюється
              {% endif %}
            layout: vertical
            entity: binary_sensor.br_aeration
            icon: |-
              {% if is_state("binary_sensor.br_aeration", "off") %}
              phu:tilt-window-closed
              {% else %}
              phu:tilt-window-opened
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.br_aeration", "off") %}
              grey
              {% else %}
              light-blue
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Вікно
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001193697_contact", "off") %}
              Закрито
              {% else %}
              Відкрито
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0001193697_contact
            icon: |-
              {% if is_state("binary_sensor.0x00158d0001193697_contact", "off") %}
              phu:lift-in-window-closed
              {% else %}
              phu:lift-in-window-open1
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0001193697_contact", "off") %}
              grey
              {% else %}
              light-blue
              {% endif %}
