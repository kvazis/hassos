############################ Колонка 2 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Опалення

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Режим
            secondary: |-
              {% if is_state("switch.br_radiator_mode", "on") %}
              Опалення увімкнене
              {% else %}
              Опалення вимкнене
              {% endif %}
            layout: vertical
            tap_action:
              action: toggle
            entity: switch.br_radiator_mode
            icon: |-
              {% if is_state("switch.br_radiator_mode", "on") %}
              phu:wiser-thermostat-off
              {% else %}
              phu:wiser-thermostat-on
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.br_radiator_mode", "on") %}
              orange
              {% else %}
              grey
              {% endif %}

          - type: custom:mushroom-climate-card
            entity: climate.0x84fd27fffe31ada3
            hvac_modes:
              - heat
            show_temperature_control: true
            layout: vertical
            fill_container: true
            collapsible_controls: true
            primary_info: name
            secondary_info: state
            name: Спальня

      - type: grid
        square: false
        columns: 3
        cards:
          - type: custom:mushroom-template-card
            primary: Калібрування
            secondary: |-
              {% if ((states('sensor.0x00158d000156e92e_temperature') | float - state_attr('climate.0x84fd27fffe31ada3', 'current_temperature') | float))|round(1) > 1
                 or ((states('sensor.0x00158d000156e92e_temperature') | float - state_attr('climate.0x84fd27fffe31ada3', 'current_temperature') | float))|round(1) < -1 %}
              Розбіжність > 1 С°
              {% else %}
              ОК
              {% endif %}
            layout: vertical
            tap_action:
              action: call-service
              service: script.turn_on
              service_data:
                entity_id: script.br_heat_temperature_calibration
            entity: script.br_heat_temperature_calibration
            icon: mdi:sync
            multiline_secondary: true
            icon_color: |-
              {% if ((states('sensor.0x00158d000156e92e_temperature') | float - state_attr('climate.0x84fd27fffe31ada3', 'current_temperature') | float))|round(1) > 1
                 or ((states('sensor.0x00158d000156e92e_temperature') | float - state_attr('climate.0x84fd27fffe31ada3', 'current_temperature') | float))|round(1) < -1 %}
              amber
              {% else %}
              green
              {% endif %}

          - type: custom:mushroom-template-card
            primary: |-
              Датчик {{ states('sensor.0x00158d000156e92e_temperature') }} С°
            secondary: |-
              Головка - {{ state_attr('climate.0x84fd27fffe31ada3', 'current_temperature') }} С°
            layout: vertical
            entity: sensor.0x00158d000156e92e_temperature
            icon_color: |-
              {% if is_state("switch.br_radiator_mode", "on") %}
              amber
              {% else %}
              grey
              {% endif %}
            icon: mdi:temperature-celsius
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: |-
              Поправка {{ states('number.0x84fd27fffe31ada3_local_temperature_calibration') }} С°
            secondary: |-
              Різниця {{ ((states('sensor.0x00158d000156e92e_temperature') | float - state_attr('climate.0x84fd27fffe31ada3', 'current_temperature') | float))|round(1) }} С°
            layout: vertical
            entity: sensor.0x00158d000156e92e_temperature
            icon_color: |-
              {% if is_state("switch.br_radiator_mode", "on") %}
              amber
              {% else %}
              grey
              {% endif %}
            icon: mdi:compare-horizontal
            tap_action:
              action: more-info

      - type: entities
        style: |
          ha-card {
            color: #f8ffd8;
            --paper-item-icon-color: #f8ffd8;
            --paper-item-icon-active-color: #f8ffd8;
            font-weight: bold;
            font-size: 14px;
          }
        show_header_toggle: false
        entities:
          - type: divider
          - entity: number.0x84fd27fffe31ada3_comfort_temperature
            name: Цільова температура
          - type: divider
          - entity: number.0x84fd27fffe31ada3_open_window_temperature
            name: Температура провітрювання
          - type: divider
          - entity: number.0x84fd27fffe31ada3_eco_temperature
            name: Нічна температура
          - type: divider
          - entity: binary_sensor.0x84fd27fffe31ada3_battery_low
            type: custom:multiple-entity-row
            state_header: Батарея
            entities:
              - attribute: last_seen
                format: relative
                name: Останній зв’язок

############################ Колонка 3 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Зволоження

      - type: markdown
