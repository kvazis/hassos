##################   Клімат
title: Вітальня Клімат
icon: phu:motion-sensor-temperature
sections:

############################ Колонка 1 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Клімат

      - type: markdown
        content: >
          ### Датчики та сенсори

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Провітрювання
            secondary: |-
              {% if is_state("binary_sensor.lr_aeration", "off") %}
              Усе закрито
              {% else %}
              Провітрюється
              {% endif %}
            layout: vertical
            entity: binary_sensor.lr_aeration
            icon: |-
              {% if is_state("binary_sensor.lr_aeration", "off") %}
              phu:tilt-window-closed
              {% else %}
              phu:tilt-window-opened
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.lr_aeration", "off") %}
              grey
              {% else %}
              light-blue
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Повітря
            secondary: |-
              {% if is_state("binary_sensor.lr_poor_air", "off") %}
              ОК
              {% else %}
              Потрібно провітрити
              {% endif %}
            layout: vertical
            entity: binary_sensor.lr_poor_air
            icon: |-
              {% if is_state("binary_sensor.lr_poor_air", "off") %}
              mdi:check-bold
              {% else %}
              mdi:biohazard
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.lr_poor_air", "off") %}
              green
              {% else %}
              deep-orange
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Праве вікно
            secondary: |-
              {% if is_state("binary_sensor.0x00158d00013ed373_contact", "off") %}
              Закрито
              {% else %}
              Відкрито
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d00013ed373_contact
            icon: |-
              {% if is_state("binary_sensor.0x00158d00013ed373_contact", "off") %}
              phu:double-window-closed
              {% else %}
              phu:double-window-open
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d00013ed373_contact", "off") %}
              grey
              {% else %}
              light-blue
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Ліве вікно
            secondary: |-
              {% if is_state("binary_sensor.0xec1bbdfffedf6a6a_contact", "off") %}
              Закрито
              {% else %}
              Відкрито
              {% endif %}
            layout: vertical
            entity: binary_sensor.0xec1bbdfffedf6a6a_contact
            icon: |-
              {% if is_state("binary_sensor.0xec1bbdfffedf6a6a_contact", "off") %}
              phu:double-window-closed
              {% else %}
              phu:double-window-open
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0xec1bbdfffedf6a6a_contact", "off") %}
              grey
              {% else %}
              light-blue
              {% endif %}
            tap_action:
              action: more-info

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Двері на балкон
            secondary: |-
              {% if is_state("binary_sensor.0x00158d000445206b_contact", "off") %}
              Закриті
              {% else %}
              Відкриті
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d000445206b_contact
            icon: |-
              {% if is_state("binary_sensor.0x00158d000445206b_contact", "off") %}
              phu:panel-glass-door2-close
              {% else %}
              phu:panel-glass-door2-open
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d000445206b_contact", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Балконне вікно
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001a2f5f7_contact", "off") %}
              Закрито
              {% else %}
              Відкрито
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0001a2f5f7_contact
            icon: |-
              {% if is_state("binary_sensor.0x00158d0001a2f5f7_contact", "off") %}
              phu:double-window-closed
              {% else %}
              phu:double-window-open
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0001a2f5f7_contact", "off") %}
              grey
              {% else %}
              light-blue
              {% endif %}
            tap_action:
              action: more-info

      - type: markdown
        content: >
          ### Кімната

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Температура
            secondary: |-
              {{ states('sensor.0x00158d00015aebb6_temperature') }} С°
            layout: vertical
            entity: sensor.0x00158d00015aebb6_temperature
            icon_color: |-
              {% if states("sensor.0x00158d00015aebb6_temperature")|float <= -10 %}
              indigo
              {% elif states("sensor.0x00158d00015aebb6_temperature")|float <= 0 %}
              blue
              {% elif states("sensor.0x00158d00015aebb6_temperature")|float <= 10 %}
              light-blue
              {% elif states("sensor.0x00158d00015aebb6_temperature")|float <= 20 %}
              cyan
              {% elif states("sensor.0x00158d00015aebb6_temperature")|float <= 25 %}
              yellow
              {% elif states("sensor.0x00158d00015aebb6_temperature")|float <= 30 %}
              amber
              {% elif states("sensor.0x00158d00015aebb6_temperature")|float <= 40 %}
              orange
              {% endif %}
            icon: mdi:temperature-celsius
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Вологість
            secondary: |-
              {{ states('sensor.0x00158d00015aebb6_humidity') }} %
            layout: vertical
            entity: sensor.0x00158d00015aebb6_humidity
            icon_color: |-
              {% if states("sensor.0x00158d00015aebb6_humidity")|float <= 30 %}
              deep-orange
              {% elif states("sensor.0x00158d00015aebb6_humidity")|float <= 40 %}
              yellow
              {% elif states("sensor.0x00158d00015aebb6_humidity")|float <= 50 %}
              light-blue
              {% elif states("sensor.0x00158d00015aebb6_humidity")|float <= 60 %}
              blue
              {% elif states("sensor.0x00158d00015aebb6_humidity")|float > 60 %}
              indigo
              {% endif %}
            icon: mdi:water-percent
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: CO2
            secondary: |-
              {{ states('sensor.lr_air_co2') }} ppb
            layout: vertical
            entity: sensor.lr_air_co2
            icon_color: |-
              {% if states("sensor.lr_air_co2")|float <= 500 %}
              green
              {% elif states("sensor.lr_air_co2")|float <= 700 %}
              light-green
              {% elif states("sensor.lr_air_co2")|float <= 800 %}
              lime
              {% elif states("sensor.lr_air_co2")|float <= 1000 %}
              yellow
              {% elif states("sensor.lr_air_co2")|float <= 1200 %}
              orange
              {% elif states("sensor.lr_air_co2")|float > 1200 %}
              red
              {% endif %}
            icon: mdi:molecule-co2
            tap_action:
              action: more-info

      - type: markdown
        content: >
          ### Балкон

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Температура балкона
            secondary: |-
              {{ states('sensor.0xec1bbdfffe4534c0_temperature') }} С°
            layout: vertical
            entity: sensor.0xec1bbdfffe4534c0_temperature
            icon_color: |-
              {% if states("sensor.0xec1bbdfffe4534c0_temperature")|float <= -10 %}
              indigo
              {% elif states("sensor.0xec1bbdfffe4534c0_temperature")|float <= 0 %}
              blue
              {% elif states("sensor.0xec1bbdfffe4534c0_temperature")|float <= 10 %}
              light-blue
              {% elif states("sensor.0xec1bbdfffe4534c0_temperature")|float <= 20 %}
              cyan
              {% elif states("sensor.0xec1bbdfffe4534c0_temperature")|float <= 25 %}
              yellow
              {% elif states("sensor.0xec1bbdfffe4534c0_temperature")|float <= 30 %}
              amber
              {% elif states("sensor.0xec1bbdfffe4534c0_temperature")|float <= 40 %}
              orange
              {% endif %}
            icon: mdi:temperature-celsius
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Вологість балкона
            secondary: |-
              {{ states('sensor.0xec1bbdfffe4534c0_humidity') }} %
            layout: vertical
            entity: sensor.0xec1bbdfffe4534c0_humidity
            icon_color: |-
              {% if states("sensor.0xec1bbdfffe4534c0_humidity")|float <= 30 %}
              deep-orange
              {% elif states("sensor.0xec1bbdfffe4534c0_humidity")|float <= 40 %}
              yellow
              {% elif states("sensor.0xec1bbdfffe4534c0_humidity")|float <= 50 %}
              light-blue
              {% elif states("sensor.0xec1bbdfffe4534c0_humidity")|float <= 60 %}
              blue
              {% elif states("sensor.0xec1bbdfffe4534c0_humidity")|float > 60 %}
              indigo
              {% endif %}
            icon: mdi:water-percent
            tap_action:
              action: more-info

############################ Колонка 2 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ### Опалення

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Режим
            secondary: |-
              {% if is_state("switch.lr_radiator_mode", "on") %}
              Опалення увімкнене
              {% else %}
              Опалення вимкнене
              {% endif %}
            layout: vertical
            tap_action:
              action: toggle
            entity: switch.lr_radiator_mode
            icon: |-
              {% if is_state("switch.lr_radiator_mode", "on") %}
              phu:wiser-thermostat-off
              {% else %}
              phu:wiser-thermostat-on
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.lr_radiator_mode", "on") %}
              orange
              {% else %}
              grey
              {% endif %}

          - type: custom:mushroom-climate-card
            entity: climate.0x2c1165fffeb3e567
            hvac_modes:
              - heat
            show_temperature_control: true
            layout: vertical
            fill_container: true
            collapsible_controls: true
            primary_info: name
            secondary_info: state
            name: Вітальня праворуч

          - type: custom:mushroom-climate-card
            entity: climate.0x2c1165fffec61c89
            hvac_modes:
              - heat
            show_temperature_control: true
            layout: vertical
            fill_container: true
            collapsible_controls: true
            primary_info: name
            secondary_info: state
            name: Вітальня ліворуч

      - type: markdown
        content: >
          ### Вітальня праворуч

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Калібрування
            secondary: |-
              {% if ((states('sensor.0x00158d00015aebb6_temperature') | float - state_attr('climate.0x2c1165fffeb3e567', 'current_temperature') | float))|round(1) > 1
                 or ((states('sensor.0x00158d00015aebb6_temperature') | float - state_attr('climate.0x2c1165fffeb3e567', 'current_temperature') | float))|round(1) < -1 %}
              Розбіжність > 1 С°
              {% else %}
              ОК
              {% endif %}
            layout: vertical
            tap_action:
              action: call-service
              service: script.turn_on
              service_data:
                entity_id: script.lr_temperature_calibration_2
            entity: script.lr_temperature_calibration_2
            icon: mdi:sync
            multiline_secondary: true
            icon_color: |-
              {% if ((states('sensor.0x00158d00015aebb6_temperature') | float - state_attr('climate.0x2c1165fffeb3e567', 'current_temperature') | float))|round(1) > 1
                 or ((states('sensor.0x00158d00015aebb6_temperature') | float - state_attr('climate.0x2c1165fffeb3e567', 'current_temperature') | float))|round(1) < -1 %}
              amber
              {% else %}
              green
              {% endif %}

          - type: custom:mushroom-template-card
            primary: |-
              Датчик {{ states('sensor.0x00158d00015aebb6_temperature') }} С°
            secondary: |-
              Головка - {{ state_attr('climate.0x2c1165fffeb3e567', 'current_temperature') }} С°
            layout: vertical
            entity: sensor.0x00158d00015aebb6_temperature
            icon_color: |-
              {% if is_state("switch.lr_radiator_mode", "on") %}
              amber
              {% else %}
              grey
              {% endif %}
            icon: mdi:temperature-celsius
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: |-
              Поправка {{ states('number.0x2c1165fffeb3e567_local_temperature_calibration') }} С°
            secondary: |-
              Різниця {{ ((states('sensor.0x00158d00015aebb6_temperature') | float - state_attr('climate.0x2c1165fffeb3e567', 'current_temperature') | float))|round(1) }} С°
            layout: vertical
            entity: sensor.0x00158d00015aebb6_temperature
            icon_color: |-
              {% if is_state("switch.lr_radiator_mode", "on") %}
              amber
              {% else %}
              grey
              {% endif %}
            icon: mdi:compare-horizontal
            tap_action:
              action: more-info

      - type: markdown
        content: >
          ### Вітальня ліворуч

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Калібрування
            secondary: |-
              {% if ((states('sensor.0x00158d00015aebb6_temperature') | float - state_attr('climate.0x2c1165fffec61c89', 'current_temperature') | float))|round(1) > 1
                 or ((states('sensor.0x00158d00015aebb6_temperature') | float - state_attr('climate.0x2c1165fffec61c89', 'current_temperature') | float))|round(1) < -1 %}
              Розбіжність > 1 С°
              {% else %}
              ОК
              {% endif %}
            layout: vertical
            tap_action:
              action: call-service
              service: script.turn_on
              service_data:
                entity_id: script.lr_temperature_calibration_1
            entity: script.lr_temperature_calibration_1
            icon: mdi:sync
            multiline_secondary: true
            icon_color: |-
              {% if ((states('sensor.0x00158d00015aebb6_temperature') | float - state_attr('climate.0x2c1165fffec61c89', 'current_temperature') | float))|round(1) > 1
                 or ((states('sensor.0x00158d00015aebb6_temperature') | float - state_attr('climate.0x2c1165fffec61c89', 'current_temperature') | float))|round(1) < -1 %}
              amber
              {% else %}
              green
              {% endif %}

          - type: custom:mushroom-template-card
            primary: |-
              Датчик {{ states('sensor.0x00158d00015aebb6_temperature') }} С°
            secondary: |-
              Головка - {{ state_attr('climate.0x2c1165fffec61c89', 'current_temperature') }} С°
            layout: vertical
            entity: sensor.0x00158d00015aebb6_temperature
            icon_color: |-
              {% if is_state("switch.lr_radiator_mode", "on") %}
              amber
              {% else %}
              grey
              {% endif %}
            icon: mdi:temperature-celsius
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: |-
              Поправка {{ states('number.0x2c1165fffec61c89_local_temperature_calibration') }} С°
            secondary: |-
              Різниця {{ ((states('sensor.0x00158d00015aebb6_temperature') | float - state_attr('climate.0x2c1165fffec61c89', 'current_temperature') | float))|round(1) }} С°
            layout: vertical
            entity: sensor.0x00158d00015aebb6_temperature
            icon_color: |-
              {% if is_state("switch.lr_radiator_mode", "on") %}
              amber
              {% else %}
              grey
              {% endif %}
            icon: mdi:compare-horizontal
            tap_action:
              action: more-info

      - type: entities
        show_header_toggle: false
        entities:
          - type: divider
          - entity: number.0x2c1165fffeb3e567_comfort_temperature
            name: Цільова температура праворуч
          - entity: number.0x2c1165fffec61c89_comfort_temperature
            name: Цільова температура ліворуч
          - type: divider
          - entity: number.0x2c1165fffeb3e567_open_window_temperature
            name: Температура провітрювання праворуч
          - entity: number.0x2c1165fffec61c89_open_window_temperature
            name: Температура провітрювання ліворуч
          - type: divider
          - entity: number.0x2c1165fffeb3e567_eco_temperature
            name: Нічна температура праворуч
          - entity: number.0x2c1165fffec61c89_eco_temperature
            name: Нічна температура ліворуч
          - type: divider
          - entity: binary_sensor.0x2c1165fffeb3e567_battery_low
            type: custom:multiple-entity-row
            name: Термоголовка праворуч
            state_header: Батарея
            entities:
              - attribute: last_seen
                format: relative
                name: Останній зв’язок
          - entity: binary_sensor.0x2c1165fffec61c89_battery_low
            type: custom:multiple-entity-row
            name: Термоголовка ліворуч
            state_header: Батарея
            entities:
              - attribute: last_seen
                format: relative
                name: Останній зв’язок

############################ Колонка 3 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ### Зволожувач

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Режим
            secondary: |-
              {% if is_state("input_boolean.lr_humidification_mode", "on") %}
              Зволоження увімкнене
              {% else %}
              Зволоження вимкнене
              {% endif %}
            layout: vertical
            entity: input_boolean.lr_humidification_mode
            icon: |-
              {% if is_state("input_boolean.lr_humidification_mode", "on") %}
              mdi:air-humidifier
              {% else %}
              mdi:air-humidifier-off
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("input_boolean.lr_humidification_mode", "on") %}
              deep-purple
              {% else %}
              grey
              {% endif %}
            tap_action:
              action: toggle

          - type: custom:mushroom-humidifier-card
            entity: humidifier.deerma_jsq2g_34d8_humidifier
            name: Вітальня
            show_target_humidity_control: true
            layout: vertical

      - type: entities
        show_header_toggle: false
        entities:
          - entity: binary_sensor.lr_humidifier_allowed
            name: Дозвіл на роботу зволожувача
          - entity: binary_sensor.lr_humidifier_water_problem
            name: Проблема з водою або баком

      - type: markdown
        content: >
          ### Кондиціонер

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Режим
            secondary: |-
              {% if is_state("switch.lr_conditioner_mode", "on") %}
              Увімкнений
              {% else %}
              Вимкнений
              {% endif %}
            layout: vertical
            tap_action:
              action: toggle
            entity: switch.lr_conditioner_mode
            icon: mdi:air-conditioner
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.lr_conditioner_mode", "on") %}
              light-blue
              {% else %}
              grey
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Кондиціонер
            secondary: |-
              {% if is_state("binary_sensor.0x00158d00054496b0_contact", "off") %}
              Вимкнений
              {% else %}
              Працює
              {% endif %}
            layout: vertical
            entity: input_button.lr_conditioner
            icon: phu:air-conditioner
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d00054496b0_contact", "off") %}
              grey
              {% else %}
              blue
              {% endif %}
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.lr_conditioner

      - type: entities
        show_header_toggle: false
        entities:
          - entity: input_datetime.lr_conditioner_from
          - entity: input_datetime.lr_conditioner_to
          - entity: input_number.lr_conditioner_min
          - entity: input_number.lr_conditioner_max