      - type: entities
        card_mod:
          style: |
            ha-card {
              color: #00BFFF;
              --paper-item-icon-color: #00BFFF;
              --paper-item-icon-active-color: #009933;
              --switch-unchecked-button-color: red;
              --switch-checked-color: green;
              --switch-checked-button-color: green;
              --switch-checked-track-color: green;
              font-weight: bold;
              font-size: 14px;
            }
        show_header_toggle: false
        entities:
          - entity: sensor.last_boot_custom
            type: custom:multiple-entity-row
            name: В онлайні -
            state_header: Сервер
            entities:
              - entity: sensor.uptime_custom
                name: Home Assistant
          - entity: sensor.disk_free
            type: custom:multiple-entity-row
            name: Сховище
            state_header: Вільно
            entities:
              - entity: sensor.mariadb
                name: База даних
          - type: divider
          - entity: sensor.local_ip
            name: IP-адреса
          - type: divider
          - entity: sensor.server_telemetry
            icon: mdi:alert
          - type: divider
          - entity: binary_sensor.zigbee2mqtt_bridge_connection_state_1
            name: Zigbee2MQTT 1
          - entity: switch.ps308g0011242300032c4copc_1_switch
          - entity: binary_sensor.zigbee2mqtt_bridge_connection_state_2
            name: Zigbee2MQTT 2
          - entity: switch.ps308g0011242300032c4copc_3_switch
          - entity: binary_sensor.zigbee2mqtt_bridge_connection_state_3
            name: Zigbee2MQTT 3
          - entity: switch.ps308g0011242300032c4copc_2_switch
          - type: divider
          - entity: switch.control_mode
            state_color: true
            secondary_info: last-changed
          - type: divider
          - entity: sensor.last_google_backup
          - entity: sensor.backups_in_google_drive
            type: custom:multiple-entity-row
            name: Резервні копії
            state_header: Google Drive
            entities:
              - entity: sensor.backups_in_home_assistant
                name: Сервер
          - entity: sensor.size_in_google_drive
            type: custom:multiple-entity-row
            name: Зайнято на
            state_header: Google Drive
            entities:
              - entity: sensor.size_in_home_assistant
                name: Сервері

      - type: entities
        card_mod:
          style: |
            ha-card {
              color: #00BFFF;
              --paper-item-icon-color: #00BFFF;
              --paper-item-icon-active-color: #009933;
              --switch-unchecked-button-color: red;
              --switch-checked-color: green;
              --switch-checked-button-color: green;
              --switch-checked-track-color: green;
              font-weight: bold;
              font-size: 14px;
            }
        show_header_toggle: false
        entities:
          - entity: input_button.git_update
          - type: divider

      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: entities
            card_mod:
              style: |
                ha-card {
                  color: #00BFFF;
                  --paper-item-icon-color: #00BFFF;
                  --iron-icon-stroke-color: #FFFFE0;
                  font-weight: bold;
                  font-size: 14px;
                }
            show_header_toggle: false
            entities:
              - entity: sensor.count_update
                type: custom:multiple-entity-row
                name: Оновлення
                state_header: Всього
                entities:
                  - entity: sensor.count_update_on
                    name: Доступно

          - type: custom:auto-entities
            card:
              type: entities
              show_header_toggle: false
            filter:
              include:
                - domain: update
                  state: 'on'
                  options:
                    type: custom:multiple-entity-row
                    show_state: false
                    secondary_info: last-changed
                    entities:
                      - attribute: installed_version
                        name: Встановлено
                      - attribute: latest_version
                        name: Остання

      - type: entities
        card_mod:
          style: |
            ha-card {
              color: #00BFFF;
              --paper-item-icon-color: #00BFFF;
              --iron-icon-stroke-color: #FFFFE0;
              font-weight: bold;
              font-size: 14px;
            }
        show_header_toggle: false
        entities:
          - entity: sensor.current_time
          - entity: binary_sensor.notification_time
            type: custom:multiple-entity-row
            name: Режими
            state_header: Сповіщення
            entities:
              - entity: binary_sensor.night_time
                name: Ніч

      - type: entities
        card_mod:
          style: |
            ha-card {
              color: #00BFFF;
              --paper-item-icon-color: #00BFFF;
              --iron-icon-stroke-color: #FFFFE0;
              font-weight: bold;
              font-size: 14px;
            }
        show_header_toggle: false
        entities:
          - entity: input_datetime.notification_start
          - entity: input_datetime.notification_stop

      - type: entities
        card_mod:
          style: |
            ha-card {
              color: #00BFFF;
              --paper-item-icon-color: #00BFFF;
              --iron-icon-stroke-color: #FFFFE0;
              font-weight: bold;
              font-size: 14px;
            }
        show_header_toggle: false
        entities:
          - entity: input_datetime.night_start
          - entity: input_datetime.night_stop

