              card_mod:
                style: |
                  ha-card {
                    color: #FA8072;
                    font-weight: bold;
                    font-size: 14px;
                  }
            filter:
              include:
                - domain: sensor
                  attributes:
                    device_class: 'battery'
              exclude:
                - state: '> 30.0'
                - state: 'unknown'
                - state: 'unavailable'

          - type: markdown
            card_mod:
              style: |
                ha-card {
                  color: #FA8072;
                }
            content: >
              #### Сенсори розряду

          - type: custom:auto-entities
            card:
              type: entities
              show_header_toggle: false
            filter:
              include:
                - domain: binary_sensor
                  state: 'on'
                  attributes:
                    device_class: 'battery'
                  options:
                    secondary_info: last-changed
                    state_color: true

      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: markdown
            card_mod:
              style: |
                ha-card {
                  color: #FA8072;
                }
            content: >
              #### Усі недоступні сутності

          - type: custom:auto-entities
            show_empty: false
            card:
              type: entities
              show_header_toggle: false
              card_mod:
                style: |
                  ha-card {
                    color: #FA8072;
                    --paper-item-icon-color: #E6E6FA;
                    font-weight: bold;
                    font-size: 14px;
                  }
            filter:
              include:
                - domain: '*'
                  state: 'unavailable'
              exclude:
                - entity_id: media_player.mi_speaker
                - entity_id: media_player.mitv
                - entity_id: media_player.mi_box
                - entity_id: media_player.kn_mi_box

############################ Колонка 3 ############################
  - type: grid
