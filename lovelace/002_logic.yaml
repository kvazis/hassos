############################ Логіка ############################
title: Логіка
icon: mdi:format-list-bulleted
sections:

############################ Колонка 1 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Система

      - type: markdown
        content: >
          ### Контроль

      - type: custom:auto-entities
        show_empty: false
        card:
          type: entities
          show_header_toggle: false
        filter:
          include:
            - entity_id: automation.control*
              options:
                secondary_info: last-changed
                state_color: true

      - type: markdown
        content: >
          ### Електрика

      - type: custom:auto-entities
        show_empty: false
        card:
          type: entities
          show_header_toggle: false
        filter:
          include:
            - entity_id: automation.electricity*
              options:
                secondary_info: last-changed
                state_color: true

      - type: markdown
        content: >
          ### Повідомлення

      - type: custom:auto-entities
        show_empty: false
        card:
          type: entities
          show_header_toggle: false
        filter:
          include:
            - entity_id: automation.telegram*
            - entity_id: automation.k7_notification_*
              options:
                secondary_info: last-changed
                state_color: true

      - type: markdown
        content: >
          ### Камери

      - type: custom:auto-entities
        show_empty: false
        card:
          type: entities
          show_header_toggle: false
        filter:
          include:
            - entity_id: automation.camera*
              options:
                secondary_info: last-changed
                state_color: true

