title: Логіка
icon: mdi:format-list-bulleted
sections:

############################ Колонка 1 ############################
  - type: grid
    cards:

      - type: entities
        title: Системні
        show_header_toggle: false
        entities:
          - type: custom:fold-entity-row
            head:
              type: section
              label: Розгорнути
            entities:
              - type: custom:auto-entities
                card:
                  type: entities
                  show_header_toggle: false
                filter:
                  include:
                    - entity_id: automation.sys_*
                      options:
                        secondary_info: last-changed
                        state_color: true
                  exclude:
                    - entity_id: automation.sys_notification_*
                sort:
                  method: friendly_name

      - type: entities
