##################   Клімат
title: Кухня Клімат
icon: phu:outdoor-motion-sensor-temperature
sections:

############################ Колонка 1 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Клімат

      - type: markdown
        content: >
          ### Датчики та сенсори

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Провітрювання
            secondary: |-
              {% if is_state("binary_sensor.kn_aeration", "off") %}
              Усе закрито
              {% else %}
              Провітрюється
              {% endif %}
            layout: vertical
            entity: binary_sensor.kn_aeration
            icon: |-
              {% if is_state("binary_sensor.kn_aeration", "off") %}
              phu:tilt-window-closed
              {% else %}
              phu:tilt-window-opened
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.kn_aeration", "off") %}
              grey
              {% else %}
              light-blue
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Вікно
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001a99562_contact", "off") %}
              Закрито
              {% else %}
              Відкрито
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0001a99562_contact
            icon: |-
              {% if is_state("binary_sensor.0x00158d0001a99562_contact", "off") %}
              phu:lift-in-window-closed
              {% else %}
              phu:lift-in-window-open1
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0001a99562_contact", "off") %}
              grey
              {% else %}
              light-blue
              {% endif %}
            tap_action:
              action: more-info

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Двері на балкон
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001a20885_contact", "off") %}
              Закриті
              {% else %}
              Відкриті
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0001a20885_contact
            icon: |-
              {% if is_state("binary_sensor.0x00158d0001a20885_contact", "off") %}
              phu:panel-glass-door2-close
              {% else %}
              phu:panel-glass-door2-open
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0001a20885_contact", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Балконне вікно
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001a4a394_contact", "off") %}
              Закрито
              {% else %}
              Відкрито
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0001a4a394_contact
            icon: |-
              {% if is_state("binary_sensor.0x00158d0001a4a394_contact", "off") %}
              phu:double-window-closed
              {% else %}
              phu:double-window-open
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0001a4a394_contact", "off") %}
              grey
              {% else %}
              light-blue
              {% endif %}
            tap_action:
              action: more-info

      - type: markdown
        content: >
          ### Кухня

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Температура
            secondary: |-
              {{ states('sensor.0x00158d0001581109_temperature') }} С°
            layout: vertical
            entity: sensor.0x00158d0001581109_temperature
            icon_color: |-
              {% if states("sensor.0x00158d0001581109_temperature")|float <= -10 %}
              indigo
              {% elif states("sensor.0x00158d0001581109_temperature")|float <= 0 %}
              blue
              {% elif states("sensor.0x00158d0001581109_temperature")|float <= 10 %}
              light-blue
              {% elif states("sensor.0x00158d0001581109_temperature")|float <= 20 %}
              cyan
              {% elif states("sensor.0x00158d0001581109_temperature")|float <= 25 %}
              yellow
              {% elif states("sensor.0x00158d0001581109_temperature")|float <= 30 %}
              amber
              {% elif states("sensor.0x00158d0001581109_temperature")|float <= 40 %}
              orange
              {% endif %}
            icon: mdi:temperature-celsius
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Вологість
            secondary: |-
              {{ states('sensor.0x00158d0001581109_humidity') }} %
            layout: vertical
            entity: sensor.0x00158d0001581109_humidity
            icon_color: |-
              {% if states("sensor.0x00158d0001581109_humidity")|float <= 30 %}
              deep-orange
              {% elif states("sensor.0x00158d0001581109_humidity")|float <= 40 %}
              yellow
              {% elif states("sensor.0x00158d0001581109_humidity")|float <= 50 %}
              light-blue
              {% elif states("sensor.0x00158d0001581109_humidity")|float <= 60 %}
              blue
              {% elif states("sensor.0x00158d0001581109_humidity")|float > 60 %}
              indigo
              {% endif %}
            icon: mdi:water-percent
            tap_action:
              action: more-info

      - type: markdown
        content: >
          ### Балкон

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Температура балкона
            secondary: |-
              {{ states('sensor.0xa4c1381ff5d0e03f_temperature') }} С°
            layout: vertical
            entity: sensor.0xa4c1381ff5d0e03f_temperature
            icon_color: |-
              {% if states("sensor.0xa4c1381ff5d0e03f_temperature")|float <= -10 %}
              indigo
              {% elif states("sensor.0xa4c1381ff5d0e03f_temperature")|float <= 0 %}
              blue
              {% elif states("sensor.0xa4c1381ff5d0e03f_temperature")|float <= 10 %}
              light-blue
              {% elif states("sensor.0xa4c1381ff5d0e03f_temperature")|float <= 20 %}
              cyan
              {% elif states("sensor.0xa4c1381ff5d0e03f_temperature")|float <= 25 %}
              yellow
              {% elif states("sensor.0xa4c1381ff5d0e03f_temperature")|float <= 30 %}
              amber
              {% elif states("sensor.0xa4c1381ff5d0e03f_temperature")|float <= 40 %}
              orange
              {% endif %}
            icon: mdi:temperature-celsius
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Вологість балкона
            secondary: |-
              {{ states('sensor.0xa4c1381ff5d0e03f_humidity') }} %
            layout: vertical
            entity: sensor.0xa4c1381ff5d0e03f_humidity
            icon_color: |-
              {% if states("sensor.0xa4c1381ff5d0e03f_humidity")|float <= 30 %}
              deep-orange
              {% elif states("sensor.0xa4c1381ff5d0e03f_humidity")|float <= 40 %}
              yellow
              {% elif states("sensor.0xa4c1381ff5d0e03f_humidity")|float <= 50 %}
              light-blue
              {% elif states("sensor.0xa4c1381ff5d0e03f_humidity")|float <= 60 %}
              blue
              {% elif states("sensor.0xa4c1381ff5d0e03f_humidity")|float > 60 %}
              indigo
              {% endif %}
            icon: mdi:water-percent
            tap_action:
              action: more-info

############################ Колонка 2 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ### Опалення

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Режим
            secondary: |-
              {% if is_state("switch.kn_thermostat_mode", "on") %}
              Опалення увімкнене
              {% else %}
              Опалення вимкнене
              {% endif %}
            layout: vertical
            tap_action:
              action: toggle
            entity: switch.kn_thermostat_mode
            icon: |-
              {% if is_state("switch.kn_thermostat_mode", "on") %}
              phu:wiser-thermostat-off
              {% else %}
              phu:wiser-thermostat-on
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.kn_thermostat_mode", "on") %}
              orange
              {% else %}
              grey
              {% endif %}

          - type: custom:mushroom-climate-card
            entity: climate.0x2c1165fffeb3e531
            hvac_modes:
              - heat
            show_temperature_control: true
            layout: vertical
            fill_container: true
            collapsible_controls: true
            primary_info: name
            secondary_info: state
            name: Кухня

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Калібрування
            secondary: |-
              {% if ((states('sensor.0x00158d0001581109_temperature') | float - state_attr('climate.0x2c1165fffeb3e531', 'current_temperature') | float))|round(1) > 1
                 or ((states('sensor.0x00158d0001581109_temperature') | float - state_attr('climate.0x2c1165fffeb3e531', 'current_temperature') | float))|round(1) < -1 %}
              Розбіжність > 1 С°
              {% else %}
              ОК
              {% endif %}
            layout: vertical
            tap_action:
              action: call-service
              service: script.turn_on
              service_data:
                entity_id: script.kn_thermostat_calibration
            entity: script.kn_thermostat_calibration
            icon: mdi:sync
            multiline_secondary: true
            icon_color: |-
              {% if ((states('sensor.0x00158d0001581109_temperature') | float - state_attr('climate.0x2c1165fffeb3e531', 'current_temperature') | float))|round(1) > 1
                 or ((states('sensor.0x00158d0001581109_temperature') | float - state_attr('climate.0x2c1165fffeb3e531', 'current_temperature') | float))|round(1) < -1 %}
              amber
              {% else %}
              green
              {% endif %}

          - type: custom:mushroom-template-card
            primary: |-
              Датчик {{ states('sensor.0x00158d0001581109_temperature') }} С°
            secondary: |-
              Головка - {{ state_attr('climate.0x2c1165fffeb3e531', 'current_temperature') }} С°
            layout: vertical
            entity: sensor.0x00158d0001581109_temperature
            icon_color: |-
              {% if is_state("switch.kn_thermostat_mode", "on") %}
              amber
              {% else %}
              grey
              {% endif %}
            icon: mdi:temperature-celsius
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: |-
              Поправка {{ states('number.0x2c1165fffeb3e531_local_temperature_calibration') }} С°
            secondary: |-
              Різниця {{ ((states('sensor.0x00158d0001581109_temperature') | float - state_attr('climate.0x2c1165fffeb3e531', 'current_temperature') | float))|round(1) }} С°
            layout: vertical
            entity: sensor.0x00158d0001581109_temperature
            icon_color: |-
              {% if is_state("switch.kn_thermostat_mode", "on") %}
              amber
              {% else %}
              grey
              {% endif %}
            icon: mdi:compare-horizontal
            tap_action:
              action: more-info

      - type: entities
        style: |
          ha-card {
            color: #f8ffd8;
            --paper-item-icon-color: #f8ffd8;
            --paper-item-icon-active-color: #f8ffd8;
            font-weight: bold;
            font-size: 14px;
          }
        show_header_toggle: false
        entities:
          - type: divider
          - entity: number.0x2c1165fffeb3e531_comfort_temperature
            name: Цільова температура
          - type: divider
          - entity: number.0x2c1165fffeb3e531_open_window_temperature
            name: Температура провітрювання
          - type: divider
          - entity: number.0x2c1165fffeb3e531_eco_temperature
            name: Нічна температура
          - type: divider
          - entity: binary_sensor.0x2c1165fffeb3e531_battery_low
            type: custom:multiple-entity-row
            state_header: Батарея
            entities:
              - attribute: last_seen
                format: relative
                name: Відгук

############################ Колонка 3 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ### Бойлер

      - type: entities
        show_header_toggle: false
        entities:
          - entity: sensor.current_time
          - entity: switch.0xa4c1388ce0ff53a8_mode

          - entity: switch.0xa4c1388ce0ff53a8
            type: custom:multiple-entity-row
            toggle: true
            state_color: true
            name: Бойлер
            secondary_info: last-changed
            state_header: Живлення
            entities:
              - entity: sensor.0xa4c1388ce0ff53a8_timer_manual
                name: Таймер M
              - entity: sensor.0xa4c1388ce0ff53a8_power
                name: Потужність
                unit: 'Вт'

      - type: conditional
        conditions:
          - entity: switch.0xa4c1388ce0ff53a8
            state: "on"
        card:
          type: custom:timer-bar-card
          entities:
            - entity: timer.0xa4c1388ce0ff53a8
              name: Залишилось -
          modifications:
            - elapsed: 30%
              bar_foreground: yellow
            - elapsed: 60%
              bar_foreground: orange
            - elapsed: 90%
              bar_foreground: red
          bar_height: 20px
          sync_issues: ignore
          invert: true

      - type: entities
        show_header_toggle: false
        entities:
          - entity: input_datetime.0xa4c1388ce0ff53a8_period

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            layout: horizontal
            entity: input_button.0xa4c1388ce0ff53a8_period_1
            icon: mdi:numeric-1-circle
            icon_color: grey
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.0xa4c1388ce0ff53a8_period_1

          - type: custom:mushroom-template-card
            layout: horizontal
            entity: input_button.0xa4c1388ce0ff53a8_period_2
