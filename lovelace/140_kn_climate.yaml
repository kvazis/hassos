          - type: custom:mushroom-template-card
            layout: horizontal
            entity: input_button.0xa4c1388ce0ff53a8_timer_manual
            icon: mdi:alpha-m-circle-outline
            icon_color: grey
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.0xa4c1388ce0ff53a8_timer_manual

      - type: entities
