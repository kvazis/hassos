              {% else %}
              mdi:power-plug-off
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x00158d0003f46bb6_l1", "on") %}
              green
              {% else %}
              red
              {% endif %}

