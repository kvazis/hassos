############################ Колонка 2 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Моніторинг

      - type: picture-entity
        entity: camera.reolink_e1_pro_rtsp
        camera_view: live
        show_state: false
        show_name: false

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-media-player-card
            entity: media_player.mitv
            name: Android TV
            icon: phu:telnet
            use_media_info: true
            show_volume_level: true
            media_controls:
              - on_off
              - play_pause_stop
            volume_controls:
              - volume_set
              - volume_mute
              - volume_buttons
            collapsible_controls: true

          - type: custom:mushroom-media-player-card
            entity: media_player.mi_box
            name: Android TV Box
            icon: phu:xiaomi-logo
            use_media_info: true
            show_volume_level: true
            media_controls:
              - on_off
              - play_pause_stop
            volume_controls:
              - volume_set
              - volume_mute
              - volume_buttons
            collapsible_controls: true

      - type: markdown
        content: >
          ### Керування мультимедіа

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Телевізор
            secondary: |-
              {% if is_state("binary_sensor.lr_tv_work", "off") %}
              Увімкнути
              {% else %}
              Вимкнути
              {% endif %}
            layout: horizontal
            entity: input_button.lr_tv_control
            icon: |-
              {% if is_state("binary_sensor.lr_tv_work", "off") %}
              mdi:television-off
              {% else %}
              mdi:television
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.lr_tv_work", "off") %}
              grey
              {% else %}
              indigo
              {% endif %}
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.lr_tv_control

          - type: custom:mushroom-template-card
            primary: Підсвічування для ТВ
            layout: horizontal
            entity: input_button.lr_light_cinema
            icon: |-
              {% if is_state('switch.lr_light_cinema_mode', 'on') %}
              mdi:led-strip-variant
              {% else %}
              mdi:led-strip-variant-off
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state('switch.lr_light_cinema_mode', 'on') %}
              amber
              {% else %}
              grey
              {% endif %}
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.lr_light_cinema

      - type: markdown
        content: >
          ### Датчики та сенсори

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Вітальня
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0005414857_occupancy", "off") %}
              Не виявлено
              {% else %}
              Рух
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0005414857_occupancy
            icon: |-
              {% if is_state("binary_sensor.0x00158d0005414857_occupancy", "off") %}
              mdi:motion-sensor-off
              {% else %}
              mdi:motion-sensor
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0005414857_occupancy", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Балкон
            secondary: |-
              {% if is_state("binary_sensor.0x00158d000449b773_occupancy", "off") %}
              Не виявлено
              {% else %}
              Рух
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d000449b773_occupancy
            icon: |-
              {% if is_state("binary_sensor.0x00158d000449b773_occupancy", "off") %}
              mdi:motion-sensor-off
              {% else %}
              mdi:motion-sensor
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d000449b773_occupancy", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Освітленість
            secondary: |-
              {{ states('sensor.0x04cf8cdf3c7cf19e_illuminance') }} lux
            layout: vertical
            entity: sensor.0x04cf8cdf3c7cf19e_illuminance
            icon_color: |-
              {% if states("sensor.0x04cf8cdf3c7cf19e_illuminance")|float <= 100 %}
              blue-grey
              {% elif states("sensor.0x04cf8cdf3c7cf19e_illuminance")|float <= 200 %}
              grey
              {% elif states("sensor.0x04cf8cdf3c7cf19e_illuminance")|float > 200 %}
              white
              {% endif %}
            icon: mdi:brightness-5
            tap_action:
              action: more-info

      - type: markdown
        content: >
          ### Робот-пилосос

      - type: custom:mushroom-vacuum-card
        entity: vacuum.zhimi_xa1_4790_robot_cleaner
        name: Lydsto Vacuum
        icon_animation: true
        layout: horizontal
        commands:
          - start_pause
          - stop
          - return_home

      - type: custom:battery-state-card
        entities:
          - entity: sensor.zhimi_xa1_4790_battery_level
            name: Рівень заряду

