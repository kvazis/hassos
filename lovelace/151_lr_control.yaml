            secondary: |-
              {{ states('sensor.lr_ups_dc_voltage') }} В
            layout: horizontal
            entity: sensor.lr_ups_dc_voltage
            icon_color: light-green
            icon: mdi:car-battery
            tap_action:
              action: more-info

      - type: markdown
