      - type: markdown
        content: >
          ### Охолодження

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Підставка Asus Fan
            secondary: |-
              {% if is_state("fan.0xa4c138d641b6346f_l1", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: fan.0xa4c138d641b6346f_l1
            icon: |-
              {% if is_state("fan.0xa4c138d641b6346f_l1", "on") %}
              mdi:fan
              {% else %}
              mdi:fan-off
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("fan.0xa4c138d641b6346f_l1", "on") %}
              green
              {% else %}
              grey
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Підставка Router Fan
            secondary: |-
              {% if is_state("fan.0x00124b00246ef1a8", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: fan.0x00124b00246ef1a8
            icon: |-
              {% if is_state("fan.0x00124b00246ef1a8", "on") %}
              mdi:fan
              {% else %}
              mdi:fan-off
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("fan.0x00124b00246ef1a8", "on") %}
              green
              {% else %}
              grey
              {% endif %}

      - type: markdown
        content: >
          ## Живлення

      - type: markdown
        content: >
          ### Вхід DC UPS

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Датчик живлення
            secondary: |-
              {% if is_state("binary_sensor.0xa4c1389d8b41b47d_power", "on") %}
              Живлення є
              {% else %}
              Живлення відсутнє
              {% endif %}
            layout: horizontal
            entity: binary_sensor.0xa4c1389d8b41b47d_power
            icon_color: |-
              {% if is_state("binary_sensor.0xa4c1389d8b41b47d_power", "on") %}
              green
              {% else %}
              red
              {% endif %}
            icon: |-
              {% if is_state("binary_sensor.0xa4c1389d8b41b47d_power", "on") %}
              mdi:power-plug
              {% else %}
              mdi:power-plug-off
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Живлення DC UPS
            secondary: |-
              {{ states('sensor.0xa4c138716822e6a7_power') }} Вт
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0xa4c138716822e6a7
            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0xa4c138716822e6a7", "on") %}
              green
              {% else %}
              red
              {% endif %}

      - type: markdown
        content: >
          ### Акумулятор DC UPS

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Струм
            secondary: |-
              {{ states('sensor.lr_ups_dc_current') }} А
            layout: horizontal
            entity: sensor.lr_ups_dc_current
            icon_color: light-green
            icon: mdi:current-dc
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
