################## Вітальня
title: Вітальня
icon: phu:rooms-living
sections:

############################ Колонка 1 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
          ## Керування

      - type: markdown
        content: >
          ### Освітлення

      - type: grid
        square: false
        columns: 4
        cards:
          - type: light
            name: Люстра 1
            entity: light.yeelight_ceiling4_0x49c726b

          - type: light
            name: Амбі 1
            entity: light.yeelight_ceiling4_0x49c726b_ambilight

          - type: light
            name: Люстра 2
            entity: light.yeelight_ceiling4_0x4a1dacd

          - type: light
            name: Амбі 2
            entity: light.yeelight_ceiling4_0x4a1dacd_ambilight

          - type: light
            name: Настільна лампа
            entity: light.smart_desk_lamp

          - type: light
            name: Стрічка
            entity: light.0xa4c138da30166b8f

          - type: light
            name: Приліжкова лампа
            entity: light.lr_bedside_lamp

          - type: light
            name: Балкон
            entity: light.0xa4c13812b94c8365

      - type: custom:mushroom-template-card
        primary: Нічне підсвічування
        secondary: |-
          {% if is_state("input_boolean.lr_night_light", "on") %}
          Увімкнено
          {% else %}
          Вимкнено
          {% endif %}
        layout: horizontal
        entity: input_boolean.lr_night_light
        icon: |-
          {% if is_state("input_boolean.lr_night_light", "on") %}
          mdi:lightbulb-group
          {% else %}
          mdi:lightbulb-group-off
          {% endif %}
        multiline_secondary: true
        icon_color: |-
          {% if is_state("input_boolean.lr_night_light", "on") %}
          green
          {% else %}
          grey
          {% endif %}
        tap_action:
          action: toggle

      - type: markdown
        content: >
          ### Люстра 1

      - type: grid
        square: false
        columns: 3
        cards:
          - type: custom:mushroom-template-card
            primary: Доступність
            secondary: |-
              {% if is_state('light.yeelight_ceiling4_0x49c726b', 'unavailable') %}
              Недоступно
              {% else %}
              OK
              {% endif %}
            layout: horizontal
            entity: binary_sensor.lr_ceiling_1_unavailable
            icon: |-
              {% if is_state('light.yeelight_ceiling4_0x49c726b', 'unavailable') %}
              mdi:alert
              {% else %}
              mdi:check-bold
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state('light.yeelight_ceiling4_0x49c726b', 'unavailable') %}
              red
              {% else %}
              green
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Живлення
            secondary: |-
              {% if is_state("switch.0x54ef4410008e96fd_top", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x54ef4410008e96fd_top
            icon: phu:aqara-h1-switch
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x54ef4410008e96fd_top", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Перезавантаження
            layout: horizontal
            entity: input_button.lr_ceiling_1_reset
            icon: mdi:reload
            multiline_secondary: true
            icon_color: amber
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.lr_ceiling_1_reset

      - type: markdown
        content: >
          ### Люстра 2

      - type: grid
        square: false
        columns: 3
        cards:
          - type: custom:mushroom-template-card
            primary: Доступність
            secondary: |-
              {% if is_state('light.yeelight_ceiling4_0x4a1dacd', 'unavailable') %}
