              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x842e14fffee5451a
            icon: mdi:power-socket-eu
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x842e14fffee5451a", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
