################## Toilet
title: Туалет, пральня
icon: mdi:toilet
sections:

############################ Колонка 1 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
           ## Керування

      - type: markdown
        content: >
           ### Освітлення та вентиляція

      - type: light
        name: Люстра
        entity: light.0x54ef44100096af68

      - type: button
        name: Освітлення на дзеркалі
        entity: light.0x00124b0023ae464d_right
        tap_action:
          action: toggle

      - type: button
        name: Аварійне світло
        entity: light.0x00124b0023ae464d_left
        tap_action:
          action: toggle

      - type: button
        name: Витяжка
        entity: fan.0x00158d00062fbb54_right
        tap_action:
          action: toggle

      - type: button
        name: Освітлення пральні
        entity: light.0x00158d00014a1a55
        tap_action:
          action: toggle

      - type: markdown
        content: >
           ### Відновлення роботи

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Доступність
            secondary: |-
              {% if is_state("binary_sensor.tt_light_unavailable", "off") %}
              OK
              {% else %}
              Недоступно
              {% endif %}
            layout: horizontal
            entity: binary_sensor.tt_light_unavailable
            icon: |-
              {% if is_state("binary_sensor.tt_light_unavailable", "off") %}
              mdi:check-bold
              {% else %}
              mdi:alert
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.tt_light_unavailable", "off") %}
              green
              {% else %}
              red
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Живлення
            secondary: |-
              {% if is_state("switch.0x00158d00062fbb54_left", "on") %}
              Увімкнено
              {% else %}
              Вимкнено
              {% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x00158d00062fbb54_left
            icon: phu:aqara-h1-switch
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x00158d00062fbb54_left", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Перезавантаження
            layout: horizontal
            entity: input_button.tt_light_reboot
            icon: mdi:reload
            multiline_secondary: true
            icon_color: amber
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.tt_light_reboot

      - type: markdown
        content: >
           ### Прання

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Живлення
            secondary: |-
              {{ states('sensor.0x842e14fffe51c5ae_power') }} Вт
            layout: horizontal
            tap_action:
              action: toggle
            entity: switch.0x842e14fffe51c5ae
            icon: mdi:power-standby
            multiline_secondary: true
            icon_color: |-
              {% if is_state("switch.0x842e14fffe51c5ae", "on") %}
              green
              {% else %}
              red
              {% endif %}

          - type: custom:mushroom-template-card
            primary: Прання
            secondary: |-
              {% if is_state("binary_sensor.ln_washing", "on") %}
              Триває прання
              {% else %}
              Очікування
              {% endif %}
            layout: horizontal
            entity: binary_sensor.ln_washing
            icon: mdi:washing-machine
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.ln_washing", "on") %}
              green
              {% else %}
              grey
              {% endif %}
            tap_action:
              action: more-info

############################ Колонка 2 ############################
  - type: grid
    cards:

      - type: markdown
        content: >
           ## Моніторинг

      - type: markdown
        content: >
           ### Датчики та сенсори в туалеті

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Рух
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001a24e71_occupancy", "off") %}
              Нема руху
              {% else %}
              Виявлено
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0001a24e71_occupancy
            icon: |-
              {% if is_state("binary_sensor.0x00158d0001a24e71_occupancy", "off") %}
              mdi:motion-sensor-off
              {% else %}
              mdi:motion-sensor
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0001a24e71_occupancy", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Присутність
            secondary: |-
              {% if is_state("binary_sensor.0x70ac08fffe63561c_presence", "off") %}
              Нікого нема
              {% else %}
              Виявлено
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x70ac08fffe63561c_presence
            icon: phu:motion-sensor
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x70ac08fffe63561c_presence", "off") %}
              grey
              {% else %}
              amber
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Двері
            secondary: |-
              {% if is_state("binary_sensor.0xa4c1384e55f274ef_contact", "off") %}
              Закриті
              {% else %}
              Відкриті
              {% endif %}
            layout: vertical
            entity: binary_sensor.0xa4c1384e55f274ef_contact
            icon: |-
              {% if is_state("binary_sensor.0xa4c1384e55f274ef_contact", "off") %}
              mdi:door-closed
              {% else %}
              mdi:door
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0xa4c1384e55f274ef_contact", "off") %}
              white
              {% else %}
              grey
              {% endif %}
            tap_action:
              action: more-info

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Рукомийник
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001bbeba6_water_leak", "off") %}
              Сухо
              {% else %}
              Протікання
              {% endif %}
            layout: vertical
            entity: binary_sensor.0x00158d0001bbeba6_water_leak
            icon: |-
              {% if is_state("binary_sensor.0x00158d0001bbeba6_water_leak", "off") %}
              mdi:water-check
              {% else %}
              mdi:water-alert
              {% endif %}
            multiline_secondary: true
            icon_color: |-
              {% if is_state("binary_sensor.0x00158d0001bbeba6_water_leak", "off") %}
              green
              {% else %}
              red
              {% endif %}
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Температура
            secondary: |-
              {{ states('sensor.0xec1bbdfffe6f3394_temperature') }} С°
            layout: vertical
            entity: sensor.0xec1bbdfffe6f3394_temperature
            icon_color: |-
              {% if states("sensor.0xec1bbdfffe6f3394_temperature")|float <= -10 %}
              indigo
              {% elif states("sensor.0xec1bbdfffe6f3394_temperature")|float <= 0 %}
              blue
              {% elif states("sensor.0xec1bbdfffe6f3394_temperature")|float <= 10 %}
              light-blue
              {% elif states("sensor.0xec1bbdfffe6f3394_temperature")|float <= 20 %}
              cyan
              {% elif states("sensor.0xec1bbdfffe6f3394_temperature")|float <= 25 %}
              yellow
              {% elif states("sensor.0xec1bbdfffe6f3394_temperature")|float <= 30 %}
              amber
              {% elif states("sensor.0xec1bbdfffe6f3394_temperature")|float <= 40 %}
              orange
              {% endif %}
            icon: mdi:temperature-celsius
            tap_action:
              action: more-info

          - type: custom:mushroom-template-card
            primary: Вологість
            secondary: |-
              {{ states('sensor.0xec1bbdfffe6f3394_humidity') }} %
            layout: vertical
            entity: sensor.0xec1bbdfffe6f3394_humidity
            icon_color: |-
              {% if states("sensor.0xec1bbdfffe6f3394_humidity")|float <= 30 %}
              deep-orange
              {% elif states("sensor.0xec1bbdfffe6f3394_humidity")|float <= 40 %}
              yellow
              {% elif states("sensor.0xec1bbdfffe6f3394_humidity")|float <= 50 %}
              light-blue
              {% elif states("sensor.0xec1bbdfffe6f3394_humidity")|float <= 60 %}
              blue
              {% elif states("sensor.0xec1bbdfffe6f3394_humidity")|float > 60 %}
              indigo
              {% endif %}
            icon: mdi:water-percent
            tap_action:
              action: more-info

      - type: markdown
        content: >
           ### Датчики та сенсори в пральні

      - type: horizontal-stack
        cards:

          - type: custom:mushroom-template-card
            primary: Рух
            secondary: |-
              {% if is_state("binary_sensor.0x00158d0001e16204_occupancy", "off") %}
              Нема руху
