##################################################
## Актуалізовано: 2026-03-25
##################################################

da_sensors:

  ##################################################
  ## HOMEASSISTANT
  ##################################################

  homeassistant:
    customize:
      binary_sensor.0x00158d00016d56f5_occupancy:
        friendly_name: Дитяча - датчик руху
        icon: mdi:motion-sensor
      sensor.0x00158d00016d56f5_battery:
        friendly_name: Дитяча - датчик руху
        icon: mdi:battery

      binary_sensor.0x00158d0001583c7b_contact:
        friendly_name: Дитяча - вікно
        icon: mdi:window-closed-variant
        device_class: window
      sensor.0x00158d0001583c7b_battery:
        friendly_name: Дитяча - вікно
        icon: mdi:battery

      binary_sensor.da_aeration:
        friendly_name: Дитяча - провітрювання
        icon: mdi:window-open-variant

      sensor.0x00158d000159c7e6_humidity:
        friendly_name: Дитяча - вологість
        icon: mdi:water-percent
      sensor.0x00158d000159c7e6_temperature:
        friendly_name: Дитяча - температура
        icon: mdi:temperature-celsius
      sensor.0x00158d000159c7e6_battery:
        friendly_name: Дитяча - клімат
        icon: mdi:battery

      sensor.0x04cf8cdf3c78ca91_illuminance_lux:
        friendly_name: Дитяча - освітленість
        icon: mdi:brightness-6
      sensor.0x04cf8cdf3c78ca91_battery:
        friendly_name: Дитяча - сенсор освітленості
        icon: mdi:battery

  ##################################################
  ## RECORDER
  ##################################################

  recorder:
    include:
      entities:
        - sensor.0x00158d000159c7e6_temperature
        - sensor.0x00158d000159c7e6_humidity
        - sensor.0x04cf8cdf3c78ca91_illuminance_lux
        - binary_sensor.0x00158d00016d56f5_occupancy

  ##################################################
  ## TEMPLATE
  ##################################################

  template:
    - binary_sensor:
        - name: da_aeration
          unique_id: da_aeration
          state: >
            {{ is_state('binary_sensor.0x00158d0001583c7b_contact', 'on') }}
          delay_on:
            seconds: 30
          device_class: opening
          icon: >
            {% if is_state("binary_sensor.da_aeration", "on") %}
            mdi:window-open-variant
            {% else %}
            mdi:window-closed-variant
            {% endif %}