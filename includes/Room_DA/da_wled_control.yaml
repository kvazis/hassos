##################################################
## Актуалізовано: 2026-03-25
##################################################

da_wled_control:

  ##################################################
  ## HOMEASSISTANT
  ##################################################

  homeassistant:
    customize:
      light.da_wled:
        friendly_name: Дитяча - WLED стрічка
        icon: mdi:led-strip-variant

      input_button.da_wled_light:
        friendly_name: Дитяча - адресна стрічка
        icon: mdi:gesture-tap-button

      automation.da_light_wled_manual_control:
        friendly_name: Дитяча - керування WLED стрічкою
        icon: mdi:led-strip

      automation.da_light_wled_effects:
        friendly_name: Дитяча - ефекти WLED стрічки
        icon: mdi:palette

      automation.da_light_wled_threat_notification:
        friendly_name: Дитяча - WLED тривога
        icon: mdi:alert

      automation.da_light_wled_threat_cancel:
        friendly_name: Дитяча - WLED скасування тривоги
        icon: mdi:check-circle

  ##################################################
  ## INPUT_BUTTON
  ##################################################

  input_button:
    da_wled_light:

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:
    - alias: da_light_wled_manual_control
      id: da_light_wled_manual_control
      description: Дитяча - керування адресною стрічкою
      initial_state: true
      trigger:
        - platform: state
          entity_id: input_button.da_wled_light
        - platform: state
          entity_id: sensor.0x54ef4410004c16d9_action
          to: "button_3_single"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
      action:
        - action: light.toggle
          target:
            entity_id: light.da_wled

    - alias: da_light_wled_effects
      id: da_light_wled_effects
      description: Дитяча - ефекти адресної стрічки
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.0x54ef4410004c16d9_action
          to: "button_3_double"
          id: da_opple_button_3_2
        - platform: state
          entity_id: sensor.0x54ef4410004c16d9_action
          to: "button_3_triple"
          id: da_opple_button_3_3
        - platform: state
          entity_id: sensor.0x54ef4410004c16d9_action
          to: "button_4_single"
          id: da_opple_button_4_1
        - platform: state
          entity_id: sensor.0x54ef4410004c16d9_action
          to: "button_4_double"
          id: da_opple_button_4_2
        - platform: state
          entity_id: sensor.0x54ef4410004c16d9_action
          to: "button_4_triple"
          id: da_opple_button_4_3
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
        - condition: state
          entity_id: light.da_wled
          state: "on"
      action:
        - choose:
            - conditions:
                - condition: trigger
                  id: da_opple_button_3_2
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.da_wled
                  data:
                    effect: Gravcentric
                    brightness_pct: 50
                - action: select.select_option
                  target:
                    entity_id: select.da_wled_color_palette
                  data:
                    option: Red Tide
                - action: number.set_value
                  target:
                    entity_id: number.da_wled_speed
                  data:
                    value: 218
                - action: number.set_value
                  target:
                    entity_id: number.da_wled_intensity
                  data:
                    value: 128

            - conditions:
                - condition: trigger
                  id: da_opple_button_3_3
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.da_wled
                  data:
                    effect: Washing Machine
                    brightness_pct: 50
                - action: select.select_option
                  target:
                    entity_id: select.da_wled_color_palette
                  data:
                    option: Icefire
                - action: number.set_value
                  target:
                    entity_id: number.da_wled_speed
                  data:
                    value: 157
                - action: number.set_value
                  target:
                    entity_id: number.da_wled_intensity
                  data:
                    value: 221

            - conditions:
                - condition: trigger
                  id: da_opple_button_4_1
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.da_wled
                  data:
                    effect: Solid
                    brightness_pct: 50
                    rgb_color: [243, 74, 255]

            - conditions:
                - condition: trigger
                  id: da_opple_button_4_2
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.da_wled
                  data:
                    effect: Bpm
                    brightness_pct: 50
                    rgb_color: [0, 0, 255]
                - action: select.select_option
                  target:
                    entity_id: select.da_wled_color_palette
                  data:
                    option: Default
                - action: number.set_value
                  target:
                    entity_id: number.da_wled_speed
                  data:
                    value: 22

            - conditions:
                - condition: trigger
                  id: da_opple_button_4_3
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.da_wled
                  data:
                    effect: Waterfall
                    brightness_pct: 50
                - action: select.select_option
                  target:
                    entity_id: select.da_wled_color_palette
                  data:
                    option: Aurora
                - action: number.set_value
                  target:
                    entity_id: number.da_wled_speed
                  data:
                    value: 128
                - action: number.set_value
                  target:
                    entity_id: number.da_wled_intensity
                  data:
                    value: 128

    - alias: da_light_wled_threat_notification
      id: da_light_wled_threat_notification
      description: Дитяча - WLED тривога
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.m_kiyiv_air
          from: "off"
          to: "on"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
        - condition: state
          entity_id: binary_sensor.night_time
          state: "off"
      action:
        - action: light.turn_on
          target:
            entity_id: light.da_wled
          data:
            effect: Gravcentric
            brightness_pct: 50
        - action: select.select_option
          target:
            entity_id: select.da_wled_color_palette
          data:
            option: Red Tide
        - action: number.set_value
          target:
            entity_id: number.da_wled_speed
          data:
            value: 218
        - action: number.set_value
          target:
            entity_id: number.da_wled_intensity
          data:
            value: 128
        - delay: 00:00:30
        - action: light.turn_off
          target:
            entity_id: light.da_wled
        - delay: 00:00:15
        - action: light.turn_off
          target:
            entity_id: light.da_wled

    - alias: da_light_wled_threat_cancel
      id: da_light_wled_threat_cancel
      description: Дитяча - скасування тривоги WLED
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.m_kiyiv_air
          from: "on"
          to: "off"
      condition:
        - condition: state
          entity_id: binary_sensor.night_time
          state: "off"
        - condition: state
          entity_id: switch.control_mode
          state: "on"
      action:
        - action: light.turn_on
          target:
            entity_id: light.da_wled
          data:
            effect: Aurora
            brightness_pct: 50
        - action: select.select_option
          target:
            entity_id: select.da_wled_color_palette
          data:
            option: Aurora
        - action: number.set_value
          target:
            entity_id: number.da_wled_speed
          data:
            value: 200
        - action: number.set_value
          target:
            entity_id: number.da_wled_intensity
          data:
            value: 200
        - delay: 00:00:30
        - action: light.turn_off
          target:
            entity_id: light.da_wled
        - delay: 00:00:15
        - action: light.turn_off
          target:
            entity_id: light.da_wled