##################################################
## Актуалізовано: 2026-03-25
##################################################

da_light:

  ##################################################
  ## HOMEASSISTANT
  ##################################################

  homeassistant:
    customize:
      automation.da_light_ceiling:
        friendly_name: Дитяча - ручне керування люстрою
        icon: mdi:ceiling-light

      automation.da_light_table_lamp_manual_control:
        friendly_name: Дитяча - ручне керування настільною лампою
        icon: mdi:desk-lamp

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:
    - alias: da_light_ceiling
      id: da_light_ceiling
      description: Дитяча - ручне керування люстрою
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.0x00158d00010b5c6e_action
          to: "single"
        - platform: state
          entity_id: sensor.0x54ef4410004c16d9_action
          to: "button_1_single"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
      action:
        - action: light.toggle
          target:
            entity_id: light.0x00158d000635ded8_right

    - alias: da_light_table_lamp_manual_control
      id: da_light_table_lamp_light_manual_control
      description: Дитяча - ручне керування настільною лампою
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.0x00158d000635ded8_action
          to: "single_left"
        - platform: state
          entity_id: sensor.0x54ef4410004c16d9_action
          to: "button_1_triple"
        - platform: state
          entity_id: sensor.0xa4c1380eb8e7e537_action
          to: "single"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
      action:
        - action: light.toggle
          target:
            entity_id: light.yeelight_lamp1_0x32a4ab4