##################################################
## Актуалізовано: 2026-03-25
##################################################

da_curtain:

  ##################################################
  ## HOMEASSISTANT
  ##################################################

  homeassistant:
    customize:
      cover.0x00124b0029dee0c9:
        friendly_name: Дитяча - штори
        icon: mdi:curtains
      sensor.0x00124b0029dee0c9_battery:
        friendly_name: Дитяча - штори
        icon: mdi:battery

      automation.da_curtain_control:
        friendly_name: Дитяча - керування шторами
        icon: mdi:curtains

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:
    - alias: da_curtain_control
      id: da_curtain_control
      description: Дитяча - керування шторами
      initial_state: false
      trigger:
        - platform: sun
          event: sunset
          offset: 0
          id: sunset
        - platform: sun
          event: sunrise
          offset: "01:00:00"
          id: sunrise_work
        - platform: sun
          event: sunrise
          offset: "03:00:00"
          id: sunrise_weekend
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
      action:
        - choose:
            - conditions:
                - condition: trigger
                  id: sunset
              sequence:
                - action: cover.close_cover
                  data: {}
                  target:
                    entity_id: cover.0x00124b0029dee0c9
                - action: telegram_bot.send_message
                  data:
                    chat_id:
                      - !secret chat_id_log
                    message: |
                      {{"\U0001F916"}} Детская A - управление шторами {{ states('sensor.time_date') }} 
                      {{"\U0001F4AC"}} Закрываю шторы

            - conditions:
                - condition: trigger
                  id: sunrise_work
                - condition: state
                  entity_id: binary_sensor.workday_sensor
                  state: "on"
              sequence:
                - action: cover.open_cover
                  data: {}
                  target:
                    entity_id: cover.0x00124b0029dee0c9
                - action: telegram_bot.send_message
                  data:
                    chat_id:
                      - !secret chat_id_log
                    message: |
                      {{"\U0001F916"}} Детская A - управление шторами {{ states('sensor.time_date') }} 
                      {{"\U0001F4AC"}} Открываю шторы

            - conditions:
                - condition: trigger
                  id: sunrise_weekend
                - condition: state
                  entity_id: binary_sensor.workday_sensor
                  state: "off"
              sequence:
                - action: cover.open_cover
                  data: {}
                  target:
                    entity_id: cover.0x00124b0029dee0c9
                - action: telegram_bot.send_message
                  data:
                    chat_id:
                      - !secret chat_id_log
                    message: |
                      {{"\U0001F916"}} Детская A - управление шторами {{ states('sensor.time_date') }} 
                      {{"\U0001F4AC"}} Открываю шторы