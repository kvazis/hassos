##################################################
## Актуалізовано: 2026-03-24
##################################################

da_heat:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      ##################################################
      ## PHYSICAL
      ##################################################

      climate.0x2c1165fffec612b1:
        friendly_name: Дитяча TRV
        icon: mdi:radiator

      switch.0x2c1165fffec612b1_heating_stop:
        friendly_name: Дитяча TRV - стоп нагріву
        icon: mdi:radiator-off

      number.0x2c1165fffec612b1_local_temperature_calibration:
        friendly_name: Дитяча TRV - калібрування температури
        unit_of_measurement: "°C"
        icon: mdi:thermometer-chevron-up

      number.0x2c1165fffec612b1_comfort_temperature:
        friendly_name: Дитяча TRV - комфортна температура
        unit_of_measurement: "°C"
        icon: mdi:thermometer

      number.0x2c1165fffec612b1_open_window_temperature:
        friendly_name: Дитяча TRV - температура провітрювання
        unit_of_measurement: "°C"
        icon: mdi:window-open-variant

      number.0x2c1165fffec612b1_holiday_temperature:
        friendly_name: Дитяча TRV - температура вихідного режиму
        unit_of_measurement: "°C"
        icon: mdi:calendar-weekend

      number.0x2c1165fffec612b1_eco_temperature:
        friendly_name: Дитяча TRV - еко температура
        unit_of_measurement: "°C"
        icon: mdi:leaf

      binary_sensor.0x2c1165fffec612b1_battery_low:
        friendly_name: Дитяча TRV - низький заряд
        icon: mdi:battery-alert

      ##################################################
      ## HELPERS
      ##################################################

      switch.da_radiator_mode:
        friendly_name: Дитяча - режим опалення
        icon: mdi:radiator

      ##################################################
      ## TEMPLATE
      ##################################################

      binary_sensor.da_thermostat_local_temperature_calibration:
        friendly_name: Дитяча - потрібне калібрування TRV
        icon: mdi:thermometer-sync

      ##################################################
      ## SCRIPT
      ##################################################

      script.da_heat_temperature_calibration:
        friendly_name: Дитяча - калібрування температури TRV
        icon: mdi:thermometer-auto

      ##################################################
      ## AUTOMATION
      ##################################################

      automation.da_heat_temperature_calibration:
        friendly_name: Дитяча - калібрування температури

      automation.da_heat_mode_toggle:
        friendly_name: Дитяча - перемикання режиму опалення

      automation.da_heat_temperature_set:
        friendly_name: Дитяча - керування температурою

  ##################################################
  ## RECORDER
  ##################################################

  recorder:
    include:
      entities:
        - climate.0x2c1165fffec612b1

  ##################################################
  ## MQTT
  ##################################################

  mqtt:
    switch:
      - name: da_radiator_mode
        unique_id: da_radiator_mode
        state_topic: "states/da_radiator"
        command_topic: "states/da_radiator"
        payload_on: "ON"
        payload_off: "OFF"
        state_on: "ON"
        state_off: "OFF"
        retain: true

  ##################################################
  ## TEMPLATE
  ##################################################

  template:
    - binary_sensor:

      ##################################################
      ## ПОТРЕБА КАЛІБРУВАННЯ TRV
      ##################################################

        - name: da_thermostat_local_temperature_calibration
          unique_id: da_thermostat_local_temperature_calibration
          state: >
            {{
              (
                states('sensor.0x00158d000159c7e6_temperature') | float(0)
                - state_attr('climate.0x2c1165fffec612b1', 'current_temperature') | float(0)
              ) | abs > 1
            }}

  ##################################################
  ## SCRIPT
  ##################################################

  script:

    ##################################################
    ## КАЛІБРУВАННЯ ТЕМПЕРАТУРИ TRV
    ##################################################

    da_heat_temperature_calibration:
      alias: da_heat_temperature_calibration
      sequence:
        - action: number.set_value
          target:
            entity_id: number.0x2c1165fffec612b1_local_temperature_calibration
          data:
            value: 0
        - delay: "00:00:10"
        - action: number.set_value
          target:
            entity_id: number.0x2c1165fffec612b1_local_temperature_calibration
          data:
            value: >
              {{
                (
                  states('sensor.0x00158d000159c7e6_temperature') | float(0)
                  - state_attr('climate.0x2c1165fffec612b1', 'current_temperature') | float(0)
                ) | round(1)
              }}

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## КАЛІБРУВАННЯ ТЕМПЕРАТУРИ
    ##################################################

    - alias: da_heat_temperature_calibration
      id: da_heat_temperature_calibration
      description: Періодичне калібрування температури TRV у дитячій
      trigger:
        - platform: time_pattern
          minutes: "/15"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
        - condition: state
          entity_id: switch.da_radiator_mode
          state: "on"
        - condition: state
          entity_id: binary_sensor.da_thermostat_local_temperature_calibration
          state: "on"
      action:
        - action: script.turn_on
          target:
            entity_id: script.da_heat_temperature_calibration

    ##################################################
    ## ПЕРЕМИКАННЯ РЕЖИМУ ОПАЛЕННЯ
    ##################################################

    - alias: da_heat_mode_toggle
      id: da_heat_mode_toggle
      description: Перемикання режиму роботи TRV у дитячій
      trigger:
        - platform: homeassistant
          event: start
        - platform: state
          entity_id:
            - switch.da_radiator_mode
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: switch.da_radiator_mode
                  state: "on"
                - condition: template
                  value_template: >
                    {{
                      states('climate.0x2c1165fffec612b1') != 'heat'
                      or state_attr('climate.0x2c1165fffec612b1', 'preset_mode') != 'manual'
                    }}
              sequence:
                - action: climate.set_hvac_mode
                  target:
                    entity_id: climate.0x2c1165fffec612b1
                  data:
                    hvac_mode: heat

                - action: climate.set_preset_mode
                  target:
                    entity_id: climate.0x2c1165fffec612b1
                  data:
                    preset_mode: manual

                - action: climate.set_temperature
                  target:
                    entity_id: climate.0x2c1165fffec612b1
                  data:
                    temperature: >
                      {{ states('number.0x2c1165fffec612b1_comfort_temperature') | float(0) }}

            - conditions:
                - condition: state
                  entity_id: switch.da_radiator_mode
                  state: "off"
                - condition: template
                  value_template: "{{ states('climate.0x2c1165fffec612b1') != 'off' }}"
              sequence:
                - action: climate.set_hvac_mode
                  target:
                    entity_id: climate.0x2c1165fffec612b1
                  data:
                    hvac_mode: "off"

    ##################################################
    ## КЕРУВАННЯ ТЕМПЕРАТУРОЮ
    ##################################################

    - alias: da_heat_temperature_set
      id: da_heat_temperature_set
      description: Керування температурою TRV за провітрюванням і нічним режимом
      trigger:
        - platform: state
          entity_id:
            - binary_sensor.da_aeration
        - platform: state
          entity_id:
            - binary_sensor.night_time
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
        - condition: state
          entity_id: switch.da_radiator_mode
          state: "on"
      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: binary_sensor.da_aeration
                  state: "on"
              sequence:
                - action: climate.set_temperature
                  target:
                    entity_id: climate.0x2c1165fffec612b1
                  data:
                    temperature: >
                      {{ states('number.0x2c1165fffec612b1_open_window_temperature') | float(0) }}

            - conditions:
                - condition: state
                  entity_id: binary_sensor.night_time
                  state: "on"
              sequence:
                - action: climate.set_temperature
                  target:
                    entity_id: climate.0x2c1165fffec612b1
                  data:
                    temperature: >
                      {{ states('number.0x2c1165fffec612b1_eco_temperature') | float(0) }}

          default:
            - action: climate.set_temperature
              target:
                entity_id: climate.0x2c1165fffec612b1
              data:
                temperature: >
                  {{ states('number.0x2c1165fffec612b1_comfort_temperature') | float(0) }}