da_heat:
## Детская А термоголовка

    recorder:
      include:
        entities:
           - climate.0x2c1165fffec612b1

    homeassistant:
      customize:
        
        climate.0x2c1165fffec612b1:
          friendly_name: Детская А TRV
        switch.0x2c1165fffec612b1_heating_stop:
          friendly_name: Детская А TRV стоп нагрев
        number.0x2c1165fffec612b1_local_temperature_calibration:
          friendly_name: Детская А TRV t калибровка
          unit_of_measurement: '°C'
        number.0x2c1165fffec612b1_comfort_temperature:
          friendly_name: Детская А TRV t комфорт
          unit_of_measurement: '°C'
        number.0x2c1165fffec612b1_open_window_temperature:
          friendly_name: Детская А TRV t окно
          unit_of_measurement: '°C'
        number.0x2c1165fffec612b1_holiday_temperature:
          friendly_name: Детская А TRV t выходные
          unit_of_measurement: '°C'
        number.0x2c1165fffec612b1_eco_temperature:
          friendly_name: Детская А TRV t эко
          unit_of_measurement: '°C'
        binary_sensor.0x2c1165fffec612b1_battery_low:
          friendly_name: Детская А TRV питание

    mqtt:
      binary_sensor:
        - name: da_radiator
          unique_id: da_radiator
          state_topic: "states/da_radiator"



    template:
    
      - binary_sensor:
      
          - name: da_thermostat_local_temperature_calibration
            unique_id: da_thermostat_local_temperature_calibration
            state: >
                    {{((states('sensor.0x00158d000159c7e6_temperature') | float - state_attr('climate.0x2c1165fffec612b1', 'current_temperature') | float))|round(1) > 1 
                     or ((states('sensor.0x00158d000159c7e6_temperature') | float - state_attr('climate.0x2c1165fffec612b1', 'current_temperature') | float))|round(1) < -1 }}
            device_class: update
     

      - switch:

          - unique_id: da_radiator_mode
            name: Режим отопления Детская А
            default_entity_id: switch.da_radiator_mode
            state: >
              {{ is_state('binary_sensor.da_radiator', 'on') }}    
            turn_on:
              - action: mqtt.publish
                data:
                  topic: states/da_radiator
                  payload: 'ON'
                  retain: true          
            turn_off:
              - action: mqtt.publish
                data:
                  topic: states/da_radiator
                  payload: 'OFF'
                  retain: true          
            icon: >
              {% if is_state('switch.da_radiator_mode', 'on') %}
                mdi:radiator
              {% else %}
                mdi:radiator
              {% endif %}
              
 
    script:
    
        da_temperature_calibration:
          alias: Детская А TRV, калибровка
          sequence:
          - action: number.set_value
            data:
              value: "0.0"
            target:
              entity_id: number.0x2c1165fffec612b1_local_temperature_calibration 
          - delay: 00:00:10
          - action: number.set_value
            data:
              value: "{{((states('sensor.0x00158d000159c7e6_temperature') | float - state_attr('climate.0x2c1165fffec612b1', 'current_temperature') | float))|round(1) }}"
            target:
              entity_id: number.0x2c1165fffec612b1_local_temperature_calibration 


    automation:

      - alias: da_heat_temperature_calibration
        id: da_heat_temperature_calibration
        description: Детская А TRV - калибровка температуры 
        initial_state: true
        trigger:
          - platform: time_pattern
            minutes: "/15"
        condition:
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
          - condition: state
            entity_id: binary_sensor.da_radiator
            state: 'on' 
          - condition: state
            entity_id: binary_sensor.da_thermostat_local_temperature_calibration
            state: 'on'
        action:
         - service: script.turn_on
           entity_id: script.da_temperature_calibration
           
      - alias: da_heat_mode_toggle
        id: da_heat_mode_toggle
        description: Детская А TRV - переключение режима работы
        initial_state: true
        trigger:
        - platform: homeassistant
          event: start
        - platform: state
          entity_id:
            - binary_sensor.da_radiator
        condition:
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
        action:
            - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.da_radiator
                    state: 'on'
                  - condition: template
                    value_template: "{{ states('climate.0x2c1165fffec612b1') != 'heat' or state_attr('climate.0x2c1165fffec612b1', 'preset_mode') != 'manual'}}"
                sequence:
                  - service: climate.set_hvac_mode
                    target:
                      entity_id: climate.0x2c1165fffec612b1
                    data:
                      hvac_mode: heat
                  - service: climate.set_preset_mode
                    data:
                      preset_mode: manual
                    target:
                      entity_id: climate.0x2c1165fffec612b1
                  - service: climate.set_temperature
                    data:
                      entity_id: climate.0x2c1165fffec612b1
                      temperature: "{{ states('number.0x2c1165fffec612b1_comfort_temperature')}}"    
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.da_radiator
                    state: 'off'
                  - condition: template
                    value_template: "{{ states('climate.0x2c1165fffec612b1') != 'off' }}"
                sequence:
                  - service: climate.set_hvac_mode
                    target:
                      entity_id: climate.0x2c1165fffec612b1
                    data:
                      hvac_mode: 'off'

      - alias: da_heat_temperature_set
        id: da_heat_temperature_set
        description: Детская А TRV - установка температуры проветривания
        initial_state: true
        trigger:
        - platform: state
          entity_id:
            - binary_sensor.da_aeration
        - platform: state
          entity_id:
            - binary_sensor.night_time
        condition:
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
          - condition: state
            entity_id: binary_sensor.da_radiator
            state: 'on' 
        action:
            - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.da_aeration
                    state: 'on'
                  - condition: state
                    entity_id: binary_sensor.night_time
                    state: 'on'
                sequence:
                  - service: climate.set_temperature
                    data:
                      entity_id: climate.0x2c1165fffec612b1
                      temperature: "{{ states('number.0x2c1165fffec612b1_open_window_temperature')}}"

              - conditions:
                  - condition: state
                    entity_id: binary_sensor.da_aeration
                    state: 'off'
                  - condition: state
                    entity_id: binary_sensor.night_time
                    state: 'off'
                sequence:
                  - service: climate.set_temperature
                    data:
                      entity_id: climate.0x2c1165fffec612b1
                      temperature: "{{ states('number.0x2c1165fffec612b1_comfort_temperature')}}"

              - conditions:
                  - condition: state
                    entity_id: binary_sensor.da_aeration
                    state: 'on'
                  - condition: state
                    entity_id: binary_sensor.night_time
                    state: 'off'
                sequence:
                  - service: climate.set_temperature
                    data:
                      entity_id: climate.0x2c1165fffec612b1
                      temperature: "{{ states('number.0x2c1165fffec612b1_open_window_temperature')}}"
 
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.da_aeration
                    state: 'off'
                  - condition: state
                    entity_id: binary_sensor.night_time
                    state: 'on'
                sequence:
                  - service: climate.set_temperature
                    data:
                      entity_id: climate.0x2c1165fffec612b1
                      temperature: "{{ states('number.0x2c1165fffec612b1_eco_temperature')}}"

                      
