##################################################
## Актуалізовано: 2026-03-25
##################################################

bt_light:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      automation.bt_light_on:
        friendly_name: Ванна світло - увімкнення
        icon: mdi:lightbulb-on

      automation.bt_light_on_full:
        friendly_name: Ванна світло - увімкнення 100%
        icon: mdi:brightness-7

      automation.bt_light_switching_switch:
        friendly_name: Ванна світло - контроль вимикача
        icon: mdi:light-switch

      automation.bt_light_switching:
        friendly_name: Ванна світло - аварійне увімкнення
        icon: mdi:alert

      automation.bt_light_switching_back:
        friendly_name: Ванна світло - повернення основного
        icon: mdi:restore

      automation.bt_light_off:
        friendly_name: Ванна світло - вимкнення
        icon: mdi:lightbulb-off

      automation.bt_blackout_light_off:
        friendly_name: Ванна світло - вимкнення аварійного
        icon: mdi:power

      binary_sensor.bt_light_day_open_door:
        friendly_name: Ванна - світло без руху день двері відкриті
        icon: mdi:door-open

      binary_sensor.bt_light_night_open_door:
        friendly_name: Ванна - світло без руху ніч двері відкриті
        icon: mdi:door-open

      binary_sensor.bt_light_closed_door:
        friendly_name: Ванна - світло без руху двері закриті
        icon: mdi:door-closed

      binary_sensor.bt_blackout_light:
        friendly_name: Ванна - аварійне світло без руху
        icon: mdi:alert

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    - binary_sensor:

##################################################
## ДЕНЬ ДВЕРІ ВІДКРИТІ
##################################################

        - name: bt_light_day_open_door
          unique_id: bt_light_day_open_door
          state: >
            {{ is_state('light.yeelight_ceiling3_0x45727f2', 'on')  
               and is_state('binary_sensor.0x00158d0001e547a3_occupancy', 'off')
               and is_state('binary_sensor.0xa4c138a9cf8e75ef_presence', 'off')
               and is_state('binary_sensor.0x00158d00054495dc_contact', 'on')
               and is_state('binary_sensor.night_time', 'off')
            }}
          delay_on: 00:01:00
          device_class: light

##################################################
## НІЧ ДВЕРІ ВІДКРИТІ
##################################################

        - name: bt_light_night_open_door
          unique_id: bt_night_day_open_door
          state: >
            {{ is_state('light.yeelight_ceiling3_0x45727f2', 'on')  
               and is_state('binary_sensor.0x00158d0001e547a3_occupancy', 'off')
               and is_state('binary_sensor.0xa4c138a9cf8e75ef_presence', 'off')
               and is_state('binary_sensor.0x00158d00054495dc_contact', 'on')
               and is_state('binary_sensor.night_time', 'on')
            }}
          device_class: light

##################################################
## ДВЕРІ ЗАКРИТІ
##################################################

        - name: bt_light_closed_door
          unique_id: bt_light_closed_door
          state: >
            {{ is_state('light.yeelight_ceiling3_0x45727f2', 'on')  
               and is_state('binary_sensor.0x00158d0001e547a3_occupancy', 'off')
               and is_state('binary_sensor.0xa4c138a9cf8e75ef_presence', 'off')
               and is_state('binary_sensor.0x00158d00054495dc_contact', 'off')
            }}
          delay_on: 00:15:00
          device_class: light

##################################################
## АВАРІЙНЕ СВІТЛО
##################################################

        - name: bt_blackout_light
          unique_id: bt_blackout_light
          state: >
            {{ is_state('light.0xa4c13861cd14a054', 'on')  
               and is_state('binary_sensor.0x00158d0001e547a3_occupancy', 'off')
               and is_state('binary_sensor.0xa4c138a9cf8e75ef_presence', 'off')
            }}
          device_class: light
          delay_on: 00:01:00

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

##################################################
## УВІМКНЕННЯ СВІТЛА
##################################################

    - alias: bt_light_on
      id: bt_light_on
      description: Увімкнення світла у ванній
      initial_state: true
      trigger:

        - platform: state
          entity_id: binary_sensor.0xa4c138a9cf8e75ef_presence
          to: 'on'

        - platform: state
          entity_id: binary_sensor.0x00158d0001e547a3_occupancy
          to: 'on'

        - platform: state
          entity_id: sensor.0x00158d000a8244b4_action
          to: 'single_right'

        - platform: state
          entity_id: sensor.0x00158d0003d50723_action
          to: 'single_left'

        - platform: state
          entity_id: sensor.0x54ef4410004c1707_action
          to: 'button_5_triple'

        - platform: state
          entity_id: sensor.0x54ef4410004c1706_action
          to: 'button_3_single'

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'

      action:
        - choose:

            - conditions:
                - condition: state
                  entity_id: light.yeelight_ceiling3_0x45727f2
                  state: 'off'
                - condition: state
                  entity_id: binary_sensor.night_time
                  state: 'off'
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.yeelight_ceiling3_0x45727f2
                  data:
                    brightness_pct: 100
                    color_temp_kelvin: 4000

            - conditions:
                - condition: state
                  entity_id: light.yeelight_ceiling3_0x45727f2
                  state: 'off'
                - condition: state
                  entity_id: binary_sensor.night_time
                  state: 'on'
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.yeelight_ceiling3_0x45727f2
                  data:
                    brightness_pct: 70
                    color_temp_kelvin: 4000

            - conditions:
                - condition: state
                  entity_id: light.yeelight_ceiling3_0x45727f2
                  state: 'unavailable'
                - condition: state
                  entity_id: light.0xa4c13861cd14a054
                  state: 'off'
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.0xa4c13861cd14a054
                  data:
                    brightness_pct: 50

##################################################
## УВІМКНЕННЯ 100%
##################################################

    - alias: bt_light_on_full
      id: bt_light_on_full
      description: Увімкнення світла 100%
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.0x00158d0003d50723_action
          to: 'double_left'

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'

      action:
        - action: light.turn_on
          target:
            entity_id: light.yeelight_ceiling3_0x45727f2
          data:
            brightness_pct: 100
            color_temp_kelvin: 4000

##################################################
## АВАРІЙНЕ СВІТЛО
##################################################

    - alias: bt_light_switching
      id: bt_light_switching
      description: Перехід на аварійне освітлення
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.electricity_internal
          from: 'off'
          to: 'on'

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: state
          entity_id: light.yeelight_ceiling3_0x45727f2
          state: 'on'

      action:
        - action: light.turn_on
          target:
            entity_id: light.0xa4c13861cd14a054
          data:
            brightness_pct: 50

##################################################
## ПОВЕРНЕННЯ ОСНОВНОГО СВІТЛА
##################################################

    - alias: bt_light_switching_back
      id: bt_light_switching_back
      description: Повернення основного освітлення
      initial_state: true
      trigger:
        - platform: state
          entity_id: light.yeelight_ceiling3_0x45727f2
          from: 'unavailable'
          to: 'off'

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: state
          entity_id: light.0xa4c13861cd14a054
          state: 'on'

      action:
        - action: light.turn_on
          target:
            entity_id: light.yeelight_ceiling3_0x45727f2
          data:
            brightness_pct: 100
            color_temp_kelvin: 4000
        - delay: 00:00:05
        - action: light.turn_off
          target:
            entity_id:
              - light.0xa4c13861cd14a054

##################################################
## ВИМКНЕННЯ СВІТЛА
##################################################

    - alias: bt_light_off
      id: bt_light_off
      description: Вимкнення світла у ванній
      initial_state: true
      trigger:

        - platform: state
          entity_id: binary_sensor.bt_light_day_open_door
          to: 'on'

        - platform: state
          entity_id: binary_sensor.bt_light_night_open_door
          to: 'on'

        - platform: state
          entity_id: binary_sensor.bt_light_closed_door
          to: 'on'

        - platform: state
          entity_id: sensor.0x00158d000a8244b4_action
          to: 'single_right'

        - platform: state
          entity_id: sensor.0x00158d0003d50723_action
          to: 'single_left'

        - platform: state
          entity_id: sensor.0x54ef4410004c1707_action
          to: 'button_5_triple'

        - platform: state
          entity_id: sensor.0x54ef4410004c1706_action
          to: 'button_3_single'

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: state
          entity_id: light.yeelight_ceiling3_0x45727f2
          state: 'on'

      action:
        - action: light.turn_off
          target:
            entity_id:
              - light.yeelight_ceiling3_0x45727f2

##################################################
## ВИМКНЕННЯ АВАРІЙНОГО
##################################################

    - alias: bt_blackout_light_off
      id: bt_blackout_light_off
      description: Вимкнення аварійного світла
      initial_state: true
      trigger:

        - platform: state
          entity_id: binary_sensor.bt_blackout_light
          to: 'on'

        - platform: state
          entity_id: sensor.0x00158d000a8244b4_action
          to: 'single_right'

        - platform: state
          entity_id: sensor.0x00158d0003d50723_action
          to: 'single_left'

        - platform: state
          entity_id: sensor.0x54ef4410004c1707_action
          to: 'button_5_triple'

        - platform: state
          entity_id: sensor.0x54ef4410004c1706_action
          to: 'button_3_single'

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: state
          entity_id: light.0xa4c13861cd14a054
          state: 'on'

      action:
        - action: light.turn_off
          target:
            entity_id:
              - light.0xa4c13861cd14a054