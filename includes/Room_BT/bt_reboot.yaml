bt_reboot:


    template:

      - binary_sensor:
      
    # A sensor that detects the inaccessibility of the light
          - name: bt_ceiling_unavailable
            unique_id: bt_ceiling_unavailable
            state: >
              {{ is_state('light.yeelight_ceiling3_0x45727f2', 'unavailable') }}
            delay_on: 
                minutes: 3
            device_class: problem  
            
    automation:
    
#################### REBOOT CEILING LIGHT ####################
               
      - alias: bt_reboot_ceiling
        id: bt_reboot_ceiling
        description: Bathroom – rebooting a ceiling light
        initial_state: true
        trigger:
    # Check every 5 minutes
        - platform: time_pattern
          minutes: '/5'
        condition:
    # A sensor that detects the inaccessibility of the light
        - condition: state
          entity_id: binary_sensor.bt_ceiling_unavailable
          state: 'on'
    # Operating mode
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
    # Electricity sensor
        - condition: state
          entity_id: binary_sensor.blackout_after
          state: 'off'  
        action: 
     # Power reboot if the chandelier is inaccessible
        - action: switch.turn_off
          data: {}
          target:
            entity_id: switch.0x00158d000a8244b4_right
        - delay: 00:00:05
        - action: switch.turn_on
          data: {}
          target:
            entity_id: switch.0x00158d000a8244b4_right
        - action: telegram_bot.send_message
          data:
            message: >-
                 {{"\U0001F916"}} Ванна кімната, перезавантаження люстри {{ states('sensor.time_date') }} 
            chat_id:
                - !secret chat_id_log
                
                
#################### AUTOMATIC SWITCH-ON OF THE CEILING LIGHT SWITCH ####################

      - alias: bt_reboot_switch_turn_on_check
        id: bt_reboot_switch_on_turn_on_check
        description: Bathroom switch status check
        initial_state: true
        trigger:
    # Check every 5 minutes
        - platform: time_pattern
          minutes: '/7'
        condition:
    # Not turned on
        - condition: template
          value_template: "{{ states('switch.0x00158d000a8244b4_right') != 'on' }}"
    # Operating mode
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
    # Electricity sensor
        - condition: state
          entity_id: binary_sensor.blackout_after
          state: 'off' 
        action:
        - action: telegram_bot.send_message
          data:
            message: >-
              {{"\U0001F916"}} Ванна кімната, вимикач - {{states('switch.0x00158d000a8244b4_right') }} 
            target:
                - !secret chat_id_log
        - delay: 00:00:05
        - action: switch.turn_on
          data: {}
          target:
            entity_id: switch.0x00158d000a8244b4_right
        - action: telegram_bot.send_message
          data:
            message: >-
              {{"\U0001F916"}} Ванна кімната, ввімкнення вимикача живлення люстри {{states('sensor.time_date') }} 
            chat_id:
                - !secret chat_id_log

      - alias: bt_reboot_switch_check
        id: bt_reboot_switch_check
        description: Bathroom forced update of switch status
        initial_state: false
        trigger:
    # Check every 15 minutes
        - platform: time_pattern
          minutes: '/15'
        condition:
    # Operating mode
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
    # Electricity sensor
        - condition: state
          entity_id: binary_sensor.blackout_after
          state: 'off' 
        action:
    # Forced update of switch status
        - action: mqtt.publish
          data:
            topic: zigstar_poe/BT wd 2ch enter/get
            payload: "{ \"state_right\": \"\" }"    
