##################################################
## Актуалізовано: 2026-03-25
##################################################

bt_vent:

  ##################################################
  ## HOMEASSISTANT
  ##################################################

  homeassistant:
    customize:
      timer.bt_vent:
        friendly_name: Ванна кімната - таймер вентиляції
        icon: mdi:timer-outline
      automation.bt_vent_on:
        friendly_name: Ванна кімната - увімкнення вентиляції
        icon: mdi:fan-plus
      automation.bt_vent_off:
        friendly_name: Ванна кімната - вимкнення вентиляції
        icon: mdi:fan-minus
      automation.bt_vent_timer_on:
        friendly_name: Ванна кімната - запуск таймера вентиляції
        icon: mdi:timer-play
      automation.bt_vent_timer_off:
        friendly_name: Ванна кімната - зупинка таймера вентиляції
        icon: mdi:timer-off

  ##################################################
  ## TIMER
  ##################################################

  timer:
    bt_vent:
      duration: "00:10:00"
      restore: true

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:
    - alias: bt_vent_on
      id: bt_vent_on
      description: Ванна кімната - увімкнення вентиляції
      initial_state: true
      trigger:
        - platform: numeric_state
          entity_id: sensor.0x00158d0001dcd47e_humidity
          above: 70
        - platform: state
          entity_id: sensor.0x00158d0003d50723_action
          to: "single_right"
        - platform: state
          entity_id: sensor.0x54ef4410004c1706_action
          to: "button_3_double"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
        - condition: state
          entity_id: fan.0x00158d000a8244b4
          state: "off"
      action:
        - action: fan.turn_on
          target:
            entity_id: fan.0x00158d000a8244b4

    - alias: bt_vent_off
      id: bt_vent_off
      description: Ванна кімната - вимкнення вентиляції
      initial_state: true
      trigger:
        - platform: event
          event_type: timer.finished
          event_data:
            entity_id: timer.bt_vent
        - platform: state
          entity_id: sensor.0x00158d0003d50723_action
          to: "single_right"
        - platform: state
          entity_id: sensor.0x54ef4410004c1706_action
          to: "button_3_double"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
        - condition: state
          entity_id: fan.0x00158d000a8244b4
          state: "on"
      action:
        - action: fan.turn_off
          target:
            entity_id: fan.0x00158d000a8244b4

    - alias: bt_vent_timer_on
      id: bt_vent_timer_on
      description: Ванна кімната - запуск таймера вентиляції
      initial_state: true
      trigger:
        - platform: state
          entity_id: fan.0x00158d000a8244b4
          to: "on"
      action:
        - action: timer.start
          target:
            entity_id: timer.bt_vent

    - alias: bt_vent_timer_off
      id: bt_vent_timer_off
      description: Ванна кімната - зупинка таймера вентиляції
      initial_state: true
      trigger:
        - platform: state
          entity_id: fan.0x00158d000a8244b4
          to: "off"
      action:
        - action: timer.cancel
          target:
            entity_id: timer.bt_vent