##################################################
## Актуалізовано: 2026-03-25
##################################################

bt_hot_water:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:
      sensor.0xa4c13804c656ffff_temperature:
        friendly_name: Ванна - температура гарячої води

      binary_sensor.bt_hot_water:
        friendly_name: Ванна - гаряча вода

      automation.bt_hot_water_cold_notification:
        friendly_name: Ванна - повідомлення про зниження температури води

      automation.bt_hot_water_hot_notification:
        friendly_name: Ванна - повідомлення про підвищення температури води

  ##################################################
  ## RECORDER
  ##################################################

  recorder:
    include:
      entities:
        - sensor.0xa4c13804c656ffff_temperature

  ##################################################
  ## TEMPLATE
  ##################################################

  template:
    - binary_sensor:
        - name: bt_hot_water
          unique_id: bt_hot_water
          state: >
            {{ states('sensor.0xa4c13804c656ffff_temperature') | float(0) > 30 }}
          delay_on:
            minutes: 1
          delay_off:
            minutes: 1
          device_class: heat

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:
    - alias: bt_hot_water_cold_notification
      id: bt_hot_water_cold_notification
      description: Повідомлення про зниження температури води
      initial_state: true
      trigger:
        # ##################################################
        # ВИМКНЕННЯ СЕНСОРА ГАРЯЧОЇ ВОДИ
        # ##################################################
        - platform: state
          entity_id: binary_sensor.bt_hot_water
          from: "on"
          to: "off"
      action:
        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_group
            message: |
              {{"\U0001F630"}} Увага - температура води знизилась до {{ states('sensor.0xa4c13804c656ffff_temperature') }} С, в {{ states('sensor.time_date') }}

    - alias: bt_hot_water_hot_notification
      id: bt_hot_water_hot_notification
      description: Повідомлення про підвищення температури води
      initial_state: true
      trigger:
        # ##################################################
        # УВІМКНЕННЯ СЕНСОРА ГАРЯЧОЇ ВОДИ
        # ##################################################
        - platform: state
          entity_id: binary_sensor.bt_hot_water
          from: "off"
          to: "on"
      action:
        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_group
            message: |
              {{"\U00002668"}} Вода знову гаряча, температура - {{ states('sensor.0xa4c13804c656ffff_temperature') }} С, в {{ states('sensor.time_date') }}