##################################################
## Актуалізовано: 2026-03-23
##################################################

out_switch:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      ##################################################
      ## SWITCH
      ##################################################

      switch.0x00158d0003f46bb6_l1:
        friendly_name: Поверх - живлення Reolink 410
        icon: mdi:power-plug

      switch.0x00158d0003f46bb6_l2:
        friendly_name: Поверх - живлення Reolink 411
        icon: mdi:power-plug

      ##################################################
      ## SENSOR
      ##################################################

      sensor.0x00158d0003f46bb6_power:
        friendly_name: Поверх - живлення камер потужність
        unit_of_measurement: Вт
        device_class: power

      sensor.0x00158d0003f46bb6_energy:
        friendly_name: Поверх - живлення камер енергія
        icon: mdi:chart-line

      sensor.0x00158d0003f46bb6_voltage:
        friendly_name: Поверх - живлення камер напруга
        icon: mdi:sine-wave

      sensor.0x00158d0003f46bb6_device_temperature:
        friendly_name: Поверх - температура пристрою
        icon: mdi:thermometer

  ##################################################
  ## RECORDER
  ##################################################

  recorder:
    include:
      entities:
        - sensor.0x00158d0003f46bb6_power
        - sensor.0x00158d0003f46bb6_voltage