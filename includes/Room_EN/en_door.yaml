en_door:

  ###################################################################
  # Оновлено 19.03.2026
  ###################################################################

    template:
     
    - binary_sensor:

  ###################################################################
  # Затримка 3 хвилини на повторне спрацювання
  ###################################################################

        - name: enter_camera_snapshot
          unique_id: enter_camera_snapshot
          state: >
            {{ is_state('binary_sensor.0x00158d000119378d_contact', 'on') }}
          delay_off: "00:03:00"
          device_class: running
          icon: >
            {% if is_state('binary_sensor.enter_camera_snapshot', 'on') %}
              mdi:camera-off
            {% else %}
              mdi:camera
            {% endif %}

  ###################################################################
  # Сенсор руху з камери
  ###################################################################

    - trigger:
        - platform: mqtt
          topic: "thingino/0268a8631f66"

      binary_sensor:
        - name: en_mi_2k_motion
          unique_id: en_mi_2k_motion
          state: "true"
          auto_off: 10

  ###################################################################
  # Кнопка для ручного фото
  ###################################################################
              
    input_button:
      mi_2k:
        name: Фото mi 2K
        icon: mdi:camera
        
    automation:


  ###################################################################
  # Відправка фото в телеграм по натисканню кнопки
  ###################################################################
    
    - alias: camera_mi_2k_photo
      id: camera_mi_2k_photo
      description: MI 2K — створення фото та надсилання в Telegram
      initial_state: true
      mode: restart
    
      triggers:
        - trigger: state
          entity_id: input_button.mi_2k
    
      conditions:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
    
      actions:
        - delay: "00:00:03"
    
        - action: camera.snapshot
          target:
            entity_id: camera.mi_2k
          data:
            filename: "/config/www/cam_captures/mi_2k.jpg"
    
        - delay: "00:00:10"
    
        - action: telegram_bot.send_photo
          data:
            chat_id:
              - !secret chat_id_group
            file: "/config/www/cam_captures/mi_2k.jpg"

  ###################################################################
  # Відправка фото в телеграм по відкриттю дверей
  ###################################################################

    - alias: en_open_door_photo
      id: en_open_door_photo
      description: Вхідні двері — фото та надсилання в Telegram
      initial_state: true
      mode: single
    
      triggers:
        - trigger: state
          entity_id: binary_sensor.enter_camera_snapshot
          to: "on"
    
      conditions:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
    
      actions:
        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_group
            message: >
              🚪 Вхідні двері відчинено о {{ states('sensor.time_date') }}
    
        - choose:
            - conditions:
                - condition: state
                  entity_id: binary_sensor.electricity
                  state: "off"
              sequence:
                - action: input_button.press
                  target:
                    entity_id:
                      - input_button.reolink_411_ws_photo
                      - input_button.reolink_410_photo
                      - input_button.mi_2k
    
            - conditions:
                - condition: state
                  entity_id: binary_sensor.electricity
                  state: "on"
              sequence:
                - action: input_button.press
                  target:
                    entity_id:
                      - input_button.reolink_411_ws_photo
                      - input_button.mi_2k           
              