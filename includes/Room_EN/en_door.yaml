##################################################
## Актуалізовано: 2026-03-21
##################################################

en_door:

  homeassistant:
    customize:
      binary_sensor.enter_camera_snapshot:
        friendly_name: Вхідні двері - затримка повторного фото
        icon: mdi:camera
      binary_sensor.en_mi_2k_motion:
        friendly_name: Передпокій - рух з камери MI 2K
        icon: mdi:motion-sensor
      input_button.mi_2k:
        friendly_name: MI 2K - створити фото
        icon: mdi:camera
      automation.en_door_camera_mi_2k_photo:
        friendly_name: MI 2K - фото в Telegram
        icon: mdi:camera-send
      automation.en_door_open_door_photo:
        friendly_name: Вхідні двері - фото в Telegram
        icon: mdi:door-open

  template:

    ##################################################
    ## ЗАТРИМКА 3 ХВИЛИНИ НА ПОВТОРНЕ СПРАЦЮВАННЯ
    ##################################################

    - binary_sensor:
        - unique_id: enter_camera_snapshot
          state: >
            {{ is_state('binary_sensor.0x00158d000119378d_contact', 'on') }}
          delay_off: "00:03:00"

    ##################################################
    ## СЕНСОР РУХУ З КАМЕРИ
    ##################################################

    - trigger:
        - platform: mqtt
          topic: "thingino/0268a8631f66"

      binary_sensor:
        - unique_id: en_mi_2k_motion
          state: "true"
          auto_off: 10

  input_button:

    ##################################################
    ## КНОПКА ДЛЯ РУЧНОГО ФОТО
    ##################################################

    e1_pro:

  automation:

    ##################################################
    ## ВІДПРАВКА ФОТО В TELEGRAM ПО НАТИСКАННЮ КНОПКИ
    ##################################################

    - alias: en_door_camera_e1_pro_photo
      id: en_door_camera_mi_e1_pro_photo
      description: Створення фото з камери E1 Pro та надсилання в Telegram
      initial_state: true
      mode: restart

      trigger:
        - platform: state
          entity_id: input_button.e1_pro

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - delay: "00:00:01"

        - action: camera.snapshot
          target:
            entity_id: camera.reolink_e1_pro_rtsp
          data:
            filename: "/config/www/cam_captures/e1_pro.jpg"

        - delay: "00:00:10"

        - action: telegram_bot.send_photo
          data:
            chat_id:
              - !secret chat_id_group
            file: "/config/www/cam_captures/e1_pro.jpg"

    ##################################################
    ## ВІДПРАВКА ФОТО В TELEGRAM ПРИ ВІДКРИТТІ ДВЕРЕЙ
    ##################################################

    - alias: en_door_open_door_photo
      id: en_door_open_door_photo
      description: Надсилання повідомлення та фото при відкритті вхідних дверей
      initial_state: true
      mode: single

      trigger:
        - platform: state
          entity_id: binary_sensor.enter_camera_snapshot
          to: "on"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_group
            message: >
              🚪 Вхідні двері відчинено о {{ states('sensor.time_date') }}

        - choose:
            - conditions:
                - condition: state
                  entity_id: binary_sensor.electricity
                  state: "off"
              sequence:
                - action: input_button.press
                  target:
                    entity_id:
                      - input_button.reolink_411_ws_photo
                      - input_button.reolink_410_photo
                      - input_button.e1_pro

            - conditions:
                - condition: state
                  entity_id: binary_sensor.electricity
                  state: "on"
              sequence:
                - action: input_button.press
                  target:
                    entity_id:
                      - input_button.reolink_411_ws_photo
                      - input_button.mi_2k