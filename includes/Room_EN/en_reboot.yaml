en_reboot:


  ###################################################################
  # Оновлено 18.03.2026
  ###################################################################

    template:
     
      - binary_sensor:

  ###################################################################
  # Визначення зависання лампи
  ###################################################################
        - name: en_light_unavailable
          unique_id: en_light_unavailable
          state: >
            {{ is_state('light.0x00158d0003e74c31', 'unavailable') }}
          delay_on: 
              minutes: 3
          device_class: problem  

  ###################################################################
  # Кнопка для ручного перезавантаження
  ###################################################################

    input_button:

      en_light_reboot:
        name: EN Light reboot
            
    automation:
    
###################################################################
# Перезавантаження завислої лампи
# Авто: коли сенсор недоступності став on
# Ручний запуск: через input_button
###################################################################

    - alias: en_reboot_bulb
      id: en_bulb_reboot
      description: Передпокій — перезавантаження завислої лампи
      initial_state: true
      mode: single
    
      triggers:
        - trigger: state
          entity_id: binary_sensor.en_light_unavailable
          to: "on"
          id: auto
    
        - trigger: state
          entity_id: input_button.en_light_reboot
          id: manual
    
      conditions:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
    
        - condition: state
          entity_id: binary_sensor.electricity_internal
          state: "off"
    
      actions:
        - action: switch.turn_off
          target:
            entity_id: switch.0x00158d00057305ac_right
    
        - delay: "00:00:05"
   
        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d00057305ac_right
    
        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_log
            message: >
              🤖 Передпокій — {{
              'ручне' if trigger.id == 'manual' else 'автоматичне'
              }} перезавантаження лампи {{ states('sensor.time_date') }}
                   
  ###################################################################
  # Перезавантаження вимикача
  ###################################################################

    - alias: en_reboot_switch_ensure_on
      id: en_reboot_switch_ensure_on
      description: Передпокій — контроль та відновлення стану вимикача
      initial_state: true
      mode: single

      triggers:
        - trigger: state
          entity_id: switch.0x00158d00057305ac_right
          to: "off"
          id: state_off

        - trigger: time_pattern
          minutes: "/5"
          id: periodic_check

      conditions:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: binary_sensor.electricity_internal
          state: "off"

      actions:
        - choose:
            - conditions:
                - condition: trigger
                  id: periodic_check
                - condition: template
                  value_template: >
                    {{ not is_state('switch.0x00158d00057305ac_right', 'on') }}
              sequence:
                - delay: "00:00:05"
                - action: switch.turn_on
                  target:
                    entity_id: switch.0x00158d00057305ac_right

            - conditions:
                - condition: trigger
                  id: state_off
              sequence:
                - delay: "00:00:05"
                - action: switch.turn_on
                  target:
                    entity_id: switch.0x00158d00057305ac_right

  ###################################################################
  # Примусове оновлення стану вимикача через MQTT
  ###################################################################

    - alias: en_reboot_switch_check
      id: en_reboot_switch_check
      description: Передпокій — перевірка стану вимикача
      initial_state: true
    
      triggers:
        # Перевірка кожні 15 хвилин
        - trigger: time_pattern
          minutes: "/15"
    
      conditions:
        # Режим роботи сервера
        - condition: state
          entity_id: switch.control_mode
          state: "on"
    
        # Є електроживлення
        - condition: state
          entity_id: binary_sensor.electricity_internal
          state: "off"
    
      actions:
        # Примусове оновлення стану через MQTT
        - action: mqtt.publish
          data:
            topic: "zigstar/EN wd 2ch/get"
            payload: '{ "state_left": "" }'


  ###################################################################
  # Перезавантаження і контроль живлення камери MI
  # Ребут за розкладом або якщо камера недоступна
  ###################################################################

    - alias: en_reboot_mi_camera
      id: en_reboot_mi_camera
      description: Передпокій — перезавантаження IP-камери MI
      initial_state: true
    
      triggers:
        - trigger: time
          at: "04:00:00"
    
        - trigger: state
          entity_id: camera.mi_2k
          to: "unavailable"
    
      conditions:
        # Режим роботи сервера
        - condition: state
          entity_id: switch.control_mode
          state: "on"
    
        # Є електроживлення
        - condition: state
          entity_id: binary_sensor.blackout_after
          state: "off"
    
      actions:
        - action: switch.turn_off
          target:
            entity_id: switch.sonoff_1000d036a0_1
    
        - delay: "00:00:10"
    
        - action: switch.turn_on
          target:
            entity_id: switch.sonoff_1000d036a0_1
    
        - delay: "00:03:00"

  ###################################################################
  # Контроль живлення USB вимикача камери
  # Реакція на вимкнення + періодична підстраховка
  ###################################################################


    - alias: en_reboot_USB_switch_turn_on_check
      id: en_reboot_USB_switch_turn_on_check
      description: Передпокій, перевірка живлення на камеру
      initial_state: true
      triggers:
        - trigger: time_pattern
          minutes: "/5"
    
      conditions:
        - condition: template
          value_template: "{{ states('switch.sonoff_1000d036a0_1') != 'on' }}"
        - condition: state
          entity_id: switch.control_mode
          state: "on"
        - condition: state
          entity_id: binary_sensor.electricity_internal
          state: "off"
    
      actions:
        - delay: "00:00:05"
        - action: switch.turn_on
          target:
            entity_id: switch.sonoff_1000d036a0_1
