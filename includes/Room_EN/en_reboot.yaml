##################################################
## Актуалізовано: 2026-03-21
##################################################

en_reboot:

  homeassistant:
    customize:
      binary_sensor.en_light_unavailable:
        friendly_name: Передпокій - лампа недоступна
        icon: mdi:alert-circle-outline
      input_button.en_light_reboot:
        friendly_name: Передпокій - перезавантажити лампу
        icon: mdi:restart
      automation.en_reboot_light:
        friendly_name: Передпокій - перезавантаження лампи
        icon: mdi:lightbulb-alert
      automation.en_reboot_switch_ensure_on:
        friendly_name: Передпокій - контроль вимикача
        icon: mdi:toggle-switch
      automation.en_reboot_switch_check:
        friendly_name: Передпокій - перевірка вимикача через MQTT
        icon: mdi:mqtt
      automation.en_reboot_mi_camera:
        friendly_name: Передпокій - перезавантаження камери MI
        icon: mdi:cctv
      automation.en_reboot_usb_switch_turn_on_check:
        friendly_name: Передпокій - контроль живлення камери
        icon: mdi:usb-port

  template:

    ##################################################
    ## ВИЗНАЧЕННЯ ЗАВИСАННЯ ЛАМПИ
    ##################################################

    - binary_sensor:
        - unique_id: en_light_unavailable
          state: >
            {{ is_state('light.0x00158d0003e74c31', 'unavailable') }}
          delay_on:
            minutes: 3

  input_button:

    ##################################################
    ## КНОПКА ДЛЯ РУЧНОГО ПЕРЕЗАВАНТАЖЕННЯ
    ##################################################

    en_light_reboot:

  automation:

    ##################################################
    ## ПЕРЕЗАВАНТАЖЕННЯ ЗАВИСЛОЇ ЛАМПИ
    ##################################################

    - alias: en_reboot_light
      id: en_reboot_light
      description: Перезавантаження завислої лампи в передпокої
      initial_state: true
      mode: single

      trigger:
        - platform: state
          entity_id: binary_sensor.en_light_unavailable
          to: "on"
          id: auto

        - platform: state
          entity_id: input_button.en_light_reboot
          id: manual

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: binary_sensor.electricity_internal
          state: "off"

      action:
        - action: switch.turn_off
          target:
            entity_id: switch.0x00158d00057305ac_right

        - delay: "00:00:05"

        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d00057305ac_right

        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_log
            message: >
              🤖 Передпокій - {{
              'ручне' if trigger.id == 'manual' else 'автоматичне'
              }} перезавантаження лампи {{ states('sensor.time_date') }}

    ##################################################
    ## ПЕРЕЗАВАНТАЖЕННЯ ВИМИКАЧА
    ##################################################

    - alias: en_reboot_switch_ensure_on
      id: en_reboot_switch_ensure_on
      description: Контроль та відновлення стану вимикача в передпокої
      initial_state: true
      mode: single

      trigger:
        - platform: state
          entity_id: switch.0x00158d00057305ac_right
          to: "off"
          id: state_off

        - platform: time_pattern
          minutes: "/5"
          id: periodic_check

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: binary_sensor.electricity_internal
          state: "off"

      action:
        - choose:
            - conditions:
                - condition: trigger
                  id: periodic_check
                - condition: template
                  value_template: >
                    {{ not is_state('switch.0x00158d00057305ac_right', 'on') }}
              sequence:
                - delay: "00:00:05"
                - action: switch.turn_on
                  target:
                    entity_id: switch.0x00158d00057305ac_right

            - conditions:
                - condition: trigger
                  id: state_off
              sequence:
                - delay: "00:00:05"
                - action: switch.turn_on
                  target:
                    entity_id: switch.0x00158d00057305ac_right

    ##################################################
    ## ПРИМУСОВЕ ОНОВЛЕННЯ СТАНУ ВИМИКАЧА ЧЕРЕЗ MQTT
    ##################################################

    - alias: en_reboot_switch_check
      id: en_reboot_switch_check
      description: Перевірка стану вимикача в передпокої через MQTT
      initial_state: true

      trigger:
        - platform: time_pattern
          minutes: "/15"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: binary_sensor.electricity_internal
          state: "off"

      action:
        - action: mqtt.publish
          data:
            topic: "zigstar/EN wd 2ch/get"
            payload: '{ "state_left": "" }'

