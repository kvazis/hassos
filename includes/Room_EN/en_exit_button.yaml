en_exit_button:


    automation:

      - alias: en_light_all_off
        id: en_light_all_off
        description: Кнопка на выходе, отключение освещения
        initial_state: true
        trigger:
    ## Кнопка на выходе
        - platform: state
          entity_id: sensor.0x00158d00010b1963_action
          to: 'single'
    # Выключатель возле кровати спальня
        - platform: state
          entity_id: sensor.0x54ef4410004c1706_action
          to: 'button_6_single'
        condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        action:
        - service: light.turn_off
          entity_id:
    ## Кухня
            - light.kn_ceiling_light
    ## Туалет
            - light.0x54ef44100096af68
    ## Коридор
            - light.yeelight_ceiling4_0x456e813
            - light.yeelight_ceiling4_0x456e813_ambilight
    ## Гостиная
            - light.smart_desk_lamp
            - light.yeelight_ceiling4_0x49c726b
            - light.yeelight_ceiling4_0x4a1dacd
            - light.yeelight_ceiling4_0x49c726b_ambilight
            - light.yeelight_ceiling4_0x4a1dacd_ambilight
            - light.0x54ef4410008e96fd_bottom
            - light.0xa4c138da30166b8f
            - light.lr_bedside_lamp
    ## Спальня
            - light.br_philips_62
        - delay: 00:00:10
        - service: light.turn_off
          entity_id:
    ## Прихожая
            - light.0x00158d0003e74c31