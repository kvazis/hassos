##################################################
## Актуалізовано: 2026-03-24
##################################################

floor_camera:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      binary_sensor.cam_reolink411_auto_cast:
        friendly_name: Камера 411 - автокаст по руху
        icon: mdi:cctv

      binary_sensor.living_room_buffering:
        friendly_name: Вітальня - буферизація
        icon: mdi:loading

      binary_sensor.living_room_media_music:
        friendly_name: Вітальня - музика
        icon: mdi:music

      input_boolean.living_room:
        friendly_name: Вітальня - блокування касту
        icon: phu:nest-hub

      input_button.reolink_411_ws_photo:
        friendly_name: Reolink 411 - зробити фото
        icon: mdi:camera

      input_button.reolink_410_photo:
        friendly_name: Reolink 410 - зробити фото
        icon: mdi:camera

      input_button.reolink_411_ws_cast:
        friendly_name: Reolink 411 - каст
        icon: mdi:cast-connected

      input_button.reolink_410_cast:
        friendly_name: Reolink 410 - каст
        icon: mdi:cast-connected

      automation.floor_camera_reolink_411_photo:
        friendly_name: Reolink 411 - фото в Telegram
        icon: mdi:camera-send

      automation.floor_camera_reolink_411_cast:
        friendly_name: Reolink 411 - каст керування
        icon: mdi:cast

      automation.floor_camera_reolink_410_photo:
        friendly_name: Reolink 410 - фото в Telegram
        icon: mdi:camera-send

      automation.floor_camera_reolink_410_cast:
        friendly_name: Reolink 410 - каст керування
        icon: mdi:cast

      automation.floor_camera_reolink_411_cast_motion:
        friendly_name: Reolink 411 - автокаст по руху
        icon: mdi:motion-sensor

      automation.floor_camera_reolink_411_cast_motion_block:
        friendly_name: Reolink 411 - блокування автокасту
        icon: mdi:block-helper

  ##################################################
  ## CAMERA
  ##################################################

  camera:

    - platform: ffmpeg
      name: reolink_411_rtsp
      input: !secret reolink_411_sub_rtsp

    - platform: ffmpeg
      name: reolink_410_rtsp
      input: !secret reolink_410_sub_rtsp

  ##################################################
  ## INPUT_BOOLEAN
  ##################################################

  input_boolean:

    living_room:
      name: living_room

  ##################################################
  ## INPUT_BUTTON
  ##################################################

  input_button:

    reolink_411_ws_photo:
      name: reolink_411_ws_photo

    reolink_410_photo:
      name: reolink_410_photo

    reolink_411_ws_cast:
      name: reolink_411_ws_cast

    reolink_410_cast:
      name: reolink_410_cast

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    ##################################################
    ## ЛОГІКА КАСТУ ТА МЕДІА
    ##################################################

    - binary_sensor:
        - name: cam_reolink411_auto_cast
          unique_id: cam_reolink411_auto_cast
          state: >
            {{ is_state('binary_sensor.reolink_411_ws_motion', 'on')
               and is_state('binary_sensor.night_time', 'off')
               and is_state('input_boolean.living_room', 'off') }}
          delay_off:
            minutes: 1

        - name: living_room_buffering
          unique_id: living_room_buffering
          state: >
            {{ is_state('media_player.living_room', 'buffering') }}
          delay_on:
            minutes: 1

        - name: living_room_media_music
          unique_id: living_room_media_music
          state: >
            {{ state_attr('media_player.living_room', 'app_name') == 'YouTube Music' }}
          delay_off:
            minutes: 1

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## REOLINK 411 - ФОТО
    ##################################################

    - alias: floor_camera_reolink_411_photo
      id: floor_camera_reolink_411_photo
      description: Фото та надсилання
      initial_state: true

      trigger:
        - platform: state
          entity_id: input_button.reolink_411_ws_photo

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - action: camera.snapshot
          target:
            entity_id: camera.reolink_411_ws_fluent
          data:
            filename: "/config/www/cam_captures/reolink411.jpg"

        - delay: "00:00:10"

        - action: telegram_bot.send_photo
          data:
            chat_id:
              - !secret chat_id_group
            file: "/config/www/cam_captures/reolink411.jpg"

    ##################################################
    ## REOLINK 411 - CAST
    ##################################################

    - alias: floor_camera_reolink_411_cast
      id: floor_camera_reolink_411_cast
      description: Каст у вітальню
      initial_state: true

      trigger:
        - platform: state
          entity_id: sensor.0x54ef4410004c1707_action
          to: "button_4_triple"

        - platform: state
          entity_id: input_button.reolink_411_ws_cast

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: media_player.living_room
                  state: "off"
              sequence:
                - action: camera.play_stream
                  data:
                    media_player: media_player.living_room
                  target:
                    entity_id: camera.reolink_411_ws_fluent

            - conditions:
                - condition: state
                  entity_id: media_player.living_room
                  state: "playing"
              sequence:
                - action: media_player.turn_off
                  target:
                    entity_id: media_player.living_room

    ##################################################
    ## REOLINK 410 - ФОТО
    ##################################################

    - alias: floor_camera_reolink_410_photo
      id: floor_camera_reolink_410_photo
      description: Фото та надсилання
      initial_state: true

      trigger:
        - platform: state
          entity_id: input_button.reolink_410_photo

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - action: camera.snapshot
          target:
            entity_id: camera.reolink_410_rtsp
          data:
            filename: "/config/www/cam_captures/reolink410.jpg"

        - delay: "00:00:10"

        - action: telegram_bot.send_photo
          data:
            chat_id:
              - !secret chat_id_group
            file: "/config/www/cam_captures/reolink410.jpg"

    ##################################################
    ## REOLINK 410 - CAST
    ##################################################

    - alias: floor_camera_reolink_410_cast
      id: floor_camera_reolink_410_cast
      description: Каст у вітальню
      initial_state: true

      trigger:
        - platform: state
          entity_id: input_button.reolink_410_cast

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: media_player.living_room
                  state: "off"
              sequence:
                - action: camera.play_stream
                  data:
                    media_player: media_player.living_room
                  target:
                    entity_id: camera.reolink_410_rtsp

            - conditions:
                - condition: state
                  entity_id: media_player.living_room
                  state: "playing"
              sequence:
                - action: media_player.turn_off
                  target:
                    entity_id: media_player.living_room

    ##################################################
    ## REOLINK 411 - АВТОКАСТ
    ##################################################

    - alias: floor_camera_reolink_411_cast_motion
      id: floor_camera_reolink_411_cast_motion
      description: Автокаст при русі
      initial_state: false

      trigger:
        - platform: state
          entity_id: binary_sensor.cam_reolink411_auto_cast

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: binary_sensor.cam_reolink411_auto_cast
                  state: "on"
                - condition: state
                  entity_id: media_player.living_room
                  state: "off"
              sequence:
                - action: media_player.volume_set
                  data:
                    volume_level: 0.0
                  target:
                    entity_id: media_player.living_room

                - action: camera.play_stream
                  data:
                    media_player: media_player.living_room
                  target:
                    entity_id: camera.reolink_411_ws_fluent

            - conditions:
                - condition: state
                  entity_id: binary_sensor.cam_reolink411_auto_cast
                  state: "off"
                - condition: state
                  entity_id: binary_sensor.living_room_media_music
                  state: "off"
              sequence:
                - action: media_player.volume_set
                  data:
                    volume_level: 0.4
                  target:
                    entity_id: media_player.living_room

                - action: media_player.turn_off
                  target:
                    entity_id: media_player.living_room

    ##################################################
    ## БЛОКУВАННЯ АВТОКАСТУ
    ##################################################

    - alias: floor_camera_reolink_411_cast_motion_block
      id: floor_camera_reolink_411_cast_motion_block
      description: Блокування автокасту
      initial_state: false

      trigger:
        - platform: state
          entity_id: media_player.living_room
          to: "playing"
          id: living_room_block

        - platform: state
          entity_id: media_player.living_room
          to: "off"
          id: living_room_unblock

        - platform: state
          entity_id: binary_sensor.living_room_buffering
          to: "on"
          id: living_room_off

      action:
        - choose:
            - conditions:
                - condition: trigger
                  id: living_room_block
                - condition: state
                  entity_id: binary_sensor.cam_reolink411_auto_cast
                  state: "off"
              sequence:
                - action: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.living_room

            - conditions:
                - condition: trigger
                  id: living_room_unblock
              sequence:
                - action: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.living_room

            - conditions:
                - condition: trigger
                  id: living_room_off
                - condition: state
                  entity_id: switch.control_mode
                  state: "on"
              sequence:
                - action: media_player.turn_off
                  target:
                    entity_id: media_player.living_room