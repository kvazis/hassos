##################################################
## Актуалізовано: 2026-03-21
##################################################

out_camera:

  homeassistant:
    customize:
      input_button.hikvision1_photo:
        friendly_name: Hikvision 1 - зробити фото
        icon: mdi:camera
      input_button.hikvision3_photo:
        friendly_name: Hikvision 3 - зробити фото
        icon: mdi:camera
      input_button.hikvision5_photo:
        friendly_name: Hikvision 5 - зробити фото
        icon: mdi:camera
      input_button.hikvision7_photo:
        friendly_name: Hikvision 7 - зробити фото
        icon: mdi:camera
      input_button.hikvision1_cast:
        friendly_name: Hikvision 1 - каст
        icon: mdi:cast-connected
      input_button.hikvision3_cast:
        friendly_name: Hikvision 3 - каст
        icon: mdi:cast-connected
      input_button.hikvision5_cast:
        friendly_name: Hikvision 5 - каст
        icon: mdi:cast-connected
      input_button.hikvision7_cast:
        friendly_name: Hikvision 7 - каст
        icon: mdi:cast-connected
      automation.out_camera_hikvision1_photo:
        friendly_name: Hikvision 1 - фото в Telegram
        icon: mdi:camera-send
      automation.out_camera_hikvision1_cast:
        friendly_name: Hikvision 1 - каст керування
        icon: mdi:cast
      automation.out_camera_hikvision3_photo:
        friendly_name: Hikvision 3 - фото в Telegram
        icon: mdi:camera-send
      automation.out_camera_hikvision3_cast:
        friendly_name: Hikvision 3 - каст керування
        icon: mdi:cast
      automation.out_camera_hikvision5_photo:
        friendly_name: Hikvision 5 - фото в Telegram
        icon: mdi:camera-send
      automation.out_camera_hikvision5_cast:
        friendly_name: Hikvision 5 - каст керування
        icon: mdi:cast
      automation.out_camera_hikvision7_photo:
        friendly_name: Hikvision 7 - фото в Telegram
        icon: mdi:camera-send
      automation.out_camera_hikvision7_cast:
        friendly_name: Hikvision 7 - каст керування
        icon: mdi:cast

  input_button:

    ##################################################
    ## КНОПКИ КЕРУВАННЯ КАМЕРАМИ
    ##################################################

    hikvision1_photo:
    hikvision3_photo:
    hikvision5_photo:
    hikvision7_photo:
    hikvision1_cast:
    hikvision3_cast:
    hikvision5_cast:
    hikvision7_cast:

  automation:

    ##################################################
    ## HIKVISION 1 - ФОТО
    ##################################################

    - alias: out_camera_hikvision1_photo
      id: out_camera_hikvision1_photo
      description: Створення фото з Hikvision 1 та надсилання в Telegram
      initial_state: true

      trigger:
        - platform: state
          entity_id: input_button.hikvision1_photo

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - action: camera.snapshot
          target:
            entity_id: camera.hikvision_1
          data:
            filename: "/config/www/cam_captures/hikvision1_photo.jpg"

        - delay: "00:00:10"

        - action: telegram_bot.send_photo
          data:
            target:
              - !secret chat_id_group
            file: "/config/www/cam_captures/hikvision1_photo.jpg"

    ##################################################
    ## HIKVISION 1 - CAST
    ##################################################

    - alias: out_camera_hikvision1_cast
      id: out_camera_hikvision1_cast
      description: Каст Hikvision 1 на пристрій у вітальні
      initial_state: true

      trigger:
        - platform: state
          entity_id: input_button.hikvision1_cast

        - platform: state
          entity_id: sensor.0x54ef4410004c1707_action
          to: "button_4_double"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: media_player.living_room
                  state: "off"
              sequence:
                - action: camera.play_stream
                  data:
                    media_player: media_player.living_room
                  target:
                    entity_id: camera.hikvision_1

            - conditions:
                - condition: state
                  entity_id: media_player.living_room
                  state: "playing"
              sequence:
                - action: media_player.turn_off
                  target:
                    entity_id: media_player.living_room

    ##################################################
    ## HIKVISION 3 - ФОТО
    ##################################################

    - alias: out_camera_hikvision3_photo
      id: out_camera_hikvision3_photo
      description: Створення фото з Hikvision 3 та надсилання в Telegram
