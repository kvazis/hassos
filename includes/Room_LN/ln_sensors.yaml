##################################################
## Актуалізовано: 2026-03-25
##################################################

ln_sensors:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      sensor.0xec1bbdfffe8d6ac9_humidity:
        friendly_name: Пральня - вологість
        icon: mdi:water-percent
        unit_of_measurement: '%'

      sensor.0xec1bbdfffe8d6ac9_temperature:
        friendly_name: Пральня - температура
        icon: mdi:temperature-celsius
        unit_of_measurement: '°C'

      sensor.0xec1bbdfffe8d6ac9_battery:
        friendly_name: Пральня - клімат

      binary_sensor.0xa4c138fbca74ad90_contact:
        friendly_name: Пральня - двері

      sensor.0xa4c138fbca74ad90_battery:
        friendly_name: Пральня - двері

      binary_sensor.0x00158d0001e16204_occupancy:
        friendly_name: Пральня - рух

      sensor.0x00158d0001e16204_battery:
        friendly_name: Пральня - рух

  ##################################################
  ## RECORDER
  ##################################################

  recorder:
    include:
      entities:
        - sensor.0xec1bbdfffe8d6ac9_temperature
        - sensor.0xec1bbdfffe8d6ac9_humidity
        - binary_sensor.0xa4c138fbca74ad90_contact
        - binary_sensor.0x00158d0001e16204_occupancy