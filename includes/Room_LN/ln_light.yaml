##################################################
## Актуалізовано: 2026-03-25
##################################################

ln_light:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      binary_sensor.ln_light_door_closed:
        friendly_name: Пральня - світло без руху при зачинених дверях
        icon: mdi:door-closed

      binary_sensor.ln_light_door_open:
        friendly_name: Пральня - світло без руху при відчинених дверях
        icon: mdi:door-open

      binary_sensor.ln_no_light_door_closed:
        friendly_name: Пральня - світло вимкнено при зачинених дверях
        icon: mdi:lightbulb-off

      automation.ln_light_auto_on:
        friendly_name: Пральня - автоматичне ввімкнення світла
        icon: mdi:lightbulb-on

      automation.ln_light_autot_off:
        friendly_name: Пральня - автоматичне вимкнення світла
        icon: mdi:lightbulb-off

      automation.ln_ceiling_light_toggle:
        friendly_name: Пральня - ручне керування світлом
        icon: mdi:light-switch

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    - binary_sensor:

        - name: ln_light_door_closed
          unique_id: ln_door_closed
          state: >
            {{ is_state('light.0x00158d00014a1a55', 'on')
               and is_state('binary_sensor.0xa4c138fbca74ad90_contact', 'off')
               and is_state('binary_sensor.0x00158d0001e16204_occupancy', 'off')
            }}
          device_class: light

        - name: ln_light_door_open
          unique_id: ln_door_open
          state: >
            {{ is_state('light.0x00158d00014a1a55', 'on')
               and is_state('binary_sensor.0xa4c138fbca74ad90_contact', 'on')
               and is_state('binary_sensor.0x00158d0001e16204_occupancy', 'off')
            }}
          delay_on:
            minutes: 15
          device_class: light

        - name: ln_no_light_door_closed
          unique_id: ln_no_light_door_closed
          state: >
            {{ is_state('light.0x00158d00014a1a55', 'off')
               and is_state('binary_sensor.0xa4c138fbca74ad90_contact', 'off')
            }}
          device_class: light

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    - alias: ln_light_auto_on
      id: ln_light_auto_on
      description: Пральня - автоматичне ввімкнення освітлення
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.0x00158d0001e16204_occupancy
          from: 'on'
          to: 'off'
        - platform: state
          entity_id: binary_sensor.ln_no_light_door_closed
          from: 'on'
          to: 'off'
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
      action:
        - action: light.turn_on
          target:
            entity_id: light.0x00158d00014a1a55
          data: {}

    - alias: ln_light_auto_off
      id: ln_light_autot_off
      description: Пральня - автоматичне вимкнення освітлення
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.ln_light_door_closed
          to: 'on'
        - platform: state
          entity_id: binary_sensor.ln_light_door_open
          to: 'on'
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: state
          entity_id: light.0x00158d00014a1a55
          state: 'on'
      action:
        - action: light.turn_off
          target:
            entity_id: light.0x00158d00014a1a55
          data: {}

    - alias: ln_ceiling_light_toggle
      id: ln_ceiling_light_toggle
      description: Пральня - ручне керування освітленням
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.0x54ef4410004c1707_action
          to: 'button_5_double'
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
      action:
        - action: light.toggle
          target:
            entity_id: light.0x00158d00014a1a55
          data: {}