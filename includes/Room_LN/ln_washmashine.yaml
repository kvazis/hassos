##################################################
## Актуалізовано: 2026-03-25
##################################################

ln_washmashine:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      binary_sensor.ln_washing:
        friendly_name: Пральня - прання активне
        icon: mdi:washing-machine

      automation.ln_washing_end:
        friendly_name: Пральня - завершення прання
        icon: mdi:washing-machine-alert

  ##################################################
  ## RECORDER
  ##################################################

  recorder:
    include:
      entities:
        - sensor.0x842e14fffe51c5ae_power
        - sensor.0x842e14fffe51c5ae_meter
        - binary_sensor.ln_washing

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    - binary_sensor:

        - name: ln_washing
          unique_id: ln_washing
          state: >
            {{ states('sensor.0x842e14fffe51c5ae_power') | int > 6 }}
          delay_on:
            minutes: 2
          delay_off:
            minutes: 2
          device_class: running

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    - alias: ln_washing_end
      id: ln_washing_end
      description: Пральня - повідомлення про завершення прання
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.ln_washing
          from: 'on'
          to: 'off'
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: state
          entity_id: binary_sensor.night_time
          state: 'off'
      action:
        - action: telegram_bot.send_message
          data_template:
            chat_id:
              - !secret chat_id_group
            message: |
              {{"\U0001F9D9"}} Прання завершено ! {{ states('sensor.time_date') }}
        - action: light.turn_on
          target:
            entity_id:
              - light.gld_wled
              - light.br_wled_round
          data:
            effect: Washing Machine
            brightness_pct: 10
        - action: select.select_option
          target:
            entity_id:
              - select.gld_wled_color_palette
              - select.br_wled_round_color_palette
          data:
            option: Icefire
        - action: number.set_value
          target:
            entity_id:
              - number.gld_wled_speed
              - number.br_wled_round_speed
          data:
            value: 157
        - action: number.set_value
          target:
            entity_id:
              - number.gld_wled_intensity
              - number.br_wled_round_intensity
          data:
            value: 221
        - delay: 00:00:30
        - action: light.turn_off
          target:
            entity_id:
              - light.gld_wled
              - light.br_wled_round
        - delay: 00:00:15
        - action: light.turn_off
          target:
            entity_id:
              - light.gld_wled
              - light.br_wled_round