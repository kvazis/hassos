br_heat:
## Спальня термоголовка

    recorder:
      include:
        entities:
           - climate.0x84fd27fffe31ada3
         
    homeassistant:
      customize:
        
        climate.0x84fd27fffe31ada3:
          friendly_name: Спальня TRV
        switch.0x84fd27fffe31ada3_heating_stop:
          friendly_name: Спальня TRV стоп нагрев
        number.0x84fd27fffe31ada3_local_temperature_calibration:
          friendly_name: Спальня TRV t калибровка
          unit_of_measurement: '°C'
        number.0x84fd27fffe31ada3_comfort_temperature:
          friendly_name: Спальня TRV t комфорт
          unit_of_measurement: '°C'
        number.0x84fd27fffe31ada3_open_window_temperature:
          friendly_name: Спальня TRV t окно
          unit_of_measurement: '°C'
        number.0x84fd27fffe31ada3_holiday_temperature:
          friendly_name: Спальня TRV t выходные
          unit_of_measurement: '°C'
        number.0x84fd27fffe31ada3_eco_temperature:
          friendly_name: Спальня TRV t эко
          unit_of_measurement: '°C'
        binary_sensor.0x84fd27fffe31ada3_battery_low:
          friendly_name: Спальня TRV питание
        br_thermostat_local_temperature_calibration:
          friendly_name: Спальня необходимость калибровки
          device_class: update

    mqtt:
      binary_sensor:
        - name: br_radiator
          unique_id: br_radiator
          state_topic: "states/br_radiator"



    template:
    
      - binary_sensor:
      
          - name: br_thermostat_local_temperature_calibration
            unique_id: br_thermostat_local_temperature_calibration
            state: >
                    {{((states('sensor.0x00158d000156e92e_temperature') | float - state_attr('climate.0x84fd27fffe31ada3', 'current_temperature') | float))|round(1) > 1
                     or ((states('sensor.0x00158d000156e92e_temperature') | float - state_attr('climate.0x84fd27fffe31ada3', 'current_temperature') | float))|round(1) < -1}}
            device_class: update

      - switch:

          - unique_id: br_radiator_mode
            name: Режим отопления Спальня
            default_entity_id: switch.br_radiator_mode
            state: >
              {{ is_state('binary_sensor.br_radiator', 'on') }}    
            turn_on:
              - action: mqtt.publish
                data:
                  topic: states/br_radiator
                  payload: 'ON'
                  retain: true          
            turn_off:
              - action: mqtt.publish
                data:
                  topic: states/br_radiator
                  payload: 'OFF'
                  retain: true          
            icon: >
              {% if is_state('switch.br_radiator_mode', 'on') %}
                mdi:radiator
              {% else %}
                mdi:radiator
              {% endif %}
     
    script:
    
        br_temperature_calibration:
          alias: Спальня TRV, калибровка
          sequence:
          - action: number.set_value
            data:
              value: "0.0"
            target:
              entity_id: number.0x84fd27fffe31ada3_local_temperature_calibration 
          - delay: 00:00:10
          - action: number.set_value
            data:
              value: "{{((states('sensor.0x00158d000156e92e_temperature') | float - state_attr('climate.0x84fd27fffe31ada3', 'current_temperature') | float))|round(1) }}"
            target:
              entity_id: number.0x84fd27fffe31ada3_local_temperature_calibration 


    automation:

      - alias: br_heat_night_temp_manual_control
        id: br_heat_night_temp_manual_control
        description: Спальня TRV - ручная установка температуры
        initial_state: true
        trigger:
    # Выключатель возле кровати
          - platform: state
            entity_id: sensor.0x54ef4410004c1706_action
            to: 'button_6_triple'
        condition:
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
          - condition: state
            entity_id: binary_sensor.br_radiator
            state: 'on' 
        action:
          - service: climate.set_temperature
            data:
              entity_id: climate.0x84fd27fffe31ada3
              temperature: 17


      - alias: br_heat_temperature_calibration
        id: br_heat_temperature_calibration
        description: Спальня TRV - калибровка температуры 
        initial_state: true
        trigger:
          - platform: time_pattern
            minutes: "/15"
        condition:
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
          - condition: state
            entity_id: binary_sensor.br_radiator
            state: 'on' 
          - condition: state
            entity_id: binary_sensor.br_thermostat_local_temperature_calibration
            state: 'on'
        action:
         - service: script.turn_on
           entity_id: script.br_temperature_calibration
           
      - alias: br_heat_mode_toggle
        id: br_heat_mode_toggle
        description: Спальня TRV - переключение режима работы
        initial_state: true
        trigger:
        - platform: homeassistant
          event: start
        - platform: state
          entity_id:
            - binary_sensor.br_radiator
        condition:
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
        action:
            - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.br_radiator
                    state: 'on'
                  - condition: template
                    value_template: "{{ states('climate.0x84fd27fffe31ada3') != 'heat' or state_attr('climate.0x84fd27fffe31ada3', 'preset_mode') != 'manual'}}"
                sequence:
                  - service: climate.set_hvac_mode
                    target:
                      entity_id: climate.0x84fd27fffe31ada3
                    data:
                      hvac_mode: heat
                  - service: climate.set_preset_mode
                    data:
                      preset_mode: manual
                    target:
                      entity_id: climate.0x84fd27fffe31ada3
                  - service: climate.set_temperature
                    data:
                      entity_id: climate.0x84fd27fffe31ada3
                      temperature: "{{ states('number.0x84fd27fffe31ada3_comfort_temperature')}}"
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.br_radiator
                    state: 'off'
                  - condition: template
                    value_template: "{{ states('climate.0x84fd27fffe31ada3') != 'off' }}"
                sequence:
                  - service: climate.set_hvac_mode
                    target:
                      entity_id: climate.0x84fd27fffe31ada3
                    data:
                      hvac_mode: 'off'

      - alias: br_heat_temperature_set
        id: br_heat_temperature_set
        description: Спальня TRV - проветривание и ночной режим
        initial_state: true
        trigger:
        - platform: state
          entity_id:
            - binary_sensor.br_aeration
        - platform: state
          entity_id:
            - binary_sensor.night_time
        condition:
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
          - condition: state
            entity_id: binary_sensor.br_radiator
            state: 'on' 
        action:
            - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.br_aeration
                    state: 'on'
                  - condition: state
                    entity_id: binary_sensor.night_time
                    state: 'on'
                sequence:
                  - service: climate.set_temperature
                    data:
                      entity_id: climate.0x84fd27fffe31ada3
                      temperature: "{{ states('number.0x84fd27fffe31ada3_open_window_temperature')}}"

              - conditions:
                  - condition: state
                    entity_id: binary_sensor.br_aeration
                    state: 'off'
                  - condition: state
                    entity_id: binary_sensor.night_time
                    state: 'off'
                sequence:
                  - service: climate.set_temperature
                    data:
                      entity_id: climate.0x84fd27fffe31ada3
                      temperature: "{{ states('number.0x84fd27fffe31ada3_comfort_temperature')}}"

              - conditions:
                  - condition: state
                    entity_id: binary_sensor.br_aeration
                    state: 'on'
                  - condition: state
                    entity_id: binary_sensor.night_time
                    state: 'off'
                sequence:
                  - service: climate.set_temperature
                    data:
                      entity_id: climate.0x84fd27fffe31ada3
                      temperature: "{{ states('number.0x84fd27fffe31ada3_open_window_temperature')}}"

              - conditions:
                  - condition: state
                    entity_id: binary_sensor.br_aeration
                    state: 'off'
                  - condition: state
                    entity_id: binary_sensor.night_time
                    state: 'on'
                sequence:
                  - service: climate.set_temperature
                    data:
                      entity_id: climate.0x84fd27fffe31ada3
                      temperature: "{{ states('number.0x84fd27fffe31ada3_eco_temperature')}}"

