##################################################
## Актуалізовано: 2026-03-25
##################################################

br_humidification:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      binary_sensor.br_aeration:
        friendly_name: Спальня - провітрювання
        icon: mdi:window-open-variant

      binary_sensor.br_humidification_time_allowed:
        friendly_name: Спальня - дозволений час
        icon: mdi:clock-outline

      binary_sensor.br_humidifier_has_water:
        friendly_name: Спальня - наявність води
        icon: mdi:water

      sensor.br_humidity:
        friendly_name: Спальня - вологість
        icon: mdi:water-percent

      sensor.br_humidity_source:
        friendly_name: Спальня - джерело вологості
        icon: mdi:information-outline

      input_datetime.br_humidification_start:
        friendly_name: Спальня - початок роботи

      input_datetime.br_humidification_stop:
        friendly_name: Спальня - завершення роботи

      input_boolean.br_humidification_mode:
        friendly_name: Спальня - режим зволоження
        icon: mdi:water

      input_boolean.br_humidifier_lock:
        friendly_name: Спальня - блокування зволожувача
        icon: mdi:water-off

      input_number.br_humidity_level:
        friendly_name: Спальня - цільова вологість
        icon: mdi:water-percent

      input_number.br_humidity_hysteresis:
        friendly_name: Спальня - гістерезис вологості
        icon: mdi:swap-horizontal

      input_number.br_humidifier_power_low_threshold:
        friendly_name: Спальня - поріг потужності
        icon: mdi:flash-alert

      automation.br_humidification_control:
        friendly_name: Спальня - керування зволожувачем

      automation.br_humidifier_no_water_shutdown:
        friendly_name: Спальня - немає води

      automation.br_humidifier_lock_reset:
        friendly_name: Спальня - зняття блокування

  ##################################################
  ## INPUT_DATETIME
  ##################################################

  input_datetime:

    br_humidification_start:
      name: br_humidification_start
      has_date: false
      has_time: true

    br_humidification_stop:
      name: br_humidification_stop
      has_date: false
      has_time: true

  ##################################################
  ## INPUT_BOOLEAN
  ##################################################

  input_boolean:

    br_humidification_mode:
      name: br_humidification_mode

    br_humidifier_lock:
      name: br_humidifier_lock

  ##################################################
  ## INPUT_NUMBER
  ##################################################

  input_number:

    br_humidity_level:
      name: br_humidity_level
      min: 30
      max: 60
      step: 1
      unit_of_measurement: "%"

    br_humidity_hysteresis:
      name: br_humidity_hysteresis
      min: 1
      max: 10
      step: 1
      unit_of_measurement: "%"

    br_humidifier_power_low_threshold:
      name: br_humidifier_power_low_threshold
      min: 0
      max: 20
      step: 1
      unit_of_measurement: "W"

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    - binary_sensor:

        ##################################################
        ## ПРОВІТРЮВАННЯ
        ##################################################

        - name: br_aeration
          unique_id: br_aeration
          state: >
            {{ is_state('binary_sensor.0x00158d0001193697_contact', 'on')
               or is_state('binary_sensor.0x00158d00015843d4_contact', 'on') }}
          delay_on:
            seconds: 30
          delay_off:
            seconds: 30
          device_class: opening

        ##################################################
        ## ДОЗВОЛЕНИЙ ЧАС
        ##################################################

        - name: br_humidification_time_allowed
          unique_id: br_humidification_time_allowed
          state: >
            {% set s = states('input_datetime.br_humidification_start') %}
            {% set e = states('input_datetime.br_humidification_stop') %}
            {% set n = now().strftime('%H:%M:%S') %}
            {% if s in ['unknown', 'unavailable', 'none', ''] or e in ['unknown', 'unavailable', 'none', ''] %}
              true
            {% elif s <= e %}
              {{ s <= n and n <= e }}
            {% else %}
              {{ n >= s or n <= e }}
            {% endif %}

        ##################################################
        ## НАЯВНІСТЬ ВОДИ
        ##################################################

        - name: br_humidifier_has_water
          unique_id: br_humidifier_has_water
          state: >
            {{ states('sensor.0x00158d00010ec4b8_power') | float(0)
               > states('input_number.br_humidifier_power_low_threshold') | float(2) }}
          delay_on:
            seconds: 30
          delay_off:
            seconds: 30

    - sensor:

        ##################################################
        ## ВОЛОГІСТЬ
        ##################################################

        - name: br_humidity
          unique_id: br_humidity
          unit_of_measurement: "%"
          device_class: humidity
          state: >
            {% set s1 = states('sensor.0xa4c138b7e1e0812c_humidity') %}
            {% set s2 = states('sensor.0x00158d000156e92e_humidity') %}
            {% set v1_ok = s1 not in ['unknown', 'unavailable', 'none', ''] and (s1 | float(default=none)) is not none %}
            {% set v2_ok = s2 not in ['unknown', 'unavailable', 'none', ''] and (s2 | float(default=none)) is not none %}
            {% if v1_ok and v2_ok %}
              {{ ((s1 | float + s2 | float) / 2) | round(1) }}
            {% elif v1_ok %}
              {{ (s1 | float) | round(1) }}
            {% elif v2_ok %}
              {{ (s2 | float) | round(1) }}
            {% else %}
              {{ 'unknown' }}
            {% endif %}

        ##################################################
        ## ДЖЕРЕЛО ВОЛОГОСТІ
        ##################################################

        - name: br_humidity_source
          unique_id: br_humidity_source
          state: >
            {% set s1 = states('sensor.0xa4c138b7e1e0812c_humidity') %}
            {% set s2 = states('sensor.0x00158d000156e92e_humidity') %}
            {% set v1_ok = s1 not in ['unknown', 'unavailable', 'none', ''] and (s1 | float(default=none)) is not none %}
            {% set v2_ok = s2 not in ['unknown', 'unavailable', 'none', ''] and (s2 | float(default=none)) is not none %}
            {% if v1_ok and v2_ok %}avg
            {% elif v1_ok %}sensor1
            {% elif v2_ok %}sensor2
            {% else %}none
            {% endif %}

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## КЕРУВАННЯ ЗВОЛОЖУВАЧЕМ
    ##################################################

    - alias: br_humidification_control
      id: br_humidification_control
      description: Керування зволожувачем
      initial_state: true
      mode: single

      trigger:
        - platform: state
          entity_id:
            - sensor.br_humidity
            - input_number.br_humidity_level
            - input_number.br_humidity_hysteresis
            - input_boolean.br_humidification_mode
            - binary_sensor.br_aeration
            - binary_sensor.br_humidification_time_allowed

        - platform: time_pattern
          minutes: "/5"

      variables:
        plug: switch.0x00158d00010ec4b8
        humidity: "{{ states('sensor.br_humidity') | float(default=none) }}"
        on_th: >-
          {{
            (states('input_number.br_humidity_level') | float(45)
             - states('input_number.br_humidity_hysteresis') | float(3)) | round(1)
          }}
        off_th: >-
          {{
            (states('input_number.br_humidity_level') | float(45)
             + states('input_number.br_humidity_hysteresis') | float(3)) | round(1)
          }}
        plug_on: "{{ is_state('switch.0x00158d00010ec4b8', 'on') }}"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - choose:

            - conditions:
                - condition: template
                  value_template: >-
                    {{
                      plug_on and (
                        is_state('input_boolean.br_humidification_mode', 'off')
                        or is_state('binary_sensor.br_aeration', 'on')
                        or is_state('binary_sensor.br_humidification_time_allowed', 'off')
                        or (humidity is not none and humidity >= off_th)
                      )
                    }}
              sequence:
                - action: switch.turn_off
                  target:
                    entity_id: "{{ plug }}"

            - conditions:
                - condition: template
                  value_template: >-
                    {{
                      (not plug_on)
                      and is_state('input_boolean.br_humidification_mode', 'on')
                      and is_state('binary_sensor.br_aeration', 'off')
                      and is_state('binary_sensor.br_humidification_time_allowed', 'on')
                      and is_state('input_boolean.br_humidifier_lock', 'off')
                      and (humidity is not none and humidity <= on_th)
                    }}
              sequence:
                - action: switch.turn_on
                  target:
                    entity_id: "{{ plug }}"

    ##################################################
    ## КОНТРОЛЬ ВОДИ
    ##################################################

    - alias: br_humidifier_no_water_shutdown
      id: br_humidifier_no_water_shutdown
      description: Вимкнення зволожувача без води
      initial_state: true
      mode: single

      trigger:
        - platform: state
          entity_id: binary_sensor.br_humidifier_has_water

        - platform: time_pattern
          minutes: "/5"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: switch.0x00158d00010ec4b8
          state: "on"
          for:
            minutes: 2

        - condition: state
          entity_id: binary_sensor.br_humidifier_has_water
          state: "off"

        - condition: state
          entity_id: input_boolean.br_humidifier_lock
          state: "off"

      action:
        - action: switch.turn_off
          target:
            entity_id: switch.0x00158d00010ec4b8

        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.br_humidifier_lock

        - action: telegram_bot.send_message
          data:
            target:
              - !secret chat_id_group_tech
            message: |
              💧 Спальня: схоже, закінчилась вода у зволожувачі — вимикаю розетку.

    ##################################################
    ## ЗНЯТТЯ БЛОКУВАННЯ
    ##################################################

    - alias: br_humidifier_lock_reset
      id: br_humidifier_lock_reset
      description: Зняття блокування після доливу води
      initial_state: true
      mode: single

      trigger:
        - platform: state
          entity_id: binary_sensor.br_humidifier_has_water
          to: "on"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: input_boolean.br_humidifier_lock
          state: "on"

      action:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.br_humidifier_lock