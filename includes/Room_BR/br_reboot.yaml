##################################################
## Актуалізовано: 2026-03-24
##################################################

br_reboot:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      binary_sensor.br_ceiling_unavailable:
        friendly_name: Спальня - недоступність люстри
        icon: mdi:ceiling-light-outline

      input_button.br_ceiling_reboot:
        friendly_name: Спальня - перезавантаження люстри
        icon: mdi:restart

      input_number.br_ceiling_reboot_attempts:
        friendly_name: Спальня - спроби перезавантаження люстри

      automation.br_ceiling_reboot:
        friendly_name: Спальня - перезавантаження люстри
        icon: phu:ceiling-being

      automation.br_ceiling_reboot_attempts_reset:
        friendly_name: Спальня - скидання спроб люстри
        icon: mdi:counter

      automation.br_ceiling_reboot_manual:
        friendly_name: Спальня - ручне перезавантаження люстри
        icon: mdi:restart

      automation.br_ceiling_off_after_unavailable:
        friendly_name: Спальня - вимкнення люстри після відновлення
        icon: mdi:lightbulb-auto-outline

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    - binary_sensor:

        ##################################################
        ## НЕДОСТУПНІСТЬ ЛЮСТРИ
        ##################################################

        - name: br_ceiling_unavailable
          unique_id: br_ceiling_unavailable
          state: >
            {{ is_state('light.br_philips_62', 'unavailable') }}
          delay_on:
            minutes: 3
          device_class: problem

  ##################################################
  ## INPUT_BUTTON
  ##################################################

  input_button:

    br_ceiling_reboot:
      name: br_ceiling_reboot

  ##################################################
  ## INPUT_NUMBER
  ##################################################

  input_number:

    br_ceiling_reboot_attempts:
      name: br_ceiling_reboot_attempts
      min: 0
      max: 3
      step: 1

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## ПЕРЕЗАВАНТАЖЕННЯ ЛЮСТРИ
    ##################################################

    - alias: br_ceiling_reboot
      id: br_ceiling_reboot
      description: Перезавантаження недоступної люстри
      initial_state: true

      trigger:
        - platform: time_pattern
          minutes: "/5"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: binary_sensor.br_ceiling_unavailable
          state: "on"

        - condition: state
          entity_id: binary_sensor.blackout_after
          state: "off"

        - condition: template
          value_template: "{{ states('input_number.br_ceiling_reboot_attempts') | int < 3 }}"

      action:
        - action: switch.turn_off
          target:
            entity_id: switch.0x54ef44100024689c_right

        - delay: "00:00:05"

        - action: switch.turn_on
          target:
            entity_id: switch.0x54ef44100024689c_right

        - action: input_number.increment
          target:
            entity_id: input_number.br_ceiling_reboot_attempts

        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_log
            message: |
              🤖 Спальня - перезавантаження люстри (спроба {{ states('input_number.br_ceiling_reboot_attempts') | int }} з 3) {{ states('sensor.time_date') }}

    ##################################################
    ## СКИДАННЯ СПРОБ ПЕРЕЗАВАНТАЖЕННЯ ЛЮСТРИ
    ##################################################

    - alias: br_ceiling_reboot_attempts_reset
      id: br_ceiling_reboot_attempts_reset
      description: Скидання спроб перезавантаження люстри
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.br_ceiling_unavailable
          from: "on"
          to: "off"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: template
          value_template: "{{ states('input_number.br_ceiling_reboot_attempts') | int > 0 }}"

      action:
        - action: input_number.set_value
          target:
            entity_id: input_number.br_ceiling_reboot_attempts
          data:
            value: 0

        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_log
            message: |
              🤖 Спальня - люстра успішно відновила роботу, лічильник скинуто

    ##################################################
    ## РУЧНЕ ПЕРЕЗАВАНТАЖЕННЯ ЛЮСТРИ
    ##################################################

    - alias: br_ceiling_reboot_manual
      id: br_ceiling_reboot_manual
      description: Ручне перезавантаження люстри
      initial_state: true

      trigger:
        - platform: state
          entity_id: input_button.br_ceiling_reboot

      action:
        - action: switch.turn_off
          target:
            entity_id: switch.0x54ef44100024689c_right

        - delay: "00:00:05"

        - action: switch.turn_on
          target:
            entity_id: switch.0x54ef44100024689c_right

        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_log
            message: |
              🤖 Спальня - ручне перезавантаження люстри {{ states('sensor.time_date') }}

    ##################################################
    ## ВИМКНЕННЯ ПІСЛЯ ВІДНОВЛЕННЯ
    ##################################################

    - alias: br_ceiling_off_after_unavailable
      id: br_ceiling_off_after_unavailable
      description: Вимкнення люстри після відновлення
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.br_ceiling_unavailable
          from: "on"
          to: "off"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: binary_sensor.electricity
          state: "off"

      action:
        - action: xiaomi_miio.light_set_scene
          target:
            entity_id: light.br_philips_62
          data:
            scene: 4

        - delay: "00:00:03"

        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.br_ceiling

        - action: light.turn_off
          target:
            entity_id: light.br_philips_62