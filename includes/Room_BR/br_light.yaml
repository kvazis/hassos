##################################################
## Актуалізовано: 2026-03-24
##################################################

br_light:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      input_boolean.br_ceiling:
        friendly_name: Спальня - ручне ввімкнення люстри
        icon: mdi:lightbulb-off-outline

      input_button.br_ceiling_light:
        friendly_name: Спальня - люстра
        icon: mdi:ceiling-light

      automation.br_ceiling_manual_control:
        friendly_name: Спальня - ручне керування люстрою
        icon: mdi:light-switch

      automation.br_ceiling_turn_control:
        friendly_name: Спальня - контроль вмикання люстри
        icon: mdi:lightbulb-alert

      automation.br_light_switching:
        friendly_name: Спальня - резервне освітлення
        icon: mdi:lightbulb-night

  ##################################################
  ## INPUT_BOOLEAN
  ##################################################

  input_boolean:

    br_ceiling:
      name: br_ceiling

  ##################################################
  ## INPUT_BUTTON
  ##################################################

  input_button:

    br_ceiling_light:
      name: br_ceiling_light

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## РУЧНЕ КЕРУВАННЯ ЛЮСТРОЮ
    ##################################################

    - alias: br_ceiling_manual_control
      id: br_ceiling_manual_control
      description: Ручне керування люстрою
      initial_state: true

      trigger:
        - platform: state
          entity_id: input_button.br_ceiling_light

        - platform: state
          entity_id: sensor.0x54ef44100024689c_action
          to: "single_right"

        - platform: state
          entity_id: sensor.0x60a423fffe942cf2_action
          to: "1_single"

        - domain: mqtt
          device_id: df1032556f8b28d1f774b454d8525cb4
          type: action
          subtype: button_1_single
          trigger: device

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: light.br_philips_62
                  state: "off"
              sequence:
                - action: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.br_ceiling

                - action: light.turn_on
                  target:
                    entity_id: light.br_philips_62
                  data:
                    brightness_pct: 100
                    color_temp_kelvin: 4000

            - conditions:
                - condition: state
                  entity_id: light.br_philips_62
                  state: "on"
              sequence:
                - action: xiaomi_miio.light_set_scene
                  target:
                    entity_id: light.br_philips_62
                  data:
                    scene: 4

                - delay: "00:00:03"

                - action: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.br_ceiling

                - action: light.turn_off
                  target:
                    entity_id: light.br_philips_62

    ##################################################
    ## КОНТРОЛЬ ВМИКАННЯ ЛЮСТРИ
    ##################################################

    - alias: br_ceiling_turn_control
      id: br_ceiling_turn_control
      description: Контроль вмикання люстри
      initial_state: true

      trigger:
        - platform: state
          entity_id: light.br_philips_62
          to: "on"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: input_boolean.br_ceiling
          state: "off"

      action:
        - action: light.turn_off
          target:
            entity_id: light.br_philips_62

    ##################################################
    ## РЕЗЕРВНЕ ОСВІТЛЕННЯ
    ##################################################

    - alias: br_light_switching
      id: br_light_switching
      description: Перемикання на резервне освітлення
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.electricity_internal
          from: "off"
          to: "on"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: light.br_philips_62
          state: "on"

      action:
        - action: light.turn_on
          target:
            entity_id: light.br_wled_round
          data:
            effect: Solid
            rgb_color: [0, 0, 0]

        - action: light.turn_on
          target:
            entity_id: light.br_wled_round
          data:
            effect: Percent
            brightness_pct: 100
            rgb_color: [255, 255, 255]

        - action: select.select_option
          target:
            entity_id: select.br_wled_round_color_palette
          data:
            option: Default

        - action: number.set_value
          target:
            entity_id: number.br_wled_round_intensity
          data:
            value: 5

        - action: script.turn_on
          target:
            entity_id: script.br_gradient_wled_on