##################################################
## Актуалізовано: 2026-03-24
##################################################

br_wled_light:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      light.br_wled_round:
        friendly_name: Спальня - WLED стрічка
        icon: phu:lightstrip-wrap

      sensor.0x60a423fffe942cf2_action:
        friendly_name: Спальня - пульт Loratap

      sensor.0x60a423fffe942cf2_battery:
        friendly_name: Спальня - пульт Loratap заряд

      input_button.br_gradient_wled:
        friendly_name: Спальня - WLED стрічка
        icon: mdi:led-strip-variant

      input_boolean.br_wled_round:
        friendly_name: Спальня - ручне ввімкнення стрічки
        icon: mdi:lightbulb-off-outline

      binary_sensor.br_moving_in_dark:
        friendly_name: Спальня - рух в темряві

      binary_sensor.br_light_no_move:
        friendly_name: Спальня - світло без руху

      binary_sensor.br_wled_round_off_5m:
        friendly_name: Спальня - затримка вимкнення

      automation.br_wled_control:
        friendly_name: Спальня - керування WLED

      automation.br_auto_light_on:
        friendly_name: Спальня - авто увімкнення підсвітки

      automation.br_auto_light_off:
        friendly_name: Спальня - авто вимкнення підсвітки

      automation.br_wled_threat_notification:
        friendly_name: Спальня - індикація тривоги

      automation.br_wled_round_control:
        friendly_name: Спальня - керування тумбою

      automation.br_wled_threat_cancel:
        friendly_name: Спальня - індикація відбою

  ##################################################
  ## INPUT_BUTTON
  ##################################################

  input_button:

    br_gradient_wled:
      name: br_gradient_wled

  ##################################################
  ## INPUT_BOOLEAN
  ##################################################

  input_boolean:

    br_wled_round:
      name: br_wled_round

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    - binary_sensor:

        ##################################################
        ## РУХ В ТЕМРЯВІ
        ##################################################

        - name: br_moving_in_dark
          unique_id: br_moving_in_dark
          state: >
            {{ is_state('binary_sensor.0x00158d0001a66222_occupancy', 'on')
               and states('sensor.0xa4c13805b968f3d2_illuminance') | float(0) < 30
               and not is_state('light.br_philips_62', 'on')
               and is_state('light.br_wled_round', 'off')
               and is_state('binary_sensor.night_time', 'off') }}

        ##################################################
        ## СВІТЛО БЕЗ РУХУ
        ##################################################

        - name: br_light_no_move
          unique_id: br_light_no_move
          state: >
            {{ is_state('light.br_wled_round', 'on')
               and is_state('binary_sensor.0x00158d0001a66222_occupancy', 'off')
               and is_state('binary_sensor.night_time', 'off') }}
          delay_on: "00:02:00"
          device_class: light

        ##################################################
        ## ЗАТРИМКА ВИМКНЕННЯ
        ##################################################

        - name: br_wled_round_off_5m
          unique_id: br_wled_round_off_5m
          state: >
            {{ is_state('light.br_wled_round', 'off') }}
          delay_on: "00:05:00"
          device_class: light

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## КЕРУВАННЯ WLED
    ##################################################

    - alias: br_wled_control
      id: br_wled_control
      description: Керування WLED стрічкою
      initial_state: true

      trigger:
        - platform: state
          entity_id: input_button.br_gradient_wled

        - platform: state
          entity_id: sensor.0x60a423fffe942cf2_action
          to: "2_single"

        - platform: state
          entity_id: sensor.0x54ef44100024689c_action
          to: "single_left"

        - domain: mqtt
          device_id: df1032556f8b28d1f774b454d8525cb4
          type: action
          subtype: button_2_single
          trigger: device

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: light.br_wled_round
                  state: "off"
              sequence:
                - action: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.br_wled_round

                - action: light.turn_on
                  target:
                    entity_id: light.br_wled_round
                  data:
                    effect: Percent
                    brightness_pct: 100
                    rgb_color: [255, 255, 255]

                - action: select.select_option
                  target:
                    entity_id: select.br_wled_round_color_palette
                  data:
                    option: Default

                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_intensity
                  data:
                    value: 100

            - conditions:
                - condition: state
                  entity_id: light.br_wled_round
                  state: "on"
              sequence:
                - action: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.br_wled_round

                - action: light.turn_off
                  target:
                    entity_id: light.br_wled_round

    ##################################################
    ## АВТО УВІМКНЕННЯ
    ##################################################

    - alias: br_auto_light_on
      id: br_auto_light_on
      description: Автоматичне увімкнення підсвітки
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.br_moving_in_dark
          to: "on"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: input_boolean.br_wled_round
          state: "off"

        - condition: state
          entity_id: binary_sensor.br_wled_round_off_5m
          state: "on"

      action:
        - action: light.turn_on
          target:
            entity_id: light.br_wled_round
          data:
            effect: Percent
            brightness_pct: 100
            rgb_color: [255, 255, 255]

        - action: select.select_option
          target:
            entity_id: select.br_wled_round_color_palette
          data:
            option: Default

        - action: number.set_value
          target:
            entity_id: number.br_wled_round_intensity
          data:
            value: 100

    ##################################################
    ## АВТО ВИМКНЕННЯ
    ##################################################

    - alias: br_auto_light_off
      id: br_auto_light_off
      description: Автоматичне вимкнення підсвітки
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.br_light_no_move
          to: "on"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: input_boolean.br_wled_round
          state: "off"

      action:
        - action: light.turn_off
          target:
            entity_id: light.br_wled_round

    ##################################################
    ## ТРИВОГА
    ##################################################

    - alias: br_wled_threat_notification
      id: br_wled_threat_notification
      description: Індикація тривоги
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.m_kiyiv_air
          from: "off"
          to: "on"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: light.br_wled_round
                  state: "off"
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.br_wled_round
                  data:
                    effect: Gravcentric
                    brightness_pct: 10

                - action: select.select_option
                  target:
                    entity_id: select.br_wled_round_color_palette
                  data:
                    option: Red Tide

                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_speed
                  data:
                    value: 218

                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_intensity
                  data:
                    value: 128

                - delay: "00:00:30"

                - action: light.turn_off
                  target:
                    entity_id: light.br_wled_round

            - conditions:
                - condition: state
                  entity_id: light.br_wled_round
                  state: "on"
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.br_wled_round
                  data:
                    effect: Gravcentric
                    brightness_pct: 50

                - action: select.select_option
                  target:
                    entity_id: select.br_wled_round_color_palette
                  data:
                    option: Red Tide

                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_speed
                  data:
                    value: 218

                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_intensity
                  data:
                    value: 128

                - delay: "00:00:30"

                - action: light.turn_on
                  target:
                    entity_id: light.br_wled_round
                  data:
                    effect: Percent
                    brightness_pct: 100
                    rgb_color: [255, 255, 255]

                - action: select.select_option
                  target:
                    entity_id: select.br_wled_round_color_palette
                  data:
                    option: Default

                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_intensity
                  data:
                    value: 100

    ##################################################
    ## ВІДБІЙ ТРИВОГИ
    ##################################################

    - alias: br_wled_threat_cancel
      id: br_wled_threat_cancel
      description: Індикація відбою
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.m_kiyiv_air
          from: "on"
          to: "off"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: light.br_wled_round
                  state: "off"
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.br_wled_round
                  data:
                    effect: Aurora
                    brightness_pct: 10

                - action: select.select_option
                  target:
                    entity_id: select.br_wled_round_color_palette
                  data:
                    option: Aurora

                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_speed
                  data:
                    value: 200

                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_intensity
                  data:
                    value: 200

                - delay: "00:00:30"

                - action: light.turn_off
                  target:
                    entity_id: light.br_wled_round

            - conditions:
                - condition: state
                  entity_id: light.br_wled_round
                  state: "on"
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.br_wled_round
                  data:
                    effect: Scanner Dual
                    brightness_pct: 30

                - action: select.select_option
                  target:
                    entity_id: select.br_wled_round_color_palette
                  data:
                    option: Aurora

                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_speed
                  data:
                    value: 0

                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_intensity
                  data:
                    value: 11

                - delay: "00:00:30"

                - action: light.turn_on
                  target:
                    entity_id: light.br_wled_round
                  data:
                    effect: Percent
                    brightness_pct: 100
                    rgb_color: [255, 255, 255]

                - action: select.select_option
                  target:
                    entity_id: select.br_wled_round_color_palette
                  data:
                    option: Default

                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_intensity
                  data:
                    value: 100
                    

    ##################################################
    ## КЕРУВАННЯ ТУМБОЮ
    ##################################################

    - alias: br_wled_round_control
      id: br_wled_round_control
      description: Керування тумбою
      initial_state: true

      trigger:
        - domain: mqtt
          device_id: df1032556f8b28d1f774b454d8525cb4
          type: action
          subtype: button_2_double
          trigger: device

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: light.br_tumb_wled
                  state: "off"
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.br_tumb_wled
                  data:
                    effect: Solid Pattern Tri
                    brightness_pct: 10
                    rgb_color: [128, 128, 255]

                - action: number.set_value
                  target:
                    entity_id: number.br_tumb_wled_intensity
                  data:
                    value: 45

            - conditions:
                - condition: state
                  entity_id: light.br_tumb_wled
                  state: "on"
              sequence:
                - action: light.turn_off
                  target:
                    entity_id: light.br_tumb_wled