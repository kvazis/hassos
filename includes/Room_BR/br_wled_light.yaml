br_wled_light:

    homeassistant:
      customize:
      
        light.br_wled_round:
          friendly_name: Спальня wled шнур
          icon: phu:lightstrip-wrap
          
        sensor.0x60a423fffe942cf2_action:
          friendly_name: Спальня пульт Loratap
        sensor.0x60a423fffe942cf2_battery:
          friendly_name: Спальня пульт Loratap

    input_button:
        
      br_gradient_wled:
        name: Спальная шнур

    input_boolean:

      br_wled_round:
        name: Спальня ручне ввімкнення шнура
        icon: mdi:lightbulb-off-outline

    template:

      - binary_sensor:


    # Рух без світла, спальня
          - name: br_moving_in_dark
            unique_id: br_moving_in_dark
            state: >
              {{ is_state('binary_sensor.0x00158d0001a66222_occupancy', 'on')
                 and states('sensor.0xa4c13805b968f3d2_illuminance')|float < 30
                 and not is_state('light.br_philips_62', 'on')
                 and is_state('light.br_wled_round', 'off')
                 and is_state('binary_sensor.night_time', 'off')
              }}

    # Світло без руху
          - name: br_light_no_move
            unique_id: br_light_no_move
            state: >
              {{ is_state('light.br_wled_round', 'on')  
                 and is_state('binary_sensor.0x00158d0001a66222_occupancy', 'off')
                 and is_state('binary_sensor.night_time', 'off')
              }}
            delay_on: 00:02:00
            device_class: light
            
    # Затримка включення
          - name: br_wled_round_off_5m
            unique_id: br_wled_round_off_5m
            state: >
              {{ is_state('light.br_wled_round', 'off') }}
            delay_on: 00:05:00
            device_class: light

    automation:

      - alias: br_wled_control
        id: br_wled_control
        description: Спальня керування адресною стрічкою
        initial_state: true
        trigger:
    ## Virtual button
        - platform: state
          entity_id: input_button.br_gradient_wled
    # Пульт Loratap кнопка 2, 1 клік
        - platform: state
          entity_id: sensor.0x60a423fffe942cf2_action
          to: '2_single'
    # Вимикач на вході 
        - platform: state
          entity_id: sensor.0x54ef44100024689c_action
          to: 'single_left'
    # ВИмикач Aqara Opple - 2 клавіша
        - domain: mqtt
          device_id: df1032556f8b28d1f774b454d8525cb4
          type: action
          subtype: button_2_single
          trigger: device
        condition:
    # Режим роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        action:
            - choose:
              - conditions:
                - condition: state
                  entity_id: light.br_wled_round
                  state: 'off'
                sequence:
                - action: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.br_wled_round
                  data: {}
        
                - action: light.turn_on
                  entity_id: light.br_wled_round
                  data:
                    effect: Percent
                    brightness_pct: 100
                    rgb_color: [255, 255, 255]
                - action: select.select_option
                  data:
                    option: Default
                  target:
                    entity_id: select.br_wled_round_color_palette
                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_intensity
                  data:
                    value: 100

              - conditions:
                - condition: state
                  entity_id: light.br_wled_round
                  state: 'on'
                sequence:
                - action: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.br_wled_round
                  data: {}        
                - action: light.turn_off
                  entity_id: light.br_wled_round

      - alias: br_auto_light_on
        id: br_auto_light_on
        description: Спальня - автоматичне ввімкнення підсвітки 
        initial_state: true
        trigger:          
    # Рух в темряві
        - platform: state
          entity_id: binary_sensor.br_moving_in_dark
          to: 'on'
        condition:
    # Перемикач режиму робти серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'          
    # Перемикач ручного ввімкнення
        - condition: state
          entity_id: input_boolean.br_wled_round
          state: 'off'
    # Лента має бути вимкнута хоча б 5 хвилин
        - condition: state
          entity_id: binary_sensor.br_wled_round_off_5m
          state: 'on'          
        
        action:          
        - action: light.turn_on
          entity_id: light.br_wled_round
          data:
            effect: Percent
            brightness_pct: 100
            rgb_color: [255, 255, 255]
        - action: select.select_option
          data:
            option: Default
          target:
            entity_id: select.br_wled_round_color_palette
        - action: number.set_value
          target:
            entity_id: number.br_wled_round_intensity
          data:
            value: 100
          
    # Автоматичне вимкнення підсвітки      
          
      - alias: br_auto_light_off
        id: br_auto_light_off
        description: Спальня - автоматичне вимкнення підсвітки 
        initial_state: true
        trigger:          
    # Рух в темряві
        - platform: state
          entity_id: binary_sensor.br_light_no_move
          to: 'on'          
        condition:
    # Перемикач режиму робти серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'          
    # Перемикач ручного ввімкнення
        - condition: state
          entity_id: input_boolean.br_wled_round
          state: 'off'
        action:            
        - action: light.turn_off
          entity_id: light.br_wled_round


      - alias: br_wled_threat_notification
        id: br_wled_threat_notification
        description: Спальня WLED - тревога
        initial_state: true          
        trigger:
    # Сенсор тривоги
        - platform: state
          entity_id: binary_sensor.m_kiyiv_air
          from: 'off'
          to: 'on'
        condition:
    # Режим роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        action:
            - choose:
              - conditions:
                - condition: state
                  entity_id: light.br_wled_round
                  state: 'off'
                sequence:
                - action: light.turn_on
                  entity_id: light.br_wled_round
                  data:
                    effect: Gravcentric
                    brightness_pct: 10
                - action: select.select_option
                  data:
                    option: Red Tide
                  target:
                    entity_id: select.br_wled_round_color_palette
                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_speed
                  data:
                    value: 218
                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_intensity
                  data:
                    value: 128
                - delay: 00:00:30
                - action: light.turn_off
                  entity_id: light.br_wled_round

              - conditions:
                - condition: state
                  entity_id: light.br_wled_round
                  state: 'on'
                sequence:
                - action: light.turn_on
                  entity_id: light.br_wled_round
                  data:
                    effect: Gravcentric
                    brightness_pct: 50
                - action: select.select_option
                  data:
                    option: Red Tide
                  target:
                    entity_id: select.br_wled_round_color_palette
                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_speed
                  data:
                    value: 218
                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_intensity
                  data:
                    value: 128
                - delay: 00:00:30
                - action: light.turn_on
                  entity_id: light.br_wled_round
                  data:
                    effect: Percent
                    brightness_pct: 100
                    rgb_color: [255, 255, 255]
                - action: select.select_option
                  data:
                    option: Default
                  target:
                    entity_id: select.br_wled_round_color_palette
                - action: number.set_value
                  target:
                    entity_id: number.br_wled_round_intensity
                  data:
                    value: 100

      - alias: br_wled_round_control
        id: br_wled_round_control
        description: Спальня керування круглим світильником на тумбочці
        initial_state: true
        trigger:
    # Выключатель возле кровати
        - domain: mqtt
          device_id: df1032556f8b28d1f774b454d8525cb4
          type: action
          subtype: button_2_double
          trigger: device
        condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        action:
            - choose:
              - conditions:
                - condition: state
                  entity_id: light.br_tumb_wled
                  state: 'off'
                sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.br_tumb_wled
                  data:
                    effect: Solid Pattern Tri
                    brightness_pct: 10
                    rgb_color:
                      - 128
                      - 128
                      - 255
                - action: number.set_value
                  target:
                    entity_id: number.br_tumb_wled_intensity
                  data:
                    value: 45
              - conditions:
                - condition: state
                  entity_id: light.br_tumb_wled
                  state: 'on'
                sequence:
                - action: light.turn_off
                  entity_id: light.br_tumb_wled


      - alias: br_wled_threat_cancel
        id: br_wled_threat_cancel
        description: Спальня WLED - отмена тревоги
        initial_state: true          
        trigger:
    # Сенсор тривоги
        - platform: state
          entity_id: binary_sensor.m_kiyiv_air
          from: 'on'
          to: 'off'
        condition:
    # Режим роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        action:
            - choose:
              - conditions:
                - condition: state
                  entity_id: light.br_wled_round
                  state: 'off'
                sequence:
                - service: light.turn_on
                  entity_id: light.br_wled_round
                  data:
                    effect: Aurora
                    brightness_pct: 10
                - service: select.select_option
                  data:
                    option: Aurora
                  target:
                    entity_id: select.br_wled_round_color_palette
                - service: number.set_value
                  target:
                    entity_id: number.br_wled_round_speed
                  data:
                    value: 200
                - service: number.set_value
                  target:
                    entity_id: number.br_wled_round_intensity
                  data:
                    value: 200
                - delay: 00:00:30
                - service: light.turn_off
                  entity_id: light.br_wled_round

              - conditions:
                - condition: state
                  entity_id: light.br_wled_round
                  state: 'on'
                sequence:
                - service: light.turn_on
                  entity_id: light.br_wled_round
                  data:
                    effect: Scanner Dual
                    brightness_pct: 30
                - service: select.select_option
                  data:
                    option: Aurora
                  target:
                    entity_id: select.br_wled_round_color_palette
                - service: number.set_value
                  target:
                    entity_id: number.br_wled_round_speed
                  data:
                    value: 0
                - service: number.set_value
                  target:
                    entity_id: number.br_wled_round_intensity
                  data:
                    value: 11
                - delay: 00:00:30
                - service: light.turn_on
                  entity_id: light.br_wled_round
                  data:
                    effect: Percent
                    brightness_pct: 100
                    rgb_color: [255, 255, 255]
                - service: select.select_option
                  data:
                    option: Default
                  target:
                    entity_id: select.br_wled_round_color_palette
                - service: number.set_value
                  target:
                    entity_id: number.br_wled_round_intensity
                  data:
                    value: 100

         


                      
