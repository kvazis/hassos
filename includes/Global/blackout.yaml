##################################################
## Актуалізовано: 2026-03-24
##################################################

blackout:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      binary_sensor.blackout:
        friendly_name: Система - blackout
        icon: mdi:power-plug-off

      binary_sensor.blackout_after:
        friendly_name: Система - після blackout
        icon: mdi:power-plug

      automation.sys_blackout_host_shutdown:
        friendly_name: Система - дії при blackout
        icon: mdi:power-off

      automation.sys_blackout_after_local:
        friendly_name: Система - локальне відновлення
        icon: mdi:home-import-outline

      automation.sys_blackout_after_restore:
        friendly_name: Система - відновлення після blackout
        icon: mdi:restart-alert

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    ##################################################
    ## СЕНСОРИ BLACKOUT
    ##################################################

    - binary_sensor:
        - name: blackout
          unique_id: blackout
          state: >
            {{ states('sensor.server_telemetry') | float(0) > 2000
               and is_state('binary_sensor.electricity_internal', 'on') }}
          delay_on:
            minutes: 1
          delay_off:
            minutes: 1

        - name: blackout_after
          unique_id: blackout_after
          state: >
            {{ is_state('binary_sensor.electricity_internal', 'on') }}
          delay_off:
            minutes: 5

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## ДІЇ ПРИ BLACKOUT
    ##################################################

    - alias: sys_blackout_host_shutdown
      id: sys_blackout_host_shutdown
      description: Дії при blackout
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.blackout
          from: "off"
          to: "on"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - action: switch.turn_off
          target:
            entity_id:
              - switch.lr_light_cinema_mode

    ##################################################
    ## ЛОКАЛЬНЕ ВІДНОВЛЕННЯ
    ##################################################

    - alias: sys_blackout_after_local
      id: sys_blackout_after_local
      description: Локальне відновлення
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.blackout
          from: "on"
          to: "off"

      action:
        - action: homeassistant.reload_config_entry
          target:
            entity_id: light.gateway_light_7811dc64f4c8

        - delay: "00:00:05"

        - action: homeassistant.reload_config_entry
          target:
            entity_id: light.gateway_light_34ce0088b039

    ##################################################
    ## ВІДНОВЛЕННЯ
    ##################################################

    - alias: sys_blackout_after_restore
      id: sys_blackout_after_restore
      description: Відновлення після blackout
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.blackout
          from: "on"
          to: "off"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - action: switch.turn_off
          target:
            entity_id: switch.0x00158d00057305ac_right

        - delay: "00:00:03"

        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d00057305ac_right

        - delay: "00:00:03"

        - action: switch.turn_off
          target:
            entity_id: switch.0x00158d00057305ac_left

        - delay: "00:00:03"

        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d00057305ac_left

        - delay: "00:00:03"

        - action: switch.turn_off
          target:
            entity_id: switch.0x00158d000a8244b4_right

        - delay: "00:00:03"

        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d000a8244b4_right

        - delay: "00:00:03"

        - action: switch.turn_off
          target:
            entity_id: switch.0x00158d00062fbb54_left

        - delay: "00:00:03"

        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d00062fbb54_left

        - delay: "00:00:03"

        - action: light.turn_on
          target:
            entity_id: light.yeelight_lamp1_0x32a4ab4

        - action: switch.turn_off
          target:
            entity_id: switch.smart_power_strip_44eu_w_socket_5

        - delay: "00:00:03"

        - action: switch.turn_on
          target:
            entity_id: switch.smart_power_strip_44eu_w_socket_5

        - delay: "00:00:03"

        - action: switch.turn_on
          target:
            entity_id:
              - switch.sonoff_1000d036a0_1

        - action: mqtt.publish
          data:
            topic: "zigstar_poe/LR TV Strip/get"
            payload: '{ "state": "" }'

        - delay: "00:00:03"

        - action: mqtt.publish
          data:
            topic: "zigstar/LR balcony light/get"
            payload: '{ "state": "" }'

        - delay: "00:00:03"

        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d00057305ac_right

        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d00057305ac_left

        - action: light.turn_off
          target:
            entity_id:
              - light.yeelight_ceiling4_0x456e813
              - light.yeelight_ceiling4_0x49c726b
              - light.yeelight_ceiling3_0x45727f2
              - light.0xa4c13812b94c8365
              - light.0x54ef4410008e96fd_bottom
              - light.24key_rbg_strip
              - light.yeelight_lamp1_0x32a4ab4

        - action: light.turn_on
          target:
            entity_id: light.0xa4c13812b94c8365

        - delay: "00:00:03"

        - action: mqtt.publish
          data:
            topic: "zigstar/LR balcony light/get"
            payload: '{ "state": "" }'

        - delay: "00:00:03"

        - action: light.turn_off
          target:
            entity_id: light.0xa4c13812b94c8365

        - delay: "00:00:05"

        - action: homeassistant.reload_config_entry
          target:
            entity_id: light.gateway_light_f0b429cc1f11

        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_log
            message: |
              🤖 Відновлення після blackout виконано {{ states('sensor.time_date') }}

        - delay: "00:00:05"

        - action: mqtt.publish
          data:
            topic: "zigstar/LR balcony light/get"
            payload: '{ "state": "" }'