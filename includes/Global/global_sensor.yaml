##################################################
## Актуалізовано: 2026-03-24
##################################################

global_sensor:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      binary_sensor.notification_time:
        friendly_name: Система - час сповіщень
        icon: mdi:bell-time

      binary_sensor.night_time:
        friendly_name: Система - нічний режим
        icon: mdi:weather-night

      input_datetime.notification_start:
        friendly_name: Система - початок сповіщень
        icon: mdi:clock-start

      input_datetime.notification_stop:
        friendly_name: Система - завершення сповіщень
        icon: mdi:clock-end

      input_datetime.night_start:
        friendly_name: Система - початок нічного режиму
        icon: mdi:weather-night-partly-cloudy

      input_datetime.night_stop:
        friendly_name: Система - завершення нічного режиму
        icon: mdi:white-balance-sunny

  ##################################################
  ## INPUT_DATETIME
  ##################################################

  input_datetime:

    notification_start:
      name: notification_start
      has_date: false
      has_time: true

    notification_stop:
      name: notification_stop
      has_date: false
      has_time: true

    night_start:
      name: night_start
      has_date: false
      has_time: true

    night_stop:
      name: night_stop
      has_date: false
      has_time: true

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    ##################################################
    ## ГЛОБАЛЬНІ ЧАСОВІ СЕНСОРИ
    ##################################################

    - binary_sensor:
        - name: notification_time
          unique_id: notification_time
          state: >
            {% set start = states('input_datetime.notification_start') %}
            {% set stop = states('input_datetime.notification_stop') %}
            {% set current = now().strftime('%H:%M:%S') %}
            {% if start < stop %}
              {{ start <= current <= stop }}
            {% elif start > stop %}
              {{ start <= current <= '23:59:59'
                 or '00:00:00' <= current <= stop }}
            {% else %}
              false
            {% endif %}

        - name: night_time
          unique_id: night_time
          state: >
            {% set start = states('input_datetime.night_start') %}
            {% set stop = states('input_datetime.night_stop') %}
            {% set current = now().strftime('%H:%M:%S') %}
            {% if start < stop %}
              {{ start <= current <= stop }}
            {% elif start > stop %}
              {{ start <= current <= '23:59:59'
                 or '00:00:00' <= current <= stop }}
            {% else %}
              false
            {% endif %}