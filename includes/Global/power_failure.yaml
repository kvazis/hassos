power_failure:

    recorder:
      include:
        entities:
           - binary_sensor.lr_electricity
           - binary_sensor.lr2_electricity
           - binary_sensor.kn_electricity
           - binary_sensor.br_electricity
           - binary_sensor.electricity_internal

           
    homeassistant:
      customize:

        binary_sensor.lr_electricity:
          friendly_name: Сенсор живлення вітальня
          icon: mdi:home-lightning-bolt-outline
          
        binary_sensor.lr2_electricity:
          friendly_name: Сенсор живлення 2 вітальня
          icon: mdi:home-lightning-bolt-outline

        binary_sensor.kn_electricity:
          friendly_name: Сенсор живлення кухня
          icon: mdi:home-lightning-bolt-outline

        binary_sensor.br_electricity:
          friendly_name: Сенсор живлення спальня
          icon: mdi:home-lightning-bolt-outline

        binary_sensor.0xa4c138bae3526a07_contact:
          friendly_name: Сенсор визначення вимкнення вітальня
          device_class: problem
        sensor.0xa4c138bae3526a07_battery:
          friendly_name: Сенсор визначення вимкнення вітальня
          
        binary_sensor.0xa4c138135e284964_contact:
          friendly_name: Сенсор визначення вимкнення вітальня 2
          device_class: problem
        sensor.0xa4c138135e284964_battery:
          friendly_name: Сенсор визначення вимкнення вітальня 2
          
        binary_sensor.0xa4c138744bf2fbf0_contact:
          friendly_name: Сенсор визначення вимкнення кухня
          device_class: problem
        sensor.0xa4c138744bf2fbf0_battery:
          friendly_name: Сенсор визначення вимкнення кухня

        binary_sensor.0xa4c138084b9d3356:
          friendly_name: Сенсор живлення спальня
          icon: mdi:home-lightning-bolt-outline
        sensor.0xa4c138084b9d3356_battery:
          friendly_name: Сенсор живлення спальня


    template:
    
      - binary_sensor:
 
  ###################################################################
  # Сенсор визначення вимкнення вітальня
  ###################################################################

          - name: lr_electricity
            unique_id: lr_electricity
            state: >
              {% if is_state('binary_sensor.0xa4c138bae3526a07_contact', 'unavailable') or
                    is_state('binary_sensor.0xa4c138bae3526a07_contact', 'unknown') %}
                {{ states('binary_sensor.lr_electricity') }}
              {% else %}
                {{ is_state('binary_sensor.0xa4c138bae3526a07_contact', 'on') }}
              {% endif %}
            device_class: problem

  ###################################################################
  # Сенсор визначення вимкнення вітальня 2
  ###################################################################
    
          - name: lr2_electricity
            unique_id: lr2_electricity
            state: >
              {% if is_state('binary_sensor.0xa4c138135e284964_contact', 'unavailable') or
                    is_state('binary_sensor.0xa4c138135e284964_contact', 'unknown') %}
                {{ states('binary_sensor.lr2_electricity') }}
              {% else %}
                {{ is_state('binary_sensor.0xa4c138135e284964_contact', 'on') }}
              {% endif %}
            device_class: problem

  ###################################################################
  # Сенсор визначення вимкнення кухня
  ###################################################################

          - name: kn_electricity
            unique_id: kn_electricity
            state: >
              {% if is_state('binary_sensor.0xa4c138744bf2fbf0_contact', 'unavailable') or
                    is_state('binary_sensor.0xa4c138744bf2fbf0_contact', 'unknown') %}
                {{ states('binary_sensor.kn_electricity') }}
              {% else %}
                {{ is_state('binary_sensor.0xa4c138744bf2fbf0_contact', 'on') }}
              {% endif %}
            device_class: problem

  ###################################################################            
  # Сенсор визначення вимкнення спальня
  ###################################################################

          - name: br_electricity
            unique_id: br_electricity
            state: >
              {% if is_state('binary_sensor.0xa4c138084b9d3356', 'unavailable') or
                    is_state('binary_sensor.0xa4c138084b9d3356', 'unknown') %}
                {{ states('binary_sensor.br_electricity') }}
              {% else %}
                {{ is_state('binary_sensor.0xa4c138084b9d3356', 'off') }}
              {% endif %}
            device_class: problem

  ###################################################################
  # Сенсор визначення залипання вітальня
  ###################################################################

          - name: lr_electricity_reset
            unique_id: lr_electricity_reset
            state: >
             {{ is_state('binary_sensor.0xa4c138bae3526a07_contact', 'on') and
                 is_state('switch.0xa4c138cd1b6a0a9a', 'on')  }}
            delay_on: 
                minutes: 1
            device_class: problem

  ###################################################################            
  # Сенсор визначення залипання вітальня 2
  ###################################################################

          - name: lr_electricity_reset_2
            unique_id: lr_electricity_reset_2
            state: >
             {{ is_state('binary_sensor.0xa4c138135e284964_contact', 'on') and
                 is_state('switch.smart_power_strip_44eu_w_socket_3', 'on')  }}
            delay_on: 
                minutes: 1
            device_class: problem

  ###################################################################            
  # Сенсор визначення залипання кухня
  ###################################################################

          - name: kn_electricity_reset
            unique_id: kn_electricity_reset
            state: >
             {{ is_state('binary_sensor.0xa4c138744bf2fbf0_contact', 'on') and
                 is_state('switch.0xa4c138235d1e6877', 'on')  }}
            delay_on: 
                minutes: 1
            device_class: problem

  ###################################################################            
  # Сенсор визначення залипання спальня
  ###################################################################

          - name: br_electricity_reset
            unique_id: br_electricity_reset
            state: >
             {{ is_state('binary_sensor.0xa4c138084b9d3356', 'off') and
                 is_state('switch.0xa4c1382dc9fecb3e', 'on')  }}
            delay_on: 
                minutes: 1
            device_class: problem

  ###################################################################
  # Сенсори відстеження внутрішнього живлення
  ###################################################################

          - name: electricity_internal
            unique_id: electricity_internal
            state: >
                {% if is_state('binary_sensor.lr_electricity', 'on') and is_state('binary_sensor.lr2_electricity', 'on') %}
                True
                {% elif is_state('binary_sensor.lr_electricity', 'on') and is_state('binary_sensor.kn_electricity', 'on') %}
                True
                {% elif is_state('binary_sensor.lr_electricity', 'on') and is_state('binary_sensor.br_electricity', 'on') %}
                True
                {% elif is_state('binary_sensor.lr2_electricity', 'on') and is_state('binary_sensor.kn_electricity', 'on') %}
                True
                {% elif is_state('binary_sensor.lr2_electricity', 'on') and is_state('binary_sensor.br_electricity', 'on') %}
                True
                {% elif is_state('binary_sensor.kn_electricity', 'on') and is_state('binary_sensor.br_electricity', 'on') %}
                True
                {% endif %}    
            device_class: problem


  ###################################################################
  # Збереження часу вимкнення і включення
  ###################################################################

    input_datetime:
      electricity_internal_off:
        name: Внутрішнє живлення вимкнене
        has_date: true
        has_time: true
        
      electricity_internal_on:
        name: Внутрішнє живлення відновлене
        has_date: true
        has_time: true

  ###################################################################
  # Накопичення
  ###################################################################


    automation:           

  ###################################################################
  # Фіксація пропадання і появи електрики
  ###################################################################         
          
      - alias: control_electricity_internal_shotdown_log
        id: control_electricity_internal_shotdown_log
        description: Фіксація пропадання і появи внутрішнього живлення
        initial_state: true
        trigger:

    # Вимкнення електрики
        - platform: state
          entity_id: binary_sensor.electricity_internal
          from: 'off'
          to: 'on'

    # Увімкнення електрики
        - platform: state
          entity_id: binary_sensor.electricity_internal
          from: 'on'
          to: 'off'
        action:

    # Вимкнення електрики
            - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.electricity_internal
                    state: 'on'
                sequence:        
                  - service: input_datetime.set_datetime
                    target:
                      entity_id: input_datetime.electricity_internal_off
                    data:
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}" 
  
    # Увімкнення електрики
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.electricity_internal
                    state: 'off'
                sequence:        
                  - service: input_datetime.set_datetime
                    target:
                      entity_id: input_datetime.electricity_internal_on
                    data:
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}" 



  ###################################################################
  # ПЕРЕЗАВАНТАЖЕННЯ СЕНСОРІВ ЖИВЛЕННЯ
  ###################################################################

  ###################################################################
  # Перезавантаження сенсору у вітальні 1
  ###################################################################
              
      - alias: electricity_reboot_lr_sensor
        id: electricity_reboot_lr_sensor
        description: Живлення скидання сенсора у вітальні 1
        initial_state: true
        trigger:
    # Проверка раз в минуту, перезагрузка если сенсор залип
        - platform: time_pattern
          minutes: '/1'
        condition:
    # Переключатель режима работы сервера
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
    # Розетка включена а сенсор нет
        - condition: state
          entity_id: binary_sensor.lr_electricity_reset
          state: 'on'
        action:
    # Перезагрузка по питанию
        - service: switch.turn_off
          entity_id: switch.0xa4c138cd1b6a0a9a
        - delay: 00:00:05
        - service: switch.turn_on
          entity_id: switch.0xa4c138cd1b6a0a9a

  ###################################################################
  # Перезавантаження сенсору у вітальні 2
  ###################################################################
          
      - alias: electricity_reboot_lr_sensor_2
        id: electricity_reboot_lr_sensor_2
        description: Живлення скидання сенсора у вітальні 2
        initial_state: true
        trigger:
    # Проверка раз в минуту, перезагрузка если сенсор залип
        - platform: time_pattern
          minutes: '/5'
        condition:
    # Переключатель режима работы сервера
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
    # Розетка включена а сенсор нет
        - condition: state
          entity_id: binary_sensor.lr_electricity_reset_2
          state: 'on'
        action:
    # Перезагрузка по питанию
        - service: switch.turn_off
          entity_id: switch.smart_power_strip_44eu_w_socket_3
        - delay: 00:00:05
        - service: switch.turn_on
          entity_id: switch.smart_power_strip_44eu_w_socket_3

  ###################################################################
  # Перезавантаження сенсору у кухні
  ###################################################################

      - alias: electricity_reboot_kn_sensor
        id: electricity_reboot_kn_sensor
        description: Живлення скидання сенсора у кухні
        initial_state: true
        trigger:
    # Проверка раз в минуту, перезагрузка если сенсор залип
        - platform: time_pattern
          minutes: '/1'
        condition:
    # Переключатель режима работы сервера
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
    # Розетка включена а сенсор нет
        - condition: state
          entity_id: binary_sensor.kn_electricity_reset
          state: 'on'
        action:
    # Перезагрузка по питанию
        - service: switch.turn_off
          entity_id: switch.0xa4c138235d1e6877
        - delay: 00:00:05
        - service: switch.turn_on
          entity_id: switch.0xa4c138235d1e6877

  ###################################################################
  # Перезавантаження сенсору у спальні
  ###################################################################

      - alias: electricity_reboot_br_sensor
        id: electricity_reboot_br_sensor
        description: Живлення скидання сенсора у спальні
        initial_state: true
        trigger:
    # Проверка раз в минуту, перезагрузка если сенсор залип
        - platform: time_pattern
          minutes: '/1'
        condition:
    # Переключатель режима работы сервера
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
    # Розетка включена а сенсор нет
        - condition: state
          entity_id: binary_sensor.br_electricity_reset
          state: 'on'
        action:
    # Перезагрузка по питанию
        - service: switch.turn_off
          entity_id: switch.0xa4c1382dc9fecb3e
        - delay: 00:00:05
        - service: switch.turn_on
          entity_id: switch.0xa4c1382dc9fecb3e
          


