##################################################
## Актуалізовано: 2026-03-24
##################################################

sys_power_failure:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      binary_sensor.lr_electricity:
        friendly_name: Вітальня - живлення
        icon: mdi:home-lightning-bolt-outline

      binary_sensor.lr2_electricity:
        friendly_name: Вітальня 2 - живлення
        icon: mdi:home-lightning-bolt-outline

      binary_sensor.kn_electricity:
        friendly_name: Кухня - живлення
        icon: mdi:home-lightning-bolt-outline

      binary_sensor.br_electricity:
        friendly_name: Спальня - живлення
        icon: mdi:home-lightning-bolt-outline

      binary_sensor.lr_electricity_reset:
        friendly_name: Вітальня - залипання сенсора

      binary_sensor.lr_electricity_reset_2:
        friendly_name: Вітальня 2 - залипання сенсора

      binary_sensor.kn_electricity_reset:
        friendly_name: Кухня - залипання сенсора

      binary_sensor.br_electricity_reset:
        friendly_name: Спальня - залипання сенсора

      binary_sensor.electricity_internal:
        friendly_name: Будинок - внутрішнє живлення

      input_datetime.electricity_internal_off:
        friendly_name: Живлення - вимкнено

      input_datetime.electricity_internal_on:
        friendly_name: Живлення - відновлено

      automation.sys_power_internal_state_log:
        friendly_name: Живлення - лог стану

      automation.lr_power_sensor_reboot:
        friendly_name: Вітальня - перезавантаження сенсора

      automation.lr2_power_sensor_reboot:
        friendly_name: Вітальня 2 - перезавантаження сенсора

      automation.kn_power_sensor_reboot:
        friendly_name: Кухня - перезавантаження сенсора

      automation.br_power_sensor_reboot:
        friendly_name: Спальня - перезавантаження сенсора

  ##################################################
  ## RECORDER
  ##################################################

  recorder:
    include:
      entities:
        - binary_sensor.lr_electricity
        - binary_sensor.lr2_electricity
        - binary_sensor.kn_electricity
        - binary_sensor.br_electricity
        - binary_sensor.electricity_internal

  ##################################################
  ## INPUT_DATETIME
  ##################################################

  input_datetime:

    electricity_internal_off:
      name: electricity_internal_off
      has_date: true
      has_time: true

    electricity_internal_on:
      name: electricity_internal_on
      has_date: true
      has_time: true

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    - binary_sensor:

      ##################################################
      ## ВІТАЛЬНЯ
      ##################################################

        - name: lr_electricity
          unique_id: lr_electricity
          state: >
            {% if is_state('binary_sensor.0xa4c138bae3526a07_contact', 'unavailable')
               or is_state('binary_sensor.0xa4c138bae3526a07_contact', 'unknown') %}
              {{ states('binary_sensor.lr_electricity') }}
            {% else %}
              {{ is_state('binary_sensor.0xa4c138bae3526a07_contact', 'on') }}
            {% endif %}
          device_class: problem

      ##################################################
      ## ВІТАЛЬНЯ 2
      ##################################################

        - name: lr2_electricity
          unique_id: lr2_electricity
          state: >
            {% if is_state('binary_sensor.0xa4c138135e284964_contact', 'unavailable')
               or is_state('binary_sensor.0xa4c138135e284964_contact', 'unknown') %}
              {{ states('binary_sensor.lr2_electricity') }}
            {% else %}
              {{ is_state('binary_sensor.0xa4c138135e284964_contact', 'on') }}
            {% endif %}
          device_class: problem

      ##################################################
      ## КУХНЯ
      ##################################################

        - name: kn_electricity
          unique_id: kn_electricity
          state: >
            {% if is_state('binary_sensor.0xa4c138744bf2fbf0_contact', 'unavailable')
               or is_state('binary_sensor.0xa4c138744bf2fbf0_contact', 'unknown') %}
              {{ states('binary_sensor.kn_electricity') }}
            {% else %}
              {{ is_state('binary_sensor.0xa4c138744bf2fbf0_contact', 'on') }}
            {% endif %}
          device_class: problem

      ##################################################
      ## СПАЛЬНЯ
      ##################################################

        - name: br_electricity
          unique_id: br_electricity
          state: >
            {% if is_state('binary_sensor.0xa4c138084b9d3356', 'unavailable')
               or is_state('binary_sensor.0xa4c138084b9d3356', 'unknown') %}
              {{ states('binary_sensor.br_electricity') }}
            {% else %}
              {{ is_state('binary_sensor.0xa4c138084b9d3356', 'off') }}
            {% endif %}
          device_class: problem

      ##################################################
      ## ЗАЛИПАННЯ
      ##################################################

        - name: lr_electricity_reset
          unique_id: lr_electricity_reset
          state: >
            {{ is_state('binary_sensor.0xa4c138bae3526a07_contact', 'on')
               and is_state('switch.0xa4c138cd1b6a0a9a', 'on') }}
          delay_on:
            minutes: 1
          device_class: problem

        - name: lr_electricity_reset_2
          unique_id: lr_electricity_reset_2
          state: >
            {{ is_state('binary_sensor.0xa4c138135e284964_contact', 'on')
               and is_state('switch.smart_power_strip_44eu_w_socket_3', 'on') }}
          delay_on:
            minutes: 1
          device_class: problem

        - name: kn_electricity_reset
          unique_id: kn_electricity_reset
          state: >
            {{ is_state('binary_sensor.0xa4c138744bf2fbf0_contact', 'on')
               and is_state('switch.0xa4c138235d1e6877', 'on') }}
          delay_on:
            minutes: 1
          device_class: problem

        - name: br_electricity_reset
          unique_id: br_electricity_reset
          state: >
            {{ is_state('binary_sensor.0xa4c138084b9d3356', 'off')
               and is_state('switch.0xa4c1382dc9fecb3e', 'on') }}
          delay_on:
            minutes: 1
          device_class: problem

      ##################################################
      ## ВНУТРІШНЄ ЖИВЛЕННЯ
      ##################################################

        - name: electricity_internal
          unique_id: electricity_internal
          state: >
            {{ [
              states('binary_sensor.lr_electricity'),
              states('binary_sensor.lr2_electricity'),
              states('binary_sensor.kn_electricity'),
              states('binary_sensor.br_electricity')
            ] | select('eq', 'on') | list | count >= 2 }}
          device_class: problem

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## ЛОГ ЖИВЛЕННЯ
    ##################################################

    - alias: sys_power_internal_state_log
      id: sys_power_internal_state_log
      description: Фіксація стану живлення
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.electricity_internal
          from: "off"
          to: "on"

        - platform: state
          entity_id: binary_sensor.electricity_internal
          from: "on"
          to: "off"

      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: binary_sensor.electricity_internal
                  state: "on"
              sequence:
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.electricity_internal_off
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            - conditions:
                - condition: state
                  entity_id: binary_sensor.electricity_internal
                  state: "off"
              sequence:
                - action: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.electricity_internal_on
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    ##################################################
    ## ПЕРЕЗАВАНТАЖЕННЯ СЕНСОРІВ
    ##################################################

    - alias: lr_power_sensor_reboot
      id: lr_power_sensor_reboot
      description: Перезапуск сенсора
      initial_state: true

      trigger:
        - platform: time_pattern
          minutes: "/1"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: binary_sensor.lr_electricity_reset
          state: "on"

      action:
        - action: switch.turn_off
          target:
            entity_id: switch.0xa4c138cd1b6a0a9a

        - delay: "00:00:05"

        - action: switch.turn_on
          target:
            entity_id: switch.0xa4c138cd1b6a0a9a

    - alias: lr2_power_sensor_reboot
      id: lr2_power_sensor_reboot
      description: Перезапуск сенсора
      initial_state: true

      trigger:
        - platform: time_pattern
          minutes: "/5"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: binary_sensor.lr_electricity_reset_2
          state: "on"

      action:
        - action: switch.turn_off
          target:
            entity_id: switch.smart_power_strip_44eu_w_socket_3

        - delay: "00:00:05"

        - action: switch.turn_on
          target:
            entity_id: switch.smart_power_strip_44eu_w_socket_3

    - alias: kn_power_sensor_reboot
      id: kn_power_sensor_reboot
      description: Перезапуск сенсора
      initial_state: true

      trigger:
        - platform: time_pattern
          minutes: "/1"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: binary_sensor.kn_electricity_reset
          state: "on"

      action:
        - action: switch.turn_off
          target:
            entity_id: switch.0xa4c138235d1e6877

        - delay: "00:00:05"

        - action: switch.turn_on
          target:
            entity_id: switch.0xa4c138235d1e6877

    - alias: br_power_sensor_reboot
      id: br_power_sensor_reboot
      description: Перезапуск сенсора
      initial_state: true

      trigger:
        - platform: time_pattern
          minutes: "/1"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: binary_sensor.br_electricity_reset
          state: "on"

      action:
        - action: switch.turn_off
          target:
            entity_id: switch.0xa4c1382dc9fecb3e

        - delay: "00:00:05"

        - action: switch.turn_on
          target:
            entity_id: switch.0xa4c1382dc9fecb3e