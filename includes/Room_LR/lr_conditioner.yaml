lr_conditioner:

    input_button:

      lr_conditioner:
        name: Вітальня кондиціонер

    input_datetime:
      lr_conditioner_from:
        name: Час роботи з
        has_date: false
        has_time: true
        
      lr_conditioner_to:
        name: Час роботи по
        has_date: false
        has_time: true

    input_number:
      lr_conditioner_min:
        name: Температура вимкнення
        min: 20
        max: 25
        step: 1
        
      lr_conditioner_max:
        name: Температура ввімкнення
        min: 26
        max: 30
        step: 1

    mqtt:
      binary_sensor:
        - name: lr_conditioner
          unique_id: lr_conditioner
          state_topic: "states/lr_conditioner"
        
    template:
    
      - binary_sensor:

################# Час роботи кондиціонера #################     
          - name: lr_conditioner_time
            unique_id: lr_conditioner_time
            state: >
                {% set t = now().strftime('%H:%M:%S') %}
                {% set begin = states("input_datetime.lr_conditioner_from") %}
                {% set end = states("input_datetime.lr_conditioner_to") %}
                {% set midnight = now().replace(hour=0, minute=0, second=0).strftime('%H:%M:%S') %}
                {% if begin <= end %} 
                {{ (begin <= t < end) }}
                {% elif midnight == end %} 
                {{ (begin <= t > end) }}
                {% elif begin >= end %} 
                        {%  if begin <= t >= midnight %}                       
                        {{ (begin <= t > end) }}
                        {%  elif midnight <= t <= end %}                       
                        {{ (midnight <= t < end) }}
                        {%  elif end <= t <= begin %}                       
                        off
                        {% endif %}
                {% endif %}
            device_class: running


    # Автоматичне вмикання
          - name: lr_conditioning_on
            unique_id: lr_conditioning_on
            state: >
              {{ is_state('binary_sensor.lr_aeration', 'off')  
                 and is_state('binary_sensor.lr_conditioner', 'on')
                 and is_state('binary_sensor.0x00158d00054496b0_contact', 'off')
                 and is_state('binary_sensor.lr_conditioner_time', 'on')
                 and (states('sensor.0x00158d00015aebb6_temperature') | float >= (states('input_number.lr_conditioner_max') | float))
              }}
            device_class: cold
            
    # Умови длял вимикання
          - name: lr_conditioning_terms
            unique_id: lr_conditioning_terms
            state: >
              {{ is_state('binary_sensor.lr_aeration', 'on')  
                 or is_state('binary_sensor.lr_conditioner', 'off')
                 or is_state('binary_sensor.lr_conditioner_time', 'off')
                 or (states('sensor.0x00158d00015aebb6_temperature') | float <= (states('input_number.lr_conditioner_min') | float))
              }}
            device_class: cold
            
    # Автоматичне вимикання
          - name: lr_conditioning_off
            unique_id: lr_conditioning_off
            state: >
              {{ is_state('binary_sensor.lr_conditioning_terms', 'on')  
                 and is_state('binary_sensor.0x00158d00054496b0_contact', 'on')
              }}
            device_class: cold

      - switch:

          - unique_id: lr_conditioner_mode
            name: Вітальня режим кондиціонування повітря
            default_entity_id: switch.lr_conditioner_mode
            state: >
              {{ is_state('binary_sensor.lr_conditioner', 'on') }}    
            turn_on:
              - action: mqtt.publish
                data:
                  topic: states/lr_conditioner
                  payload: 'ON'
                  retain: true          
            turn_off:
              - action: mqtt.publish
                data:
                  topic: states/lr_conditioner
                  payload: 'OFF'
                  retain: true          
            icon: >
              {% if is_state('switch.lr_conditioner_mode', 'on') %}
                mdi:air-conditioner
              {% else %}
                mdi:fan-off
              {% endif %}



    automation:

      - alias: lr_conditioner_control
        id: lr_conditioner_control
        description: Вітальня, керування кондиціонером
        initial_state: true
        trigger:
    ## Віртуальна кнопка
        - platform: state
          entity_id: input_button.lr_conditioner
        - platform: state
          entity_id: binary_sensor.lr_conditioning_on
          from: 'off'
          to: 'on'
        - platform: state
          entity_id: binary_sensor.lr_conditioning_off
          from: 'off'
          to: 'on'
        condition:
    # Режим роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
    # Режим роботи
        - condition: state
          entity_id: switch.lr_conditioner_mode
          state: 'on'
    # Сенсор електрики
        - condition: state
          entity_id: binary_sensor.blackout_after
          state: 'off' 
        action:
            - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.0x00158d00054496b0_contact
                    state: 'off'
                sequence:
                  - service: remote.send_command
                    data:
                      entity_id: remote.lr_broadlin_ir
                      command:
                        - b64:JgCSAAABJpMVNhUSFRMUNxU2FTYVNxQTFRIVExUSFTYVExQTFRIVExQTFRMUExQTFRMUExUSFRMUExUSFRMUExU2FRMUNxQTFRMVNhQTFQACjhUTFBMVEhUTFDcVEhUTFBMVEhUTFBMVEhUTFDcVEhUTFBMVEhUTFRIVExQTFRIVExQTFRIVExQTFRIVNxQ3FDcVAA0FAAAAAAAA
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.0x00158d00054496b0_contact
                    state: 'on'
                sequence:
                  - service: remote.send_command
                    data:
                      entity_id: remote.lr_broadlin_ir
                      command:
                        - b64:JgCSAAABJpMUNxQTFRMUExU2FTYWNhQTFRIVExQTFTYWEhQTFRIVExUSFRIWEhQTFRIVExQTFRMUExUSFRMUExU2FhIUNxQTFhEWNhUSFQACjhUTFBMVEhUTFDcUExUTFBMVEhUTFRIVEhUTFDcVEhUTFBMVEhYSFBMVEhUTFRIVExQTFRIVExUSFRIVNhY2FBMVAA0FAAAAAAAA
