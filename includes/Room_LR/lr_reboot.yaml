##################################################
## Актуалізовано: 2026-03-25
##################################################

lr_reboot:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      binary_sensor.lr_ceiling_1_unavailable:
        friendly_name: Вітальня - люстра 1 недоступна
        icon: mdi:alert-circle

      binary_sensor.lr_ceiling_2_unavailable:
        friendly_name: Вітальня - люстра 2 недоступна
        icon: mdi:alert-circle

      binary_sensor.lr_gateway_unavailable:
        friendly_name: Вітальня - шлюз недоступний
        icon: mdi:router-wireless-off

      binary_sensor.lr_broadlink_ir_unavailable:
        friendly_name: Вітальня - IR контролер недоступний
        icon: mdi:remote-off

      binary_sensor.lr_balcony_switch_e1_unavailable:
        friendly_name: Вітальня - вимикач балкону недоступний
        icon: mdi:light-switch-off

      input_button.lr_ceiling_1_reboot:
        friendly_name: Вітальня - перезавантаження люстри 1
        icon: mdi:restart

      input_button.lr_ceiling_2_reboot:
        friendly_name: Вітальня - перезавантаження люстри 2
        icon: mdi:restart

      input_button.lr_gateway_reboot:
        friendly_name: Вітальня - перезавантаження шлюзу
        icon: mdi:restart

      input_number.lr_ceiling_1_reboot_attempts:
        friendly_name: Вітальня - спроби перезавантаження люстри 1

      input_number.lr_ceiling_2_reboot_attempts:
        friendly_name: Вітальня - спроби перезавантаження люстри 2

      input_number.lr_gateway_reboot_attempts:
        friendly_name: Вітальня - спроби перезавантаження шлюзу

      input_number.lr_broadlink_ir_reboot_attempts:
        friendly_name: Вітальня - спроби перезавантаження IR

      input_number.lr_balcony_switch_e1_reboot_attempts:
        friendly_name: Вітальня - спроби перезавантаження вимикача балкону

      automation.lr_ceiling_1_reboot:
        friendly_name: Вітальня - перезавантаження люстри 1
        icon: mdi:restart

      automation.lr_ceiling_1_reboot_attempts_reset:
        friendly_name: Вітальня - скидання спроб люстри 1
        icon: mdi:counter

      automation.lr_ceiling_2_reboot:
        friendly_name: Вітальня - перезавантаження люстри 2
        icon: mdi:restart

      automation.lr_ceiling_2_reboot_attempts_reset:
        friendly_name: Вітальня - скидання спроб люстри 2
        icon: mdi:counter

      automation.lr_gateway_reboot:
        friendly_name: Вітальня - перезавантаження шлюзу
        icon: mdi:router-wireless

      automation.lr_gateway_reboot_attempts_reset:
        friendly_name: Вітальня - скидання спроб шлюзу
        icon: mdi:counter

      automation.lr_broadlink_ir_reboot:
        friendly_name: Вітальня - перезавантаження IR контролера
        icon: mdi:remote

      automation.lr_broadlink_ir_reboot_attempts_reset:
        friendly_name: Вітальня - скидання спроб IR
        icon: mdi:counter

      automation.lr_balcony_switch_e1_reboot:
        friendly_name: Вітальня - відновлення вимикача балкону
        icon: mdi:light-switch

      automation.lr_balcony_switch_e1_reboot_attempts_reset:
        friendly_name: Вітальня - скидання спроб вимикача балкону
        icon: mdi:counter

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    - binary_sensor:

        - name: lr_ceiling_1_unavailable
          unique_id: lr_ceiling_1_unavailable
          state: >
            {{ is_state('light.yeelight_ceiling4_0x49c726b', 'unavailable') }}
          delay_on:
            minutes: 5
          device_class: problem

        - name: lr_ceiling_2_unavailable
          unique_id: lr_ceiling_2_unavailable
          state: >
            {{ is_state('light.yeelight_ceiling4_0x4a1dacd', 'unavailable') }}
          delay_on:
            minutes: 5
          device_class: problem

        - name: lr_gateway_unavailable
          unique_id: lr_gateway_unavailable
          state: >
            {{ is_state('light.gateway_light_34ce0088b039', 'unavailable') }}
          delay_on:
            minutes: 3
          device_class: problem

        - name: lr_broadlink_ir_unavailable
          unique_id: lr_broadlink_ir_unavailable
          state: >
            {{ is_state('sensor.lr_broadlin_ir_temperature', 'unavailable') }}
          delay_on:
            minutes: 2
          device_class: problem

        - name: lr_balcony_switch_e1_unavailable
          unique_id: lr_balcony_switch_e1_unavailable
          state: >
            {{ is_state('switch.0x54ef441000681a6f_right', 'unavailable') }}
          delay_on:
            minutes: 2
          device_class: problem

  ##################################################
  ## INPUT_BUTTON
  ##################################################

  input_button:

    lr_ceiling_1_reboot:
      name: lr_ceiling_1_reboot

    lr_ceiling_2_reboot:
      name: lr_ceiling_2_reboot

    lr_gateway_reboot:
      name: lr_gateway_reboot

  ##################################################
  ## INPUT_NUMBER
  ##################################################

  input_number:

    lr_ceiling_1_reboot_attempts:
      name: lr_ceiling_1_reboot_attempts
      min: 0
      max: 3
      step: 1

    lr_ceiling_2_reboot_attempts:
      name: lr_ceiling_2_reboot_attempts
      min: 0
      max: 3
      step: 1

    lr_gateway_reboot_attempts:
      name: lr_gateway_reboot_attempts
      min: 0
      max: 3
      step: 1

    lr_broadlink_ir_reboot_attempts:
      name: lr_broadlink_ir_reboot_attempts
      min: 0
      max: 3
      step: 1

    lr_balcony_switch_e1_reboot_attempts:
      name: lr_balcony_switch_e1_reboot_attempts
      min: 0
      max: 3
      step: 1

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    - alias: lr_ceiling_1_reboot
      id: lr_ceiling_1_reboot
      description: Вітальня — перезавантаження люстри 1
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: '/5'
        - platform: state
          entity_id: input_button.lr_ceiling_1_reboot
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: state
          entity_id: binary_sensor.lr_ceiling_1_unavailable
          state: 'on'
        - condition: state
          entity_id: binary_sensor.blackout_after
          state: 'off'
        - condition: template
          value_template: "{{ states('input_number.lr_ceiling_1_reboot_attempts')|int < 3 }}"
      action:
        - action: switch.turn_off
          target:
            entity_id: switch.0x54ef4410008e96fd_top
        - delay: 00:00:05
        - action: switch.turn_on
          target:
            entity_id: switch.0x54ef4410008e96fd_top
        - action: input_number.increment
          target:
            entity_id: input_number.lr_ceiling_1_reboot_attempts
        - action: telegram_bot.send_message
          data_template:
            chat_id:
              - !secret chat_id_log
            message: |
              {{"\U0001F916"}} Вітальня — перезавантаження люстри 1 (спроба {{ states('input_number.lr_ceiling_1_reboot_attempts')|int }} з 3) {{ states('sensor.time_date') }}

    - alias: lr_ceiling_1_reboot_attempts_reset
      id: lr_ceiling_1_reboot_attempts_reset
      description: Вітальня — скидання спроб перезавантажень люстри 1
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.lr_ceiling_1_unavailable
          from: "on"
          to: "off"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: template
          value_template: "{{ states('input_number.lr_ceiling_1_reboot_attempts')|int > 0 }}"
      action:
        - action: input_number.set_value
          target:
            entity_id: input_number.lr_ceiling_1_reboot_attempts
          data:
            value: 0
        - action: telegram_bot.send_message
          data_template:
            chat_id:
              - !secret chat_id_log
            message: |
              {{"\U0001F916"}} Вітальня - люстра 1 успішно відновила роботу, лічильник скинуто

    - alias: lr_ceiling_2_reboot
      id: lr_ceiling_2_reboot
      description: Вітальня — перезавантаження люстри 2
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: '/5'
        - platform: state
          entity_id: input_button.lr_ceiling_2_reboot
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: state
          entity_id: binary_sensor.lr_ceiling_2_unavailable
          state: 'on'
        - condition: state
          entity_id: binary_sensor.blackout_after
          state: 'off'
        - condition: template
          value_template: "{{ states('input_number.lr_ceiling_2_reboot_attempts')|int < 3 }}"
      action:
        - action: switch.turn_off
          target:
            entity_id: switch.0x842e14fffee5451a
        - delay: 00:00:05
        - action: switch.turn_on
          target:
            entity_id: switch.0x842e14fffee5451a
        - action: input_number.increment
          target:
            entity_id: input_number.lr_ceiling_2_reboot_attempts
        - action: telegram_bot.send_message
          data_template:
            chat_id:
              - !secret chat_id_log
            message: |
              {{"\U0001F916"}} Вітальня — перезавантаження люстри 2 (спроба {{ states('input_number.lr_ceiling_2_reboot_attempts')|int }} з 3) {{ states('sensor.time_date') }}

    - alias: lr_ceiling_2_reboot_attempts_reset
      id: lr_ceiling_2_reboot_attempts_reset
      description: Вітальня — скидання спроб перезавантажень люстри 2
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.lr_ceiling_2_unavailable
          from: "on"
          to: "off"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: template
          value_template: "{{ states('input_number.lr_ceiling_2_reboot_attempts')|int > 0 }}"
      action:
        - action: input_number.set_value
          target:
            entity_id: input_number.lr_ceiling_2_reboot_attempts
          data:
            value: 0
        - action: telegram_bot.send_message
          data_template:
            chat_id:
              - !secret chat_id_log
            message: |
              {{"\U0001F916"}} Вітальня - люстра 2 успішно відновила роботу, лічильник скинуто

    - alias: lr_gateway_reboot
      id: lr_gateway_reboot
      description: Вітальня — перезавантаження шлюза xiaomi
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: '/5'
        - platform: state
          entity_id: input_button.lr_gateway_reboot
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: state
          entity_id: binary_sensor.lr_gateway_unavailable
          state: 'on'
        - condition: state
          entity_id: binary_sensor.blackout_after
          state: 'off'
        - condition: template
          value_template: "{{ states('input_number.lr_gateway_reboot_attempts')|int < 3 }}"
      action:
        - action: switch.turn_off
          target:
            entity_id:
              - switch.0xa4c1387c6584d955
        - delay: 00:00:03
        - action: switch.turn_on
          target:
            entity_id:
              - switch.0xa4c1387c6584d955
        - action: input_number.increment
          target:
            entity_id: input_number.lr_gateway_reboot_attempts
        - action: telegram_bot.send_message
          data_template:
            chat_id:
              - !secret chat_id_log
            message: |
              {{"\U0001F916"}} Вітальня — перезавантаження шлюза xiaomi (спроба {{ states('input_number.lr_gateway_reboot_attempts')|int }} з 3) {{ states('sensor.time_date') }}
        - delay: 00:00:15
        - action: homeassistant.reload_config_entry
          target:
            entity_id: light.gateway_light_34ce0088b039
          data: {}

    - alias: lr_gateway_reboot_attempts_reset
      id: lr_gateway_reboot_attempts_reset
      description: Вітальня — скидання спроб перезавантажень шлюза xiaomi
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.lr_gateway_unavailable
          from: "on"
          to: "off"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: template
          value_template: "{{ states('input_number.lr_gateway_reboot_attempts')|int > 0 }}"
      action:
        - action: input_number.set_value
          target:
            entity_id: input_number.lr_gateway_reboot_attempts
          data:
            value: 0
        - action: telegram_bot.send_message
          data_template:
            chat_id:
              - !secret chat_id_log
            message: |
              {{"\U0001F916"}} Вітальня - шлюз xiaomi успішно відновив роботу, лічильник скинуто

    - alias: lr_broadlink_ir_reboot
      id: lr_broadlink_ir_reboot
      description: Вітальня — перезавантаження IR контролера Broadlink
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: '/5'
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: state
          entity_id: binary_sensor.lr_broadlink_ir_unavailable
          state: 'on'
        - condition: state
          entity_id: binary_sensor.blackout_after
          state: 'off'
        - condition: template
          value_template: "{{ states('input_number.lr_broadlink_ir_reboot_attempts')|int < 3 }}"
      action:
        - action: switch.turn_off
          target:
            entity_id: switch.smart_power_strip_44eu_w_socket_5
        - delay: 00:00:05
        - action: switch.turn_on
          target:
            entity_id: switch.smart_power_strip_44eu_w_socket_5
        - action: input_number.increment
          target:
            entity_id: input_number.lr_broadlink_ir_reboot_attempts
        - action: telegram_bot.send_message
          data_template:
            chat_id:
              - !secret chat_id_log
            message: |
              {{"\U0001F916"}} Вітальня — перезавантаження IR контролера Broadlink (спроба {{ states('input_number.lr_broadlink_ir_reboot_attempts')|int }} з 3) {{ states('sensor.time_date') }}

    - alias: lr_broadlink_ir_reboot_attempts_reset
      id: lr_broadlink_ir_reboot_attempts_reset
      description: Вітальня — скидання спроб перезавантажень IR контролера Broadlink
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.lr_broadlink_ir_unavailable
          from: "on"
          to: "off"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: template
          value_template: "{{ states('input_number.lr_broadlink_ir_reboot_attempts')|int > 0 }}"
      action:
        - action: input_number.set_value
          target:
            entity_id: input_number.lr_broadlink_ir_reboot_attempts
          data:
            value: 0
        - action: telegram_bot.send_message
          data_template:
            chat_id:
              - !secret chat_id_log
            message: |
              {{"\U0001F916"}} Вітальня - IR контролер Broadlink успішно відновив роботу, лічильник скинуто

    - alias: lr_balcony_switch_e1_reboot
      id: lr_balcony_switch_e1_reboot
      description: Вітальня — відновлення роботи вимикача Aqara E1 на вході балкону
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: '/15'
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: state
          entity_id: binary_sensor.lr_balcony_switch_e1_unavailable
          state: 'on'
        - condition: state
          entity_id: binary_sensor.blackout_after
          state: 'off'
        - condition: template
          value_template: "{{ states('input_number.lr_balcony_switch_e1_reboot_attempts')|int < 3 }}"
      action:
        - action: input_number.increment
          target:
            entity_id: input_number.lr_balcony_switch_e1_reboot_attempts
        - action: telegram_bot.send_message
          data_template:
            chat_id:
              - !secret chat_id_log
            message: |
              {{"\U0001F916"}} Вітальня — відновлення роботи вимикача люстри балкону (спроба {{ states('input_number.lr_balcony_switch_e1_reboot_attempts')|int }} з 3) {{ states('sensor.time_date') }}
        - delay: 00:00:05
        - action: light.turn_on
          target:
            entity_id: light.0xa4c13812b94c8365
          data_template:
            brightness_pct: 100
            kelvin: 4000
        - delay: 00:00:10
        - action: light.turn_off
          target:
            entity_id: light.0xa4c13812b94c8365

    - alias: lr_balcony_switch_e1_reboot_attempts_reset
      id: lr_balcony_switch_e1_reboot_attempts_reset
      description: Вітальня — скидання спроб відновлення роботи вимикача Aqara E1 на вході балкону
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.lr_balcony_switch_e1_unavailable
          from: "on"
          to: "off"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: template
          value_template: "{{ states('input_number.lr_balcony_switch_e1_reboot_attempts')|int > 0 }}"
      action:
        - action: input_number.set_value
          target:
            entity_id: input_number.lr_balcony_switch_e1_reboot_attempts
          data:
            value: 0
        - action: telegram_bot.send_message
          data_template:
            chat_id:
              - !secret chat_id_log
            message: |
              {{"\U0001F916"}} Вітальня - вимикач люстри балкону успішно відновив роботу, лічильник скинуто
