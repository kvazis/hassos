##################################################
## Актуалізовано: 2026-03-23
##################################################

lr_reminder:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      automation.lr_light_wled_calendar_reminder:
        friendly_name: Вітальня WLED - нагадування календаря
        icon: mdi:calendar-check

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## НАГАДУВАННЯ КАЛЕНДАРЯ
    ##################################################

    - alias: lr_light_wled_calendar_reminder
      id: lr_light_wled_calendar_reminder
      description: Нагадування календаря через WLED у вітальні
      initial_state: true
      trigger:
        - platform: time
          at: "21:00:00"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
      action:
        - action: light.turn_on
          target:
            entity_id: light.gld_wled
          data:
            effect: Saw
            brightness_pct: 50

        - action: select.select_option
          target:
            entity_id: select.gld_wled_color_palette
          data:
            option: Hult

        - action: number.set_value
          target:
            entity_id: number.gld_wled_speed
          data:
            value: 114

        - action: number.set_value
          target:
            entity_id: number.gld_wled_intensity
          data:
            value: 76

        - delay: "00:00:15"

        - action: light.turn_off
          target:
            entity_id: light.gld_wled