##################################################
## Актуалізовано: 2026-03-25
##################################################

lr_tvlight:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:
      input_button.lr_light_cinema:
        friendly_name: Вітальня ТБ - підсвітка
        icon: mdi:television-ambient-light

      switch.lr_light_cinema_mode:
        friendly_name: Вітальня ТБ - режим підсвітки
        icon: mdi:led-strip-variant

      binary_sensor.lr_light_tv_cinema:
        friendly_name: Вітальня ТБ - тригер підсвітки
        icon: mdi:motion-sensor

      automation.lr_light_tv_cinema:
        friendly_name: Вітальня ТБ - підсвітка
        icon: mdi:television-ambient-light

  ##################################################
  ## INPUT_BUTTON
  ##################################################

  input_button:
    lr_light_cinema:
      name: lr_light_cinema

  ##################################################
  ## MQTT
  ##################################################

  mqtt:
    switch:
      - name: lr_light_cinema_mode
        unique_id: lr_light_cinema_mode
        state_topic: "states/lr_light_cinema_mode"
        command_topic: "states/lr_light_cinema_mode"
        payload_on: "ON"
        payload_off: "OFF"
        state_on: "ON"
        state_off: "OFF"
        retain: true

  ##################################################
  ## TEMPLATE
  ##################################################

  template:
    - trigger:
        ##################################################
        ## SONOFF BUTTON
        ##################################################
        - platform: state
          entity_id: sensor.0x84ba20fffed2331e_action
          to: "double"

        ##################################################
        ## 6 КНОПКА AQARA OPPLE
        ##################################################
        - platform: state
          entity_id: sensor.0x04cf8cdf3c79360a_action
          to: "button_6_single"

        ##################################################
        ## ВІРТУАЛЬНА КНОПКА
        ##################################################
        - platform: state
          entity_id: input_button.lr_light_cinema

        ##################################################
        ## AQARA OPPLE НА СТОЛІ
        ##################################################
        - platform: state
          entity_id: sensor.0x54ef4410004c1707_action
          to: "button_6_single"

      binary_sensor:
        - name: lr_light_tv_cinema
          unique_id: lr_light_tv_cinema
          auto_off: 3
          state: "true"

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:
    - alias: lr_light_tv_cinema
      id: lr_light_tv_cinema
      description: Вітальня, підсвітка для ТБ
      initial_state: true
      trigger:
        ##################################################
        ## СПРАЦЮВАННЯ СЕНСОРА
        ##################################################
        - platform: state
          entity_id: binary_sensor.lr_light_tv_cinema
          to: "on"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - action: switch.toggle
          target:
            entity_id:
              - switch.lr_light_cinema_mode

        - delay: 00:00:01

        - choose:
            - conditions:
                - condition: state
                  entity_id: switch.lr_light_cinema_mode
                  state: "on"
              sequence:
                - action: light.turn_off
                  target:
                    entity_id:
                      - light.smart_desk_lamp
                      - light.yeelight_ceiling4_0x49c726b
                      - light.yeelight_ceiling4_0x4a1dacd
                      - light.0x54ef4410008e96fd_bottom
                      - light.lr_bedside_lamp

                - action: light.turn_on
                  target:
                    entity_id:
                      - light.yeelight_ceiling4_0x49c726b_ambilight
                      - light.yeelight_ceiling4_0x4a1dacd_ambilight
                      - light.0xa4c13826d6a56255
                  data:
                    brightness_pct: 100
                    rgb_color: [169, 153, 255]

            - conditions:
                - condition: state
                  entity_id: switch.lr_light_cinema_mode
                  state: "off"
              sequence:
                - action: light.turn_off
                  target:
                    entity_id:
                      - light.yeelight_ceiling4_0x49c726b_ambilight
                      - light.yeelight_ceiling4_0x4a1dacd_ambilight
                      - light.0xa4c13826d6a56255
