##################################################
## Актуалізовано: 2026-03-25
##################################################

lr_air_quality:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      sensor.lr_air_co2:
        friendly_name: Вітальня - CO2
        unit_of_measurement: 'ppm'
        icon: mdi:molecule-co2
        device_class: carbon_dioxide

      binary_sensor.lr_poor_air:
        friendly_name: Вітальня - погана якість повітря
        icon: mdi:air-filter-alert

      automation.lr_air_notification:
        friendly_name: Вітальня - сповіщення про якість повітря
        icon: mdi:message-alert

  ##################################################
  ## RECORDER
  ##################################################

  recorder:
    include:
      entities:
        - sensor.lr_air_co2

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    - binary_sensor:
        - name: lr_poor_air
          unique_id: lr_poor_air
          state: >
            {{ states('sensor.lr_air_co2')|float(0) > 1500
               and is_state('binary_sensor.notification_time', 'on')
               and is_state('binary_sensor.lr_aeration', 'off') }}
          availability: "{{ (states('sensor.lr_air_co2')|float(0) > 250) }}"
          icon: >
            {% if is_state("binary_sensor.lr_poor_air", "on") %}
            mdi:biohazard
            {% else %}
            mdi:air-filter
            {% endif %}

    - sensor:
        - name: lr_air_co2
          unique_id: lr_air_co2
          state: "{{ states('sensor.cgllc_s1_cc00_co2_density')|float(500) }}"

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    - alias: lr_air_notification
      id: lr_air_notification
      description: Вітальня - сповіщення про низьку якість повітря
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: '/30'
      condition:
        - condition: state
          entity_id: binary_sensor.lr_poor_air
          state: 'on'
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
      action:
        - action: telegram_bot.send_message
          data_template:
            chat_id:
              - !secret chat_id_group
            message: |
              {{"\U0001F637"}} Гостиная {{ states('sensor.time_date') }} - хорошо бы проветрить
        - action: light.turn_on
          target:
            entity_id:
              - light.gateway_light_34ce0088b039
          data_template:
            brightness_pct: 20
            rgb_color: [0, 0, 255]
        - action: xiaomi_aqara.play_ringtone
          data:
            gw_mac: 34:CE:00:88:B0:39
            ringtone_id: 10010
            ringtone_vol: 50
        - delay: 00:00:04
        - action: light.turn_off
          target:
            entity_id:
              - light.gateway_light_34ce0088b039