lr_robot:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      vacuum.zhimi_xa1_4790_robot_cleaner:
        friendly_name: Вітальня - робот-пилосос
        icon: mdi:robot-vacuum

      sensor.zhimi_xa1_4790_battery_level:
        friendly_name: Вітальня - робот-пилосос батарея
        icon: mdi:battery

  ##################################################
  ## RECORDER
  ##################################################

  recorder:
    include:
      entities:
        - sensor.zhimi_xa1_4790_battery_level