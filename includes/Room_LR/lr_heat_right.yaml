lr_heat_2:
## Гостиная термоголовка 2

    recorder:
      include:
        entities:
           - climate.0x2c1165fffeb3e567

    homeassistant:
      customize:
        
        climate.0x2c1165fffeb3e567:
          friendly_name: Гостиная 2, TRV
        switch.0x2c1165fffeb3e567_heating_stop:
          friendly_name: Гостиная 2, TRV стоп нагрев
        number.0x2c1165fffeb3e567_local_temperature_calibration:
          friendly_name: Гостиная 2, TRV t калибровка
          unit_of_measurement: '°C'
        number.0x2c1165fffeb3e567_comfort_temperature:
          friendly_name: Гостиная 2, TRV t комфорт
          unit_of_measurement: '°C'
        number.0x2c1165fffeb3e567_open_window_temperature:
          friendly_name: Гостиная 2, TRV t окно
          unit_of_measurement: '°C'
        number.0x2c1165fffeb3e567_holiday_temperature:
          friendly_name: Гостиная 2, TRV t выходные
          unit_of_measurement: '°C'
        number.0x2c1165fffeb3e567_eco_temperature:
          friendly_name: Гостиная 2, TRV t эко
        binary_sensor.0x2c1165fffeb3e567_battery_low:
          friendly_name: Гостиная 2, TRV питание
        lr_thermostat_local_temperature_calibration_2:
          friendly_name: Гостиная 2 необходимость калибровки
          device_class: update

    template:

      - binary_sensor:
      
          - name: lr_thermostat_local_temperature_calibration_2
            unique_id: lr_thermostat_local_temperature_calibration_2
            state: >
                    {{((states('sensor.0x00158d00015aebb6_temperature') | float - state_attr('climate.0x2c1165fffeb3e567', 'current_temperature') | float))|round(1) > 1 
                     or ((states('sensor.0x00158d00015aebb6_temperature') | float - state_attr('climate.0x2c1165fffeb3e567', 'current_temperature') | float))|round(1) < -1}}

    script:
    
        lr_temperature_calibration_2:
          alias: Гостиная 2, TRV, калибровка
          sequence:
          - action: number.set_value
            data:
              value: "0.0"
            target:
              entity_id: number.0x2c1165fffeb3e567_local_temperature_calibration 
          - delay: 00:00:10
          - action: number.set_value
            data:
              value: "{{((states('sensor.0x00158d00015aebb6_temperature') | float - state_attr('climate.0x2c1165fffeb3e567', 'current_temperature') | float))|round(1) }}"
            target:
              entity_id: number.0x2c1165fffeb3e567_local_temperature_calibration    


    automation:

      - alias: lr_heat_temperature_calibration_2
        id: lr_heat_temperature_calibration_2
        description: Гостиная TRV правый - калибровка температуры 
        initial_state: true
        trigger:
          - platform: time_pattern
            minutes: "/15"
        condition:
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
          - condition: state
            entity_id: binary_sensor.lr_radiator
            state: 'on'
          - condition: state
            entity_id: binary_sensor.lr_thermostat_local_temperature_calibration_2
            state: 'on'
        action:
         - service: script.turn_on
           entity_id: script.lr_temperature_calibration_2
        

      - alias: lr_heat_mode_toggle_2
        id: lr_heat_mode_toggle_2
        description: Гостиная TRV правый - переключение режима работы
        initial_state: true
        trigger:
        - platform: homeassistant
          event: start
        - platform: state
          entity_id:
            - binary_sensor.lr_radiator
        condition:
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
        action:
            - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.lr_radiator
                    state: 'on'
                  - condition: template
                    value_template: "{{ states('climate.0x2c1165fffeb3e567') != 'heat' or state_attr('climate.0x2c1165fffeb3e567', 'preset_mode') != 'manual'}}"
                sequence:
                  - service: climate.set_hvac_mode
                    target:
                      entity_id: climate.0x2c1165fffeb3e567
                    data:
                      hvac_mode: heat
                  - service: climate.set_preset_mode
                    data:
                      preset_mode: manual
                    target:
                      entity_id: climate.0x2c1165fffeb3e567
                  - service: climate.set_temperature
                    data:
                      entity_id: climate.0x2c1165fffeb3e567
                      temperature: "{{ states('number.0x2c1165fffeb3e567_comfort_temperature')}}"
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.lr_radiator
                    state: 'off'
                  - condition: template
                    value_template: "{{ states('climate.0x2c1165fffeb3e567') != 'off' }}"
                sequence:
                  - service: climate.set_hvac_mode
                    target:
                      entity_id: climate.0x2c1165fffeb3e567
                    data:
                      hvac_mode: 'off'

      - alias: lr_heat_temperature_set_2
        id: lr_heat_temperature_set_2
        description: Гостиная TRV правый - проветривание и ночной режим
        initial_state: true
        trigger:
        - platform: state
          entity_id:
            - binary_sensor.lr_aeration
        - platform: state
          entity_id:
            - binary_sensor.night_time
        condition:
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
          - condition: state
            entity_id: binary_sensor.lr_radiator
            state: 'on' 
        action:
            - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.lr_aeration
                    state: 'on'
                  - condition: state
                    entity_id: binary_sensor.night_time
                    state: 'on'
                sequence:
                  - service: climate.set_temperature
                    data:
                      entity_id: climate.0x2c1165fffeb3e567
                      temperature: "{{ states('number.0x2c1165fffeb3e567_open_window_temperature')}}"

              - conditions:
                  - condition: state
                    entity_id: binary_sensor.lr_aeration
                    state: 'off'
                  - condition: state
                    entity_id: binary_sensor.night_time
                    state: 'off'
                #   - condition: numeric_state
                #     entity_id: sensor.0x00158d00015aebb6_temperature
                #     below: 19
                sequence:
                  - service: climate.set_temperature
                    data:
                      entity_id: climate.0x2c1165fffeb3e567
                      temperature: "{{ states('number.0x2c1165fffeb3e567_comfort_temperature')}}"
                #   - service: number.set_value
                #     data:
                #       value: "180"
                #     target:
                #       entity_id: number.0x2c1165fffeb3e567_boost_timeset_countdown

              - conditions:
                  - condition: state
                    entity_id: binary_sensor.lr_aeration
                    state: 'on'
                  - condition: state
                    entity_id: binary_sensor.night_time
                    state: 'off'
                sequence:
                  - service: climate.set_temperature
                    data:
                      entity_id: climate.0x2c1165fffeb3e567
                      temperature: "{{ states('number.0x2c1165fffeb3e567_open_window_temperature')}}"

              - conditions:
                  - condition: state
                    entity_id: binary_sensor.lr_aeration
                    state: 'off'
                  - condition: state
                    entity_id: binary_sensor.night_time
                    state: 'on'
                sequence:
                  - service: climate.set_temperature
                    data:
                      entity_id: climate.0x2c1165fffeb3e567
                      temperature: "{{ states('number.0x2c1165fffeb3e567_eco_temperature')}}"


                