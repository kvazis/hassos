lr_light:

    input_boolean:
    
      lr_night_light:
        name: Нічне підсвічування
        icon: mdi:toggle-switch-outline

    # Перемикач для визначення, що світло ввімкнено вручну
      lr_ceiling_1:
        name: Вітальня ручне ввімкнення люстри 1
        icon: mdi:lightbulb-off-outline

      lr_ceiling_2:
        name: Вітальня ручне ввімкнення люстри 2
        icon: mdi:lightbulb-off-outline
          
    template:

      - binary_sensor:

     # Сенсор для для ввімкнення автоматичного підсвічування
          - name: lr_mode_auto_light_day_on
            unique_id: lr_mode_auto_light_day_on
            state: >
              {{ is_state('light.smart_desk_lamp', 'off') and
                 is_state('light.yeelight_ceiling4_0x49c726b', 'off') and                 
                 is_state('light.yeelight_ceiling4_0x49c726b_ambilight', 'off') and
                 is_state('light.yeelight_ceiling4_0x4a1dacd', 'off') and
                 is_state('light.yeelight_ceiling4_0x4a1dacd_ambilight', 'off') and
                 is_state('light.0x54ef4410008e96fd_bottom', 'off') and
                 is_state('light.0xa4c13826d6a56255', 'off') and
                 is_state('light.lr_bedside_lamp', 'off') and
                 is_state('light.0xa4c138da30166b8f', 'off') and
                 is_state('binary_sensor.lr_tv_work', 'off') and
                 states('sensor.0x04cf8cdf3c7cf19e_illuminance')|int < 30 }}

     # Усі світильники без ambilight
          - name: lr_lights_no_ambi
            unique_id: lr_lights_no_ambi
            state: >
              {{ is_state('light.smart_desk_lamp', 'off') and
                 is_state('light.yeelight_ceiling4_0x49c726b', 'off') and
                 is_state('light.yeelight_ceiling4_0x4a1dacd', 'off') and
                 is_state('light.0x54ef4410008e96fd_bottom', 'off') and
                 is_state('light.0xa4c13826d6a56255', 'off') and
                 is_state('light.lr_bedside_lamp', 'off') and
                 is_state('binary_sensor.lr_light_tv_cinema', 'off') }}

    # Рух без світла на балконі
          - name: lr_balcony_moving_in_dark
            unique_id: lr_balcony_moving_in_dark
            state: >
              {{ is_state('binary_sensor.0x00158d000449b773_occupancy', 'on')
                 and states('sensor.0x00158d000449b773_illuminance')|float < 100 
              }}

    # Світло без руху
          - name: lr_balcony_light_no_move
            unique_id: lr_balcony_light_no_move
            state: >
              {{ is_state('light.0xa4c13812b94c8365', 'on')  
                 and is_state('binary_sensor.0x00158d000449b773_occupancy', 'off')
              }}
            delay_on: 00:02:00
            device_class: light


    automation:

#################### ОСНОВНЕ ОСВІТЛЕННЯ ####################          

      - alias: lr_ceiling_1_manual_control
        id: lr_ceiling_1_manual_control
        description: Вітальня — ручне керування люстрою 1
        initial_state: true
        trigger:
    ## Aqara Opple на столі
          - platform: state
            entity_id: sensor.0x54ef4410004c1707_action
            to: 'button_1_double'
    # Вимикач на стіні всередині при вході
          - platform: state
            entity_id: sensor.0x54ef4410008e96fd_action
            to: 'single_top'
    ## Кнопка Sonoff
          - platform: state
            entity_id: sensor.0x84ba20fffed2331e_action
            to: "long"
    # Вимикач на стіні ззовні при вході
          - platform: state
            entity_id: sensor.0x00158d00013fc3bc_action
            to: 'single_left'          
    ## 3 кнопка Aqara Opple
          - platform: state
            entity_id: sensor.0x04cf8cdf3c79360a_action
            to: 'button_3_single'
        condition:
    # Режим роботи серверу
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
        action:
            - choose:
              - conditions:
                  - condition: state
                    entity_id: light.yeelight_ceiling4_0x49c726b
                    state: 'off'
                sequence:
                  - action: input_boolean.turn_on
                    data: {}
                    target:
                      entity_id: input_boolean.lr_ceiling_1
                  - action: light.turn_on
                    data:
                      transition: 1
                      color_temp_kelvin: 4000
                      brightness_pct: 60
                    target:
                      entity_id: light.yeelight_ceiling4_0x49c726b

              - conditions:
                  - condition: state
                    entity_id: light.yeelight_ceiling4_0x49c726b
                    state: 'on'
                sequence:
                  - action: light.turn_off
                    data: {}
                    target:
                      entity_id: light.yeelight_ceiling4_0x49c726b
                      
    # Контроль того, що люстра ввімкнута вручну             
      - alias: lr_ceiling_1_turn_control
        id: lr_ceiling_1_turn_control
        description:  Вітальня - контроль вмикання люстри 1
        initial_state: true
        trigger:
          - platform: state
            entity_id: light.yeelight_ceiling4_0x49c726b
            to: 'on'
        condition:
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
          - condition: state
            entity_id: input_boolean.lr_ceiling_1
            state: 'off'
        action:
          - action: light.turn_off
            data: {}
            target:
              entity_id: light.yeelight_ceiling4_0x49c726b                

    # Контроль вимикання блокування      
      - alias: lr_ceiling_1_block_control
        id: lr_ceiling_1_block_control
        description:  Вітальня - контроль блокування вмикання люстри 1
        initial_state: true
        trigger:
          - platform: state
            entity_id: light.yeelight_ceiling4_0x49c726b
            to: 'off'
        condition:
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
          - condition: state
            entity_id: input_boolean.lr_ceiling_1
            state: 'on'
        action:
          - action: input_boolean.turn_off
            data: {}
            target:
              entity_id: input_boolean.lr_ceiling_1

                      
                      
      - alias: lr_ceiling_2_manual_control
        id: lr_ceiling_2_manual_control
        description: Вітальня — ручне керування люстрою 2
        initial_state: true
        trigger:
    ## Aqara Opple на столі
          - platform: state
            entity_id: sensor.0x54ef4410004c1707_action
            to: 'button_2_double'
    ## 4 кнопка Aqara Opple
          - platform: state
            entity_id: sensor.0x04cf8cdf3c79360a_action
            to: 'button_4_single'
        condition:
    # Режим роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        action:
            - choose:
              - conditions:
                  - condition: state
                    entity_id: light.yeelight_ceiling4_0x4a1dacd
                    state: 'off'
                sequence:
                  - action: input_boolean.turn_on
                    data: {}
                    target:
                      entity_id: input_boolean.lr_ceiling_2
                  - action: light.turn_on
                    data:
                      transition: 1
                      color_temp_kelvin: 4000
                      brightness_pct: 60
                    target:
                      entity_id: light.yeelight_ceiling4_0x4a1dacd
              - conditions:
                  - condition: state
                    entity_id: light.yeelight_ceiling4_0x4a1dacd
                    state: 'on'
                sequence:
                  - action: light.turn_off
                    data: {}
                    target:
                      entity_id: light.yeelight_ceiling4_0x4a1dacd

    # Контроль того, що люстра ввімкнута вручну             
      - alias: lr_ceiling_2_turn_control
        id: lr_ceiling_2_turn_control
        description:  Вітальня - контроль вмикання люстри 2
        initial_state: true
        trigger:
          - platform: state
            entity_id: light.yeelight_ceiling4_0x4a1dacd
            to: 'on'
        condition:
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
          - condition: state
            entity_id: input_boolean.lr_ceiling_2
            state: 'off'
        action:
          - action: light.turn_off
            data: {}
            target:
              entity_id: light.yeelight_ceiling4_0x4a1dacd               

    # Контроль вимикання блокування      
      - alias: lr_ceiling_2_block_control
        id: lr_ceiling_2_block_control
        description:  Вітальня - контроль блокування вмикання люстри 2
        initial_state: true
        trigger:
          - platform: state
            entity_id: light.yeelight_ceiling4_0x4a1dacd
            to: 'off'
        condition:
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
          - condition: state
            entity_id: input_boolean.lr_ceiling_2
            state: 'on'
        action:
          - action: input_boolean.turn_off
            data: {}
            target:
              entity_id: input_boolean.lr_ceiling_2


      - alias: lr_ceiling_max_light
        id: lr_ceiling_max_light
        description: Вітальня — максимальне освітлення
        initial_state: true
        trigger:
    ## Aqara Opple на столі
          - platform: state
            entity_id: sensor.0x54ef4410004c1707_action
            to: 'button_1_triple'
        condition:
    # Режим роботи серверу
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
        action:
            - choose:
              - conditions:
                  - condition: state
                    entity_id: light.yeelight_ceiling4_0x49c726b
                    state: 'off'
                  - condition: state
                    entity_id: light.yeelight_ceiling4_0x4a1dacd
                    state: 'off'
                sequence:
                  - action: input_boolean.turn_on
                    data: {}
                    target:
                      entity_id:
                        - input_boolean.lr_ceiling_1
                        - input_boolean.lr_ceiling_2
                  - action: light.turn_on
                    data:
                      transition: 1
                      color_temp_kelvin: 5000
                      brightness_pct: 100
                    target:
                      entity_id:
                        - light.yeelight_ceiling4_0x49c726b
                        - light.yeelight_ceiling4_0x4a1dacd
              - conditions:
                  - condition: state
                    entity_id: light.yeelight_ceiling4_0x49c726b
                    state: 'on'
                  - condition: state
                    entity_id: light.yeelight_ceiling4_0x4a1dacd
                    state: 'on'
                sequence:
                  - action: light.turn_off
                    data: {}
                    target:
                      entity_id:
                        - light.yeelight_ceiling4_0x49c726b
                        - light.yeelight_ceiling4_0x4a1dacd


      - alias: lr_light_wall_toggle
        id: lr_light_wall_toggle
        description: Вітальня — ручне керування світильником на стіні
        initial_state: true
        trigger:
    ## Aqara Opple на столі
          - platform: state
            entity_id: sensor.0x54ef4410004c1707_action
            to: 'button_2_single'
    # Вимикач на стіні ззовні при вході
          - platform: state
            entity_id: sensor.0x00158d00013fc3bc_action
            to: 'single_right' 
    ## Кнопка Sonoff
          - platform: state
            entity_id: sensor.0x84ba20fffed2331e_action
            to: "single"
    ## 2 кнопка Aqara Opple
          - platform: state
            entity_id: sensor.0x04cf8cdf3c79360a_action
            to: 'button_2_single' 
        condition:
    # Режим роботи серверу
          - condition: state
            entity_id: switch.control_mode
            state: 'on'
        action:
          - action: light.toggle
            data: {}
            target:
              entity_id: light.0x54ef4410008e96fd_bottom


      - alias: lr_light_blackout_manual_control
        id: lr_light_blackout_manual_control
        description: Вітальня — ручне керування автономним світлом
        initial_state: false
        trigger:
    ## Aqara Opple на столі
        - platform: state
          entity_id: sensor.0x54ef4410004c1707_action
          to: 'button_2_single'
    # Вимикач на стіні ззовні при вході
        - platform: state
          entity_id: sensor.0x00158d00013fc3bc_action
          to: 'single_right' 
    ## Кнопка Sonoff
        - platform: state
          entity_id: sensor.0x84ba20fffed2331e_action
          to: "single"
    ## 2 кнопка Aqara Opple
        - platform: state
          entity_id: sensor.0x04cf8cdf3c79360a_action
          to: 'button_2_single' 
        condition:
    # Режим роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
    # Нема електрики
        - condition: state
          entity_id: binary_sensor.electricity
          state: 'on'
        action:
            - choose:
              - conditions:
                  - condition: state
                    entity_id: light.0xa4c138da30166b8f
                    state: 'off'
                sequence:
                  - service: light.turn_on
                    entity_id:
                      - light.0xa4c138da30166b8f
                    data_template:
                      brightness_pct: 60
              - conditions:
                  - condition: state
                    entity_id: light.0xa4c138da30166b8f
                    state: 'on'
                sequence:
                  - service: light.turn_off
                    entity_id:
                      - light.0xa4c138da30166b8f

      - alias: lr_light_switching
        id: lr_light_switching
        description: Вітальня — перемикання основного та аварійного освітлення
        initial_state: false
        trigger:
    # Вимкнення електрики
        - platform: state
          entity_id: binary_sensor.electricity
          from: 'off'
          to: 'on'
    # Увімкнення електрики
        - platform: state
          entity_id: binary_sensor.electricity
          from: 'on'
          to: 'off'
        condition:
    # Режим роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        action:
            - choose:
    # Вимкнули електрику, при увімненому світильнку на стіні
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.electricity
                    state: 'on'
                  - condition: state
                    entity_id: light.0x54ef4410008e96fd_bottom
                    state: 'on' 
                sequence:
                  - service: light.turn_off
                    entity_id: light.0x54ef4410008e96fd_bottom
                  - service: light.turn_on
                    entity_id:
                      - light.0xa4c138da30166b8f
                    data_template:
                      brightness_pct: 60
    # З'явилиась електрика при увікненому аварійному освітленні
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.electricity
                    state: 'off'
                  - condition: state
                    entity_id: light.0xa4c138da30166b8f
                    state: 'on' 
                sequence:
                  - service: light.turn_off
                    entity_id: light.0xa4c138da30166b8f
                  - service: light.turn_on
                    entity_id: light.0x54ef4410008e96fd_bottom

      - alias: lr_light_table_lamp_toggle
        id: lr_light_table_lamp_toggle
        description: Вітальня — ручне керування настільною лампою
        initial_state: true
        trigger:
    ## 1 кнопка Aqara Opple
        - platform: state
          entity_id: sensor.0x04cf8cdf3c79360a_action
          to: 'button_1_single' 
    ## Aqara Opple на столі
        - platform: state
          entity_id: sensor.0x54ef4410004c1707_action
          to: 'button_1_single'
        condition:
    # Режим роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        action:
            - choose:
              - conditions:
                  - condition: state
                    entity_id: light.smart_desk_lamp
                    state: 'off'
                sequence:
                  - service: light.turn_on
                    entity_id:
                      - light.smart_desk_lamp
                    data_template:
                      brightness_pct: 100
                      color_temp_kelvin: 4000
              - conditions:
                  - condition: state
                    entity_id: light.smart_desk_lamp
                    state: 'on'
                sequence:
                  - service: light.turn_off
                    entity_id:
                      - light.smart_desk_lamp

#################### АВТОМАТИЧНЕ ОСВІТЛЕННЯ ####################
    
      - alias: lr_ceiling_auto_light_on
        id: lr_ceiling_auto_light_on
        description: Вітальня — автоматичне вмикання освітлення
        initial_state: true
        trigger:
    # Спрацювання датчика руху
        - platform: state
          entity_id: binary_sensor.0x00158d0005414857_occupancy
          from: 'off'
          to: 'on'
        condition:
    # Перемикач нічного освітлення
        - condition: state
          entity_id: input_boolean.lr_night_light
          state: 'on'
    # Режим роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
    # Денний режим
        - condition: state
          entity_id: binary_sensor.lr_mode_auto_light_day_on
          state: 'on' 
        action:
        - service: light.turn_on
          entity_id:
            - light.yeelight_ceiling4_0x49c726b_ambilight
            - light.yeelight_ceiling4_0x4a1dacd_ambilight
          data_template:
            brightness_pct: 75
            color_temp_kelvin: 4000

      - alias: lr_ceiling_auto_light_off
        id: lr_ceiling_auto_light_off
        description: Вітальня — автоматичне вимикання освітлення
        initial_state: true
        trigger:
    # Вимкнення датчика руху
        - platform: state
          entity_id: binary_sensor.0x00158d0005414857_occupancy
          from: 'on'
          to: 'off'
    # Увімкнення будь-якого зі світильників, окрім ambilight
        - platform: state
          entity_id: binary_sensor.lr_lights_no_ambi
          from: 'on'
          to: 'off'
        condition:
    # Перемикач нічного освітлення
        - condition: state
          entity_id: input_boolean.lr_night_light
          state: 'on'
    # Режим роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
    # Телевізор
        - condition: state
          entity_id: binary_sensor.lr_tv_work
          state: 'off'
    # Стрічка за телевізором
        - condition: state
          entity_id: light.0xa4c13826d6a56255
          state: 'off'          
        action:
        - service: light.turn_off
          entity_id:
            - light.yeelight_ceiling4_0x49c726b_ambilight
            - light.yeelight_ceiling4_0x4a1dacd_ambilight


#################### ДОПОМІЖНЕ ОСВІТЛЕННЯ ####################

      - alias: lr_light_philips_on_off
        id: lr_light_philips_on_off
        description: Вітальня — керування прикроватним світильником
        initial_state: true
        trigger:
    ## 5 кнопка Aqara Opple
        - platform: state
          entity_id: sensor.0x04cf8cdf3c79360a_action
          to: 'button_5_double'
    ## Aqara Opple на столі
        - platform: state
          entity_id: sensor.0x54ef4410004c1707_action
          to: 'button_2_triple'
        condition:
    # Режим роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        action:
            - choose:
              - conditions:
                  - condition: state
                    entity_id: light.lr_bedside_lamp
                    state: 'off'
                sequence:
                  - service: light.turn_off
                    entity_id:
                      - light.smart_desk_lamp
                      - light.yeelight_ceiling4_0x49c726b
                      - light.yeelight_ceiling4_0x4a1dacd
                      - light.0x54ef4410008e96fd_bottom
                  - service: light.turn_on
                    entity_id:
                      - light.lr_bedside_lamp
                    data_template:
                      brightness_pct: 100
                      color_temp_kelvin: 4000
              - conditions:
                  - condition: state
                    entity_id: light.lr_bedside_lamp
                    state: 'on'
                sequence:
                  - service: light.turn_on
                    entity_id:
                      - light.lr_bedside_lamp
                    data_template:
                      brightness_pct: 50
                      color_temp_kelvin: 3000            
                  - delay: 00:00:15
                  - service: light.turn_off
                    entity_id:
                      - light.lr_bedside_lamp
                      
      - alias: lr_light_philips_temp_on_and_off
        id: lr_light_philips_temp_on_and_off
        description: Вітальня — вимкнення всього освітлення з тимчасовим підсвічуванням
        initial_state: true
        trigger:
    ## Aqara Opple на столі
        - platform: state
          entity_id: sensor.0x54ef4410004c1707_action
          to: 'button_6_triple'
        condition:
    # Режим роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        action:
        - service: light.turn_off
          entity_id:
            - light.smart_desk_lamp
            - light.yeelight_ceiling4_0x49c726b
            - light.yeelight_ceiling4_0x4a1dacd
            - light.0x54ef4410008e96fd_bottom
        - service: light.turn_on
          entity_id:
            - light.lr_bedside_lamp
          data_template:
            brightness_pct: 100
            color_temp_kelvin: 4000
        - delay: 00:00:15
        - service: light.turn_off
          entity_id:
            - light.lr_bedside_lamp
          
#################### ВІТАЛЬНЯ БАЛКОН ####################          
          
      - alias: lr_light_balcony_turn_on
        id: lr_light_balcony_turn_on
        description: Вітальня — вмикання люстри на балконі
        initial_state: true
        trigger:
    # Вимикач на вході
        - platform: state
          entity_id: sensor.0x54ef441000681a6f_action
          to: 'single_right'
    # Кнопка на балконі
        - platform: state
          entity_id: sensor.0x00158d0001b86d2e_action
          to: 'single'
    # Рух в темряві
        - platform: state
          entity_id: binary_sensor.lr_balcony_moving_in_dark
          to: 'on'
        condition:
    # Режим роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
    # Люстра вимкнена
        - condition: state
          entity_id: light.0xa4c13812b94c8365
          state: 'off'
        action:
        - service: light.turn_on
          entity_id:
            - light.0xa4c13812b94c8365
          data_template:
            brightness_pct: 100
            color_temp_kelvin: 4000          
          
