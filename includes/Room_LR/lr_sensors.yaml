##################################################
## Актуалізовано: 2026-03-25
##################################################

lr_sensors:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      ##################################################
      ## ВІТАЛЬНЯ
      ##################################################

      binary_sensor.0x00158d0005414857_occupancy:
        friendly_name: Вітальня - рух

      sensor.0x00158d0005414857_battery:
        friendly_name: Вітальня - датчик руху

      sensor.0x04cf8cdf3c7cf19e_illuminance_lux:
        friendly_name: Вітальня - освітленість

      sensor.0x04cf8cdf3c7cf19e_battery:
        friendly_name: Вітальня - датчик освітлення

      binary_sensor.0x00158d000449b773_occupancy:
        friendly_name: Вітальня - балкон рух

      sensor.0x00158d000449b773_illuminance_lux:
        friendly_name: Вітальня - балкон освітленість

      sensor.0x00158d000449b773_battery:
        friendly_name: Вітальня - балкон датчик руху

      sensor.0x00158d00015aebb6_humidity:
        friendly_name: Вітальня - вологість
        icon: mdi:water-percent

      sensor.0x00158d00015aebb6_temperature:
        friendly_name: Вітальня - температура
        icon: mdi:temperature-celsius

      sensor.0x00158d00015aebb6_battery:
        friendly_name: Вітальня - клімат

      sensor.0xec1bbdfffe4534c0_humidity:
        friendly_name: Вітальня - балкон вологість
        icon: mdi:water-percent

      sensor.0xec1bbdfffe4534c0_temperature:
        friendly_name: Вітальня - балкон температура
        icon: mdi:temperature-celsius

      sensor.0xec1bbdfffe4534c0_battery:
        friendly_name: Вітальня - балкон клімат

      binary_sensor.0x00158d00013ed373_contact:
        friendly_name: Вітальня - вікно праворуч
        device_class: window

      sensor.0x00158d00013ed373_battery:
        friendly_name: Вітальня - вікно праворуч

      binary_sensor.0xec1bbdfffedf6a6a_contact:
        friendly_name: Вітальня - вікно ліворуч
        device_class: window

      binary_sensor.0x00158d000445206b_contact:
        friendly_name: Вітальня - двері на балкон
        device_class: door

      sensor.0x00158d000445206b_battery:
        friendly_name: Вітальня - двері на балкон

      binary_sensor.0x00158d0001a2f5f7_contact:
        friendly_name: Вітальня - вікно на балконі
        device_class: window

      sensor.0x00158d0001a2f5f7_battery:
        friendly_name: Вітальня - вікно на балконі

      ##################################################
      ## TEMPLATE
      ##################################################

      binary_sensor.lr_aeration:
        friendly_name: Вітальня - провітрювання
        icon: mdi:window-open

  ##################################################
  ## RECORDER
  ##################################################

  recorder:
    include:
      entities:
        - binary_sensor.0x00158d0005414857_occupancy
        - sensor.0x04cf8cdf3c7cf19e_illuminance
        - binary_sensor.0x00158d000449b773_occupancy
        - sensor.0x00158d000449b773_illuminance_lux
        - sensor.0x00158d00015aebb6_temperature
        - sensor.0x00158d00015aebb6_humidity
        - sensor.0xec1bbdfffe4534c0_humidity
        - sensor.0xec1bbdfffe4534c0_temperature

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    - binary_sensor:

        - name: lr_aeration
          unique_id: lr_aeration
          state: >
            {{ is_state('binary_sensor.0x00158d00013ed373_contact', 'on')
               or is_state('binary_sensor.0xec1bbdfffedf6a6a_contact', 'on')
               or is_state('binary_sensor.0x00158d000445206b_contact', 'on')
            }}
          delay_on:
            seconds: 30
          delay_off:
            seconds: 30
          device_class: opening
          icon: >
            {% if is_state("binary_sensor.lr_aeration", "on") %}
            mdi:window-open-variant
            {% else %}
            mdi:window-closed-variant
            {% endif %}