      input_button.0xa4c1388ce0ff53a8_period_2:
        friendly_name: Кухня - період 2

      input_button.0xa4c1388ce0ff53a8_period_3:
        friendly_name: Кухня - період 3

      input_button.0xa4c1388ce0ff53a8_period_4:
        friendly_name: Кухня - період 4

      input_button.0xa4c1388ce0ff53a8_period_5:
        friendly_name: Кухня - період 5

      timer.0xa4c1388ce0ff53a8:
        friendly_name: Кухня - таймер бойлера

      binary_sensor.0xa4c1388ce0ff53a8_period_1_on:
        friendly_name: Кухня - запуск періоду 1

      binary_sensor.0xa4c1388ce0ff53a8_period_2_on:
        friendly_name: Кухня - запуск періоду 2

      binary_sensor.0xa4c1388ce0ff53a8_period_3_on:
        friendly_name: Кухня - запуск періоду 3

      binary_sensor.0xa4c1388ce0ff53a8_period_4_on:
        friendly_name: Кухня - запуск періоду 4

      binary_sensor.0xa4c1388ce0ff53a8_period_5_on:
        friendly_name: Кухня - запуск періоду 5

      binary_sensor.0xa4c1388ce0ff53a8_manual:
        friendly_name: Кухня - ручне ввімкнення бойлера

      switch.0xa4c1388ce0ff53a8_mode:
        friendly_name: Кухня - режим бойлера
        icon: mdi:water-boiler

      switch.0xa4c1388ce0ff53a8_period_1_mode:
        friendly_name: Кухня - режим періоду 1
        icon: mdi:numeric-1-box

      switch.0xa4c1388ce0ff53a8_period_2_mode:
        friendly_name: Кухня - режим періоду 2
        icon: mdi:numeric-2-box

      switch.0xa4c1388ce0ff53a8_period_3_mode:
        friendly_name: Кухня - режим періоду 3
        icon: mdi:numeric-3-box

      switch.0xa4c1388ce0ff53a8_period_4_mode:
        friendly_name: Кухня - режим періоду 4
        icon: mdi:numeric-4-box

      switch.0xa4c1388ce0ff53a8_period_5_mode:
        friendly_name: Кухня - режим періоду 5
        icon: mdi:numeric-5-box

      automation.0xa4c1388ce0ff53a8_period:
        friendly_name: Кухня - встановлення періоду

      automation.0xa4c1388ce0ff53a8_timer:
        friendly_name: Кухня - встановлення таймера

      automation.0xa4c1388ce0ff53a8_period_on:
        friendly_name: Кухня - ввімкнення за періодом

      automation.0xa4c1388ce0ff53a8_period_message:
        friendly_name: Кухня - повідомлення про період

      automation.0xa4c1388ce0ff53a8_manual:
        friendly_name: Кухня - ручне ввімкнення

      automation.0xa4c1388ce0ff53a8_blackout_on:
        friendly_name: Кухня - ввімкнення після blackout

      automation.0xa4c1388ce0ff53a8_manual_message:
        friendly_name: Кухня - повідомлення про ручне ввімкнення

      automation.0xa4c1388ce0ff53a8_off:
        friendly_name: Кухня - вимкнення бойлера

      automation.0xa4c1388ce0ff53a8_off_message:
        friendly_name: Кухня - повідомлення про вимкнення

      automation.0xa4c1388ce0ff53a8_timer_off:
        friendly_name: Кухня - скасування таймера

  ##################################################
  ## RECORDER
  ##################################################

  recorder:
    include:
      entities:
        - binary_sensor.0xa4c1388ce0ff53a8_switch
        - sensor.0xa4c1388ce0ff53a8_power
        - sensor.0xa4c1388ce0ff53a8_energy

  ##################################################
  ## INPUT_DATETIME
  ##################################################

  input_datetime:

    0xa4c1388ce0ff53a8_timer:
      name: 0xa4c1388ce0ff53a8_timer
      has_date: false
      has_time: true

    0xa4c1388ce0ff53a8_period:
      name: 0xa4c1388ce0ff53a8_period
      has_date: false
      has_time: true

  ##################################################
  ## INPUT_BUTTON
  ##################################################

  input_button:

    0xa4c1388ce0ff53a8_timer_1:
      name: 0xa4c1388ce0ff53a8_timer_1

    0xa4c1388ce0ff53a8_timer_2:
      name: 0xa4c1388ce0ff53a8_timer_2

    0xa4c1388ce0ff53a8_timer_3:
      name: 0xa4c1388ce0ff53a8_timer_3

    0xa4c1388ce0ff53a8_timer_4:
      name: 0xa4c1388ce0ff53a8_timer_4

    0xa4c1388ce0ff53a8_timer_5:
      name: 0xa4c1388ce0ff53a8_timer_5

    0xa4c1388ce0ff53a8_timer_manual:
      name: 0xa4c1388ce0ff53a8_timer_manual

    0xa4c1388ce0ff53a8_period_1:
      name: 0xa4c1388ce0ff53a8_period_1

    0xa4c1388ce0ff53a8_period_2:
      name: 0xa4c1388ce0ff53a8_period_2

    0xa4c1388ce0ff53a8_period_3:
      name: 0xa4c1388ce0ff53a8_period_3

    0xa4c1388ce0ff53a8_period_4:
      name: 0xa4c1388ce0ff53a8_period_4

    0xa4c1388ce0ff53a8_period_5:
      name: 0xa4c1388ce0ff53a8_period_5

  ##################################################
  ## TIMER
  ##################################################

  timer:

    '0xa4c1388ce0ff53a8':
      name: 0xa4c1388ce0ff53a8
      restore: true

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    - binary_sensor:

        ##################################################
        ## СТАН БОЙЛЕРА
        ##################################################

        - name: 0xa4c1388ce0ff53a8_switch
          unique_id: 0xa4c1388ce0ff53a8_switch
          state: >
            {{ is_state('switch.0xa4c1388ce0ff53a8', 'on') }}
          delay_on: 00:00:01
          delay_off: 00:00:01
          device_class: power

        ##################################################
        ## ПЕРІОД 1
        ##################################################

        - name: 0xa4c1388ce0ff53a8_period_1_on
          unique_id: 0xa4c1388ce0ff53a8_period_1_on
          state: >
            {{ is_state('switch.0xa4c1388ce0ff53a8_mode', 'on')
               and is_state('switch.0xa4c1388ce0ff53a8_period_1_mode', 'on')
               and states('sensor.current_time') == states('sensor.0xa4c1388ce0ff53a8_period_1') }}
          device_class: running

        ##################################################
        ## ПЕРІОД 2
        ##################################################

        - name: 0xa4c1388ce0ff53a8_period_2_on
          unique_id: 0xa4c1388ce0ff53a8_period_2_on
          state: >
            {{ is_state('switch.0xa4c1388ce0ff53a8_mode', 'on')
               and is_state('switch.0xa4c1388ce0ff53a8_period_2_mode', 'on')
               and states('sensor.current_time') == states('sensor.0xa4c1388ce0ff53a8_period_2') }}
          device_class: running

        ##################################################
        ## ПЕРІОД 3
        ##################################################

        - name: 0xa4c1388ce0ff53a8_period_3_on
          unique_id: 0xa4c1388ce0ff53a8_period_3_on
          state: >
            {{ is_state('switch.0xa4c1388ce0ff53a8_mode', 'on')
               and is_state('switch.0xa4c1388ce0ff53a8_period_3_mode', 'on')
               and states('sensor.current_time') == states('sensor.0xa4c1388ce0ff53a8_period_3') }}
          device_class: running

        ##################################################
        ## ПЕРІОД 4
        ##################################################

        - name: 0xa4c1388ce0ff53a8_period_4_on
          unique_id: 0xa4c1388ce0ff53a8_period_4_on
          state: >
            {{ is_state('switch.0xa4c1388ce0ff53a8_mode', 'on')
               and is_state('switch.0xa4c1388ce0ff53a8_period_4_mode', 'on')
               and states('sensor.current_time') == states('sensor.0xa4c1388ce0ff53a8_period_4') }}
          device_class: running

        ##################################################
        ## ПЕРІОД 5
        ##################################################

        - name: 0xa4c1388ce0ff53a8_period_5_on
          unique_id: 0xa4c1388ce0ff53a8_period_5_on
          state: >
            {{ is_state('switch.0xa4c1388ce0ff53a8_mode', 'on')
               and is_state('switch.0xa4c1388ce0ff53a8_period_5_mode', 'on')
               and states('sensor.current_time') == states('sensor.0xa4c1388ce0ff53a8_period_5') }}
          device_class: running

        ##################################################
        ## РУЧНЕ ВВІМКНЕННЯ
        ##################################################

        - name: 0xa4c1388ce0ff53a8_manual
          unique_id: 0xa4c1388ce0ff53a8_manual
          state: >
            {{ is_state('binary_sensor.0xa4c1388ce0ff53a8_period_1_on', 'on')
               or is_state('binary_sensor.0xa4c1388ce0ff53a8_period_2_on', 'on')
               or is_state('binary_sensor.0xa4c1388ce0ff53a8_period_3_on', 'on')
               or is_state('binary_sensor.0xa4c1388ce0ff53a8_period_4_on', 'on')
               or is_state('binary_sensor.0xa4c1388ce0ff53a8_period_5_on', 'on') }}
          device_class: running

  ##################################################
  ## MQTT
  ##################################################

  mqtt:

    switch:
      - name: 0xa4c1388ce0ff53a8_mode
        unique_id: 0xa4c1388ce0ff53a8_mode
        state_topic: "states/0xa4c1388ce0ff53a8/mode"
        command_topic: "states/0xa4c1388ce0ff53a8/mode"
        payload_on: "ON"
        payload_off: "OFF"
        state_on: "ON"
        state_off: "OFF"
        retain: true

      - name: 0xa4c1388ce0ff53a8_period_1_mode
        unique_id: 0xa4c1388ce0ff53a8_period_1_mode
        state_topic: "states/0xa4c1388ce0ff53a8/period_1_mode"
        command_topic: "states/0xa4c1388ce0ff53a8/period_1_mode"
        payload_on: "ON"
        payload_off: "OFF"
        state_on: "ON"
        state_off: "OFF"
        retain: true

      - name: 0xa4c1388ce0ff53a8_period_2_mode
        unique_id: 0xa4c1388ce0ff53a8_period_2_mode
        state_topic: "states/0xa4c1388ce0ff53a8/period_2_mode"
        command_topic: "states/0xa4c1388ce0ff53a8/period_2_mode"
        payload_on: "ON"
        payload_off: "OFF"
        state_on: "ON"
        state_off: "OFF"
        retain: true

      - name: 0xa4c1388ce0ff53a8_period_3_mode
        unique_id: 0xa4c1388ce0ff53a8_period_3_mode
        state_topic: "states/0xa4c1388ce0ff53a8/period_3_mode"
        command_topic: "states/0xa4c1388ce0ff53a8/period_3_mode"
        payload_on: "ON"
        payload_off: "OFF"
        state_on: "ON"
        state_off: "OFF"
        retain: true

      - name: 0xa4c1388ce0ff53a8_period_4_mode
        unique_id: 0xa4c1388ce0ff53a8_period_4_mode
        state_topic: "states/0xa4c1388ce0ff53a8/period_4_mode"
        command_topic: "states/0xa4c1388ce0ff53a8/period_4_mode"
        payload_on: "ON"
        payload_off: "OFF"
        state_on: "ON"
        state_off: "OFF"
        retain: true

      - name: 0xa4c1388ce0ff53a8_period_5_mode
        unique_id: 0xa4c1388ce0ff53a8_period_5_mode
        state_topic: "states/0xa4c1388ce0ff53a8/period_5_mode"
        command_topic: "states/0xa4c1388ce0ff53a8/period_5_mode"
        payload_on: "ON"
        payload_off: "OFF"
        state_on: "ON"
        state_off: "OFF"
        retain: true

    sensor:
      - name: 0xa4c1388ce0ff53a8_timer_1
        unique_id: 0xa4c1388ce0ff53a8_timer_1
        state_topic: "states/0xa4c1388ce0ff53a8/timer_1"

      - name: 0xa4c1388ce0ff53a8_timer_2
        unique_id: 0xa4c1388ce0ff53a8_timer_2
        state_topic: "states/0xa4c1388ce0ff53a8/timer_2"

      - name: 0xa4c1388ce0ff53a8_timer_3
        unique_id: 0xa4c1388ce0ff53a8_timer_3
        state_topic: "states/0xa4c1388ce0ff53a8/timer_3"

      - name: 0xa4c1388ce0ff53a8_timer_4
        unique_id: 0xa4c1388ce0ff53a8_timer_4
        state_topic: "states/0xa4c1388ce0ff53a8/timer_4"

      - name: 0xa4c1388ce0ff53a8_timer_5
        unique_id: 0xa4c1388ce0ff53a8_timer_5
        state_topic: "states/0xa4c1388ce0ff53a8/timer_5"

      - name: 0xa4c1388ce0ff53a8_timer_manual
        unique_id: 0xa4c1388ce0ff53a8_timer_manual
        state_topic: "states/0xa4c1388ce0ff53a8/timer_manual"

      - name: 0xa4c1388ce0ff53a8_period_1
        unique_id: 0xa4c1388ce0ff53a8_period_1
        state_topic: "states/0xa4c1388ce0ff53a8/period_1"

      - name: 0xa4c1388ce0ff53a8_period_2
        unique_id: 0xa4c1388ce0ff53a8_period_2
        state_topic: "states/0xa4c1388ce0ff53a8/period_2"

      - name: 0xa4c1388ce0ff53a8_period_3
        unique_id: 0xa4c1388ce0ff53a8_period_3
        state_topic: "states/0xa4c1388ce0ff53a8/period_3"

      - name: 0xa4c1388ce0ff53a8_period_4
        unique_id: 0xa4c1388ce0ff53a8_period_4
        state_topic: "states/0xa4c1388ce0ff53a8/period_4"

      - name: 0xa4c1388ce0ff53a8_period_5
        unique_id: 0xa4c1388ce0ff53a8_period_5
        state_topic: "states/0xa4c1388ce0ff53a8/period_5"

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## ВСТАНОВЛЕННЯ ПЕРІОДУ
    ##################################################

    - alias: 0xa4c1388ce0ff53a8_period
      id: 0xa4c1388ce0ff53a8_period
      description: Встановлення періоду бойлера
      initial_state: true

      trigger:
        - platform: state
          entity_id: input_button.0xa4c1388ce0ff53a8_period_1
          id: period_1

        - platform: state
          entity_id: input_button.0xa4c1388ce0ff53a8_period_2
          id: period_2

        - platform: state
          entity_id: input_button.0xa4c1388ce0ff53a8_period_3
          id: period_3

        - platform: state
          entity_id: input_button.0xa4c1388ce0ff53a8_period_4
          id: period_4

        - platform: state
          entity_id: input_button.0xa4c1388ce0ff53a8_period_5
          id: period_5

      action:
        - choose:
            - conditions:
                - condition: trigger
                  id: period_1
              sequence:
                - action: mqtt.publish
                  data:
                    topic: "states/0xa4c1388ce0ff53a8/period_1"
                    payload: "{{ states('input_datetime.0xa4c1388ce0ff53a8_period') }}"
                    retain: true

            - conditions:
                - condition: trigger
                  id: period_2
              sequence:
                - action: mqtt.publish
                  data:
                    topic: "states/0xa4c1388ce0ff53a8/period_2"
                    payload: "{{ states('input_datetime.0xa4c1388ce0ff53a8_period') }}"
                    retain: true

            - conditions:
                - condition: trigger
                  id: period_3
              sequence:
                - action: mqtt.publish
                  data:
                    topic: "states/0xa4c1388ce0ff53a8/period_3"
                    payload: "{{ states('input_datetime.0xa4c1388ce0ff53a8_period') }}"
                    retain: true

            - conditions:
                - condition: trigger
                  id: period_4
              sequence:
                - action: mqtt.publish
                  data:
                    topic: "states/0xa4c1388ce0ff53a8/period_4"
                    payload: "{{ states('input_datetime.0xa4c1388ce0ff53a8_period') }}"
                    retain: true

            - conditions:
                - condition: trigger
                  id: period_5
              sequence:
                - action: mqtt.publish
                  data:
                    topic: "states/0xa4c1388ce0ff53a8/period_5"
                    payload: "{{ states('input_datetime.0xa4c1388ce0ff53a8_period') }}"
                    retain: true

    ##################################################
    ## ВСТАНОВЛЕННЯ ТАЙМЕРА
    ##################################################

    - alias: 0xa4c1388ce0ff53a8_timer
      id: 0xa4c1388ce0ff53a8_timer
      description: Встановлення таймера бойлера
      initial_state: true

      trigger:
        - platform: state
          entity_id: input_button.0xa4c1388ce0ff53a8_timer_1
          id: timer_1

        - platform: state
          entity_id: input_button.0xa4c1388ce0ff53a8_timer_2
          id: timer_2

        - platform: state
          entity_id: input_button.0xa4c1388ce0ff53a8_timer_3
          id: timer_3

        - platform: state
          entity_id: input_button.0xa4c1388ce0ff53a8_timer_4
          id: timer_4

        - platform: state
          entity_id: input_button.0xa4c1388ce0ff53a8_timer_5
          id: timer_5

        - platform: state
          entity_id: input_button.0xa4c1388ce0ff53a8_timer_manual
          id: timer_manual

      action:
        - choose:
            - conditions:
                - condition: trigger
                  id: timer_1
              sequence:
                - action: mqtt.publish
                  data:
                    topic: "states/0xa4c1388ce0ff53a8/timer_1"
                    payload: "{{ states('input_datetime.0xa4c1388ce0ff53a8_timer') }}"
                    retain: true

            - conditions:
                - condition: trigger
                  id: timer_2
              sequence:
                - action: mqtt.publish
                  data:
                    topic: "states/0xa4c1388ce0ff53a8/timer_2"
                    payload: "{{ states('input_datetime.0xa4c1388ce0ff53a8_timer') }}"
                    retain: true

            - conditions:
                - condition: trigger
                  id: timer_3
              sequence:
                - action: mqtt.publish
                  data:
                    topic: "states/0xa4c1388ce0ff53a8/timer_3"
                    payload: "{{ states('input_datetime.0xa4c1388ce0ff53a8_timer') }}"
                    retain: true

            - conditions:
                - condition: trigger
                  id: timer_4
              sequence:
                - action: mqtt.publish
                  data:
                    topic: "states/0xa4c1388ce0ff53a8/timer_4"
                    payload: "{{ states('input_datetime.0xa4c1388ce0ff53a8_timer') }}"
                    retain: true

            - conditions:
                - condition: trigger
                  id: timer_5
              sequence:
                - action: mqtt.publish
                  data:
                    topic: "states/0xa4c1388ce0ff53a8/timer_5"
                    payload: "{{ states('input_datetime.0xa4c1388ce0ff53a8_timer') }}"
                    retain: true

            - conditions:
                - condition: trigger
                  id: timer_manual
              sequence:
                - action: mqtt.publish
                  data:
                    topic: "states/0xa4c1388ce0ff53a8/timer_manual"
                    payload: "{{ states('input_datetime.0xa4c1388ce0ff53a8_timer') }}"
                    retain: true

    ##################################################
    ## ВВІМКНЕННЯ ЗА ПЕРІОДОМ
    ##################################################

    - alias: 0xa4c1388ce0ff53a8_period_on
      id: 0xa4c1388ce0ff53a8_period_on
      description: Ввімкнення бойлера за періодом
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.0xa4c1388ce0ff53a8_period_1_on
          from: 'off'
          to: 'on'
          id: period_1

        - platform: state
          entity_id: binary_sensor.0xa4c1388ce0ff53a8_period_2_on
          from: 'off'
          to: 'on'
          id: period_2

        - platform: state
          entity_id: binary_sensor.0xa4c1388ce0ff53a8_period_3_on
          from: 'off'
          to: 'on'
          id: period_3

        - platform: state
          entity_id: binary_sensor.0xa4c1388ce0ff53a8_period_4_on
          from: 'off'
          to: 'on'
          id: period_4

        - platform: state
          entity_id: binary_sensor.0xa4c1388ce0ff53a8_period_5_on
          from: 'off'
          to: 'on'
          id: period_5

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'

      action:
        - choose:
            - conditions:
                - condition: trigger
