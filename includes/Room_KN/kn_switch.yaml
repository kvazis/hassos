##################################################
## Актуалізовано: 2026-03-25
##################################################

kn_switch:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      ##################################################
      ## ВИМИКАЧІ
      ##################################################

      switch.0x54ef4410000f4741_right:
        friendly_name: Кухня - живлення люстри

      switch.0x54ef4410000f4741_left:
        friendly_name: Кухня - вимикач Aqara E1 (ліва лінія)

      sensor.0x54ef4410000f4741_action:
        friendly_name: Кухня - вимикач Aqara E1

      ##################################################
      ## РОЗЕТКИ ТА ПРИСТРОЇ
      ##################################################

      switch.0xa4c138d571b656c5:
        friendly_name: Кухня - аерогриль живлення
        icon: mdi:pot

      sensor.0xa4c138d571b656c5_power:
        friendly_name: Кухня - аерогриль потужність
        unit_of_measurement: W
        device_class: power

      sensor.0xa4c138d571b656c5_energy:
        friendly_name: Кухня - аерогриль енергія
        icon: mdi:chart-line

      switch.0xa4c138201dcb67f6:
        friendly_name: Кухня - електрогриль
        icon: mdi:grill

      sensor.0xa4c138201dcb67f6_power:
        friendly_name: Кухня - електрогриль потужність
        unit_of_measurement: W
        device_class: power

      sensor.0xa4c138201dcb67f6_energy:
        friendly_name: Кухня - електрогриль енергія
        icon: mdi:chart-line

      switch.0xa4c138273b49e4d0:
        friendly_name: Кухня - мікрохвильовка живлення
        icon: mdi:microwave

      sensor.0xa4c138273b49e4d0_power:
        friendly_name: Кухня - мікрохвильовка потужність
        unit_of_measurement: W
        device_class: power

      sensor.0xa4c138273b49e4d0_energy:
        friendly_name: Кухня - мікрохвильовка енергія
        icon: mdi:chart-line

      switch.0xa4c1385bcf7d00c9:
        friendly_name: Кухня - чайник живлення
        icon: mdi:kettle

      sensor.0xa4c1385bcf7d00c9_power:
        friendly_name: Кухня - чайник потужність
        unit_of_measurement: W
        device_class: power

      sensor.0xa4c1385bcf7d00c9_energy:
        friendly_name: Кухня - чайник енергія
        icon: mdi:chart-line

      switch.kn_coffee_machine:
        friendly_name: Кухня - кавомашина
        icon: mdi:coffee-maker

      switch.0xa4c13874f3d1d1c0:
        friendly_name: Кухня - кавомашина живлення
        icon: mdi:power-socket-eu

      sensor.0xa4c13874f3d1d1c0_power:
        friendly_name: Кухня - кавомашина потужність
        unit_of_measurement: W
        device_class: power

      sensor.0xa4c13874f3d1d1c0_energy:
        friendly_name: Кухня - кавомашина енергія
        icon: mdi:chart-line

      sensor.0xa4c13874f3d1d1c0_voltage:
        friendly_name: Кухня - кавомашина напруга

      ##################################################
      ## ХОЛОДИЛЬНИК
      ##################################################

      switch.0x00158d0001fa2934:
        friendly_name: Кухня - холодильник живлення
        icon: mdi:fridge

      sensor.0x00158d0001fa2934_power:
        friendly_name: Кухня - холодильник потужність
        unit_of_measurement: W
        device_class: power

      sensor.0x00158d0001fa2934_energy:
        friendly_name: Кухня - холодильник енергія
        device_class: energy
        unit_of_measurement: kWh
        icon: mdi:chart-line
        state_class: total_increasing

      sensor.0x00158d0001fa2934_device_temperature:
        friendly_name: Кухня - холодильник температура
        icon: mdi:thermometer

      sensor.kn_fridge_meter:
        friendly_name: Кухня - холодильник споживання (година)
        unit_of_measurement: kWh
        state_class: total
        device_class: energy

      sensor.kn_fridge_max_energy_day:
        friendly_name: Кухня - холодильник макс енергія (доба)

      sensor.kn_fridge_max_power_day:
        friendly_name: Кухня - холодильник макс потужність (доба)

      ##################################################
      ## ШЛЮЗ
      ##################################################

      switch.0x00158d000114a1e1:
        friendly_name: Кухня - живлення шлюзу
        icon: mdi:router-wireless

      sensor.0x00158d000114a1e1_power:
        friendly_name: Кухня - шлюз потужність
        unit_of_measurement: W
        device_class: power

      sensor.0x00158d000114a1e1_energy:
        friendly_name: Кухня - шлюз енергія
        icon: mdi:chart-line

      sensor.0x00158d000114a1e1_device_temperature:
        friendly_name: Кухня - шлюз температура
        icon: mdi:thermometer

  ##################################################
  ## RECORDER
  ##################################################

  recorder:
    include:
      entities:
        - sensor.0xa4c138d571b656c5_power
        - sensor.0xa4c138273b49e4d0_power
        - sensor.0xa4c1385bcf7d00c9_power
        - sensor.0xa4c13874f3d1d1c0_power
        - sensor.0x00158d0001fa2934_power
        - sensor.0x00158d000114a1e1_power
        - sensor.0xa4c138201dcb67f6_power
        - sensor.kn_fridge_meter
        - sensor.kn_fridge_max_energy_day
        - sensor.kn_fridge_max_power_day

  ##################################################
  ## MQTT
  ##################################################

  mqtt:
    switch:
      - name: kn_coffee_machine
        unique_id: kn_coffee_machine
        state_topic: "zigbee2mqtt_3/KN coffee machine"
        command_topic: "zigbee2mqtt_3/KN coffee machine/set"
        payload_on: "ON"
        payload_off: "OFF"
        state_on: "ON"
        state_off: "OFF"
        value_template: "{{ value_json.state }}"
        json_attributes_topic: "zigbee2mqtt_3/KN coffee machine"
        qos: 1

  ##################################################
  ## UTILITY_METER
  ##################################################

  utility_meter:

    kn_fridge_meter:
      source: sensor.0x00158d0001fa2934_energy
      unique_id: kn_fridge_meter
      cycle: hourly

  ##################################################
  ## SENSOR
  ##################################################

  sensor:

    - platform: statistics
      name: kn_fridge_max_energy_day
      unique_id: kn_fridge_max_energy_day
      entity_id: sensor.kn_fridge_meter
      state_characteristic: value_max
      max_age:
        hours: 24

    - platform: statistics
      name: kn_fridge_max_power_day
      unique_id: kn_fridge_max_power_day
      entity_id: sensor.0x00158d0001fa2934_power
      state_characteristic: value_max
      max_age:
        hours: 24