##################################################
## Актуалізовано: 2026-03-22
##################################################

kn_tv:

  recorder:
    include:
      entities:
        - sensor.0x00158d0001291d12_power

  homeassistant:
    customize:

      ##################################################
      ## ТВ КУХНЯ
      ##################################################

      switch.0x00158d0001291d12:
        friendly_name: Кухня - живлення телевізора
        icon: mdi:television

      sensor.0x00158d0001291d12_power:
        friendly_name: Кухня - потужність ТВ
        unit_of_measurement: W
        device_class: power

      sensor.0x00158d0001291d12_energy:
        friendly_name: Кухня - енергія ТВ
        icon: mdi:chart-line

      sensor.0x00158d0001291d12_device_temperature:
        friendly_name: Кухня - температура пристрою
        icon: mdi:thermometer

      binary_sensor.kn_tv_work:
        friendly_name: Кухня - ТВ працює
        icon: mdi:television

      binary_sensor.kn_tv_box_off:
        friendly_name: Кухня - TV Box недоступний
        icon: mdi:television-off

      input_button.kn_tv_control:
        friendly_name: Кухня - керування ТВ
        icon: mdi:remote-tv

      automation.kn_tv_toggle:
        friendly_name: Кухня - керування телевізором
        icon: mdi:television

      automation.kn_tv_box_offline:
        friendly_name: Кухня - індикація TV Box
        icon: mdi:alert

      automation.kn_gateway_auto_off:
        friendly_name: Кухня - авто вимкнення шлюзу
        icon: mdi:lightbulb-off

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    - binary_sensor:

        - unique_id: kn_tv_work
          state: >
            {{ states('sensor.0x00158d0001291d12_power') | int > 10 }}

        - unique_id: kn_tv_box_off
          state: >
            {{ is_state('binary_sensor.kn_tv_work', 'on')
               and is_state('media_player.kn_mi_box', 'unavailable') }}

  ##################################################
  ## INPUT
  ##################################################

  input_button:

    kn_tv_control:

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## КЕРУВАННЯ ТВ
    ##################################################

    - alias: kn_tv_toggle
      id: kn_tv_toggle
      description: Кухня - керування телевізором
      initial_state: true

      trigger:
        - platform: state
          entity_id: sensor.0x04cf8cdf3c794209_action
          to: "button_5_single"

        - platform: state
          entity_id: input_button.kn_tv_control

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: binary_sensor.kn_tv_work
                  state: "off"
              sequence:
                - action: remote.send_command
                  target:
                    entity_id: remote.chuangmi_v2_2769_ir
                  data:
                    command:
                      - raw:Z6WRAN0AAAAfAgAAewIAACUEAAB5BQAALioAAMAMAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAATEkJCEkISQhJCQlITEkJCEkISQhJCQlITEkJCEkISQhJCQlITEkJCEkISQhJCQlITEkJCEkISQhJCQlITEkJCEkISQhJCQmIA==

            - conditions:
                - condition: state
                  entity_id: binary_sensor.kn_tv_work
                  state: "on"
              sequence:
                - action: remote.send_command
                  target:
                    entity_id: remote.chuangmi_v2_2769_ir
                  data:
                    command:
                      - raw:Z6WRAN0AAAAfAgAAewIAACUEAAB5BQAALioAAMAMAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAATEkJCEkISQhJCQlITEkJCEkISQhJCQlITEkJCEkISQhJCQlITEkJCEkISQhJCQlITEkJCEkISQhJCQlITEkJCEkISQhJCQmIA==
                      - raw:Z6W/ABwCAAB9AgAAQgMAAE0EAAB6BQAAjjMAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAADMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMQE==
                      - raw:Z6W/ABwCAAB9AgAAQgMAAE0EAAB6BQAAjjMAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAADMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMQE==
                      - raw:Z6W/ABwCAAB9AgAAQgMAAE0EAAB6BQAAjjMAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAADMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMVEDMQEhMQEBQQEBMQE==
                      - raw:Z6WPABgCAACBAgAAPgMAAEkEAABxBQAAJzEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAADMQEhMQEBQSEBQVEDMQEhMQEBQSEBQVEDMQEhMQEBQSEBQVEDMQEhMQEBQSEBQVEDMQEhMQEBQSEBQVEDMQEhMQEBQSEBQQE==

                - action: media_player.turn_off
                  target:
                    entity_id: media_player.kn_mi_box

    ##################################################
    ## ІНДИКАЦІЯ TV BOX
    ##################################################

    - alias: kn_tv_box_offline
      id: kn_tv_box_offline
      description: Кухня - індикація стану TV Box
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.kn_tv_box_off

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: binary_sensor.kn_tv_box_off
                  state: "on"
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.gateway_light_7811dc64f4c8
                  data:
                    color_name: dodgerblue
                    brightness_pct: 70

            - conditions:
                - condition: state
                  entity_id: binary_sensor.kn_tv_box_off
                  state: "off"
              sequence:
                - action: light.turn_off
                  target:
                    entity_id: light.gateway_light_7811dc64f4c8

    ##################################################
    ## АВТО ВИМКНЕННЯ ШЛЮЗУ
    ##################################################

    - alias: kn_gateway_auto_off
      id: kn_gateway_auto_off
      description: Кухня - автоматичне вимкнення шлюзу
      initial_state: true

      trigger:
        - platform: time_pattern
          minutes: "/3"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: light.gateway_light_7811dc64f4c8
          state: "on"

      action:
        - action: light.turn_off
          target:
            entity_id: light.gateway_light_7811dc64f4c8