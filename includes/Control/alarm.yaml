alarm:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      binary_sensor.0x842e14fffef6d9e5_smoke:
        friendly_name: Кухня - дим

      sensor.0x842e14fffef6d9e5_battery:
        friendly_name: Кухня - батарея

      binary_sensor.0x00158d000149d28b_smoke:
        friendly_name: Передпокій - дим

      sensor.0x00158d000149d28b_battery:
        friendly_name: Передпокій - батарея

      binary_sensor.0x00158d0001bbeba6_water_leak:
        friendly_name: Туалет - протікання

      sensor.0x00158d0001bbeba6_battery:
        friendly_name: Туалет - батарея

      binary_sensor.0x00158d0002705b7b_water_leak:
        friendly_name: Пральня - протікання

      sensor.0x00158d0002705b7b_battery:
        friendly_name: Пральня - батарея

      binary_sensor.0xec1bbdfffe8f1e42_water_leak:
        friendly_name: Кухня - протікання

      sensor.0xec1bbdfffe8f1e42_battery:
        friendly_name: Кухня - батарея

      binary_sensor.0x00158d0001d72fa2_water_leak:
        friendly_name: Ванна - протікання раковини

      sensor.0x00158d0001d72fa2_battery:
        friendly_name: Ванна - батарея раковини

      binary_sensor.0x00158d0001bb60c2_water_leak:
        friendly_name: Ванна - протікання душу

      sensor.0x00158d0001bb60c2_battery:
        friendly_name: Ванна - батарея душу

      sensor.alarm_smoke_detect:
        friendly_name: Сигналізація - дим
        icon: mdi:smoke-detector-alert

      sensor.alarm_water_leak_detect:
        friendly_name: Сигналізація - протікання
        icon: mdi:water-alert

      automation.alarm_smoke_control:
        friendly_name: Сигналізація - контроль диму
        icon: mdi:smoke-detector-alert

      automation.alarm_water_leak_control:
        friendly_name: Сигналізація - контроль протікання
        icon: mdi:water-alert

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    ##################################################
    ## ДАТЧИКИ ДИМУ
    ##################################################

    - sensor:
        - name: alarm_smoke_detect
          unique_id: alarm_smoke_detect
          state: >
            {% set variable = namespace(value = {}) %}
            {% for entity in states.binary_sensor
              if is_state(entity.entity_id, 'on')
              and is_state_attr(entity.entity_id, 'device_class', 'smoke') %}
              {% set variable.value = dict(variable.value, **{entity.name: entity.state}) %}
            {% endfor %}
            {{ (variable.value | length) | int(0) }}
          attributes:
            list_entities: >
              {% set variable = namespace(value = {}) %}
              {% for entity in states.binary_sensor
                if is_state(entity.entity_id, 'on')
                and is_state_attr(entity.entity_id, 'device_class', 'smoke') %}
                {% set variable.value = dict(variable.value, **{entity.name: entity.state}) %}
              {% endfor %}
              {{ variable.value | dictsort(false, 'value') }}

    ##################################################
    ## ДАТЧИКИ ПРОТІКАННЯ
    ##################################################

    - sensor:
        - name: alarm_water_leak_detect
          unique_id: alarm_water_leak_detect
          state: >
            {% set variable = namespace(value = {}) %}
            {% for entity in states.binary_sensor
              if is_state(entity.entity_id, 'on')
              and is_state_attr(entity.entity_id, 'device_class', 'moisture') %}
              {% set variable.value = dict(variable.value, **{entity.name: entity.state}) %}
            {% endfor %}
            {{ (variable.value | length) | int(0) }}
          attributes:
            list_entities: >
              {% set variable = namespace(value = {}) %}
              {% for entity in states.binary_sensor
                if is_state(entity.entity_id, 'on')
                and is_state_attr(entity.entity_id, 'device_class', 'moisture') %}
                {% set variable.value = dict(variable.value, **{entity.name: entity.state}) %}
              {% endfor %}
              {{ variable.value | dictsort(false, 'value') }}

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## КОНТРОЛЬ ДИМУ
    ##################################################

    - alias: alarm_smoke_control
      id: alarm_smoke_control
      description: Контроль датчиків диму
      initial_state: true

      trigger:
        - platform: template
          value_template: "{{ states('sensor.alarm_smoke_detect') | int(0) > 0 }}"

        - platform: template
          value_template: "{{ states('sensor.alarm_smoke_detect') | int(0) == 0 }}"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ states('sensor.alarm_smoke_detect') | int(0) > 0 }}"
              sequence:
                - action: telegram_bot.send_message
                  data:
                    chat_id:
                      - !secret chat_id_group_tech
                    message: |
                      {{ '\U000026A0' }} Виявлено дим {{ states('sensor.time_date') }}
                      {% for entity_name, entity_state in state_attr('sensor.alarm_smoke_detect', 'list_entities') -%}
                      {{ entity_name }}
                      {% endfor %}

                - action: light.turn_on
                  target:
                    entity_id:
                      - light.yeelight_ceiling4_0x456e813_ambilight
                      - light.yeelight_ceiling4_0x49c726b_ambilight
                      - light.yeelight_ceiling4_0x4a1dacd_ambilight
                  data:
                    brightness_pct: 70
                    color_name: red
                    transition: 2

            - conditions:
                - condition: template
                  value_template: "{{ states('sensor.alarm_smoke_detect') | int(0) == 0 }}"
              sequence:
                - action: telegram_bot.send_message
                  data:
                    chat_id:
                      - !secret chat_id_group_tech
                    message: >
                      Задимлення відсутнє

                - action: light.turn_on
                  target:
                    entity_id:
                      - light.yeelight_ceiling4_0x456e813_ambilight
                      - light.yeelight_ceiling4_0x49c726b_ambilight
                      - light.yeelight_ceiling4_0x4a1dacd_ambilight
                  data:
                    brightness_pct: 70
                    color_name: green
                    transition: 2

                - delay: "00:00:10"

                - action: light.turn_off
                  target:
                    entity_id:
                      - light.yeelight_ceiling4_0x49c726b_ambilight
                      - light.yeelight_ceiling4_0x4a1dacd_ambilight
                      - light.yeelight_ceiling4_0x456e813_ambilight

    ##################################################
    ## КОНТРОЛЬ ПРОТІКАННЯ
    ##################################################

    - alias: alarm_water_leak_control
      id: alarm_water_leak_control
      description: Контроль датчиків протікання
      initial_state: true

      trigger:
        - platform: template
          value_template: "{{ states('sensor.alarm_water_leak_detect') | int(0) > 0 }}"

        - platform: template
          value_template: "{{ states('sensor.alarm_water_leak_detect') | int(0) == 0 }}"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ states('sensor.alarm_water_leak_detect') | int(0) > 0 }}"
              sequence:
                - action: telegram_bot.send_message
                  data:
                    chat_id:
                      - !secret chat_id_group_tech
                    message: |
                      {{ '\U000026A0' }} Виявлено протікання {{ states('sensor.time_date') }}
                      {% for entity_name, entity_state in state_attr('sensor.alarm_water_leak_detect', 'list_entities') -%}
                      {{ entity_name }}
                      {% endfor %}

                - action: light.turn_on
                  target:
                    entity_id:
                      - light.yeelight_ceiling4_0x456e813_ambilight
                      - light.yeelight_ceiling4_0x49c726b_ambilight
                      - light.yeelight_ceiling4_0x4a1dacd_ambilight
                  data:
                    brightness_pct: 70
                    color_name: red
                    transition: 2

            - conditions:
                - condition: template
                  value_template: "{{ states('sensor.alarm_water_leak_detect') | int(0) == 0 }}"
              sequence:
                - action: telegram_bot.send_message
                  data:
                    chat_id:
                      - !secret chat_id_group_tech
                    message: >
                      Протікання усунено

                - action: light.turn_on
                  target:
                    entity_id:
                      - light.yeelight_ceiling4_0x456e813_ambilight
                      - light.yeelight_ceiling4_0x49c726b_ambilight
                      - light.yeelight_ceiling4_0x4a1dacd_ambilight
                  data:
                    brightness_pct: 70
                    color_name: green
                    transition: 2

                - delay: "00:00:10"

                - action: light.turn_off
                  target:
                    entity_id:
                      - light.yeelight_ceiling4_0x49c726b_ambilight
                      - light.yeelight_ceiling4_0x4a1dacd_ambilight
                      - light.yeelight_ceiling4_0x456e813_ambilight