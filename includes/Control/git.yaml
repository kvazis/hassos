git:

  homeassistant:
    customize:

      automation.sys_git_update:
        friendly_name: Git - оновлення конфігурації
        icon: mdi:git

      input_button.sys_git_update:
        friendly_name: Git - оновлення конфігурації
        icon: mdi:git

  shell_command:
    git_config: "bash ./ha_git.sh"

  input_button:
    sys_git_update:
      name: Git - оновлення конфігурації

  automation:
    - alias: sys_git_update
      id: sys_git_update
      description: Git - оновлення конфігурації
      trigger:
        - platform: state
          entity_id: input_button.sys_git_update
      action:
        - action: shell_command.git_config