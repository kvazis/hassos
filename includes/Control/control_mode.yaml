##################################################
## Актуалізовано: 2026-03-21
##################################################

control_mode:

  homeassistant:
    customize:
      switch.control_mode:
        friendly_name: Система - режим керування
        icon: mdi:server

  mqtt:

    ##################################################
    ## ПЕРЕМИКАЧ РЕЖИМУ КЕРУВАННЯ (MQTT)
    ##################################################

    switch:
      - name: control_mode
        unique_id: control_mode
        state_topic: "states/control"
        command_topic: "states/control"
        payload_on: "ON"
        payload_off: "OFF"
        state_on: "ON"
        state_off: "OFF"
        retain: true
