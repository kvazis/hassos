control_mode:

    mqtt:
      binary_sensor:
        - name: control
          unique_id: control
          state_topic: "states/control"

    template:
    
      - switch:

          - unique_id: control_mode
            name: Режим управления
            default_entity_id: switch.control_mode
            state: >
              {{ is_state('binary_sensor.control', 'on') }}    
            turn_on:
              - action: mqtt.publish
                data:
                  topic: states/control
                  payload: 'ON'
                  retain: true          
            turn_off:
              - action: mqtt.publish
                data:
                  topic: states/control
                  payload: 'OFF'
                  retain: true          
            icon: >
              {% if is_state('switch.control_mode', 'on') %}
                mdi:server
              {% else %}
                mdi:server-off
              {% endif %}


