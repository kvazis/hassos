##################################################
## Актуалізовано: 2026-03-25
##################################################

k7_1_3_power:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:
      binary_sensor.k7_1_3_power_ping:
        friendly_name: Живлення 1-3 - статус
        icon: mdi:transmission-tower

      sensor.k7_1_3_power_on_yesterday:
        friendly_name: Живлення 1-3 - час за добу
        icon: mdi:timer-outline

      input_datetime.k7_1_3_power_off_time:
        friendly_name: Живлення 1-3 - вимкнення
        icon: mdi:power-plug-off

      input_datetime.k7_1_3_power_on_time:
        friendly_name: Живлення 1-3 - увімкнення
        icon: mdi:power-plug

      input_boolean.k7_1_3_power_off_notify_lock:
        friendly_name: Блокування - вимкнення 1-3
        icon: mdi:lock

      input_boolean.k7_1_3_power_on_notify_lock:
        friendly_name: Блокування - увімкнення 1-3
        icon: mdi:lock

      automation.k7_1_3_power_off_record:
        friendly_name: Живлення 1-3 - фіксація вимкнення
        icon: mdi:power-off

      automation.k7_1_3_power_on_record:
        friendly_name: Живлення 1-3 - фіксація увімкнення
        icon: mdi:power

      automation.k7_1_3_power_off_notify:
        friendly_name: Живлення 1-3 - повідомлення про вимкнення
        icon: mdi:alert

      automation.k7_1_3_power_off_notify_reset:
        friendly_name: Живлення 1-3 - розблокування вимкнення
        icon: mdi:lock-open

      automation.k7_1_3_power_on_notify:
        friendly_name: Живлення 1-3 - повідомлення про увімкнення
        icon: mdi:check

      automation.k7_1_3_power_on_notify_reset:
        friendly_name: Живлення 1-3 - розблокування увімкнення
        icon: mdi:lock-open

  ##################################################
  ## RECORDER
  ##################################################

  recorder:
    include:
      entities:
        - binary_sensor.k7_1_3_power_ping
        - sensor.k7_1_3_power_on_yesterday
        - binary_sensor.93_127_127_43

  ##################################################
  ## INPUT_BOOLEAN
  ##################################################

  input_boolean:
    k7_1_3_power_off_notify_lock:
      name: k7_1_3_power_off_notify_lock

    k7_1_3_power_on_notify_lock:
      name: k7_1_3_power_on_notify_lock

  ##################################################
  ## INPUT_DATETIME
  ##################################################

  input_datetime:
    k7_1_3_power_off_time:
      name: k7_1_3_power_off_time
      has_date: true
      has_time: true

    k7_1_3_power_on_time:
      name: k7_1_3_power_on_time
      has_date: true
      has_time: true

  ##################################################
  ## SENSOR
  ##################################################

  sensor:
    - platform: history_stats
      name: k7_1_3_power_on_yesterday
      entity_id: binary_sensor.k7_1_3_power_ping
      state: "on"
      type: time
      start: "{{ (today_at('00:00:00') - timedelta(days=1)) }}"
      end: "{{ today_at('00:00:00') }}"

  ##################################################
  ## TEMPLATE
  ##################################################

  template:
    - binary_sensor:
        - name: k7_1_3_power_ping
          unique_id: k7_1_3_power_ping
          state: >
            {{ is_state('binary_sensor.93_127_127_43', 'on') }}
          delay_off:
            minutes: 1

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## ФІКСАЦІЯ ВИМКНЕННЯ
    ##################################################
    - alias: k7_1_3_power_off_record
      id: k7_1_3_power_off_record
      description: Фіксація вимкнення 1-3
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.k7_1_3_power_ping
          from: "on"
          to: "off"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_notification
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_1_3_power_off_notify_lock
          state: "off"

      action:
        - action: input_datetime.set_datetime
          data:
            datetime: " {{ (now() - timedelta(minutes=1)).strftime('%Y-%m-%d %H:%M:%S') }}"
          target:
            entity_id: input_datetime.k7_1_3_power_off_time

    ##################################################
    ## ФІКСАЦІЯ УВІМКНЕННЯ
    ##################################################
    - alias: k7_1_3_power_on_record
      id: k7_1_3_power_on_record
      description: Фіксація увімкнення 1-3
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.k7_1_3_power_ping
          from: "off"
          to: "on"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_notification
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_1_3_power_on_notify_lock
          state: "off"

      action:
        - action: input_datetime.set_datetime
          data:
            datetime: " {{ (now()).strftime('%Y-%m-%d %H:%M:%S') }}"
          target:
            entity_id: input_datetime.k7_1_3_power_on_time

    ##################################################
    ## ПОВІДОМЛЕННЯ ПРО ВИМКНЕННЯ
    ##################################################
    - alias: k7_1_3_power_off_notify
      id: k7_1_3_power_off_notify
      description: Повідомлення про вимкнення світла 1-3
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.k7_1_3_power_ping
          from: "on"
          to: "off"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_notification
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_1_3_power_off_notify_lock
          state: "off"

      action:
        - delay: 00:00:05

        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.k7_1_3_power_off_notify_lock

        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_k7
            message: |
              {%- set off = as_datetime(states('input_datetime.k7_1_3_power_off_time')) -%}
              {%- set on  = as_datetime(states('input_datetime.k7_1_3_power_on_time')) -%}

              {%- if off and on -%}
                {%- set d = off - on -%}
                {%- set days = d.days -%}
                {%- set sec = d.seconds -%}
                {%- set h = sec // 3600 -%}
                {%- set m = (sec % 3600) // 60 -%}
                {%- set s = sec % 60 -%}

              🟥 1️⃣2️⃣3️⃣
              Зникнення живлення по вводу 1-3 секції в {{ (now() - timedelta(minutes=1)).strftime('%H:%M') }}
              ⏳ Електрика була - {{ (days ~ 'д ' ) if days > 0 else '' }}{{ '%02d:%02d:%02d'|format(h,m,s) }}
              {%- else -%}
              🟥 1️⃣2️⃣3️⃣
              Зникнення живлення по вводу 1-3 секції в {{ (now() - timedelta(minutes=1)).strftime('%H:%M') }}
              ⏳ Електрика була - н/д
              {%- endif -%}

    ##################################################
    ## РОЗБЛОКУВАННЯ ВИМКНЕННЯ
    ##################################################
    - alias: k7_1_3_power_off_notify_reset
      id: k7_1_3_power_off_notify_reset
      description: Розблокування повідомлення про вимкнення 1-3
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.k7_1_3_power_ping
          from: "off"
          to: "on"

      condition:
        - condition: state
          entity_id: input_boolean.k7_1_3_power_off_notify_lock
          state: "on"

      action:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.k7_1_3_power_off_notify_lock

    ##################################################
    ## ПОВІДОМЛЕННЯ ПРО УВІМКНЕННЯ
    ##################################################
    - alias: k7_1_3_power_on_notify
      id: k7_1_3_power_on_notify
      description: Повідомлення про увімкнення світла 1-3
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.k7_1_3_power_ping
          from: "off"
          to: "on"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_notification
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_1_3_power_on_notify_lock
          state: "off"

      action:
        - delay: 00:00:05

        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.k7_1_3_power_on_notify_lock

        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_k7
            message: |
              {%- set off = as_datetime(states('input_datetime.k7_1_3_power_on_time')) -%}
              {%- set on  = as_datetime(states('input_datetime.k7_1_3_power_off_time')) -%}

              {%- if off and on -%}
                {%- set d = off - on -%}
                {%- set days = d.days -%}
                {%- set sec = d.seconds -%}
                {%- set h = sec // 3600 -%}
                {%- set m = (sec % 3600) // 60 -%}
                {%- set s = sec % 60 -%}

              🟩 1️⃣2️⃣3️⃣
              Відновлення живлення по вводу 1-3 секції в {{ (now()).strftime('%H:%M') }}
              ⏳ Електрики не було - {{ (days ~ 'д ' ) if days > 0 else '' }}{{ '%02d:%02d:%02d'|format(h,m,s) }}
              {%- else -%}
              🟩 1️⃣2️⃣3️⃣
              Відновлення живлення по вводу 1-3 секції в {{ (now()).strftime('%H:%M') }}
              ⏳ Електрики не було - н/д
              {%- endif -%}

    ##################################################
    ## РОЗБЛОКУВАННЯ УВІМКНЕННЯ
    ##################################################
    - alias: k7_1_3_power_on_notify_reset
      id: k7_1_3_power_on_notify_reset
      description: Розблокування повідомлення про увімкнення 1-3
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.k7_1_3_power_ping
          from: "on"
          to: "off"

      condition:
        - condition: state
          entity_id: input_boolean.k7_1_3_power_on_notify_lock
          state: "on"

      action:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.k7_1_3_power_on_notify_lock