##################################################
## Актуалізовано: 2026-03-25
##################################################

early_warning:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:
      sensor.tg_parser_source_1:
        friendly_name: Парсер ТГ - джерело 1
        icon: mdi:telegram

      sensor.tg_parser_source_2:
        friendly_name: Парсер ТГ - джерело 2
        icon: mdi:telegram

      sensor.tg_parser_source_1_type:
        friendly_name: Парсер ТГ - тип події 1
        icon: mdi:information

      sensor.tg_parser_source_2_type:
        friendly_name: Парсер ТГ - тип події 2
        icon: mdi:information

      input_boolean.tg_parser_gone_lock:
        friendly_name: Блокування - вимкнення світла
        icon: mdi:lock

      input_boolean.tg_parser_back_lock:
        friendly_name: Блокування - увімкнення світла
        icon: mdi:lock

      automation.tg_parser_gone_notification:
        friendly_name: Світло - попередження про вимкнення
        icon: mdi:flash

      automation.tg_parser_gone_notification_block:
        friendly_name: Світло - блокування попередження вимкнення
        icon: mdi:lock-alert

      automation.tg_parser_gone_notification_reload:
        friendly_name: Світло - розблокування вимкнення
        icon: mdi:lock-open

      automation.tg_parser_back_notification:
        friendly_name: Світло - попередження про увімкнення
        icon: mdi:flash-outline

      automation.tg_parser_back_notification_block:
        friendly_name: Світло - блокування попередження увімкнення
        icon: mdi:lock-alert

      automation.tg_parser_back_notification_reload:
        friendly_name: Світло - розблокування увімкнення
        icon: mdi:lock-open

  ##################################################
  ## RECORDER
  ##################################################

  recorder:
    include:
      entities:
        - sensor.parser_tg_parser_source_1
        - sensor.parser_tg_parser_source_2
        - sensor.parser_tg_parser_source_1_type
        - sensor.parser_tg_parser_source_2_type

  ##################################################
  ## REST
  ##################################################

  rest:
    - resource_template: "https://r.jina.ai/https://t.me/s/svitlobot_pr19?nocache={{ now().timestamp()|int }}"
      scan_interval: 20
      timeout: 30
      sensor:
        - name: tg_parser_source_1
          value_template: >-
            {% set page = value | default('', true) %}
            {% set text = page | lower
                           | replace('’','ʼ') | replace("'",'ʼ') | replace('`','ʼ') %}

            {% set pos_gone  = text.rfind('світло зникло') %}
            {% set pos_back1 = text.rfind('світло зʼявилося') %}
            {% set pos_back2 = text.rfind('світло зявилося') %}

            {% set idx = [pos_gone, pos_back1, pos_back2] | max %}

            {% if idx == -1 %}
              {{ '' }}
            {% else %}
              {% set start = page.rfind('\n', 0, idx) %}
              {% set end   = page.find('\n', idx) %}
              {% set start = 0 if start == -1 else start + 1 %}
              {% set end   = page|length if end == -1 else end %}
              {{ page[start:end] | trim }}
            {% endif %}

    - resource_template: "https://r.jina.ai/https://t.me/s/svitlobot_ivasuka_v32?nocache={{ now().timestamp()|int }}"
      scan_interval: 20
      timeout: 30
      sensor:
        - name: tg_parser_source_2
          value_template: >-
            {% set page = value | default('', true) %}
            {% set text = page | lower
                           | replace('’','ʼ') | replace("'",'ʼ') | replace('`','ʼ') %}

            {% set pos_gone  = text.rfind('світло зникло') %}
            {% set pos_back1 = text.rfind('світло зʼявилося') %}
            {% set pos_back2 = text.rfind('світло зявилося') %}

            {% set idx = [pos_gone, pos_back1, pos_back2] | max %}

            {% if idx == -1 %}
              {{ '' }}
            {% else %}
              {% set start = page.rfind('\n', 0, idx) %}
              {% set end   = page.find('\n', idx) %}
              {% set start = 0 if start == -1 else start + 1 %}
              {% set end   = page|length if end == -1 else end %}
              {{ page[start:end] | trim }}
            {% endif %}

  ##################################################
  ## TEMPLATE
  ##################################################

  template:
    - sensor:
        - name: tg_parser_source_1_type
          state: >-
            {% set l = (states('sensor.tg_parser_source_1') | lower
                        | replace('’','ʼ') | replace("'",'ʼ') | replace('`','ʼ')) %}
            {% if 'світло зникло' in l %} gone
            {% elif 'світло зʼявилося' in l or 'світло зявилося' in l %} back
            {% else %} unknown
            {% endif %}

        - name: tg_parser_source_2_type
          state: >-
            {% set l = (states('sensor.tg_parser_source_2') | lower
                        | replace('’','ʼ') | replace("'",'ʼ') | replace('`','ʼ')) %}
            {% if 'світло зникло' in l %} gone
            {% elif 'світло зʼявилося' in l or 'світло зявилося' in l %} back
            {% else %} unknown
            {% endif %}

  ##################################################
  ## INPUT_BOOLEAN
  ##################################################

  input_boolean:
    tg_parser_gone_lock:
      name: tg_parser_gone_lock

    tg_parser_back_lock:
      name: tg_parser_back_lock

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## ПОПЕРЕДЖЕННЯ ПРО ВИМКНЕННЯ СВІТЛА
    ##################################################
    - alias: tg_parser_gone_notification
      id: tg_parser_gone_notification
      description: Сповіщення про можливе вимкнення світла
      initial_state: false
      trigger:
        - platform: state
          entity_id: sensor.tg_parser_source_1_type
          to: "gone"

        - platform: state
          entity_id: sensor.tg_parser_source_2_type
          to: "gone"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_notification
          state: "on"

        - condition: state
          entity_id: input_boolean.tg_parser_gone_lock
          state: "off"

        - condition: state
          entity_id: binary_sensor.electricity
          state: "off"

        - condition: state
          entity_id: input_boolean.k7_notification_extr
          state: "off"

      action:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.tg_parser_gone_lock

        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_k7
            message: |
              🔶 4️⃣5️⃣6️⃣7️⃣
              Увага! Виявлено ознаки можливого вимкнення електроенергії найближчими хвилинами
              Аналіз на основі інших будинків групи 9.1

    ##################################################
    ## БЛОКУВАННЯ (ЯКЩО ЗАПІЗНИЛОСЬ)
    ##################################################
    - alias: tg_parser_gone_notification_block
      id: tg_parser_gone_notification_block
      description: Блокування при фактичному вимкненні
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.electricity
          from: "off"
          to: "on"

      condition:
        - condition: state
          entity_id: input_boolean.tg_parser_gone_lock
          state: "off"

      action:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.tg_parser_gone_lock

    ##################################################
    ## РОЗБЛОКУВАННЯ ВИМКНЕННЯ
    ##################################################
    - alias: tg_parser_gone_notification_reload
      id: tg_parser_gone_notification_reload
      description: Розблокування повідомлення про вимкнення
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.tg_parser_source_1_type
          to: "back"

        - platform: state
          entity_id: sensor.tg_parser_source_2_type
          to: "back"

      condition:
        - condition: template
          value_template: >
            {{ is_state('sensor.tg_parser_source_1_type', 'back')
               and is_state('sensor.tg_parser_source_2_type', 'back') }}

        - condition: state
          entity_id: input_boolean.tg_parser_gone_lock
          state: "on"

      action:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.tg_parser_gone_lock

    ##################################################
    ## ПОПЕРЕДЖЕННЯ ПРО УВІМКНЕННЯ СВІТЛА
    ##################################################
    - alias: tg_parser_back_notification
      id: tg_parser_back_notification
      description: Сповіщення про можливе увімкнення світла
      initial_state: false
      mode: single
      trigger:
        - platform: state
          entity_id: sensor.tg_parser_source_1_type
          to: "back"

        - platform: state
          entity_id: sensor.tg_parser_source_2_type
          to: "back"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_notification
          state: "on"

        - condition: state
          entity_id: input_boolean.tg_parser_back_lock
          state: "off"

        - condition: state
          entity_id: binary_sensor.electricity
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_notification_extr
          state: "off"

      action:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.tg_parser_back_lock

        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_k7
            message: |
              🔷 4️⃣5️⃣6️⃣7️⃣
              Виявлено ознаки можливого увімкнення електроенергії найближчим часом
              Аналіз на основі інших будинків групи 9.1

    ##################################################
    ## БЛОКУВАННЯ (ЯКЩО ЗАПІЗНИЛОСЬ)
    ##################################################
    - alias: tg_parser_back_notification_block
      id: tg_parser_back_notification_block
      description: Блокування при фактичному увімкненні
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.electricity
          from: "on"
          to: "off"

      condition:
        - condition: state
          entity_id: input_boolean.tg_parser_back_lock
          state: "off"

      action:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.tg_parser_back_lock

    ##################################################
    ## РОЗБЛОКУВАННЯ УВІМКНЕННЯ
    ##################################################
    - alias: tg_parser_back_notification_reload
      id: tg_parser_back_notification_reload
      description: Розблокування повідомлення про увімкнення
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.tg_parser_source_1_type
          to: "gone"

        - platform: state
          entity_id: sensor.tg_parser_source_2_type
          to: "gone"

      condition:
        - condition: template
          value_template: >
            {{ is_state('sensor.tg_parser_source_1_type', 'gone')
               and is_state('sensor.tg_parser_source_2_type', 'gone') }}

        - condition: state
          entity_id: input_boolean.tg_parser_back_lock
          state: "on"

      action:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.tg_parser_back_lock