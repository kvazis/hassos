##################################################
## Актуалізовано: 2026-03-25
##################################################

calendar:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:
      automation.telegram_calendar_reminder:
        friendly_name: Календар - нагадування
        icon: mdi:calendar-clock

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:
    - alias: telegram_calendar_reminder
      id: telegram_calendar_reminder
      description: Календар - нагадування
      initial_state: true
      trigger:
        - platform: calendar
          event: start
          entity_id: calendar.reminder

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_group_tech
            message: |
              {{"\U0001F567"}} {{ now().strftime('%H:%M:%S') }}
              {{"\U0001F4C5"}} {{ trigger.calendar_event.summary }}
              {{"\U00002709"}} {{ trigger.calendar_event.description }}
