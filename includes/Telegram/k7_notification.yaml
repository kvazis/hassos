k7_notification:

    input_button:

      k7_notification:
        name: Сповіщення К7

    automation:
    
    
      - alias: k7_notification
        id: k7_notification
        description: Сповіщення К7
        initial_state: false
        trigger:
    ## Virtual button
        - platform: state
          entity_id: input_button.k7_notification
    # Вимкнення електрики
        - platform: state
          entity_id: binary_sensor.electricity
          from: 'off'
          to: 'on'
    # Увімкнення електрики
        - platform: state
          entity_id: binary_sensor.electricity
          from: 'on'
          to: 'off'
        condition:
    # Перемикач режиму роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
    # Перемикач режиму роботи сповіщень
        - condition: state
          entity_id: input_boolean.k7_notification
          state: 'on'
        action:
            - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.electricity
                    state: 'on'
                sequence:        
                  - delay: 00:00:05
                  - action: telegram_bot.send_message
                    data:
                      chat_id:
                          - !secret chat_id_k7
                      message: | 
                           {{"\U0001F534"}} Електрика {{"\U000026A1"}} вимкнена в {{ states('sensor.time') }}
                           {% set s = (strptime(states("input_datetime.electricity_off"), "%Y-%m-%d %H:%M:%S").timestamp() | int - strptime(states("input_datetime.electricity_on"), "%Y-%m-%d %H:%M:%S").timestamp() | int) %}
                           {{"\U0000231B"}} {{ 'Електрика була - {:02d}:{:02d}:{:02d}'.format ( s % 86400 // 3600, s % 3600 // 60, s % 60) }} 

              - conditions:
                  - condition: state
                    entity_id: binary_sensor.electricity
                    state: 'off'
                sequence:
                  - delay: 00:00:05
                  - action: telegram_bot.send_message
                    data:
                      chat_id:
                          - !secret chat_id_k7
                      message: | 
                           {{"\U00002705"}} Електрика {{"\U000026A1"}} відновлена в {{ states('sensor.time') }}
                           {% set s = (strptime(states("input_datetime.electricity_on"), "%Y-%m-%d %H:%M:%S").timestamp() | int - strptime(states("input_datetime.electricity_off"), "%Y-%m-%d %H:%M:%S").timestamp() | int) %}
                           {{"\U0000231B"}} {{ 'Тривалість відключення - {:02d}:{:02d}:{:02d}'.format ( s % 86400 // 3600, s % 3600 // 60, s % 60) }} 


                         
                         
                         
                         
                         
                         
                         
                         
                         
                         
                         
                         
                         