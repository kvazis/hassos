##################################################
## Актуалізовано: 2026-03-25
##################################################

tg_dtek_notify:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:
      input_boolean.k7_notification_extr:
        friendly_name: К7 - екстрені відключення
        icon: mdi:alert-circle

      automation.k7_notification_dtek_1_3:
        friendly_name: ДТЕК - графік 1-3
        icon: mdi:calendar

      automation.k7_notification_dtek_4_7:
        friendly_name: ДТЕК - графік 4-7
        icon: mdi:calendar

  ##################################################
  ## INPUT_BOOLEAN
  ##################################################

  input_boolean:
    k7_notification_extr:
      name: k7_notification_extr

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## ГРАФІК 1-3
    ##################################################
    - alias: k7_notification_dtek_1_3
      id: k7_notification_dtek_1_3
      mode: single
      initial_state: true
      description: Щоденне повідомлення графік 1-3
      trigger:
        - platform: time
          at: "00:10:00"

      variables:
        cal_entity: calendar.svitlo_kyiv_5_1_outages_schedule

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_notification
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_notification_extr
          state: "off"

      action:
        - action: calendar.get_events
          target:
            entity_id: "{{ cal_entity }}"
          data:
            start_date_time: "{{ today_at('00:00').isoformat() }}"
            end_date_time: "{{ today_at('23:59:59').isoformat() }}"
          response_variable: cal_resp

        - variables:
            body: |-
              {% set r = cal_resp %}
              {% set k = cal_entity %}
              {% set events = r[k]['events'] if r is mapping and (k in r) and (r[k] is mapping) and ('events' in r[k]) else [] %}
              {% set evs = events | sort(attribute='start') %}
              {% set today = now().strftime('%d.%m.%Y') %}

              {% if evs | count == 0 %}
              1️⃣2️⃣3️⃣
              Планових відключень по групі 5.1 {{ today }} не передбачається
              {% else %}
              1️⃣2️⃣3️⃣
              ⚡ Відключення електроенергії група 5.1
              📅 Розклад на сьогодні ({{ today }}):

              {% for e in evs %}
              {% set sdt = as_datetime(e.start) if e.start is defined else none -%}
              {% set edt = as_datetime(e.end)   if e.end   is defined else none -%}
              {% set s   = sdt.astimezone(now().tzinfo) if sdt else none -%}
              {% set e2  = edt.astimezone(now().tzinfo) if edt else none -%}
              🕐 {{ s.strftime('%H:%M') if s else '??:??' }}–{{ e2.strftime('%H:%M') if e2 else '??:??' }}
              {% endfor %}
              {% endif %}

        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_k7
            message: |
              {{ body }}
            disable_web_page_preview: true

    ##################################################
    ## ГРАФІК 4-7
    ##################################################
    - alias: k7_notification_dtek_4_7
      id: k7_notification_dtek_4_7
      mode: single
      initial_state: true
      description: Щоденне повідомлення графік 4-7
      trigger:
        - platform: time
          at: "00:10:10"

      variables:
        cal_entity: calendar.svitlo_kyiv_9_1_outages_schedule

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_notification
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_notification_extr
          state: "off"

      action:
        - action: calendar.get_events
          target:
            entity_id: "{{ cal_entity }}"
          data:
            start_date_time: "{{ today_at('00:00').isoformat() }}"
            end_date_time: "{{ today_at('23:59:59').isoformat() }}"
          response_variable: cal_resp

        - variables:
            body: |-
              {% set r = cal_resp %}
              {% set k = cal_entity %}
              {% set events = r[k]['events'] if r is mapping and (k in r) and (r[k] is mapping) and ('events' in r[k]) else [] %}
              {% set evs = events | sort(attribute='start') %}
              {% set today = now().strftime('%d.%m.%Y') %}

              {% if evs | count == 0 %}
              4️⃣5️⃣6️⃣7️⃣
              Планових відключень по групі 9.1 {{ today }} не передбачається
              {% else %}
              4️⃣5️⃣6️⃣7️⃣
              ⚡ Відключення електроенергії група 9.1
              📅 Розклад на сьогодні ({{ today }}):

              {% for e in evs %}
              {% set sdt = as_datetime(e.start) if e.start is defined else none -%}
              {% set edt = as_datetime(e.end)   if e.end   is defined else none -%}
              {% set s   = sdt.astimezone(now().tzinfo) if sdt else none -%}
              {% set e2  = edt.astimezone(now().tzinfo) if edt else none -%}
              🕐 {{ s.strftime('%H:%M') if s else '??:??' }}–{{ e2.strftime('%H:%M') if e2 else '??:??' }}
              {% endfor %}
              {% endif %}

        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_k7
            message: |
              {{ body }}
            disable_web_page_preview: true