power_outage:

    recorder:
      include:
        entities:
           - sensor.electricity_4_7_yesterday
           - binary_sensor.electricity
           - binary_sensor.188_190_229_184
           - binary_sensor.electricity_second



    homeassistant:
      customize:
      
        binary_sensor.electricity:
          friendly_name: Зовнішнє живлення основний
          icon: mdi:transmission-tower      

        binary_sensor.electricity_second:
          friendly_name: Зовнішнє живлення резервний
          icon: mdi:transmission-tower  
          
  ###################################################################
  # Перемикач режиму сповіщень
  ###################################################################   

    input_boolean:
    
      k7_notification:
        name: Сповіщення К7
        icon: mdi:toggle-switch-outline

  ###################################################################
  # Сенсори відстеження зовнішнього живлення
  ###################################################################
 
    template:
    
      - binary_sensor:

          - name: electricity
            unique_id: electricity
            state: >
              {{ is_state('binary_sensor.deye_sun15_grid', 'off') }}
            device_class: problem
            
          - name: electricity_on_5
            unique_id: electricity_on_5
            state: >
              {{ is_state('binary_sensor.deye_sun15_grid', 'on') }}
            delay_on: 
                minutes: 5


          - name: electricity_second
            unique_id: electricity_second
            state: >
              {{ is_state('binary_sensor.188_190_229_184', 'off') }}
            device_class: problem     
 

  ###################################################################
  # Збереження часу вимкнення і включення
  ###################################################################

    input_datetime:
      electricity_off:
        name: Живлення вимкнене
        has_date: true
        has_time: true
        
      electricity_on:
        name: Живлення відновлене
        has_date: true
        has_time: true

  ###################################################################
  # Накопичення
  ###################################################################

    sensor:
      - platform: history_stats
        name: electricity_4_7_yesterday
        entity_id: binary_sensor.electricity
        state: "off"
        type: time
        start: "{{ (today_at('00:00:00') - timedelta(days=1)) }}"
        end: "{{ today_at('00:00:00') }}"

    automation:     
    
  ###################################################################
  # Фіксація пропадання і появи електрики
  ###################################################################         
          
    - alias: control_electricity_shotdown_log
      id: control_electricity_shotdown_log
      description: Фіксація пропадання і появи електрики
      initial_state: true
      trigger:

  # Вимкнення електрики
      - platform: state
        entity_id: binary_sensor.electricity
        from: 'off'
        to: 'on'

  # Увімкнення електрики
      - platform: state
        entity_id: binary_sensor.electricity
        from: 'on'
        to: 'off'
      action:

  # Вимкнення електрики
          - choose:
            - conditions:
                - condition: state
                  entity_id: binary_sensor.electricity
                  state: 'on'
              sequence:        
                - service: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.electricity_off
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}" 
  
  # Увімкнення електрики
            - conditions:
                - condition: state
                  entity_id: binary_sensor.electricity
                  state: 'off'
              sequence:        
                - service: input_datetime.set_datetime
                  target:
                    entity_id: input_datetime.electricity_on
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}" 
                      
                      
  ###################################################################
  # Сповіщення про фактичне включення і відключення електрики
  ###################################################################
        
        
    - alias: tg_power_outage_notification
      id: tg_power_outage_notification
      description: Сповіщення про фактичне включення і відключення електрики
      initial_state: true
      trigger:

  # Вимкнення електрики
        - platform: state
          entity_id: binary_sensor.electricity
          from: 'off'
          to: 'on'

  # Увімкнення електрики
        - platform: state
          entity_id: binary_sensor.electricity
          from: 'on'
          to: 'off'

      condition:

  # Перемикач режиму роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
 
  # Перемикач режиму роботи сповіщень
        - condition: state
          entity_id: input_boolean.k7_notification
          state: 'on'

      action:

          - choose:

  # Сповіщення про відключення 
            - conditions:
                - condition: state
                  entity_id: binary_sensor.electricity
                  state: 'on'
              sequence:        
                - delay: 00:00:05

                - action: telegram_bot.send_message
                  data:
                    chat_id:
                        - !secret chat_id_k7
                    message: | 
                        {%- set off = as_datetime(states('input_datetime.electricity_off')) -%}
                        {%- set on  = as_datetime(states('input_datetime.electricity_on')) -%}
                        
                        {%- if off and on -%}
                          {%- set d = off - on -%}
                          {%- set days = d.days -%}
                          {%- set sec = d.seconds -%}
                          {%- set h = sec // 3600 -%}
                          {%- set m = (sec % 3600) // 60 -%}
                          {%- set s = sec % 60 -%}
                        
                        🔴 4️⃣5️⃣6️⃣7️⃣ 
                        Електрика по вводу секцій 4-7 вимкнена в {{ states('sensor.time') }}
                        ⏳ Електрика була - {{ (days ~ 'д ' ) if days > 0 else '' }}{{ '%02d:%02d:%02d'|format(h,m,s) }}
                        {%- else -%}
                        🔴 4️⃣5️⃣6️⃣7️⃣ 
                        Електрика по вводу секцій 4-7 вимкнена в {{ states('sensor.time') }}
                        ⏳ Електрика була - н/д
                        {%- endif -%}

  # Сповіщення про включення 
            - conditions:
                - condition: state
                  entity_id: binary_sensor.electricity
                  state: 'off'
              sequence:
                - delay: 00:00:05

                - action: telegram_bot.send_message
                  data:
                    chat_id:
                        - !secret chat_id_k7
                    message: | 
                        {%- set on  = as_datetime(states('input_datetime.electricity_on')) -%}
                        {%- set off = as_datetime(states('input_datetime.electricity_off')) -%}
                        
                        {%- if on and off -%}
                          {%- set d = on - off -%}
                          {%- set days = d.days -%}
                          {%- set sec = d.seconds -%}
                          {%- set h = sec // 3600 -%}
                          {%- set m = (sec % 3600) // 60 -%}
                          {%- set s = sec % 60 -%}
                        
                        🟢 4️⃣5️⃣6️⃣7️⃣ 
                        Електрика по вводу секцій 4-7 відновлена в {{ states('sensor.time') }}
                        ⚡Напруга - Фаза 1 - {{ states('sensor.deye_sun15_grid_l1_voltage') }} В, Фаза 2 - {{ states('sensor.deye_sun15_grid_l2_voltage') }} В, Фаза 3 - {{ states('sensor.deye_sun15_grid_l3_voltage') }} В
                        ⏳ Не було електрики - {{ (days ~ 'д ' ) if days > 0 else '' }}{{ '%02d:%02d:%02d'|format(h,m,s) }}
                        {%- else -%}
                        🟢 4️⃣5️⃣6️⃣7️⃣ 
                        Електрика по вводу секцій 4-7 відновлена в {{ states('sensor.time') }}
                        ⚡Напруга - Фаза 1 - {{ states('sensor.deye_sun15_grid_l1_voltage') }} В, Фаза 2 - {{ states('sensor.deye_sun15_grid_l2_voltage') }} В, Фаза 3 - {{ states('sensor.deye_sun15_grid_l3_voltage') }} В
                        ⏳ Не було електрики - н/д
                        {%- endif -%}  
                        
                        

    
    - alias: k7_notification_summary
      id: k7_notification_summary
      mode: single
      initial_state: true
      description: "Щоденний звіт по електриці"
    
      trigger:
          - platform: time
            at: "00:05:00"
                 
      condition:

  # Перемикач режиму роботи серверу
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
 
  # Перемикач режиму роботи сповіщень
        - condition: state
          entity_id: input_boolean.k7_notification
          state: 'on'

      action:
        - action: telegram_bot.send_message
          data:
            chat_id:
                - !secret chat_id_k7
            message: |

                {% set total = 24 * 60 %}
            
                {% set m  = (states('sensor.electricity_1_3_yesterday')|float * 60) | round(0) | int %}
                {% set m  = [0, [m, total] | min] | max %}
                {% set on_h  = (m // 60) %}
                {% set on_mm = (m % 60) %}
                {% set off   = total - m %}
                {% set off_h  = (off // 60) %}
                {% set off_mm = (off % 60) %}
            
                {% set m1 = (states('sensor.electricity_4_7_yesterday')|float * 60) | round(0) | int %}
                {% set m1 = [0, [m1, total] | min] | max %}
                {% set on_h1  = (m1 // 60) %}
                {% set on_mm1 = (m1 % 60) %}
                {% set off1   = total - m1 %}
                {% set off_h1  = (off1 // 60) %}
                {% set off_mm1 = (off1 % 60) %}
            
                {% set m3 = (states('sensor.electricity_3_partial_yesterday')|float * 60) | round(0) | int %}
                {% set m3 = [0, [m3, total] | min] | max %}
                {% set on_h3  = (m3 // 60) %}
                {% set on_mm3 = (m3 % 60) %}
                {% set off3   = total - m3 %}
                {% set off_h3  = (off3 // 60) %}
                {% set off_mm3 = (off3 % 60) %}
            
                {% set diff = (m - m3) | abs %}
            
                ⚡ Звіт за {{ (now() - timedelta(days=1)).strftime('%d.%m.%Y') }}:
            
                1️⃣2️⃣3️⃣
                ✅ Електрика була: {{ on_h }}г {{ '%02d'|format(on_mm) }}хв
                ❌ Без електрики: {{ off_h }}г {{ '%02d'|format(off_mm) }}хв
            
                4️⃣5️⃣6️⃣7️⃣
                ✅ Електрика була: {{ on_h1 }}г {{ '%02d'|format(on_mm1) }}хв
                ❌ Без електрики: {{ off_h1 }}г {{ '%02d'|format(off_mm1) }}хв
            
                {% if diff > 30 %}
            
                🔺3️⃣ (часткове)
                ✅ Електрика була: {{ on_h3 }}г {{ '%02d'|format(on_mm3) }}хв
                ❌ Без електрики: {{ off_h3 }}г {{ '%02d'|format(off_mm3) }}хв
                📊 Відхилення від 1-3: {{ (diff // 60) }}г {{ '%02d'|format(diff % 60) }}хв
            
                {% endif %}                        
  