##################################################
## Актуалізовано: 2026-03-25
##################################################

k7_3_partial_power:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:
      sensor.k7_3_partial_power_source:
        friendly_name: Парсер ТГ 3 - джерело
        icon: mdi:telegram

      sensor.k7_3_partial_power_event:
        friendly_name: Парсер ТГ 3 - тип події
        icon: mdi:information

      sensor.k7_3_partial_power_on_yesterday:
        friendly_name: Секція 3 - час за добу
        icon: mdi:timer-outline

      input_boolean.k7_3_partial_power_log:
        friendly_name: Секція 3 - лог електрики
        icon: mdi:history

      input_boolean.k7_3_partial_power_off_notify_lock:
        friendly_name: Блокування - вимкнення (3)
        icon: mdi:lock

      input_boolean.k7_3_partial_power_on_notify_lock:
        friendly_name: Блокування - увімкнення (3)
        icon: mdi:lock

      input_datetime.k7_3_partial_power_off_time:
        friendly_name: Секція 3 - вимкнення (частково)
        icon: mdi:power-plug-off

      input_datetime.k7_3_partial_power_on_time:
        friendly_name: Секція 3 - увімкнення (частково)
        icon: mdi:power-plug

      binary_sensor.k7_3_partial_power_on:
        friendly_name: Секція 3 - часткове відновлення
        icon: mdi:check

      binary_sensor.k7_3_partial_power_off:
        friendly_name: Секція 3 - часткове вимкнення
        icon: mdi:alert

      binary_sensor.k7_1_3_power_ping_stable_5m:
        friendly_name: Живлення 1-3 - стабільний ping 5 хв
        icon: mdi:lan-connect

      binary_sensor.k7_1_3_power_ping_unstable_5m:
        friendly_name: Живлення 1-3 - нестабільний ping 5 хв
        icon: mdi:lan-disconnect

      automation.k7_3_partial_power_off_record:
        friendly_name: Секція 3 - запис вимкнення
        icon: mdi:database-export

      automation.k7_3_partial_power_on_record:
        friendly_name: Секція 3 - запис увімкнення
        icon: mdi:database-import

      automation.k7_3_partial_power_on_notify:
        friendly_name: Секція 3 - повідомлення про відновлення
        icon: mdi:check-circle

      automation.k7_3_partial_power_off_notify:
        friendly_name: Секція 3 - повідомлення про вимкнення
        icon: mdi:alert-circle

  ##################################################
  ## RECORDER
  ##################################################

  recorder:
    include:
      entities:
        - sensor.k7_3_partial_power_source
        - sensor.k7_3_partial_power_event
        - sensor.k7_3_partial_power_on_yesterday
        - input_boolean.k7_3_partial_power_log

  ##################################################
  ## REST
  ##################################################

  rest:
    - resource_template: "https://r.jina.ai/https://t.me/s/k7outage13s?nocache={{ now().timestamp()|int }}"
      scan_interval: 20
      timeout: 30
      sensor:
        - name: k7_3_partial_power_source
          value_template: >-
            {% set page = value | default('', true) %}
            {% set text = page | lower
                           | replace('’','ʼ') | replace("'",'ʼ') | replace('`','ʼ') %}

            {% set pos_gone  = text.rfind('зникнення') %}
            {% set pos_back  = text.rfind('відновлення') %}
            {% set idx = [pos_gone, pos_back] | max %}

            {% if idx == -1 %}
              {{ '' }}
            {% else %}
              {% set start = page.rfind('\n', 0, idx) %}
              {% set end   = page.find('\n', idx) %}
              {% set start = 0 if start == -1 else start + 1 %}
              {% set end   = page|length if end == -1 else end %}
              {{ page[start:end] | trim }}
            {% endif %}

  ##################################################
  ## INPUT_DATETIME
  ##################################################

  input_datetime:
    k7_3_partial_power_off_time:
      name: k7_3_partial_power_off_time
      has_date: true
      has_time: true

    k7_3_partial_power_on_time:
      name: k7_3_partial_power_on_time
      has_date: true
      has_time: true

  ##################################################
  ## SENSOR
  ##################################################

  sensor:
    - platform: history_stats
      name: k7_3_partial_power_on_yesterday
      unique_id: k7_3_partial_power_on_yesterday
      entity_id: input_boolean.k7_3_partial_power_log
      state: "on"
      type: time
      start: "{{ (today_at('00:00:00') - timedelta(days=1)) }}"
      end: "{{ today_at('00:00:00') }}"

  ##################################################
  ## INPUT_BOOLEAN
  ##################################################

  input_boolean:
    k7_3_partial_power_off_notify_lock:
      name: k7_3_partial_power_off_notify_lock

    k7_3_partial_power_on_notify_lock:
      name: k7_3_partial_power_on_notify_lock

    k7_3_partial_power_log:
      name: k7_3_partial_power_log

  ##################################################
  ## TEMPLATE
  ##################################################

  template:
    - sensor:
        - name: k7_3_partial_power_event
          unique_id: k7_3_partial_power_event
          state: >-
            {% set l = (states('sensor.k7_3_partial_power_source') | lower
                        | replace('’','ʼ') | replace("'",'ʼ') | replace('`','ʼ')) %}
            {% if 'зникнення' in l %} gone
            {% elif 'відновлення' in l %} back
            {% else %} unknown
            {% endif %}

    - binary_sensor:
        - name: k7_3_partial_power_on
          unique_id: k7_3_partial_power_on
          state: >
            {{ is_state('sensor.k7_3_partial_power_event', 'back') }}
          delay_on:
            minutes: 2
          delay_off:
            seconds: 30

        - name: k7_1_3_power_ping_stable_5m
          unique_id: k7_1_3_power_ping_stable_5m
          state: "{{ is_state('binary_sensor.93_127_127_43', 'on') }}"
          delay_on:
            minutes: 5
          delay_off:
            seconds: 15

        - name: k7_3_partial_power_off
          unique_id: k7_3_partial_power_off
          state: >
            {{ is_state('sensor.k7_3_partial_power_event', 'gone') }}
          delay_on:
            minutes: 2
          delay_off:
            seconds: 30

        - name: k7_1_3_power_ping_unstable_5m
          unique_id: k7_1_3_power_ping_unstable_5m
          state: "{{ is_state('binary_sensor.93_127_127_43', 'off') }}"
          delay_on:
            minutes: 5
          delay_off:
            seconds: 15

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## ЗАПИС ВИМКНЕННЯ
    ##################################################
    - alias: k7_3_partial_power_off_record
      id: k7_3_partial_power_off_record
      description: Запис часу часткового вимкнення (TG)
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.k7_3_partial_power_event
          from: "back"
          to: "gone"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.k7_3_partial_power_off_time
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.k7_3_partial_power_log

    ##################################################
    ## ЗАПИС УВІМКНЕННЯ
    ##################################################
    - alias: k7_3_partial_power_on_record
      id: k7_3_partial_power_on_record
      description: Запис часу часткового відновлення (TG)
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.k7_3_partial_power_event
          from: "gone"
          to: "back"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.k7_3_partial_power_on_time
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.k7_3_partial_power_log

    ##################################################
    ## ПОВІДОМЛЕННЯ ПРО ВІДНОВЛЕННЯ
    ##################################################
    - alias: k7_3_partial_power_on_notify
      id: k7_3_partial_power_on_notify
      description: Повідомлення про часткове відновлення
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.k7_3_partial_power_on
          from: "off"
          to: "on"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_notification
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_3_partial_power_on_notify_lock
          state: "off"

      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: binary_sensor.k7_1_3_power_ping_stable_5m
                  state: "on"
              sequence:
                - action: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.k7_3_partial_power_on_notify_lock

                - action: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.k7_3_partial_power_off_notify_lock

                - action: telegram_bot.send_message
                  data:
                    chat_id:
                      - !secret chat_id_k7
                    message: |
                      {%- set off = as_datetime(states('input_datetime.k7_3_partial_power_on_time')) -%}
                      {%- set on  = as_datetime(states('input_datetime.k7_3_partial_power_off_time')) -%}

                      {%- if off and on -%}
                        {%- set d = off - on -%}
                        {%- set days = d.days -%}
                        {%- set sec = d.seconds -%}
                        {%- set h = sec // 3600 -%}
                        {%- set m = (sec % 3600) // 60 -%}
                        {%- set s = sec % 60 -%}
                      ✅3️⃣
                      Часткове відновлення живлення секції 3 о {{ (now()).strftime('%H:%M') }}
                      ⏳ Електрики не було - {{ (days ~ 'д ' ) if days > 0 else '' }}{{ '%02d:%02d:%02d'|format(h,m,s) }}
                      {%- else -%}
                      ✅3️⃣
                      Часткове відновлення живлення секції 3 о {{ (now()).strftime('%H:%M') }}
                      ⏳ Електрики не було - н/д
                      {%- endif -%}

            - conditions:
                - condition: state
                  entity_id: binary_sensor.k7_1_3_power_ping_unstable_5m
                  state: "on"
              sequence:
                - action: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.k7_3_partial_power_on_notify_lock

                - action: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.k7_3_partial_power_off_notify_lock

                - action: telegram_bot.send_message
                  data:
                    chat_id:
                      - !secret chat_id_k7
                    message: |
                      {%- set off = as_datetime(states('input_datetime.k7_3_partial_power_on_time')) -%}
                      {%- set on  = as_datetime(states('input_datetime.k7_3_partial_power_off_time')) -%}

                      {%- if off and on -%}
                        {%- set d = off - on -%}
                        {%- set days = d.days -%}
                        {%- set sec = d.seconds -%}
                        {%- set h = sec // 3600 -%}
                        {%- set m = (sec % 3600) // 60 -%}
                        {%- set s = sec % 60 -%}
                      ✅3️⃣
                      Часткове відновлення живлення секції 3 о {{ (now()).strftime('%H:%M') }}
                      ⏳ Електрики не було - {{ (days ~ 'д ' ) if days > 0 else '' }}{{ '%02d:%02d:%02d'|format(h,m,s) }}
                      {%- else -%}
                      ✅3️⃣
                      Часткове відновлення живлення секції 3 о {{ (now()).strftime('%H:%M') }}
                      ⏳ Електрики не було - н/д
                      {%- endif -%}

          default:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.k7_3_partial_power_on_notify_lock

            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.k7_3_partial_power_off_notify_lock

    ##################################################
    ## ПОВІДОМЛЕННЯ ПРО ВИМКНЕННЯ
    ##################################################
    - alias: k7_3_partial_power_off_notify
      id: k7_3_partial_power_off_notify
      description: Повідомлення про часткове вимкнення
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.k7_3_partial_power_off
          from: "off"
          to: "on"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_notification
          state: "on"

        - condition: state
          entity_id: input_boolean.k7_3_partial_power_off_notify_lock
          state: "off"

      action:
        - choose:
            - conditions:
                - condition: state
