                  state: "on"
              sequence:
                - action: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.k7_3_partial_power_off_notify_lock

                - action: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.k7_3_partial_power_on_notify_lock

                - action: telegram_bot.send_message
                  data:
                    chat_id:
                      - !secret chat_id_k7
                    message: |
                      {%- set off = as_datetime(states('input_datetime.k7_3_partial_power_off_time')) -%}
                      {%- set on  = as_datetime(states('input_datetime.k7_3_partial_power_on_time')) -%}

                      {%- if off and on -%}
                        {%- set d = off - on -%}
                        {%- set days = d.days -%}
                        {%- set sec = d.seconds -%}
                        {%- set h = sec // 3600 -%}
                        {%- set m = (sec % 3600) // 60 -%}
                        {%- set s = sec % 60 -%}
                      ❗3️⃣
                      Часткове вимкнення живлення секції 3 о {{ (now()).strftime('%H:%M') }}
                      ⏳ Електрика була - {{ (days ~ 'д ' ) if days > 0 else '' }}{{ '%02d:%02d:%02d'|format(h,m,s) }}
                      {%- else -%}
                      ❗3️⃣
                      Часткове вимкнення живлення секції 3 о {{ (now()).strftime('%H:%M') }}
                      ⏳ Електрика була - н/д
                      {%- endif -%}

            - conditions:
                - condition: state
                  entity_id: binary_sensor.k7_1_3_power_ping_stable_5m
                  state: "on"
              sequence:
                - action: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.k7_3_partial_power_off_notify_lock

                - action: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.k7_3_partial_power_on_notify_lock

                - action: telegram_bot.send_message
                  data:
                    chat_id:
                      - !secret chat_id_k7
                    message: |
                      {%- set off = as_datetime(states('input_datetime.k7_3_partial_power_off_time')) -%}
                      {%- set on  = as_datetime(states('input_datetime.k7_3_partial_power_on_time')) -%}

                      {%- if off and on -%}
                        {%- set d = off - on -%}
                        {%- set days = d.days -%}
                        {%- set sec = d.seconds -%}
                        {%- set h = sec // 3600 -%}
                        {%- set m = (sec % 3600) // 60 -%}
                        {%- set s = sec % 60 -%}
                      ❗3️⃣
                      Часткове вимкнення живлення секції 3 о {{ (now()).strftime('%H:%M') }}
                      ⏳ Електрика була - {{ (days ~ 'д ' ) if days > 0 else '' }}{{ '%02d:%02d:%02d'|format(h,m,s) }}
                      {%- else -%}
                      ❗3️⃣
                      Часткове вимкнення живлення секції 3 о {{ (now()).strftime('%H:%M') }}
                      ⏳ Електрика була - н/д
                      {%- endif -%}

          default:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.k7_3_partial_power_off_notify_lock

            - action: input_boolean.turn_off
              target:
