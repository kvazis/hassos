##################################################
## Актуалізовано: 2026-03-27
##################################################

deye_energy:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      ##################################################
      ## АВТОМАТИЗАЦІЇ
      ##################################################

      automation.deye_sun15_mode_apply:
        friendly_name: Deye SUN15 - застосування режиму
        icon: mdi:tune-variant

      automation.deye_sun15_mode_watchdog:
        friendly_name: Deye SUN15 - контроль відповідності режиму
        icon: mdi:shield-check-outline

      automation.deye_sun15_tou_profile_apply:
        friendly_name: Deye SUN15 - застосування ToU профілю
        icon: mdi:battery-sync

      automation.deye_sun15_tou_capacity_notify:
        friendly_name: Deye SUN15 - повідомлення про віддачу енергії батареєю
        icon: mdi:battery-arrow-down-outline

      ##################################################
      ## КЕРУВАННЯ
      ##################################################

      input_select.deye_sun15_mode:
        friendly_name: Deye SUN15 - режим роботи
        icon: mdi:car-shift-pattern

      input_select.deye_sun15_tou_profile:
        friendly_name: Deye SUN15 - ToU профіль
        icon: mdi:battery-sync

      ##################################################
      ## ЛОГІЧНІ СЕНСОРИ
      ##################################################

      binary_sensor.deye_sun15_grid_charging_mismatch:
        friendly_name: Deye SUN15 - невідповідність заряджання від мережі
        icon: mdi:alert-circle-outline

      binary_sensor.deye_sun15_tou_mismatch:
        friendly_name: Deye SUN15 - невідповідність ToU
        icon: mdi:alert-circle-outline

      binary_sensor.deye_sun15_mode_mismatch:
        friendly_name: Deye SUN15 - невідповідність режиму
        icon: mdi:alert

      sensor.deye_sun15_expected_tou:
        friendly_name: Deye SUN15 - очікуваний стан ToU
        icon: mdi:timer-outline

      sensor.deye_sun15_expected_grid_charging:
        friendly_name: Deye SUN15 - очікуване заряджання від мережі
        icon: mdi:battery-charging

      sensor.deye_sun15_effective_mode:
        friendly_name: Deye SUN15 - ефективний режим
        icon: mdi:state-machine

      ##################################################
      ## СКРИПТИ
      ##################################################

      script.deye_sun15_mode_apply:
        friendly_name: Deye SUN15 - застосування режиму
        icon: mdi:tune-variant

      script.deye_sun15_tou_apply_optimistic:
        friendly_name: Deye SUN15 - застосування оптимістичного ToU
        icon: mdi:battery-heart-variant

      script.deye_sun15_tou_apply_alert:
        friendly_name: Deye SUN15 - застосування тривожного ToU
        icon: mdi:battery-alert-variant

  ##################################################
  ## INPUT_SELECT
  ##################################################

  input_select:

    deye_sun15_mode:
      name: deye_sun15_mode
      options:
        - normal
        - eco
        - supereco

    deye_sun15_tou_profile:
      name: deye_sun15_tou_profile
      options:
        - optimistic
        - alert

  ##################################################
  ## TEMPLATE
  ##################################################

  template:
    - binary_sensor:

        - name: deye_sun15_grid_charging_mismatch
          unique_id: deye_sun15_grid_charging_mismatch
          state: >
            {{
              states('switch.deye_sun15_battery_grid_charging')
              !=
              states('sensor.deye_sun15_expected_grid_charging')
            }}

        - name: deye_sun15_tou_mismatch
          unique_id: deye_sun15_tou_mismatch
          state: >
            {{
              states('select.deye_sun15_time_of_use')
              !=
              states('sensor.deye_sun15_expected_tou')
            }}

        - name: deye_sun15_mode_mismatch
          unique_id: deye_sun15_mode_mismatch
          state: >
            {{
              is_state('binary_sensor.deye_sun15_tou_mismatch', 'on')
              or
              is_state('binary_sensor.deye_sun15_grid_charging_mismatch', 'on')
            }}

    - sensor:
        - name: deye_sun15_expected_tou
          unique_id: deye_sun15_expected_tou
          state: >
            {% if is_state('input_select.deye_sun15_mode', 'supereco') %}
              Enabled
            {% else %}
              Disabled
            {% endif %}

        - name: deye_sun15_expected_grid_charging
          unique_id: deye_sun15_expected_grid_charging
          state: >
            {% if is_state('input_select.deye_sun15_mode', 'normal') %}
              on
            {% elif is_state('input_select.deye_sun15_mode', 'supereco') %}
              on
            {% elif is_state('input_select.deye_sun15_mode', 'eco')
                    and is_state('binary_sensor.energy_tariff', 'on') %}
              on
            {% else %}
              off
            {% endif %}

        - name: deye_sun15_effective_mode
          unique_id: deye_sun15_effective_mode
          state: >
            {% if is_state('input_select.deye_sun15_mode', 'eco')
                  and is_state('binary_sensor.energy_tariff', 'on') %}
              eco_night
            {% elif is_state('input_select.deye_sun15_mode', 'eco') %}
              eco_day
            {% else %}
              {{ states('input_select.deye_sun15_mode') }}
            {% endif %}

  ##################################################
  ## SCRIPT
  ##################################################

  script:

    deye_sun15_mode_apply:
      alias: deye_sun15_mode_apply
      mode: restart
      sequence:
        - choose:
            - conditions:
                - condition: template
                  value_template: >
                    {{
                      states('select.deye_sun15_time_of_use')
                      !=
                      states('sensor.deye_sun15_expected_tou')
                    }}
              sequence:
                - action: select.select_option
                  target:
                    entity_id: select.deye_sun15_time_of_use
                  data:
                    option: "{{ states('sensor.deye_sun15_expected_tou') }}"
                - delay:
                    seconds: 2

        - choose:
            - conditions:
                - condition: template
                  value_template: >
                    {{ states('sensor.deye_sun15_expected_grid_charging') == 'on' }}
                - condition: state
                  entity_id: switch.deye_sun15_battery_grid_charging
                  state: "off"
              sequence:
                - action: switch.turn_on
                  target:
                    entity_id: switch.deye_sun15_battery_grid_charging

            - conditions:
                - condition: template
                  value_template: >
                    {{ states('sensor.deye_sun15_expected_grid_charging') == 'off' }}
                - condition: state
                  entity_id: switch.deye_sun15_battery_grid_charging
                  state: "on"
              sequence:
                - action: switch.turn_off
                  target:
                    entity_id: switch.deye_sun15_battery_grid_charging

    ##################################################
    ## ОПТИМІСТИЧНИЙ ПРОФІЛЬ TOU
    ##################################################

    deye_sun15_tou_apply_optimistic:
      alias: deye_sun15_tou_apply_optimistic
      mode: single
      sequence:
        - action: number.set_value
          target:
            entity_id: number.deye_sun15_program_1_soc
          data:
            value: 100

        - action: number.set_value
          target:
            entity_id: number.deye_sun15_program_2_soc
          data:
            value: 80

        - action: number.set_value
          target:
            entity_id: number.deye_sun15_program_3_soc
          data:
            value: 60

        - action: number.set_value
          target:
            entity_id: number.deye_sun15_program_4_soc
          data:
            value: 50

        - action: number.set_value
          target:
            entity_id: number.deye_sun15_program_5_soc
          data:
            value: 40

        - action: number.set_value
          target:
            entity_id: number.deye_sun15_program_6_soc
          data:
            value: 20

    ##################################################
    ## ТРИВОЖНИЙ ПРОФІЛЬ TOU
    ##################################################

    deye_sun15_tou_apply_alert:
      alias: deye_sun15_tou_apply_alert
      mode: single
      sequence:
        - action: number.set_value
          target:
            entity_id: number.deye_sun15_program_1_soc
          data:
            value: 100

        - action: number.set_value
          target:
            entity_id: number.deye_sun15_program_2_soc
          data:
            value: 90

        - action: number.set_value
          target:
            entity_id: number.deye_sun15_program_3_soc
          data:
            value: 80

        - action: number.set_value
          target:
            entity_id: number.deye_sun15_program_4_soc
          data:
            value: 70

        - action: number.set_value
          target:
            entity_id: number.deye_sun15_program_5_soc
          data:
            value: 60

        - action: number.set_value
          target:
            entity_id: number.deye_sun15_program_6_soc
          data:
            value: 50

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## ЗАСТОСУВАННЯ РЕЖИМУ
    ##################################################

    - alias: deye_sun15_mode_apply
      id: deye_sun15_mode_apply
      description: Deye SUN15 - застосування режиму
      initial_state: true
      mode: restart

      trigger:
        - platform: state
          entity_id: input_select.deye_sun15_mode
          id: mode_change

        - platform: state
          entity_id: binary_sensor.energy_tariff
          id: night_tariff_change

        - platform: homeassistant
          event: start
          id: ha_start

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: or
          conditions:
            - condition: template
              value_template: "{{ trigger.id != 'night_tariff_change' }}"

            - condition: state
              entity_id: input_select.deye_sun15_mode
              state: "eco"

      action:
        - action: script.deye_sun15_mode_apply

        - if:
            - condition: template
              value_template: "{{ trigger.id != 'ha_start' }}"
          then:
            - action: telegram_bot.send_message
              data:
                chat_id:
                  - !secret chat_id_group_tech
                message: |-
                  🔄 Deye: застосовано режим {{ states('sensor.deye_sun15_effective_mode') }}
                  🌙 Нічний тариф: {{ states('binary_sensor.energy_tariff') }}
                  🔌 Grid charging: {{ states('switch.deye_sun15_battery_grid_charging') }}
                  ⏱ ToU: {{ states('select.deye_sun15_time_of_use') }}
                  🔋 SOC: {{ states('sensor.deye_sun15_battery') }}%
                  🕒 {{ now().strftime('%Y-%m-%d %H:%M') }}

    ##################################################
    ## WATCHDOG РЕЖИМУ
    ##################################################

    - alias: deye_sun15_mode_watchdog
      id: deye_sun15_mode_watchdog
      description: Deye SUN15 - контроль відповідності режиму
      initial_state: true
      mode: restart

      trigger:
        - platform: time_pattern
          minutes: "/30"

        - platform: state
          entity_id:
            - select.deye_sun15_time_of_use
            - switch.deye_sun15_battery_grid_charging

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: binary_sensor.deye_sun15_mode_mismatch
          state: "on"

      action:
        - action: script.deye_sun15_mode_apply

        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_group_tech
            message: |-
              🛠 Deye watchdog: виправлено невідповідність
              🧩 Режим: {{ states('sensor.deye_sun15_effective_mode') }}
              🌙 Нічний тариф: {{ states('binary_sensor.energy_tariff') }}
              🔌 Grid charging: {{ states('switch.deye_sun15_battery_grid_charging') }}
              ⏱ ToU: {{ states('select.deye_sun15_time_of_use') }}
              🔋 SOC: {{ states('sensor.deye_sun15_battery') }}%
              🕒 {{ now().strftime('%Y-%m-%d %H:%M') }}

    ##################################################
    ## ЗАСТОСУВАННЯ TOU ПРОФІЛЮ
    ##################################################

    - alias: deye_sun15_tou_profile_apply
      id: deye_sun15_tou_profile_apply
      description: Застосування ToU профілю для SOC періодів
      initial_state: true
      mode: single

      trigger:
        - platform: state
          entity_id: input_select.deye_sun15_tou_profile

        - platform: homeassistant
          event: start

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: input_select.deye_sun15_tou_profile
                  state: "optimistic"
              sequence:
                - action: script.deye_sun15_tou_apply_optimistic

            - conditions:
                - condition: state
                  entity_id: input_select.deye_sun15_tou_profile
                  state: "alert"
              sequence:
                - action: script.deye_sun15_tou_apply_alert

    ##################################################
    ## ПОВІДОМЛЕННЯ ПРО ВІДДАЧУ ЕНЕРГІЇ БАТАРЕЄЮ
    ##################################################

    - alias: deye_sun15_tou_capacity_notify
      id: deye_sun15_tou_capacity_notify
      description: Deye SUN15 - повідомлення про енергію, віддану батареєю в режимі ToU
      initial_state: true
      mode: single

      trigger:
        - platform: time
          at: "00:05:00"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: select.deye_sun15_time_of_use
          state: "Enabled"

      action:
        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_group_tech
            message: |-
              🌅 Deye: енергія, віддана батареєю
              🔌 За сьогодні: {{ states('sensor.deye_sun15_today_battery_discharge') }}
              🔋 SOC: {{ states('sensor.deye_sun15_battery') }}%
              🕒 {{ now().strftime('%H:%M') }}