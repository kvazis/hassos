##################################################
## Актуалізовано: 2026-03-24
##################################################

river_2_max:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      sensor.river_2_max_battery_in_power:
        friendly_name: EcoFlow River 2 Max - потужність заряджання акумулятора
        icon: mdi:battery-arrow-up

      sensor.river_2_max_battery_out_power:
        friendly_name: EcoFlow River 2 Max - потужність розряджання акумулятора
        icon: mdi:battery-arrow-down

      binary_sensor.river_2_max_stage_2_start:
        friendly_name: EcoFlow River 2 Max - стадія 2
        icon: mdi:numeric-2

      binary_sensor.river_2_max_stage_3_start:
        friendly_name: EcoFlow River 2 Max - стадія 3
        icon: mdi:numeric-3

      binary_sensor.river_2_max_control:
        friendly_name: EcoFlow River 2 Max - контроль розеток
        icon: mdi:power-plug

      binary_sensor.river_2_max_control_notification:
        friendly_name: EcoFlow River 2 Max - повідомлення контролю розеток
        icon: mdi:message-badge

      binary_sensor.river_2_max_finish:
        friendly_name: EcoFlow River 2 Max - завершення тренування
        icon: mdi:flag-checkered

      input_boolean.river_2_max_stage_1_active:
        friendly_name: EcoFlow River 2 Max - тренування стадія 1
        icon: mdi:numeric-1

      input_boolean.river_2_max_stage_2_active:
        friendly_name: EcoFlow River 2 Max - тренування стадія 2
        icon: mdi:numeric-2

      input_boolean.river_2_max_stage_3_active:
        friendly_name: EcoFlow River 2 Max - тренування стадія 3
        icon: mdi:numeric-3

      automation.river_2_max_stage_1_start:
        friendly_name: EcoFlow River 2 Max - запуск стадії 1
        icon: mdi:numeric-1-circle

      automation.river_2_max_stage_2_start:
        friendly_name: EcoFlow River 2 Max - запуск стадії 2
        icon: mdi:numeric-2-circle

      automation.river_2_max_stage_3_start:
        friendly_name: EcoFlow River 2 Max - запуск стадії 3
        icon: mdi:numeric-3-circle

      automation.river_2_max_control:
        friendly_name: EcoFlow River 2 Max - контроль розеток
        icon: mdi:power-plug

      automation.river_2_max_control_notification:
        friendly_name: EcoFlow River 2 Max - повідомлення про розетки
        icon: mdi:message-alert

      automation.river_2_max_finish:
        friendly_name: EcoFlow River 2 Max - завершення тренування
        icon: mdi:check-circle

      automation.river_2_max_turn_on_dc_12:
        friendly_name: EcoFlow River 2 Max - увімкнення DC 12V
        icon: mdi:power-plug-battery

      automation.river_2_max_turn_off_dc_12:
        friendly_name: EcoFlow River 2 Max - вимкнення DC 12V
        icon: mdi:power-plug-off

  ##################################################
  ## INPUT_BOOLEAN
  ##################################################

  input_boolean:

    river_2_max_stage_1_active:
      name: river_2_max_stage_1_active

    river_2_max_stage_2_active:
      name: river_2_max_stage_2_active

    river_2_max_stage_3_active:
      name: river_2_max_stage_3_active

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    - sensor:
        - name: river_2_max_battery_in_power
          unique_id: river_2_max_battery_in_power
          device_class: power
          unit_of_measurement: "W"
          state: >
            {% set total_in = states('sensor.river_2_max_total_in_power') | float(0) %}
            {% set total_out = states('sensor.river_2_max_total_out_power') | float(0) %}
            {% if total_in > total_out %}
              {{ total_in - total_out }}
            {% else %}
              0
            {% endif %}

        - name: river_2_max_battery_out_power
          unique_id: river_2_max_battery_out_power
          device_class: power
          unit_of_measurement: "W"
          state: >
            {% set total_in = states('sensor.river_2_max_total_in_power') | float(0) %}
            {% set total_out = states('sensor.river_2_max_total_out_power') | float(0) %}
            {% if total_out > total_in %}
              {{ total_out - total_in }}
            {% else %}
              0
            {% endif %}

    - binary_sensor:
        - name: river_2_max_stage_2_start
          unique_id: river_2_max_stage_2_start
          state: >
            {{ is_state('input_boolean.river_2_max_stage_1_active', 'on') and
               states('sensor.river_2_max_battery_level') | int(0) == 100 }}
          delay_on:
            minutes: 1

        - name: river_2_max_stage_3_start
          unique_id: river_2_max_stage_3_start
          state: >
            {{ is_state('input_boolean.river_2_max_stage_2_active', 'on') and
               is_state('binary_sensor.lr_electricity', 'on') }}

        - name: river_2_max_control
          unique_id: river_2_max_control
          state: >
            {{ is_state('input_boolean.river_2_max_stage_3_active', 'on') and
               is_state('binary_sensor.lr_electricity', 'on') }}

        - name: river_2_max_control_notification
          unique_id: river_2_max_control_notification
          state: >
            {{ is_state('input_boolean.river_2_max_stage_3_active', 'on') and
               is_state('binary_sensor.lr_electricity', 'off') }}

        - name: river_2_max_finish
          unique_id: river_2_max_finish
          state: >
            {{ is_state('input_boolean.river_2_max_stage_3_active', 'on') and
               states('sensor.river_2_max_battery_level') | int(0) == 60 }}

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    - alias: river_2_max_stage_1_start
      id: river_2_max_stage_1_start
      description: Запуск першої стадії тренування EcoFlow River 2 Max
      initial_state: true

      trigger:
        - platform: state
          entity_id: input_boolean.river_2_max_stage_1_active
          to: "on"

      action:
        - action: number.set_value
          target:
            entity_id: number.river_2_max_max_charge_level
          data:
            value: "100"

        - action: number.set_value
          target:
            entity_id: number.river_2_max_ac_charging_power
          data:
            value: "300"

        - delay: "00:00:05"

        - action: telegram_bot.send_message
          data:
            target:
              - !secret chat_id_group_tech
            message: |
              {{ "\u0031\uFE0F\u20E3" }} Стадія 1 - зарядка, запущено в {{ now().strftime('%Y-%m-%d %H:%M') }}
              {{ "\U0001F50B" }} Поточний рівень заряду - {{ states('sensor.river_2_max_battery_level') }} %
              {{ "\U0001F39A" }} Заряджати до - {{ states('number.river_2_max_max_charge_level') }} %
              {{ "\U0001F50C" }} Потужність заряду - {{ states('number.river_2_max_ac_charging_power') }} Ватт

    - alias: river_2_max_stage_2_start
      id: river_2_max_stage_2_start
      description: Запуск другої стадії тренування EcoFlow River 2 Max
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.river_2_max_stage_2_start
          to: "on"

      action:
        - action: number.set_value
          target:
            entity_id: number.river_2_max_max_charge_level
          data:
            value: "60"

        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.river_2_max_stage_1_active

        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.river_2_max_stage_2_active

        - action: switch.turn_off
          target:
            entity_id: switch.0xa4c138ee9e1e5451

        - delay: "00:00:05"

        - action: telegram_bot.send_message
          data:
            target:
              - !secret chat_id_group_tech
            message: |
              {{ "\u0032\uFE0F\u20E3" }} Стадія 2 - розряджання, запущено в {{ now().strftime('%Y-%m-%d %H:%M') }}
              {{ "\U0001F50B" }} Поточний рівень заряду - {{ states('sensor.river_2_max_battery_level') }} %
              {{ "\U0001F39A" }} Заряджати до - {{ states('number.river_2_max_max_charge_level') }} %
              {{ "\U0001F50C" }} Мережева розетка - {{ states('switch.0xa4c138ee9e1e5451') }}

    - alias: river_2_max_stage_3_start
      id: river_2_max_stage_3_start
      description: Запуск третьої стадії тренування EcoFlow River 2 Max
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.river_2_max_stage_3_start
          to: "on"

      action:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.river_2_max_stage_2_active

        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.river_2_max_stage_3_active

        - action: switch.turn_on
          target:
            entity_id: switch.0xa4c138ee9e1e5451

        - delay: "00:00:15"

        - action: telegram_bot.send_message
          data:
            target:
              - !secret chat_id_group_tech
            message: |
              {{ "\u0033\uFE0F\u20E3" }} Стадія 3 - зарядка, запущено в {{ now().strftime('%Y-%m-%d %H:%M') }}
              {{ "\U0001F50B" }} Поточний рівень заряду - {{ states('sensor.river_2_max_battery_level') }} %
              {{ "\U0001F39A" }} Заряджати до - {{ states('number.river_2_max_max_charge_level') }} %
              {{ "\U0001F50C" }} Мережева розетка - {{ states('switch.0xa4c138ee9e1e5451') }}
              {{ "\U0001F50C" }} Розетки станції - {{ states('switch.river_2_max_ac_enabled') }}

    - alias: river_2_max_control
      id: river_2_max_control
      description: Контроль розеток EcoFlow River 2 Max
      initial_state: true

      trigger:
        - platform: time_pattern
          minutes: "/1"

      condition:
        - condition: state
          entity_id: binary_sensor.river_2_max_control
          state: "on"

      action:
        - action: switch.turn_on
          target:
            entity_id: switch.river_2_max_ac_enabled

    - alias: river_2_max_control_notification
      id: river_2_max_control_notification
      description: Повідомлення про стан розеток EcoFlow River 2 Max
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.river_2_max_control_notification
          to: "on"

      action:
        - delay: "00:00:05"

        - action: telegram_bot.send_message
          data:
            target:
              - !secret chat_id_group_tech
            message: |
              {{ "\u0033\uFE0F\u20E3" }} Стадія 3 триває
              {{ "\U0001F50B" }} Поточний рівень заряду - {{ states('sensor.river_2_max_battery_level') }} %
              {{ "\U0001F39A" }} Заряджати до - {{ states('number.river_2_max_max_charge_level') }} %
              {{ "\U0001F50C" }} Мережева розетка - {{ states('switch.0xa4c138ee9e1e5451') }}
              {{ "\U0001F50C" }} Розетки станції - {{ states('switch.river_2_max_ac_enabled') }}

    - alias: river_2_max_finish
      id: river_2_max_finish
      description: Завершення тренування EcoFlow River 2 Max
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.river_2_max_finish
          to: "on"

      action:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.river_2_max_stage_3_active

        - action: telegram_bot.send_message
          data:
            target:
              - !secret chat_id_group_tech
            message: |
              {{ "\u0033\uFE0F\u20E3" }} Тренування завершене в {{ now().strftime('%Y-%m-%d %H:%M') }}, станцію можна вимикати
              {{ "\U0001F50B" }} Поточний рівень заряду - {{ states('sensor.river_2_max_battery_level') }} %

    - alias: river_2_max_turn_on_dc_12
      id: river_2_max_turn_on_dc_12
      description: Увімкнення DC 12V на EcoFlow River 2 Max
      initial_state: false

      trigger:
        - platform: time_pattern
          minutes: "/5"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: switch.river_2_max_dc_12v_enabled
          state: "off"

        - condition: state
          entity_id: binary_sensor.electricity
          state: "on"

        - condition: numeric_state
          entity_id: sensor.delta_2_battery_level
          below: 60

      action:
        - action: switch.turn_on
          target:
            entity_id: switch.river_2_max_dc_12v_enabled

    - alias: river_2_max_turn_off_dc_12
      id: river_2_max_turn_off_dc_12
      description: Вимкнення DC 12V на EcoFlow River 2 Max
      initial_state: false

      trigger:
        - platform: state
          entity_id: binary_sensor.blackout
          from: "on"
          to: "off"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: switch.river_2_max_dc_12v_enabled
          state: "on"

      action:
        - action: switch.turn_off
          target:
            entity_id: switch.river_2_max_dc_12v_enabled