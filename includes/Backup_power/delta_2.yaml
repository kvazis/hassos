delta_2:

    homeassistant:
      customize:

        sensor.delta_2_battery_in_power:
          friendly_name: Ecoflow Delta 2, потужність на аккумулятор
          device_class: power
          unit_of_measurement: W
          
        sensor.delta_2_battery_out_power:
          friendly_name: Ecoflow Delta 2, потужність з аккумулятора
          device_class: power
          unit_of_measurement: W
          
    recorder:
      include:
        entities:
          - sensor.delta_2_ac_in_power
          - sensor.delta_2_ac_in_volts
          - sensor.delta_2_ac_out_power
          - sensor.delta_2_ac_out_volts
          - sensor.delta_2_total_in_power
          - sensor.delta_2_total_out_power
          - sensor.delta_2_battery_in_power
          - sensor.delta_2_battery_out_power
          - sensor.delta_2_main_battery_level
          - sensor.delta_2_battery_level
          - sensor.delta_2_solar_in_power
          
    template:

      - sensor:

          - name: delta_2_battery_in_power
            unique_id: delta_2_battery_in_power
            state: >
                {% if states('sensor.delta_2_total_in_power')|float > states('sensor.delta_2_total_out_power')|float %}
                {{ states('sensor.delta_2_total_in_power')|float - states('sensor.delta_2_total_out_power')|float }}
                {% else %}
                0
                {% endif %} 
                
          - name: delta_2_battery_out_power
            unique_id: delta_2_battery_out_power
            state: >
                {% if states('sensor.delta_2_total_out_power')|float > states('sensor.delta_2_total_in_power')|float %}
                {{ states('sensor.delta_2_total_out_power')|float - states('sensor.delta_2_total_in_power')|float }}
                {% else %}
                0
                {% endif %} 
                
      - binary_sensor:

          - name: delta_2_stage_2
            unique_id: delta_2_stage_2
            state: >
                {{ is_state('input_boolean.delta_2_stage_1', 'on') and
                   states('sensor.delta_2_battery_level')|int == 100 }}
            delay_on: 
                minutes: 1
                   
          - name: delta_2_stage_3
            unique_id: delta_2_stage_3
            state: >
                {{ is_state('input_boolean.delta_2_stage_2', 'on') and             
                  is_state('binary_sensor.lr_electricity', 'on') }}
                   
          - name: delta_2_control
            unique_id: delta_2_control
            state: >
                {{ is_state('input_boolean.delta_2_stage_3', 'on') and
                  is_state('binary_sensor.lr_electricity', 'on') }}
                   
          - name: delta_2_control_notification
            unique_id: delta_2_control_notification
            state: >
                {{ is_state('input_boolean.delta_2_stage_3', 'on') and
                  is_state('binary_sensor.lr_electricity', 'off') }}
                  
          - name: delta_2_finish
            unique_id: delta_2_finish
            state: >
                {{ is_state('input_boolean.delta_2_stage_3', 'on') and
                   states('sensor.delta_2_battery_level')|int == 60 }}
                   
    input_boolean:
    
     delta_2_stage_1:
        name: Ecoflow Delta 2, тренування - стадія 1
        icon: mdi:numeric-1
        
     delta_2_stage_2:
        name: Ecoflow Delta 2, тренування - стадія 2
        icon: mdi:numeric-2
        
     delta_2_stage_3:
        name: Ecoflow Delta 2, тренування - стадія 3
        icon: mdi:numeric-3     
        
    automation:
    
      - alias: delta_2_stage_1
        id: delta_2_stage_1
        description: Ecoflow Delta 2, тренування - стадія 1
        initial_state: true
        trigger:
    ## Manual training mode start
        - platform: state
          entity_id: input_boolean.delta_2_stage_1
          to: 'on'
        action:
    ## Set charge level to 100%
        - action: number.set_value
          target:
            entity_id: number.delta_2_max_charge_level
          data:
            value: "100"
    ## Set charging power to 300 Watts
        - action: number.set_value
          target:
            entity_id: number.delta_2_ac_charging_power
          data:
            value: "600"
    ## Delay for data update
        - delay: 00:00:05
    ## Telegram notification
        - service: telegram_bot.send_message
          data_template:
            target:
                - !secret chat_id_group_tech
            message: | 
                 {{ "\u0031\uFE0F\u20E3" }} Стадія 1 - зарядка, запущено в {{ now().strftime('%Y-%m-%d %H:%M') }}
                 {{ "\U0001F50B" }} Поточний рівень заряду - {{ states('sensor.delta_2_battery_level') }}  %
                 {{ "\U0001F39A" }} Заряджати до - {{ states('number.delta_2_max_charge_level') }} %
                 {{ "\U0001F50C" }} Потужність заряду - {{ states('number.delta_2_ac_charging_power') }} Ватт

      - alias: delta_2_stage_2
        id: delta_2_stage_2
        description: Ecoflow Delta 2, тренування - стадія 2
        initial_state: true
        trigger:
    ## Transition to stage 2
        - platform: state
          entity_id: binary_sensor.delta_2_stage_2
          to: 'on'
        action:        
    ## Set charge level to 60%
        - action: number.set_value
          target:
            entity_id: number.delta_2_max_charge_level
          data:
            value: "60"        
    ## Disable stage 1 switch
        - action: input_boolean.turn_off
          data: {}
          target:
            entity_id: input_boolean.delta_2_stage_1
    ## Enable stage 2 switch
        - action: input_boolean.turn_on
          data: {}
          target:
            entity_id: input_boolean.delta_2_stage_2 
    ## Turn off load outlet     
        - action: switch.turn_off
          data: {}
          target:
            entity_id: switch.0xa4c138ee9e1e5451
    ## Delay for data update
        - delay: 00:00:05
    ## Telegram notification
        - service: telegram_bot.send_message
          data_template:
            target:
                - !secret chat_id_group_tech
            message: | 
                 {{ "\u0032\uFE0F\u20E3" }} Стадія 2 - розряджання, запущено в {{ now().strftime('%Y-%m-%d %H:%M') }}
                 {{ "\U0001F50B" }} Поточний рівень заряду - {{ states('sensor.delta_2_battery_level') }} %
                 {{ "\U0001F39A" }} Заряджати до - {{ states('number.delta_2_max_charge_level') }} % 
                 {{ "\U0001F50C" }} Мережева розетка - {{ states('switch.0xa4c138ee9e1e5451') }} 
        

      - alias: delta_2_stage_3
        id: delta_2_stage_3
        description: Ecoflow Delta 2, тренування - стадія 3
        initial_state: true
        trigger:
    ## Transition to stage 3
        - platform: state
          entity_id: binary_sensor.delta_2_stage_3
          to: 'on'
        action:               
    ## Disable stage 2 switch
        - action: input_boolean.turn_off
          data: {}
          target:
            entity_id: input_boolean.delta_2_stage_2
    ## Enable stage 3 switch
        - action: input_boolean.turn_on
          data: {}
          target:
            entity_id: input_boolean.delta_2_stage_3
    # Turn on load outlet     
        - action: switch.turn_on
          data: {}
          target:
            entity_id: switch.0xa4c138ee9e1e5451        
    ## Delay for data update
        - delay: 00:00:15
    ## Telegram notification
        - service: telegram_bot.send_message
          data_template:
            target:
                - !secret chat_id_group_tech
            message: | 
                 {{ "\u0033\uFE0F\u20E3" }} Стадія 3 - зарядка, запущено в {{ now().strftime('%Y-%m-%d %H:%M') }}
                 {{ "\U0001F50B" }} Поточний рівень заряду - {{ states('sensor.delta_2_battery_level') }} %
                 {{ "\U0001F39A" }} Заряджати до - {{ states('number.delta_2_max_charge_level') }} % 
                 {{ "\U0001F50C" }} Мережева розетка - {{ states('switch.0xa4c138ee9e1e5451') }}
                 {{ "\U0001F50C" }} Розетки станції - {{ states('switch.delta_2_ac_enabled') }}
        

      - alias: delta_2_control
        id: delta_2_control
        description: Ecoflow Delta 2 контроль розеток
        initial_state: true
        trigger:
    # Check every minute
        - platform: time_pattern
          minutes: '/1'
        condition:
    # Stage 3 in progress, but socket is still off
        - condition: state
          entity_id: binary_sensor.delta_2_control
          state: 'on'        
        action:             
    ## Turn on station outlet
        - action: switch.turn_on
          data: {}
          target:
            entity_id: switch.delta_2_ac_enabled
        
      - alias: delta_2_control_notification
        id: delta_2_control_notification
        description: Ecoflow Delta 2, повідомлення при ввімкнені розетки
        initial_state: true
        trigger:
    # Stage 3 in progress, station outlet turned on
        - platform: state
          entity_id: binary_sensor.delta_2_control_notification
          to: 'on' 
        action:
    ## Delay for data update
        - delay: 00:00:05
    ## Telegram notification
        - service: telegram_bot.send_message
          data_template:
            target:
                - !secret chat_id_group_tech
            message: | 
                 {{ "\u0033\uFE0F\u20E3" }} Стадія 3 триває
                 {{ "\U0001F50B" }} Поточний рівень заряду - {{ states('sensor.delta_2_battery_level') }} %
                 {{ "\U0001F39A" }} Заряджати до - {{ states('number.delta_2_max_charge_level') }} % 
                 {{ "\U0001F50C" }} Мережева розетка - {{ states('switch.0xa4c138ee9e1e5451') }}
                 {{ "\U0001F50C" }} Розетки станції - {{ states('switch.delta_2_ac_enabled') }}      
        

      - alias: delta_2_finish
        id: delta_2_finish
        description: Ecoflow Delta 2, training finished 
        initial_state: true
        trigger:
    ## Transition to final stage
        - platform: state
          entity_id: binary_sensor.delta_2_finish
          to: 'on'
        action:               
    ## Disable stage 3 switch
        - action: input_boolean.turn_off
          data: {}
          target:
            entity_id: input_boolean.delta_2_stage_3
    ## Telegram notification
        - service: telegram_bot.send_message
          data_template:
            target:
                - !secret chat_id_group_tech
            message: | 
                 {{ "\u0033\uFE0F\u20E3" }} Тренування завершене в {{ now().strftime('%Y-%m-%d %H:%M') }}, станцію можна вимикати
                 {{ "\U0001F50B" }} Поточний рівень заряду - {{ states('sensor.delta_2_battery_level') }} %
                   
                   
                   
