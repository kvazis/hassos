##################################################
## Актуалізовано: 2026-03-24
##################################################

delta_2:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:

      sensor.delta_2_battery_in_power:
        friendly_name: EcoFlow Delta 2 - потужність заряджання акумулятора
        icon: mdi:battery-arrow-up

      sensor.delta_2_battery_out_power:
        friendly_name: EcoFlow Delta 2 - потужність розряджання акумулятора
        icon: mdi:battery-arrow-down

      binary_sensor.delta_2_stage_2_start:
        friendly_name: EcoFlow Delta 2 - стадія 2
        icon: mdi:numeric-2

      binary_sensor.delta_2_stage_3_start:
        friendly_name: EcoFlow Delta 2 - стадія 3
        icon: mdi:numeric-3

      binary_sensor.delta_2_control:
        friendly_name: EcoFlow Delta 2 - контроль розеток
        icon: mdi:power-plug

      binary_sensor.delta_2_control_notification:
        friendly_name: EcoFlow Delta 2 - повідомлення контролю розеток
        icon: mdi:message-badge

      binary_sensor.delta_2_finish:
        friendly_name: EcoFlow Delta 2 - завершення тренування
        icon: mdi:flag-checkered

      input_boolean.delta_2_stage_1_active:
        friendly_name: EcoFlow Delta 2 - тренування стадія 1
        icon: mdi:numeric-1

      input_boolean.delta_2_stage_2_active:
        friendly_name: EcoFlow Delta 2 - тренування стадія 2
        icon: mdi:numeric-2

      input_boolean.delta_2_stage_3_active:
        friendly_name: EcoFlow Delta 2 - тренування стадія 3
        icon: mdi:numeric-3

      automation.delta_2_stage_1_start:
        friendly_name: EcoFlow Delta 2 - запуск стадії 1
        icon: mdi:numeric-1-circle

      automation.delta_2_stage_2_start:
        friendly_name: EcoFlow Delta 2 - запуск стадії 2
        icon: mdi:numeric-2-circle

      automation.delta_2_stage_3_start:
        friendly_name: EcoFlow Delta 2 - запуск стадії 3
        icon: mdi:numeric-3-circle

      automation.delta_2_control:
        friendly_name: EcoFlow Delta 2 - контроль розеток
        icon: mdi:power-plug

      automation.delta_2_control_notification:
        friendly_name: EcoFlow Delta 2 - повідомлення про розетки
        icon: mdi:message-alert

      automation.delta_2_finish:
        friendly_name: EcoFlow Delta 2 - завершення тренування
        icon: mdi:check-circle

  ##################################################
  ## INPUT_BOOLEAN
  ##################################################

  input_boolean:

    delta_2_stage_1_active:
      name: delta_2_stage_1_active

    delta_2_stage_2_active:
      name: delta_2_stage_2_active

    delta_2_stage_3_active:
      name: delta_2_stage_3_active

  ##################################################
  ## TEMPLATE
  ##################################################

  template:

    - sensor:
        - name: delta_2_battery_in_power
          unique_id: delta_2_battery_in_power
          device_class: power
          unit_of_measurement: "W"
          state: >
            {% set total_in = states('sensor.delta_2_total_in_power') | float(0) %}
            {% set total_out = states('sensor.delta_2_total_out_power') | float(0) %}
            {% if total_in > total_out %}
              {{ total_in - total_out }}
            {% else %}
              0
            {% endif %}

        - name: delta_2_battery_out_power
          unique_id: delta_2_battery_out_power
          device_class: power
          unit_of_measurement: "W"
          state: >
            {% set total_in = states('sensor.delta_2_total_in_power') | float(0) %}
            {% set total_out = states('sensor.delta_2_total_out_power') | float(0) %}
            {% if total_out > total_in %}
              {{ total_out - total_in }}
            {% else %}
              0
            {% endif %}

    - binary_sensor:
        - name: delta_2_stage_2_start
          unique_id: delta_2_stage_2_start
          state: >
            {{ is_state('input_boolean.delta_2_stage_1_active', 'on') and
               states('sensor.delta_2_battery_level') | int(0) == 100 }}
          delay_on:
            minutes: 1

        - name: delta_2_stage_3_start
          unique_id: delta_2_stage_3_start
          state: >
            {{ is_state('input_boolean.delta_2_stage_2_active', 'on') and
               is_state('binary_sensor.lr_electricity', 'on') }}

        - name: delta_2_control
          unique_id: delta_2_control
          state: >
            {{ is_state('input_boolean.delta_2_stage_3_active', 'on') and
               is_state('binary_sensor.lr_electricity', 'on') }}

        - name: delta_2_control_notification
          unique_id: delta_2_control_notification
          state: >
            {{ is_state('input_boolean.delta_2_stage_3_active', 'on') and
               is_state('binary_sensor.lr_electricity', 'off') }}

        - name: delta_2_finish
          unique_id: delta_2_finish
          state: >
            {{ is_state('input_boolean.delta_2_stage_3_active', 'on') and
               states('sensor.delta_2_battery_level') | int(0) == 60 }}

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    - alias: delta_2_stage_1_start
      id: delta_2_stage_1_start
      description: Запуск першої стадії тренування EcoFlow Delta 2
      initial_state: true

      trigger:
        - platform: state
          entity_id: input_boolean.delta_2_stage_1_active
          to: "on"

      action:
        - action: number.set_value
          target:
            entity_id: number.delta_2_max_charge_level
          data:
            value: "100"

        - action: number.set_value
          target:
            entity_id: number.delta_2_ac_charging_power
          data:
            value: "600"

        - delay: "00:00:05"

        - action: telegram_bot.send_message
          data:
            target:
              - !secret chat_id_group_tech
            message: |
              {{ "\u0031\uFE0F\u20E3" }} Стадія 1 - зарядка, запущено в {{ now().strftime('%Y-%m-%d %H:%M') }}
              {{ "\U0001F50B" }} Поточний рівень заряду - {{ states('sensor.delta_2_battery_level') }} %
              {{ "\U0001F39A" }} Заряджати до - {{ states('number.delta_2_max_charge_level') }} %
              {{ "\U0001F50C" }} Потужність заряду - {{ states('number.delta_2_ac_charging_power') }} Ватт

    - alias: delta_2_stage_2_start
      id: delta_2_stage_2_start
      description: Запуск другої стадії тренування EcoFlow Delta 2
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.delta_2_stage_2_start
          to: "on"

      action:
        - action: number.set_value
          target:
            entity_id: number.delta_2_max_charge_level
          data:
            value: "60"

        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.delta_2_stage_1_active

        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.delta_2_stage_2_active

        - action: switch.turn_off
          target:
            entity_id: switch.0xa4c138ee9e1e5451

        - delay: "00:00:05"

        - action: telegram_bot.send_message
          data:
            target:
              - !secret chat_id_group_tech
            message: |
              {{ "\u0032\uFE0F\u20E3" }} Стадія 2 - розряджання, запущено в {{ now().strftime('%Y-%m-%d %H:%M') }}
              {{ "\U0001F50B" }} Поточний рівень заряду - {{ states('sensor.delta_2_battery_level') }} %
              {{ "\U0001F39A" }} Заряджати до - {{ states('number.delta_2_max_charge_level') }} %
              {{ "\U0001F50C" }} Мережева розетка - {{ states('switch.0xa4c138ee9e1e5451') }}

    - alias: delta_2_stage_3_start
      id: delta_2_stage_3_start
      description: Запуск третьої стадії тренування EcoFlow Delta 2
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.delta_2_stage_3_start
          to: "on"

      action:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.delta_2_stage_2_active

        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.delta_2_stage_3_active

        - action: switch.turn_on
          target:
            entity_id: switch.0xa4c138ee9e1e5451

        - delay: "00:00:15"

        - action: telegram_bot.send_message
          data:
            target:
              - !secret chat_id_group_tech
            message: |
              {{ "\u0033\uFE0F\u20E3" }} Стадія 3 - зарядка, запущено в {{ now().strftime('%Y-%m-%d %H:%M') }}
              {{ "\U0001F50B" }} Поточний рівень заряду - {{ states('sensor.delta_2_battery_level') }} %
              {{ "\U0001F39A" }} Заряджати до - {{ states('number.delta_2_max_charge_level') }} %
              {{ "\U0001F50C" }} Мережева розетка - {{ states('switch.0xa4c138ee9e1e5451') }}
              {{ "\U0001F50C" }} Розетки станції - {{ states('switch.delta_2_ac_enabled') }}

    - alias: delta_2_control
      id: delta_2_control
      description: Контроль розеток EcoFlow Delta 2
      initial_state: true

      trigger:
        - platform: time_pattern
          minutes: "/1"

      condition:
        - condition: state
          entity_id: binary_sensor.delta_2_control
          state: "on"

      action:
        - action: switch.turn_on
          target:
            entity_id: switch.delta_2_ac_enabled

    - alias: delta_2_control_notification
      id: delta_2_control_notification
      description: Повідомлення про стан розеток EcoFlow Delta 2
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.delta_2_control_notification
          to: "on"

      action:
        - delay: "00:00:05"

        - action: telegram_bot.send_message
          data:
            target:
              - !secret chat_id_group_tech
            message: |
              {{ "\u0033\uFE0F\u20E3" }} Стадія 3 триває
              {{ "\U0001F50B" }} Поточний рівень заряду - {{ states('sensor.delta_2_battery_level') }} %
              {{ "\U0001F39A" }} Заряджати до - {{ states('number.delta_2_max_charge_level') }} %
              {{ "\U0001F50C" }} Мережева розетка - {{ states('switch.0xa4c138ee9e1e5451') }}
              {{ "\U0001F50C" }} Розетки станції - {{ states('switch.delta_2_ac_enabled') }}

    - alias: delta_2_finish
      id: delta_2_finish
      description: Завершення тренування EcoFlow Delta 2
      initial_state: true

      trigger:
        - platform: state
          entity_id: binary_sensor.delta_2_finish
          to: "on"

      action:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.delta_2_stage_3_active

        - action: telegram_bot.send_message
          data:
            target:
              - !secret chat_id_group_tech
            message: |
              {{ "\u0033\uFE0F\u20E3" }} Тренування завершене в {{ now().strftime('%Y-%m-%d %H:%M') }}, станцію можна вимикати
              {{ "\U0001F50B" }} Поточний рівень заряду - {{ states('sensor.delta_2_battery_level') }} %