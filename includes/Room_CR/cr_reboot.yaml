##################################################
## Актуалізовано: 2026-03-25
##################################################

cr_reboot:

  ##################################################
  ## HOMEASSISTANT
  ##################################################

  homeassistant:
    customize:
      binary_sensor.cr_ceiling_unavailable:
        friendly_name: Коридор - недоступність люстри
        icon: mdi:ceiling-light
      input_button.cr_ceiling_reboot:
        friendly_name: Коридор - перезавантаження люстри
        icon: mdi:restart
      automation.cr_reboot_ceiling:
        friendly_name: Коридор - перезавантаження люстри
        icon: mdi:restart
      automation.cr_reboot_ceiling_manual:
        friendly_name: Коридор - ручне перезавантаження люстри
        icon: mdi:restart-alert
      automation.cr_reboot_switch_turn_on:
        friendly_name: Коридор - увімкнення вимикача люстри
        icon: mdi:light-switch
      automation.cr_reboot_switch_turn_on_check:
        friendly_name: Коридор - перевірка стану вимикача люстри
        icon: mdi:light-switch
      automation.cr_reboot_switch_check:
        friendly_name: Коридор - перевірка статусу вимикача люстри
        icon: mdi:update

  ##################################################
  ## INPUT_BUTTON
  ##################################################

  input_button:
    cr_ceiling_reboot:

  ##################################################
  ## TEMPLATE
  ##################################################

  template:
    - binary_sensor:
        - name: cr_ceiling_unavailable
          unique_id: cr_ceiling_unavailable
          state: >
            {{ is_state('light.yeelight_ceiling4_0x456e813', 'unavailable') }}
          delay_on:
            minutes: 3
          device_class: problem

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:
    - alias: cr_reboot_ceiling
      id: cr_reboot_ceiling
      description: Коридор - перезавантаження завислої люстри
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: "/5"
      condition:
        - condition: state
          entity_id: binary_sensor.cr_ceiling_unavailable
          state: "on"
        - condition: state
          entity_id: switch.control_mode
          state: "on"
        - condition: state
          entity_id: binary_sensor.electricity_internal
          state: "off"
      action:
        - action: switch.turn_off
          target:
            entity_id: switch.0x00158d00057305ac_left
        - delay: 00:00:05
        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d00057305ac_left
        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_log
            message: |
              {{"\U0001F916"}} Перезавантаження люстри в коридорі {{ states('sensor.time_date') }}

    - alias: cr_reboot_ceiling_manual
      id: cr_reboot_ceiling_manual
      description: Коридор - ручне перезавантаження завислої люстри
      initial_state: true
      trigger:
        - platform: state
          entity_id: input_button.cr_ceiling_reboot
      action:
        - action: switch.turn_off
          target:
            entity_id: switch.0x00158d00057305ac_left
        - delay: 00:00:05
        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d00057305ac_left

    - alias: cr_reboot_switch_turn_on
      id: cr_reboot_switch_turn_on
      description: Коридор - увімкнення вимикача
      initial_state: true
      trigger:
        - platform: state
          entity_id: switch.0x00158d00057305ac_left
          to: "off"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
        - condition: state
          entity_id: binary_sensor.electricity_internal
          state: "off"
      action:
        - delay: 00:00:05
        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d00057305ac_left

    - alias: cr_reboot_switch_turn_on_check
      id: cr_reboot_switch_turn_on_check
      description: Коридор - перевірка стану вимикача
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: "/5"
      condition:
        - condition: template
          value_template: "{{ states('switch.0x00158d00057305ac_left') != 'on' }}"
        - condition: state
          entity_id: switch.control_mode
          state: "on"
        - condition: state
          entity_id: binary_sensor.electricity_internal
          state: "off"
      action:
        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d00057305ac_left

    - alias: cr_reboot_switch_check
      id: cr_reboot_switch_check
      description: Коридор - перевірка статусу вимикача
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: "/15"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
        - condition: state
          entity_id: binary_sensor.electricity_internal
          state: "off"
      action:
        - action: mqtt.publish
          data:
            topic: "zigstar/EN wd 2ch/get"
            payload: '{ "state_right": "" }'