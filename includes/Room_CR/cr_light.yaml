##################################################
## Актуалізовано: 2026-03-25
##################################################

cr_light:

  ##################################################
  ## HOMEASSISTANT
  ##################################################

  homeassistant:
    customize:
      binary_sensor.cr_light_day:
        friendly_name: Коридор - світло без руху (день)
        icon: mdi:timer
      binary_sensor.cr_light_night:
        friendly_name: Коридор - світло без руху (ніч)
        icon: mdi:timer
      binary_sensor.0x00158d0003e74c31_on:
        friendly_name: Коридор - лампа активна
        icon: mdi:radiobox-marked
      binary_sensor.cr_mode_auto_light_on:
        friendly_name: Коридор - авто підсвічування
        icon: mdi:lightbulb-auto
      automation.cr_ceiling_light_manual_control:
        friendly_name: Коридор - ручне керування люстрою
        icon: mdi:ceiling-light
      automation.cr_ceiling_light_vibration:
        friendly_name: Коридор - увімкнення від вібрації
        icon: mdi:vibrate
      automation.cr_ceiling_light_auto_off:
        friendly_name: Коридор - авто вимкнення світла
        icon: mdi:lightbulb-off
      automation.cr_mode_auto_light_on:
        friendly_name: Коридор - авто підсвічування
        icon: mdi:lightbulb-auto
      automation.cr_en_light_control:
        friendly_name: Коридор і передпокій - керування освітленням
        icon: mdi:lightbulb-group

  ##################################################
  ## TEMPLATE
  ##################################################

  template:
    - binary_sensor:
        - name: cr_light_day
          unique_id: cr_light_day
          state: >
            {{ is_state('light.yeelight_ceiling4_0x456e813', 'on')
               and is_state('binary_sensor.0x00158d00010f8920_occupancy', 'off')
               and is_state('binary_sensor.night_time', 'off')
            }}
          delay_on: 00:05:00
          icon: >
            {% if is_state("binary_sensor.cr_light_day", "on") %}
            mdi:timer
            {% else %}
            mdi:timer-off
            {% endif %}

        - name: cr_light_night
          unique_id: cr_light_night
          state: >
            {{ is_state('light.yeelight_ceiling4_0x456e813', 'on')
               and is_state('binary_sensor.0x00158d00010f8920_occupancy', 'off')
               and is_state('binary_sensor.night_time', 'on')
            }}
          delay_on: 00:01:00
          icon: >
            {% if is_state("binary_sensor.cr_light_night", "on") %}
            mdi:timer
            {% else %}
            mdi:timer-off
            {% endif %}

        - name: 0x00158d0003e74c31_on
          unique_id: 0x00158d0003e74c31_on
          state: >
            {{ is_state('light.0x00158d0003e74c31', 'on') }}
          delay_on: 00:00:05
          icon: >
            {% if is_state("binary_sensor.0x00158d0003e74c31_on", "on") %}
            mdi:radiobox-marked
            {% else %}
            mdi:radiobox-blank
            {% endif %}

        - name: cr_mode_auto_light_on
          unique_id: cr_mode_auto_light_on
          state: >
            {{ is_state('light.yeelight_ceiling4_0x456e813', 'off') and
               is_state('light.yeelight_ceiling4_0x456e813_ambilight', 'off') and
               is_state('binary_sensor.0xa4c138dc97e602e5_presence', 'on') and
               states('sensor.0xa4c138dc97e602e5_illuminance') | int < 200 }}

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:
    - alias: cr_ceiling_light_manual_control
      id: cr_ceiling_light_manual_control
      description: Коридор - ручне керування люстрою
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.0x00158d00057305ac_action
          to: "single_left"
        - platform: state
          entity_id: sensor.0x00158d0001f3fefe_action
          to: "single"
        - platform: state
          entity_id: sensor.0x04cf8cdf3c794209_action
          to: "button_3_single"
        - platform: state
          entity_id: sensor.0x04cf8cdf3c7942ca_action
          to: "button_3_single"
        - platform: state
          entity_id: sensor.0x54ef4410004c1707_action
          to: "button_3_double"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: light.yeelight_ceiling4_0x456e813
                  state: "off"
              sequence:
                - action: light.turn_on
                  target:
                    entity_id:
                      - light.yeelight_ceiling4_0x456e813
                  data:
                    brightness_pct: 75
                    color_temp_kelvin: 4000
            - conditions:
                - condition: state
                  entity_id: light.yeelight_ceiling4_0x456e813
                  state: "on"
              sequence:
                - action: light.turn_off
                  target:
                    entity_id:
                      - light.yeelight_ceiling4_0x456e813

    - alias: cr_ceiling_light_vibration
      id: cr_ceiling_light_vibration
      description: Коридор - увімкнення по датчику вібрації
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.0x00158d0002a4f77e_action
          to: "vibration"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
        - condition: state
          entity_id: binary_sensor.0x00158d00010f8920_occupancy
          state: "on"
        - condition: state
          entity_id: binary_sensor.night_time
          state: "off"
        - condition: state
          entity_id: light.yeelight_ceiling4_0x456e813
          state: "off"
      action:
        - action: light.turn_on
          target:
            entity_id:
              - light.yeelight_ceiling4_0x456e813
          data:
            brightness_pct: 75
            color_temp_kelvin: 4000
        - delay: 00:00:15
        - action: light.turn_off
          target:
            entity_id:
              - light.yeelight_ceiling4_0x456e813

    - alias: cr_ceiling_light_auto_off
      id: cr_ceiling_light_auto_off
      description: Коридор - автоматичне вимкнення освітлення
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.cr_light_day
          to: "on"
        - platform: state
          entity_id: binary_sensor.cr_light_night
          to: "on"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
      action:
        - action: light.turn_off
          target:
            entity_id:
              - light.yeelight_ceiling4_0x456e813

    - alias: cr_mode_auto_light_on
      id: cr_mode_auto_light_on
      description: Коридор - автоматичне підсвічування
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.cr_mode_auto_light_on
          to: "on"
        - platform: state
          entity_id: binary_sensor.0xa4c138dc97e602e5_presence
          to: "off"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: binary_sensor.cr_mode_auto_light_on
                  state: "on"
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: light.yeelight_ceiling4_0x456e813_ambilight
                  data:
                    color_temp_kelvin: 4000
                    brightness_pct: 100
            - conditions:
                - condition: state
                  entity_id: binary_sensor.0xa4c138dc97e602e5_presence
                  state: "off"
              sequence:
                - action: light.turn_off
                  target:
                    entity_id: light.yeelight_ceiling4_0x456e813_ambilight

    - alias: cr_en_light_control
      id: cr_en_light_control
      description: Коридор і передпокій - керування освітленням
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.0x00158d00013fc3bc_action
          to: "single_both"
      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"
      action:
        - choose:
            - conditions:
                - condition: state
                  entity_id: light.0x00158d0003e74c31
                  state: "off"
                - condition: state
                  entity_id: light.yeelight_ceiling4_0x456e813
                  state: "off"
              sequence:
                - action: light.turn_on
                  target:
                    entity_id:
                      - light.0x00158d0003e74c31
                  data:
                    brightness_pct: 100
                    color_temp_kelvin: 4000
            - conditions:
                - condition: state
                  entity_id: light.0x00158d0003e74c31
                  state: "on"
                - condition: state
                  entity_id: binary_sensor.0x00158d0003e74c31_on
                  state: "off"
                - condition: state
                  entity_id: light.yeelight_ceiling4_0x456e813
                  state: "off"
              sequence:
                - action: light.turn_on
                  target:
                    entity_id:
                      - light.yeelight_ceiling4_0x456e813
                  data:
                    brightness_pct: 75
                    color_temp_kelvin: 4000
            - conditions:
                - condition: state
                  entity_id: light.0x00158d0003e74c31
                  state: "on"
                - condition: state
                  entity_id: light.yeelight_ceiling4_0x456e813
                  state: "on"
              sequence:
                - action: light.turn_off
                  target:
                    entity_id:
                      - light.0x00158d0003e74c31
                      - light.yeelight_ceiling4_0x456e813
            - conditions:
                - condition: state
                  entity_id: binary_sensor.0x00158d0003e74c31_on
                  state: "on"
                - condition: state
                  entity_id: light.yeelight_ceiling4_0x456e813
                  state: "off"
              sequence:
                - action: light.turn_off
                  target:
                    entity_id:
                      - light.0x00158d0003e74c31
            - conditions:
                - condition: state
                  entity_id: light.0x00158d0003e74c31
                  state: "off"
                - condition: state
                  entity_id: light.yeelight_ceiling4_0x456e813
                  state: "on"
              sequence:
                - action: light.turn_off
                  target:
                    entity_id:
                      - light.yeelight_ceiling4_0x456e813