cr_light:

    template:
     
      - binary_sensor:
          
    # Свет без движения в коридоре днем
          - name: cr_light_day
            unique_id: cr_light_day
            state: >
              {{ is_state('light.yeelight_ceiling4_0x456e813', 'on')  
                 and is_state('binary_sensor.0x00158d00010f8920_occupancy', 'off')
                 and is_state('binary_sensor.night_time', 'off')
              }}
            delay_on: 00:05:00
            icon: >
              {% if is_state("binary_sensor.cr_light_day", "on") %}
              mdi:timer
              {% else %}
              mdi:timer-off
              {% endif %}
              
    # Свет без движения в коридоре ночью
          - name: cr_light_night
            unique_id: cr_light_night
            state: >
              {{ is_state('light.yeelight_ceiling4_0x456e813', 'on')  
                 and is_state('binary_sensor.0x00158d00010f8920_occupancy', 'off')
                 and is_state('binary_sensor.night_time', 'on')
              }}
            delay_on: 00:01:00
            icon: >
              {% if is_state("binary_sensor.cr_light_night", "on") %}
              mdi:timer
              {% else %}
              mdi:timer-off
              {% endif %}
              
    # Отслеживание включения лампочки в прихожей в течении 10 сек
          - name: 0x00158d0003e74c31_on
            unique_id: 0x00158d0003e74c31_on
            state: >
              {{ is_state('light.0x00158d0003e74c31', 'on')  
              }}
            delay_on: 00:00:05
            icon: >
              {% if is_state("binary_sensor.0x00158d0003e74c31_on", "on") %}
              mdi:radiobox-marked
              {% else %}
              mdi:radiobox-blank
              {% endif %}

     # Сенсор для для ввімкнення автоматичного підсвічування
          - name: cr_mode_auto_light_on
            unique_id: cr_mode_auto_light_on
            state: >
              {{ is_state('light.yeelight_ceiling4_0x456e813', 'off') and
                 is_state('light.yeelight_ceiling4_0x456e813_ambilight', 'off') and                 
                 is_state('binary_sensor.0xa4c138dc97e602e5_presence', 'on') and
                 states('sensor.0xa4c138dc97e602e5_illuminance')|int < 200 }}



    automation:
    
      - alias: cr_ceiling_light_manual_control
        id: cr_ceiling_light_manual_control
        description: Коридор - ручное управление люстрой
        initial_state: true
        trigger:
    # Выключатель на стене у входа
        - platform: state
          entity_id: sensor.0x00158d00057305ac_action
          to: 'single_left'
    # Круглая кнопка в шкафу
        - platform: state
          entity_id: sensor.0x00158d0001f3fefe_action
          to: 'single' 
    # 6 клавишник на входе в кухню
        - platform: state
          entity_id: sensor.0x04cf8cdf3c794209_action
          to: 'button_3_single'
    # 4 клавишник на комоде
        - platform: state
          entity_id: sensor.0x04cf8cdf3c7942ca_action
          to: 'button_3_single'
    ## Aqara Opple на столе
        - platform: state
          entity_id: sensor.0x54ef4410004c1707_action
          to: 'button_3_double'
        condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        action:
            - choose:
              - conditions:
                  - condition: state
                    entity_id: light.yeelight_ceiling4_0x456e813
                    state: 'off'
                sequence:
                  - service: light.turn_on
                    entity_id:
                      - light.yeelight_ceiling4_0x456e813
                    data_template:
                      brightness_pct: 75
                      color_temp_kelvin: 4000
              - conditions:
                  - condition: state
                    entity_id: light.yeelight_ceiling4_0x456e813
                    state: 'on'
                sequence:
                  - service: light.turn_off
                    entity_id:
                      - light.yeelight_ceiling4_0x456e813
                      
      - alias: cr_ceiling_light_vibration
        id: cr_ceiling_light_vibration
        description: Коридор - включение по датчику вибрации
        initial_state: true
        trigger:
        - platform: state
          entity_id: sensor.0x00158d0002a4f77e_action
          to: 'vibration'
        condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: state
          entity_id: binary_sensor.0x00158d00010f8920_occupancy
          state: 'on'
        - condition: state
          entity_id: binary_sensor.night_time
          state: 'off'
        - condition: state
          entity_id: light.yeelight_ceiling4_0x456e813
          state: 'off'
        action:
        - service: light.turn_on
          entity_id:
            - light.yeelight_ceiling4_0x456e813
          data_template:
            brightness_pct: 75
            color_temp_kelvin: 4000
        - delay: 00:00:15
        - service: light.turn_off
          entity_id:
            - light.yeelight_ceiling4_0x456e813
    
      - alias: cr_ceiling_light_auto_off
        id: cr_ceiling_light_auto_off
        description: Коридор - автоматическое выключение освещения
        initial_state: true
        trigger:
        - platform: state
          entity_id: binary_sensor.cr_light_day
          to: 'on'
        - platform: state
          entity_id: binary_sensor.cr_light_night
          to: 'on'
        condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        action:
        - service: light.turn_off
          entity_id:
            - light.yeelight_ceiling4_0x456e813
    
      - alias: cr_ceiling_light_moving
        id: cr_ceiling_light_moving
        description: Коридор - включение по датчику движения ночью
        initial_state: false
        trigger:
        - platform: state
          entity_id: binary_sensor.0x00158d00010f8920_occupancy
          to: 'on'
        condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        - condition: state
          entity_id: binary_sensor.night_time
          state: 'on'
        - condition: state
          entity_id: light.yeelight_ceiling4_0x456e813
          state: 'off'
        action:
        - service: light.turn_on
          entity_id:
            - light.yeelight_ceiling4_0x456e813_ambilight
          data_template:
            brightness_pct: 75
            color_temp_kelvin: 4000
        - delay: 00:00:10
        - service: light.turn_off
          entity_id:
            - light.yeelight_ceiling4_0x456e813_ambilight
            
      - alias: cr_mode_auto_light_on
        id: cr_mode_auto_light_on
        description: Коридор - автоматичне підсвічування
        initial_state: true
        trigger:
        - platform: state
          entity_id: binary_sensor.cr_mode_auto_light_on
          to: 'on'
        - platform: state
          entity_id: binary_sensor.0xa4c138dc97e602e5_presence
          to: 'off'
        condition:
        - condition: state
          entity_id: switch.control_mode
          state: 'on'
        # - condition: state
        #   entity_id: binary_sensor.electricity
        #   state: 'off'
        action:
            - choose:

              - conditions:
                  - condition: state
                    entity_id: binary_sensor.cr_mode_auto_light_on
                    state: 'on'
                sequence:
                  - action: light.turn_on
                    data:
                      color_temp_kelvin: 4000
                      brightness_pct: 100
                    target:
                      entity_id: light.yeelight_ceiling4_0x456e813_ambilight

              - conditions:
                  - condition: state
                    entity_id: binary_sensor.0xa4c138dc97e602e5_presence
                    state: 'off'
                sequence:
                  - action: light.turn_off
                    target:
                      entity_id: light.yeelight_ceiling4_0x456e813_ambilight                      


