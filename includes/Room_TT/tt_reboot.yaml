##################################################
## Актуалізовано: 2026-03-25
##################################################

tt_reboot:

  ##################################################
  ## CUSTOMIZE
  ##################################################

  homeassistant:
    customize:
      binary_sensor.tt_light_unavailable:
        friendly_name: Туалет - люстра недоступна
        icon: mdi:alert

      input_button.tt_light_reboot:
        friendly_name: Туалет - перезавантаження люстри
        icon: mdi:restart

      automation.tt_reboot_ceiling:
        friendly_name: Туалет - перезавантаження люстри (авто)
        icon: mdi:restart-alert

      automation.tt_reboot_ceiling_manual:
        friendly_name: Туалет - перезавантаження люстри (ручне)
        icon: mdi:restart

      automation.tt_reboot_switch_turn_on:
        friendly_name: Туалет - авто увімкнення вимикача
        icon: mdi:toggle-switch

      automation.tt_reboot_switch_turn_on_check:
        friendly_name: Туалет - перевірка вимикача
        icon: mdi:check

      automation.tt_reboot_switch_check:
        friendly_name: Туалет - оновлення статусу вимикача
        icon: mdi:sync

  ##################################################
  ## TEMPLATE
  ##################################################

  template:
    - binary_sensor:

        ##################################################
        ## НЕДОСТУПНІСТЬ ЛЮСТРИ
        ##################################################
        - name: tt_light_unavailable
          unique_id: tt_light_unavailable
          state: >
            {{ is_state('light.0x54ef44100096af68', 'unavailable') }}
          delay_on:
            minutes: 3
          device_class: problem

  ##################################################
  ## INPUT_BUTTON
  ##################################################

  input_button:
    tt_light_reboot:
      name: tt_light_reboot

  ##################################################
  ## AUTOMATION
  ##################################################

  automation:

    ##################################################
    ## ПЕРЕЗАВАНТАЖЕННЯ ЛЮСТРИ (АВТО)
    ##################################################
    - alias: tt_reboot_ceiling
      id: tt_reboot_ceiling
      description: Туалет, перезавантаження завислої люстри
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: "/5"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: binary_sensor.tt_light_unavailable
          state: "on"

        - condition: state
          entity_id: binary_sensor.electricity_internal
          state: "off"

      action:
        - action: switch.turn_off
          target:
            entity_id: switch.0x00158d00062fbb54_left

        - delay: 00:00:05

        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d00062fbb54_left

        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_log
            message: |
              {{"\U0001F916"}} Туалет - перезавантаження люстри {{ states('sensor.time_date') }}

    ##################################################
    ## ПЕРЕЗАВАНТАЖЕННЯ ЛЮСТРИ (РУЧНЕ)
    ##################################################
    - alias: tt_reboot_ceiling_manual
      id: tt_reboot_ceiling_manual
      description: Туалет, ручне перезавантаження завислої люстри
      initial_state: true
      trigger:
        - platform: state
          entity_id: input_button.tt_light_reboot

      condition:
        - condition: state
          entity_id: binary_sensor.tt_light_unavailable
          state: "on"

      action:
        - action: switch.turn_off
          target:
            entity_id: switch.0x00158d00062fbb54_left

        - delay: 00:00:05

        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d00062fbb54_left

        - action: telegram_bot.send_message
          data:
            chat_id:
              - !secret chat_id_log
            message: |
              {{"\U0001F916"}} Туалет - перезавантаження люстри {{ states('sensor.time_date') }}

    ##################################################
    ## АВТО УВІМКНЕННЯ ВИМИКАЧА
    ##################################################
    - alias: tt_reboot_switch_turn_on
      id: tt_reboot_switch_turn_on
      description: Туалет, авто увімкнення вимикача
      initial_state: true
      trigger:
        - platform: state
          entity_id: switch.0x00158d00062fbb54_left
          to: "off"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: binary_sensor.electricity_internal
          state: "off"

      action:
        - delay: 00:00:05

        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d00062fbb54_left

    ##################################################
    ## ПЕРЕВІРКА ВИМИКАЧА
    ##################################################
    - alias: tt_reboot_switch_turn_on_check
      id: tt_reboot_switch_turn_on_check
      description: Туалет, перевірка стану вимикача
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: "/1"

      condition:
        - condition: template
          value_template: "{{ states('switch.0x00158d00062fbb54_left') != 'on' }}"

        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: binary_sensor.electricity_internal
          state: "off"

      action:
        - action: switch.turn_on
          target:
            entity_id: switch.0x00158d00062fbb54_left

    ##################################################
    ## ОНОВЛЕННЯ СТАТУСУ ВИМИКАЧА
    ##################################################
    - alias: tt_reboot_switch_check
      id: tt_reboot_switch_check
      description: Туалет, перевірка статусу вимикача
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: "/10"

      condition:
        - condition: state
          entity_id: switch.control_mode
          state: "on"

        - condition: state
          entity_id: binary_sensor.electricity_internal
          state: "off"

      action:
        - action: mqtt.publish
          data:
            topic: "zigstar_poe/TT wd D1 enter/get"
            payload: '{ "state_left": "" }'