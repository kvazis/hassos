homeassistant:
  name: Home
  country: UA
  language: en
  currency: UAH
  latitude: !secret latitude_coord
  longitude: !secret longitude_coord
  elevation: 50
  unit_system: metric
  time_zone: Europe/Kyiv
  packages: !include_dir_merge_named includes
  auth_providers:
   - type: homeassistant
  whitelist_external_dirs :
   - /config

default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes
  extra_module_url:
    - /hacsfiles/custom-brand-icons/custom-brand-icons.js

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Text to speech
tts:
  - platform: google_translate
  
  - platform: reversotts
    language: 'Alyona-Russian'
    pitch: "100"
    bitrate: "128k"

panel_custom:
  - name: server_state
    sidebar_title: 'System'
    sidebar_icon: mdi:server
    js_url: /api/hassio/app/entrypoint.js
    url_path: 'hassio/system'
    embed_iframe: true
    require_admin: true
    config:
      ingress: core_configurator
      
  - name: zigbee2mqtt_1
    sidebar_title: 'Z2M 1 07'
    sidebar_icon: mdi:zigbee
    js_url: /api/hassio/app/entrypoint.js
    url_path: 'hassio/ingress/8c77aaed_zigbee2mqtt'
    embed_iframe: true
    require_admin: true
    config:
      ingress: core_configurator
      
  - name: zigbee2mqtt_2
    sidebar_title: 'Z2M 2 77'
    sidebar_icon: mdi:zigbee
    js_url: /api/hassio/app/entrypoint.js
    url_path: 'hassio/ingress/45df7312_zigbee2mqtt'
    embed_iframe: true
    require_admin: true
    config:
      ingress: core_configurator 
      
  - name: zigbee2mqtt_3
    sidebar_title: 'Z2M 3 76'
    sidebar_icon: mdi:zigbee
    js_url: /api/hassio/app/entrypoint.js
    url_path: 'hassio/ingress/997a5552_zigbee2mqtt'
    embed_iframe: true
    require_admin: true
    config:
      ingress: core_configurator 

  - name: developer-tools
    sidebar_title: Dev Tools
    sidebar_icon: mdi:application-cog-outline
    js_url: /api/hassio/app/entrypoint.js
    url_path: developer-tools
    embed_iframe: true      
      

